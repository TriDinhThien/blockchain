<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Consumer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background động */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #0c4a6e, #0284c8, #22d3ee, #67e8f9);
            background-size: 400% 400%;
            animation: gradientMove 25s ease infinite;
            opacity: 0.85;
        }

        /* Subtle particle layer */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            background-size: 200% 200%;
            animation: particleFloat 30s linear infinite;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes particleFloat {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 200%; }
        }

        .product-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 1.75rem;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.3);
        }

        .glass { backdrop-filter: blur(16px); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInScale 0.5s ease-out forwards; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        .sidebar-item.active {
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.35);
        }

        /* Timeline */
        .timeline-item {
            position: relative;
            padding-left: 34px;
            margin-bottom: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 10px;
            bottom: -20px;
            width: 3px;
            background: linear-gradient(to bottom, #0ea5e9, #67e8f9);
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot {
            position: absolute;
            left: 9px;
            top: 6px;
            width: 14px;
            height: 14px;
            background: #0ea5e9;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white/95 border-r border-white/30 flex flex-col z-50 hidden md:flex shadow-2xl backdrop-blur-xl">
        <div class="p-8 flex items-center gap-3 border-b border-white/30">
            <img src="2.png" alt="VeriGlow Logo" class="w-12 h-12 object-contain drop-shadow">
            <div>
                <span class="font-bold text-2xl tracking-tighter bg-gradient-to-r from-white to-cyan-200 bg-clip-text text-transparent">VeriGlow</span>
                <p class="text-[10px] text-white/70 -mt-1">Blockchain Traceability</p>
            </div>
        </div>
        
        <nav class="mt-8 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-left font-semibold">
                <i class="fa-solid fa-box-open text-xl"></i> 
                <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-left font-semibold">
                <i class="fa-solid fa-qrcode text-xl"></i> 
                <span>Quét mã xác thực</span>
            </button>
        </nav>
        
        <div class="p-6 border-t border-white/30 mt-auto">
            <p class="text-xs font-medium text-white/70 mb-2">TÀI KHOẢN</p>
            <div id="walletAddr" class="text-xs font-mono bg-white/10 p-3.5 rounded-2xl break-all text-white/90"></div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 min-h-screen">
        <header class="h-20 glass border-b border-white/30 flex items-center justify-between px-8 md:px-12 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-semibold text-white drop-shadow-sm">Sản phẩm của bạn</h2>
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-3.5 h-3.5 rounded-full bg-emerald-400 ring-2 ring-white/50 animate-pulse"></div>
                <span class="hidden sm:inline text-sm font-medium text-white/90">Đã kết nối</span>
            </div>
        </header>

        <div class="p-8 md:p-12 max-w-7xl mx-auto">
            <div id="my-purchases" class="tab-content active">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-lg mx-auto bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/30 p-8">
                    <div id="reader" class="rounded-3xl overflow-hidden border border-white/30 aspect-video"></div>
                    <p class="text-center text-white/70 text-sm mt-6">Đưa mã QR sản phẩm vào khung hình</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Chi Tiết -->
    <div id="detailModal" class="fixed inset-0 bg-black/70 backdrop-blur-2xl z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl relative max-h-[94vh] overflow-hidden flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-10 w-11 h-11 bg-white shadow rounded-2xl flex items-center justify-center hover:bg-red-50 hover:text-red-500">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="flex-1 overflow-y-auto p-8 md:p-12"></div>
        </div>
    </div>

    <!-- Modal Giấy Chứng Nhận -->
    <div id="certModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[90] hidden">
        <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 overflow-hidden">
            <div class="p-6 border-b flex justify-between">
                <h4 class="font-semibold text-xl">Giấy chứng nhận</h4>
                <button onclick="closeCertModal()" class="text-4xl text-slate-400 hover:text-slate-600">×</button>
            </div>
            <div class="p-8">
                <img id="certImage" src="" class="w-full rounded-2xl shadow-2xl" alt="Chứng nhận">
            </div>
        </div>
    </div>

    <!-- Modal QR -->
    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[90] hidden">
        <div class="bg-white rounded-3xl p-10 max-w-sm w-full mx-4 text-center">
            <h4 class="font-semibold text-xl mb-6">Mã QR Truy Xuất Nguồn Gốc</h4>
            <canvas id="modalQRCode" class="mx-auto rounded-2xl"></canvas>
            <p class="text-xs text-slate-400 mt-8">Quét để kiểm tra thông tin trên Blockchain</p>
        </div>
    </div>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";

const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "") return 'https://via.placeholder.com/600x600/0ea5e9/ffffff?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddr').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadProducts();
    } else {
        alert("Vui lòng cài MetaMask để sử dụng VeriGlow!");
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = `<div class="col-span-full text-center py-20 text-white/70">Đang tải tủ đồ của bạn...</div>`;

    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        let found = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="openDetail(${i})" class="product-card cursor-pointer group">
                        <img src="${formatUrl(p.productImageUrl)}" class="w-full aspect-[4/3] object-cover">
                        <div class="p-6">
                            <h4 class="font-semibold text-xl text-slate-800 line-clamp-2 group-hover:text-sky-600">${p.name}</h4>
                            <div class="mt-4 flex justify-between">
                                <span class="font-mono text-sky-500">${p.batchID}</span>
                                <span class="text-emerald-600">${p.origin}</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
        grid.innerHTML = found ? html : `<div class="col-span-full text-center py-24 text-white/60">Bạn chưa sở hữu sản phẩm nào</div>`;
    } catch (e) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-300">Lỗi kết nối Blockchain</div>`;
    }
}

async function openDetail(id) {
    try {
        const verifyData = await contract.methods.verifyProduct(id).call();
        const fullData = await contract.methods.products(id).call();

        let imgUrl = formatUrl(fullData.productImageUrl);
        let certUrl = formatUrl(fullData.certificationUrl);

        let historyHTML = verifyData.visibleHistory.map((log, idx) => `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="text-slate-700 font-medium">${log}</div>
            </div>
        `).join('') || `<p class="text-slate-400">Chưa có lịch sử.</p>`;

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-10">
                <div class="lg:col-span-2">
                    <img src="${imgUrl}" class="w-full rounded-3xl shadow-2xl" style="height:460px;object-fit:cover;">
                    <button onclick="showCertModal('${certUrl}')" class="mt-6 w-full py-4 bg-gradient-to-r from-indigo-500 to-sky-500 text-white font-semibold rounded-2xl flex items-center justify-center gap-3">
                        <i class="fa-solid fa-file-shield"></i> Xem Giấy Chứng Nhận
                    </button>
                </div>
                <div class="lg:col-span-3 space-y-8">
                    <h1 class="text-4xl font-bold text-slate-900">${fullData.name}</h1>
                    <div class="grid grid-cols-2 gap-5">
                        <div class="bg-slate-50 p-6 rounded-3xl"><p class="text-xs text-slate-400">Ngày SX</p><p class="text-2xl font-semibold">${fullData.manufactureDate}</p></div>
                        <div class="bg-slate-50 p-6 rounded-3xl"><p class="text-xs text-slate-400">Xuất xứ</p><p class="text-2xl font-semibold">${fullData.origin}</p></div>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 mb-2">Hành trình sản phẩm</p>
                        <div class="bg-white p-6 rounded-3xl border">${historyHTML}</div>
                    </div>
                    <button onclick="showQrModal('https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}')" 
                            class="w-full py-5 bg-slate-900 text-white font-semibold rounded-2xl flex items-center justify-center gap-3 hover:bg-black">
                        <i class="fa-solid fa-qrcode"></i> Xem mã QR truy xuất nguồn gốc
                    </button>
                </div>
            </div>
        `;
        document.getElementById('detailModal').classList.remove('hidden');
    } catch (e) {
        alert("Không thể tải thông tin sản phẩm.");
    }
}

// Modal functions
function showCertModal(url) {
    if (!url || url.includes('placeholder')) return alert("Chưa có giấy chứng nhận.");
    document.getElementById('certImage').src = url;
    document.getElementById('certModal').classList.remove('hidden');
}
function closeCertModal() { document.getElementById('certModal').classList.add('hidden'); }

function showQrModal(url) {
    document.getElementById('qrModal').classList.remove('hidden');
    setTimeout(() => QRCode.toCanvas(document.getElementById('modalQRCode'), url, { width: 280 }), 200);
}
function closeQrModal() { document.getElementById('qrModal').classList.add('hidden'); }

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    if (id === 'my-purchases') document.querySelectorAll('.sidebar-item')[0].classList.add('active');
    if (id === 'verify-trace') {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        startScanner();
    } else stopScanner();
}

let html5QrCode;
function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({facingMode: "environment"}, {fps:10, qrbox:260}, (text) => {
        const match = text.match(/\d+/);
        if (match) openDetail(match[0]);
    }).catch(()=>{});
}
function stopScanner() {
    if (html5QrCode) html5QrCode.stop();
}
</script>
</body>
</html>
