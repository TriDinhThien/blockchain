<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Hệ thống Truy xuất Nguồn gốc Cao cấp</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #6366f1; 
            --primary-dark: #4f46e5;
            --accent: #f472b6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .product-card {
            background: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.5);
            border-radius: 2.5rem;
            padding: 1rem;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUpFade 0.5s ease-out; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--primary);
        }

        #reader { border: none !important; border-radius: 2rem; overflow: hidden; }
    </style>
</head>

<body class="flex text-slate-900">

    <aside class="desktop-sidebar fixed left-0 top-0 bottom-0 w-72 bg-white/80 backdrop-blur-xl border-r border-slate-100 flex flex-col z-50 hidden md:flex">
        <div class="p-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa-sparkles text-white text-xl"></i>
                </div>
                <span class="font-black text-2xl tracking-tighter bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 px-6 space-y-3 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-grid-2 text-lg"></i> <span>Bộ sưu tập</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-qrcode text-lg"></i> <span>Xác thực ngay</span>
            </button>
        </nav>

        <div class="p-8 border-t border-slate-50">
            <div class="bg-slate-900 rounded-2xl p-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Ví liên kết</p>
                <div class="text-[11px] font-mono text-white truncate" id="pcAccount">Chưa kết nối</div>
            </div>
        </div>
    </aside>

    <main class="main-content flex-1 flex flex-col min-w-0 w-full md:ml-72">
        <header class="h-20 glass-nav flex items-center justify-between px-6 md:px-12 sticky top-0 z-30">
            <div>
                <span class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em]">Dashboard</span>
                <h2 id="pageTitle" class="text-xl font-extrabold text-slate-800">Tủ đồ của tôi</h2>
            </div>
            <div class="flex items-center gap-4">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white shadow-sm animate-pulse"></div>
                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                    <i class="fa-solid fa-user text-slate-400 text-sm"></i>
                </div>
            </div>
        </header>

        <div class="p-6 md:p-12 max-w-7xl mx-auto w-full">
            
            <div id="my-purchases" class="tab-content active">
                <div class="mb-10">
                    <h1 class="text-4xl font-black text-slate-900 mb-2">Xin chào! ✨</h1>
                    <p class="text-slate-500 font-medium">Danh sách các sản phẩm chính hãng bạn đang sở hữu.</p>
                </div>
                <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-xl mx-auto">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 mb-10">
                        <div id="reader"></div>
                    </div>
                    <div id="traceResult" class="hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[70] hidden flex items-end md:items-center justify-center p-0 md:p-8 transition-all">
        <div class="bg-white w-full max-w-5xl rounded-t-[3rem] md:rounded-[3rem] shadow-2xl relative max-h-[92vh] flex flex-col overflow-hidden">
            <button onclick="closeModal()" class="absolute top-8 right-8 z-10 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-all">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto p-8 md:p-12"></div>
        </div>
    </div>

    <nav class="mobile-nav fixed bottom-0 left-0 right-0 glass-nav px-8 py-4 pb-8 flex justify-between items-center z-50 md:hidden rounded-t-[2.5rem] shadow-2xl">
        <button onclick="showTab('my-purchases')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Tủ đồ</span></button>
        <div onclick="showTab('verify-trace')" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center -translate-y-6 shadow-lg border-4 border-white"><i class="fa-solid fa-qrcode text-white"></i></div>
        <button onclick="location.reload()" class="flex flex-col items-center gap-1"><i class="fa-solid fa-rotate"></i><span class="text-[10px] font-bold">Tải lại</span></button>
    </nav>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_id", "type": "uint256" },
			{ "internalType": "address", "name": "_newOwner", "type": "address" }
		],
		"name": "transferOwnership",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "productCount",
		"outputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"name": "products",
		"outputs": [
			{ "internalType": "string", "name": "name", "type": "string" },
			{ "internalType": "string", "name": "batchID", "type": "string" },
			{ "internalType": "uint256", "name": "manufactureDate", "type": "uint256" },
			{ "internalType": "string", "name": "origin", "type": "string" },
			{ "internalType": "bool", "name": "isAuthentic", "type": "bool" },
			{ "internalType": "address", "name": "owner", "type": "address" },
			{ "internalType": "string", "name": "productImageUrl", "type": "string" },
			{ "internalType": "string", "name": "certificationUrl", "type": "string" },
			{ "internalType": "string", "name": "manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "factoryAddress", "type": "string" }
		],
		"stateMutability": "view",
		"type": "function"
	},
    {
        "inputs": [{ "internalType": "uint256", "name": "_id", "type": "uint256" }],
        "name": "verifyProduct",
        "outputs": [
            { "internalType": "string", "name": "name", "type": "string" },
            { "internalType": "string", "name": "batchID", "type": "string" },
            { "internalType": "uint256", "name": "manufactureDate", "type": "uint256" },
            { "internalType": "string", "name": "origin", "type": "string" },
            { "internalType": "address", "name": "owner", "type": "address" },
            { "internalType": "string", "name": "manufacturerName", "type": "string" },
            { "internalType": "string", "name": "factoryAddress", "type": "string" },
            { "internalType": "string[]", "name": "visibleHistory", "type": "string[]" }
        ],
        "stateMutability": "view",
        "type": "function"
    }
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmVmZWZlIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiNhYmFiYWIiIHRleHQtYW5jaG9yPSJtaWRkbGUiPlZlcmlHbG93PC90ZXh0Pjwvc3ZnPg==';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

function formatDate(ts) {
    if (!ts || ts == 0) return "N/A";
    const date = new Date(Number(ts) * 1000);
    return date.toLocaleDateString('vi-VN');
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('pcAccount').innerText = account;
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        contract = new web3.eth.Contract(abi, contractAddress);
        loadPurchasedProducts();
    }
});

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    grid.innerHTML = '<div class="col-span-full text-center py-10"><i class="fa-solid fa-spinner animate-spin"></i> Đang tải...</div>';
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                found++;
                html += `
                    <div onclick="openProductDetail(${i})" class="product-card group">
                        <div class="relative overflow-hidden rounded-[2rem] mb-4 aspect-square">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold border border-white">
                                <i class="fa-solid fa-badge-check text-green-500"></i> VERIFIED
                            </div>
                        </div>
                        <h4 class="font-bold text-lg text-slate-900">${p.name}</h4>
                        <p class="text-xs text-indigo-500 font-bold uppercase tracking-widest">${p.batchID}</p>
                    </div>`;
            }
        }
        grid.innerHTML = found > 0 ? html : '<p class="col-span-full text-center py-20 text-slate-400">Bạn chưa sở hữu sản phẩm nào.</p>';
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

async function openProductDetail(id) {
    try {
        const p1 = await contract.methods.verifyProduct(id).call();
        const p2 = await contract.methods.products(id).call();
        
        document.getElementById('detailModal').classList.remove('hidden');
        
        const historyHtml = p1.visibleHistory && p1.visibleHistory.length > 0 
            ? `<div class="mt-4 relative ml-4 pl-8 border-l-2 border-slate-100 space-y-6">
                ${p1.visibleHistory.map(log => {
                    const parts = log.split(':');
                    return `
                    <div class="timeline-item relative">
                        <p class="text-sm font-black text-slate-800">${parts[0] || 'Cập nhật'}</p>
                        <p class="text-xs font-medium text-slate-500">${parts[1] || log}</p>
                    </div>`;
                }).join('')}
              </div>`
            : '<p class="text-slate-400 italic text-sm">Chưa có hành trình.</p>';

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div>
                    <img src="${formatUrl(p2.productImageUrl)}" class="w-full h-[400px] object-cover rounded-[2.5rem] shadow-xl mb-6">
                    <div class="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                        <p class="text-[10px] font-black text-indigo-400 mb-2 uppercase">Chứng nhận chất lượng</p>
                        <a href="${formatUrl(p2.certificationUrl)}" target="_blank" class="flex justify-between items-center font-bold text-indigo-600 hover:underline">
                            <span>GACP-WHO Certificate</span> <i class="fa-solid fa-external-link"></i>
                        </a>
                    </div>
                </div>
                <div>
                    <span class="text-xs font-black text-indigo-500 uppercase tracking-widest">Sản phẩm chi tiết</span>
                    <h2 class="text-4xl font-black text-slate-900 mb-2 mt-1">${p1.name}</h2>
                    <p class="text-slate-400 font-mono text-xs mb-8">Mã lô: ${p1.batchID} | NFT ID: #${id}</p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <p class="text-[10px] text-slate-400 uppercase font-bold">Ngày sản xuất</p>
                            <p class="text-sm font-bold">${formatDate(p1.manufactureDate)}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <p class="text-[10px] text-slate-400 uppercase font-bold">Xuất xứ</p>
                            <p class="text-sm font-bold">${p1.origin}</p>
                        </div>
                    </div>

                    <div class="mb-8 p-5 bg-slate-900 text-white rounded-2xl">
                        <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Cơ sở sản xuất</p>
                        <p class="text-sm font-bold">${p1.manufacturerName}</p>
                        <p class="text-[11px] text-slate-400 mt-1">${p1.factoryAddress}</p>
                    </div>

                    <div>
                        <p class="text-xs font-black text-slate-900 uppercase border-b pb-2 mb-4">Hành trình sản phẩm</p>
                        ${historyHtml}
                    </div>
                </div>
            </div>`;
    } catch (e) { alert("Lỗi tải chi tiết!"); }
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    if(id === 'my-purchases') {
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        stopScanner();
    } else {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        startScanner();
    }
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        const id = text.split('-').pop();
        openProductDetail(id);
        stopScanner();
    }).catch(() => {});
}

function stopScanner() { if(html5QrCode) html5QrCode.stop(); }
function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
