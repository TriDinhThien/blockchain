<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Consumer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; min-height: 100vh; }
        .product-card { background: white; transition: all 0.3s ease; border: 1px solid #e2e8f0; border-radius: 1.5rem; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; }
        
        /* Progress Bar Styles */
        .status-container { margin: 1.5rem 0; }
        .status-bar-bg { height: 8px; background: #f1f5f9; border-radius: 999px; overflow: hidden; position: relative; border: 1px solid #e2e8f0; }
        .status-bar-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #6366f1); transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Timeline */
        .timeline-item { position: relative; padding-left: 28px; }
        .timeline-item::before { content: ''; position: absolute; left: 9px; top: 0; bottom: -20px; width: 2px; background: #e2e8f0; }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot { position: absolute; left: 0; top: 4px; width: 18px; height: 18px; background: #0ea5e9; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; max-width: 90%; max-height: 90%; overflow: hidden; }
    </style>
</head>
<body class="flex text-slate-900">

    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex flex-col z-50 hidden md:flex">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-leaf text-lg"></i>
            </div>
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-box-open"></i> <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-qrcode"></i> <span>Quét mã xác thực</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Ví của bạn</p>
            <div class="text-[11px] font-mono text-slate-600 break-all bg-slate-50 p-3 rounded-lg" id="walletAddr">Kết nối ví...</div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 min-h-screen">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Sản phẩm sở hữu</h2>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300"></div>
        </header>

        <div class="p-10 max-w-6xl mx-auto">
            <div id="my-purchases" class="tab-content active">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div id="reader" class="rounded-2xl overflow-hidden"></div>
                    <p class="text-center text-slate-400 text-sm mt-4 font-medium">Đưa mã QR vào khung hình</p>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl relative max-h-[92vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-500 z-10 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div id="modalContent" class="p-8 md:p-12"></div>
        </div>
    </div>

    <div id="certModal" class="modal">
        <div class="modal-content max-w-2xl">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h4 class="font-semibold text-lg">Giấy chứng nhận sản phẩm</h4>
                <button onclick="closeCertModal()" class="text-3xl text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div class="p-6"><img id="certImage" src="" class="w-full rounded-2xl shadow-xl"></div>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content max-w-md">
            <div class="flex justify-between items-center px-6 py-4 border-b">
                <h4 class="font-semibold text-lg">Mã QR Truy Xuất</h4>
                <button onclick="closeQrModal()" class="text-3xl text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div class="p-8 text-center">
                <canvas id="modalQRCode" class="mx-auto rounded-2xl"></canvas>
            </div>
        </div>
    </div>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";

// ABI đã cập nhật trường ingredients ở products call 
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://via.placeholder.com/400x400?text=No+Image';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddr').innerText = account;
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        contract = new web3.eth.Contract(abi, contractAddress);
        loadProducts();
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full text-center py-10">Đang tải...</div>';
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="openDetail(${i})" class="product-card p-5 cursor-pointer group">
                        <div class="aspect-square rounded-2xl overflow-hidden bg-slate-50 mb-4">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <h4 class="font-bold text-slate-800 line-clamp-2">${p.name}</h4>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-[10px] font-bold text-sky-600 uppercase tracking-wider">${p.batchID}</span>
                            <span class="text-[10px] text-emerald-600 font-medium">${p.origin}</span>
                        </div>
                    </div>`;
            }
        }
        grid.innerHTML = found > 0 ? html : '<div class="col-span-full text-center py-20 text-slate-400">Trống.</div>';
    } catch (e) { grid.innerHTML = '<div class="col-span-full text-center py-10 text-red-400">Lỗi Blockchain.</div>'; }
}

async function openDetail(id) {
    try {
        const verifyData = await contract.methods.verifyProduct(id).call();
        const fullData = await contract.methods.products(id).call();

        // Xử lý hiển thị Ingredients 
        const ingredientsHTML = fullData.ingredients && fullData.ingredients.length > 0 
            ? fullData.ingredients.map(ing => `<span class="px-3 py-1.5 bg-sky-50 text-sky-700 text-xs font-semibold rounded-lg border border-sky-100">${ing}</span>`).join('')
            : '<p class="text-slate-400 italic text-sm">Chưa cập nhật thành phần.</p>';

        // Xử lý Thanh Bar Trạng Thái 
        const historyLen = verifyData.visibleHistory.length;
        const progressPercentage = historyLen === 1 ? '20%' : (historyLen === 2 ? '60%' : '100%');
        const statusText = historyLen === 1 ? 'Vừa xuất xưởng' : (historyLen === 2 ? 'Đang phân phối' : 'Đã đến tay người tiêu dùng');

        const historyHTML = verifyData.visibleHistory.map((log, index) => `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="text-sm font-medium text-slate-700">${log}</div>
            </div>
        `).join('');

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-10">
                <div class="lg:col-span-2">
                    <img src="${formatUrl(fullData.productImageUrl)}" class="w-full rounded-3xl shadow-xl border border-slate-100">
                    <div class="mt-6">
                        <button onclick="showCertModal('${formatUrl(fullData.certificationUrl)}')" class="w-full py-4 bg-white border border-indigo-200 hover:bg-indigo-50 rounded-2xl flex items-center justify-center gap-3 text-indigo-700 font-semibold transition-all">
                            <i class="fa-solid fa-file-shield"></i> Xem giấy chứng nhận
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-3 space-y-6">
                    <div>
                        <span class="inline-block px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full uppercase tracking-widest">Đã xác thực Blockchain</span>
                        <h1 class="text-3xl font-bold text-slate-900 mt-2">${fullData.name}</h1>
                        <p class="text-slate-400 font-mono text-sm mt-1">ID: #${id} • Batch: ${fullData.batchID}</p>
                    </div>

                    <div class="status-container">
                        <div class="flex justify-between items-end mb-2">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-tighter">Trạng thái hành trình</p>
                            <p class="text-[11px] font-bold text-sky-600">${statusText}</p>
                        </div>
                        <div class="status-bar-bg">
                            <div class="status-bar-fill" style="width: ${progressPercentage}"></div>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase mb-3">Thành phần chi tiết</p>
                        <div class="flex flex-wrap gap-2">${ingredientsHTML}</div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Ngày SX</p>
                            <p class="font-bold text-slate-800 text-sm">${fullData.manufactureDate}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Xuất xứ</p>
                            <p class="font-bold text-slate-800 text-sm">${fullData.origin}</p>
                        </div>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase mb-3">Hành trình sản phẩm</p>
                        <div class="space-y-4">${historyHTML}</div>
                    </div>

                    <button onclick="showQrModal('https://veriglow.io/verify?id=${id}')" class="w-full py-4 bg-slate-900 hover:bg-black text-white font-semibold rounded-2xl flex items-center justify-center gap-3 transition-all">
                        <i class="fa-solid fa-qrcode"></i> Mã QR Truy Xuất
                    </button>
                </div>
            </div>
        `;
        document.getElementById('detailModal').classList.remove('hidden');
    } catch (e) { console.error(e); }
}

// Modal & Scanner Functions (Giữ nguyên từ code cũ của bạn)
function showCertModal(url) { document.getElementById('certImage').src = url; document.getElementById('certModal').style.display = 'flex'; }
function closeCertModal() { document.getElementById('certModal').style.display = 'none'; }
function showQrModal(url) {
    document.getElementById('qrModal').style.display = 'flex';
    setTimeout(() => { QRCode.toCanvas(document.getElementById('modalQRCode'), url, { width: 240 }); }, 200);
}
function closeQrModal() { document.getElementById('qrModal').style.display = 'none'; }
function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'verify-trace') startScanner(); else stopScanner();
}
function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        const idMatch = decodedText.match(/\d+/);
        if (idMatch) { openDetail(idMatch[0]); stopScanner(); }
    });
}
function stopScanner() { if (html5QrCode) html5QrCode.stop(); }
</script>
</body>
</html>
