<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Hệ thống Truy xuất Nguồn gốc</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        
        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-nav { display: flex; }
            body { padding-bottom: 5rem; }
        }
        @media (min-width: 769px) {
            .desktop-sidebar { display: flex; }
            .mobile-nav { display: none; }
            .main-content { margin-left: 18rem; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #reader { border: none !important; border-radius: 24px; overflow: hidden; background: #000; }
        .sidebar-item.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .nav-item.active { color: var(--primary); }
    </style>
</head>

<body class="min-h-screen flex text-slate-900">

    <aside class="desktop-sidebar fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex-col z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg"><i class="fa-solid fa-leaf text-white"></i></div>
            <span class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-semibold text-slate-600"><i class="fa-solid fa-bag-shopping"></i> Tủ đồ của tôi</button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-semibold text-slate-600"><i class="fa-solid fa-qrcode"></i> Quét mã QR</button>
        </nav>
        <div class="p-6 border-t border-slate-100 text-[10px] font-mono text-slate-400 truncate" id="pcAccount">Đang kết nối...</div>
    </aside>

    <main class="main-content flex-1 flex flex-col w-full">
        <header class="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-6 md:px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-lg md:text-xl font-bold text-slate-800">Cửa hàng của tôi</h2>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white shadow-sm"></div>
        </header>

        <div class="p-6 md:p-10 max-w-6xl mx-auto w-full">
            <div id="my-purchases" class="tab-content active">
                <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-20 text-slate-400 text-sm">Đang đồng bộ Blockchain...</div>
                </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div>
                        <div id="reader" class="shadow-2xl"></div>
                        <div class="mt-6 p-4 bg-white rounded-2xl border border-slate-100 text-xs text-slate-500"><i class="fa-solid fa-circle-info mr-2 text-indigo-500"></i>Vui lòng đưa mã QR vào khung quét để kiểm tra.</div>
                    </div>
                    <div id="traceResult" class="hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="mobile-nav fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-10 py-4 pb-6 justify-between items-center z-50">
        <button onclick="showTab('my-purchases')" class="nav-item active flex flex-col items-center gap-1"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[9px] font-bold uppercase">Tủ đồ</span></button>
        <div onclick="showTab('verify-trace')" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center -translate-y-6 shadow-xl border-4 border-white"><i class="fa-solid fa-qrcode text-white text-xl"></i></div>
        <button onclick="location.reload()" class="nav-item flex flex-col items-center gap-1"><i class="fa-solid fa-arrows-rotate text-xl text-slate-400"></i><span class="text-[9px] font-bold text-slate-400 uppercase">Tải lại</span></button>
    </nav>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center p-0 md:p-6">
        <div class="bg-white w-full max-w-3xl rounded-t-[2.5rem] md:rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative max-h-[90vh] overflow-hidden flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500 transition-colors z-10"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            <div id="modalContent" class="overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>
    </div>

<script>
// Cập nhật địa chỉ từ file bạn cung cấp
const contractAddress = "0x4B180846fE4a4f554d386bc12111900955959cfC";
const abi = [
    { "inputs": [], "name": "productCount", "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }], "stateMutability": "view", "type": "function" },
    { "inputs": [{ "internalType": "uint256", "name": "_id", "type": "uint256" }], "name": "verifyProduct", "outputs": [
        { "internalType": "string", "name": "name", "type": "string" },
        { "internalType": "string", "name": "batchID", "type": "string" },
        { "internalType": "uint256", "name": "manufactureDate", "type": "uint256" },
        { "internalType": "string", "name": "origin", "type": "string" },
        { "internalType": "bool", "name": "isAuthentic", "type": "bool" },
        { "internalType": "string[]", "name": "history", "type": "string[]" },
        { "internalType": "address", "name": "owner", "type": "address" }
    ], "stateMutability": "view", "type": "function" }
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url) return 'https://via.placeholder.com/400x300?text=VeriGlow+Product';
    return url.startsWith('ipfs://') ? url.replace('ipfs://', 'https://ipfs.io/ipfs/') : (url.startsWith('http') ? url : `https://ipfs.io/ipfs/${url}`);
}

window.addEventListener("load", async () => {
    // 1. Init Web3
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        document.getElementById('pcAccount').innerText = "Ví: " + account.substring(0,12) + "...";
    } else {
        web3 = new Web3('http://127.0.0.1:7545'); // Ganache fallback
    }
    
    contract = new web3.eth.Contract(abi, contractAddress);

    // 2. Tự động kiểm tra nếu có ID trên URL (ví dụ: ?id=1)
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    if (idParam) {
        showTab('verify-trace');
        verifyProduct(idParam);
    } else {
        loadPurchasedProducts();
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content, .sidebar-item, .nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    // Active UI Desktop & Mobile
    const idx = tabId === 'my-purchases' ? 0 : 1;
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
    document.querySelectorAll('.nav-item')[idx === 0 ? 0 : 2].classList.add('active');
    document.getElementById('pageTitle').innerText = idx === 0 ? 'Cửa hàng của tôi' : 'Truy xuất nguồn gốc';

    if (tabId === 'verify-trace') startScanner(); else stopScanner();
}

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    if(!account) { grid.innerHTML = '<p class="col-span-full text-center py-10">Vui lòng kết nối ví MetaMask.</p>'; return; }
    
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                html += `
                <div onclick="openProductDetail(${i})" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer group">
                    <div class="w-full h-40 bg-indigo-50 rounded-2xl mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-box-open text-indigo-200 text-4xl"></i>
                    </div>
                    <h4 class="font-bold text-slate-800">${p.name}</h4>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase mt-1">${p.batchID}</p>
                </div>`;
            }
        }
        grid.innerHTML = html || '<p class="col-span-full text-center py-20 text-slate-400">Bạn chưa sở hữu sản phẩm nào.</p>';
    } catch (e) { grid.innerHTML = 'Lỗi tải dữ liệu Blockchain.'; }
}

async function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    if (html5QrCode.isScanning) await html5QrCode.stop();
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
        // Hỗ trợ cả link (verify.html?id=1) và text thuần (1)
        const id = text.includes('=') ? text.split('=').pop() : text.split('-').pop();
        if (navigator.vibrate) navigator.vibrate(100);
        verifyProduct(id);
    }).catch(() => {});
}

function stopScanner() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); }

async function verifyProduct(id) {
    const res = document.getElementById('traceResult');
    res.classList.remove('hidden');
    res.innerHTML = '<div class="bg-white p-10 rounded-[2rem] text-center shadow-lg"><i class="fa-solid fa-circle-notch animate-spin text-indigo-500 text-2xl"></i></div>';
    
    try {
        const p = await contract.methods.verifyProduct(id).call();
        res.innerHTML = `
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-2xl text-center">
                <div class="w-16 h-16 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-check-double text-2xl"></i>
                </div>
                <h3 class="font-extrabold text-xl text-slate-800 mb-1">${p.name}</h3>
                <p class="text-sm text-slate-400 mb-6">Sản phẩm chính hãng đã xác thực</p>
                <button onclick="openProductDetail(${id})" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">Xem Chi Tiết Nguồn Gốc</button>
            </div>`;
        stopScanner();
    } catch (e) { res.innerHTML = '<div class="p-8 bg-white rounded-[2rem] text-center text-red-500 font-bold shadow-lg">Mã sản phẩm không tồn tại trên hệ thống!</div>'; }
}

async function openProductDetail(id) {
    const p = await contract.methods.verifyProduct(id).call();
    document.getElementById('detailModal').classList.remove('hidden');
    
    // Timeline lịch sử
    const historyHtml = p.history && p.history.length > 0 
        ? p.history.map((log, i) => `
            <div class="flex gap-4 relative">
                ${i !== p.history.length-1 ? '<div class="absolute left-[9px] top-5 w-[2px] h-full bg-slate-100"></div>' : ''}
                <div class="z-10 w-5 h-5 rounded-full bg-indigo-500 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid fa-check text-[8px] text-white"></i></div>
                <div class="pb-6"><p class="text-xs font-bold text-slate-700">${log}</p><p class="text-[9px] text-slate-400">Giao dịch đã xác thực</p></div>
            </div>`).join('')
        : '<p class="text-xs text-slate-400 italic">Chưa có dữ liệu lịch sử.</p>';

    document.getElementById('modalContent').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="w-full h-64 md:h-full bg-slate-50 rounded-[2rem] flex items-center justify-center border-4 border-white shadow-inner">
                <i class="fa-solid fa-spa text-6xl text-indigo-100"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black text-slate-900 mb-1">${p.name}</h3>
                <p class="text-indigo-600 font-bold text-xs uppercase tracking-widest mb-6">${p.batchID}</p>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Xuất xứ</p>
                        <p class="text-xs font-bold">${p.origin}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Ngày Sản Xuất</p>
                        <p class="text-xs font-bold">${new Date(Number(p.manufactureDate)*1000).toLocaleDateString('vi-VN')}</p>
                    </div>
                </div>

                <div class="mb-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Hành trình sản phẩm</p>
                    <div class="max-h-48 overflow-y-auto pr-2 custom-scrollbar">${historyHtml}</div>
                </div>

                <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100 mb-6">
                    <p class="text-[9px] font-bold text-indigo-400 uppercase mb-1">Chủ sở hữu hiện tại</p>
                    <p class="text-[10px] font-mono text-indigo-700 break-all">${p.owner}</p>
                </div>
            </div>
        </div>`;
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
