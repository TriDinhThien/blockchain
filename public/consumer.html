<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Consumer Dashboard | VeriGlow</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
       
        :root {
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-300: #f9a8d4;
            --pink-400: #f472b6;
            --pink-500: #ec4899;
            --rose-500: #f43f5e;
            --violet-500: #8b5cf6;
            --text-dark: #3f2b3d;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(252, 231, 243, 0.95), transparent 35%),
                radial-gradient(circle at bottom right, rgba(243, 232, 255, 0.9), transparent 30%),
                linear-gradient(135deg, #fff1f7 0%, #fdf4ff 45%, #fff7fb 100%);
        }
        /* Aesthetic global */
        .tab-content { display: none; }
        .tab-content.active {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        /* Intro screen - soft pink video */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 28, 54, 0.38);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.8) saturate(1.2) contrast(1.05);
        }
        .intro-content {
            text-align: center;
            z-index: 10;
            animation: introFloat 3s ease-in-out infinite;
        }
        @keyframes introFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        /* Sidebar - pink aesthetic */
        .sidebar-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 9999px;
        }
        .sidebar-item:hover {
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgb(236 72 153 / 0.22);
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #f472b6, #ec4899, #8b5cf6);
            color: white;
            box-shadow: 0 15px 30px -8px rgba(236, 72, 153, 0.45);
        }
        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 60%;
            background: white;
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
        }
        /* Product cards */
        #productGrid > div {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2.5rem;
        }
        #productGrid > div:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 25px 25px 50px -12px rgb(236 72 153 / 0.22);
        }
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
        }
        .info-icon {
            transition: all 0.2s ease;
        }
        .info-icon:hover {
            color: #ec4899;
            transform: scale(1.2);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(88, 28, 68, 0.72);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
        }
        .modal.active { display: flex; }
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Error popup centered */
        #errorModal .modal-content {
            max-width: 520px;
            width: calc(100% - 2rem);
            border-radius: 2rem;
            overflow: hidden;
        }
        #errorModal .error-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,245,250,0.98));
            border: 1px solid rgba(244, 114, 182, 0.22);
            box-shadow: 0 30px 80px rgba(190, 24, 93, 0.25);
        }
        #errorModal .error-badge {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            box-shadow: 0 12px 24px rgba(236, 72, 153, 0.3);
        }

        /* PRODUCT DETAIL SIDEBAR */
        #productDetailSidebar {
            position: fixed;
            inset-y: 0;
            right: 0;
            width: 420px;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: -10px 0 50px -12px rgb(0 0 0 / 0.15);
            display: flex;
            flex-direction: column;
            z-index: 10001;
            border-left: 1px solid rgb(252, 231, 243);
            backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #productDetailSidebar.translate-x-full {
            transform: translateX(100%);
        }

        /* FIX SCROLL ISSUE */
        #main-scroll-area {
            flex: 1 1 0 !important;
            min-height: 0 !important;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch !important;
            scroll-behavior: smooth;
        }

        /* Nav Mobile Bottom Buttons */
        .mobile-nav-btn.active {
            color: #ec4899;
        }

        @media (max-width: 768px) {
            header {
                height: 64px !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
            }
            #pageTitle {
                font-size: 1.5rem !important;
            }
            #main-scroll-area {
                padding: 16px 16px 100px 16px !important; /* Tạo khoảng trống cho menu dưới */
            }
            #reader {
                height: 300px !important;
            }
        }
    </style>
</head>

<script>
// CẬP NHẬT CONTRACT MỚI & ABI
const contractAddress = "0x5fb38a482899ee0C716996872A0b7DD95038B98a";
const abi = [
	{
		"anonymous": false,
		"inputs": [
			{"indexed": false, "internalType": "string", "name": "id", "type": "string"},

	{

	},
	{

			{"internalType": "string", "name": "_id", "type": "string"},
			{"internalType": "string", "name": "_name", "type": "string"},

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://placehold.co/400x400?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

function showError(title, message) {
    document.getElementById('errorTitle').innerText = title || 'Thông báo lỗi';
    document.getElementById('errorMessage').innerText = message || 'Đã xảy ra lỗi.';
    document.getElementById('errorModal').classList.add('active');
}

function closeErrorModal() {
    document.getElementById('errorModal').classList.remove('active');
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0]?.toLowerCase();
            if (!account) {
                showError('Lỗi ví', 'Không thể đọc địa chỉ ví từ MetaMask. Vui lòng kiểm tra lại kết nối ví.');
                return;
            }
            document.getElementById('walletAddr').innerText = account.slice(0,6) + "..." + account.slice(-4);
            contract = new web3.eth.Contract(abi, contractAddress);
            await switchToSepolia();
            loadProducts();
        } catch (err) {
            console.error("User denied account access", err);
            showError('Lỗi kết nối ví', 'Bạn chưa cấp quyền kết nối MetaMask hoặc phiên làm việc đã bị từ chối.');
        }
    } else {
        showError('Thiếu MetaMask', 'Vui lòng cài đặt ví MetaMask trên trình duyệt của bạn.');
    }
});

async function switchToSepolia() {
    try {
        const chainId = await web3.eth.getChainId();
        if (chainId !== 11155111) {
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0xaa36a7' }] });
        }
    } catch (e) {}
}

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-slate-400 italic">Đang tải tủ đồ từ Blockchain...</p></div>';
   
    try {
        if (!contract || !account) {
            throw new Error('Chưa kết nối ví hoặc hợp đồng chưa sẵn sàng.');
        }
        
        const count = Number(await contract.methods.getProductCount().call());
        let html = '';
        let found = 0;
       
        for (let i = count - 1; i >= 0; i--) {
            const idStr = await contract.methods.allProductIds(i).call();
            const p = await contract.methods.getProductBasicInfo(idStr).call();
            
            if (p.owner.toLowerCase() === account) {
                found++;
                const journey = await contract.methods.getProductJourney(idStr).call();
                const manufacturerName = journey.length > 0 ? journey[0].name : "N/A";

                html += `
                    <div onclick="showProductDetail('${idStr}')" class="bg-white rounded-[2rem] border border-pink-100 overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 group cursor-pointer relative">
                        <div class="h-56 overflow-hidden bg-rose-50 relative">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 left-4">
                                <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold shadow-sm border border-pink-100 uppercase font-mono">ID: ${idStr}</span>
                            </div>
                        </div>
                        <div class="p-6">
                            <p class="text-[10px] text-pink-500 font-bold uppercase tracking-widest mb-2">${manufacturerName}</p>
                            <h4 class="font-bold text-slate-800 mb-4 line-clamp-1 group-hover:text-pink-600 transition-colors">${p.name}</h4>
                            <div class="flex items-center justify-between pt-4 border-t border-pink-50">
                                <div class="flex flex-col text-[10px]">
                                    <span class="text-slate-400 font-medium italic">Mã lô hàng</span>
                                    <span class="text-slate-700 font-bold font-mono">${p.batchID}</span>
                                </div>
                                <span class="bg-pink-50 text-pink-600 text-[10px] font-bold px-2.5 py-1 rounded-lg"><i class="fa-solid fa-shield-check"></i> Sở hữu</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
       
        grid.innerHTML = found > 0 ? html :
            '<div class="col-span-full py-32 text-center"><i class="fa-solid fa-box-open text-5xl text-pink-100 mb-6 block"></i><p class="text-slate-400 font-medium">Bạn chưa sở hữu sản phẩm nào.</p></div>';
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-pink-500">Không thể kết nối với Blockchain.</div>';
        showError('Tải dữ liệu thất bại', e?.message || 'Không thể lấy danh sách sản phẩm từ Blockchain.');
    }
}

async function showProductDetail(idStr) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto"></div></div>';
    sidebar.classList.remove('translate-x-full');
   
    try {
        if (!contract) throw new Error('Chưa khởi tạo hợp đồng thông minh.');
        
        const p = await contract.methods.getProductBasicInfo(idStr).call();
        const journey = await contract.methods.getProductJourney(idStr).call();
        const manufacturerNode = journey.length > 0 ? journey[0] : {};
        
        let imgUrl = formatUrl(p.productImageUrl);
        let certUrl = formatUrl(p.certificationUrl);
        const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${idStr}`;
        const ingredients = p.ingredients || [];

        let journeyHTML = journey.map((node, index) => {
            let dotColor = index === 0 ? 'bg-pink-500 shadow-sm ring-2 ring-pink-100' : (index === journey.length - 1 ? 'bg-orange-500 shadow-sm' : 'bg-slate-300');
            let isLast = index === journey.length - 1;
            let wrapperClass = isLast ? 'relative bg-orange-50 p-3 rounded-xl border border-orange-100' : 'relative';
            
            return `
            <div class="${wrapperClass}">
                <div class="absolute -left-[21px] ${isLast ? 'top-4' : 'top-1'} w-3 h-3 rounded-full ${dotColor} border-2 border-white"></div>
                <div class="text-xs font-bold ${isLast ? 'text-orange-600 uppercase' : 'text-slate-800'}">${node.role}</div>
                <div class="text-[10px] font-mono text-slate-500 mt-0.5 truncate">${node.name}</div>
                <div class="text-[9px] text-slate-500 mt-0.5 break-all"><i class="fa-solid fa-wallet mr-1"></i>Ví: ${node.wallet}</div>
                <div class="text-[9px] text-slate-400 mt-0.5"><i class="fa-regular fa-clock mr-1"></i>${new Date(Number(node.timestamp) * 1000).toLocaleString('vi-VN')}</div>
            </div>`;
        }).join('');

        content.innerHTML = `
            <div class="space-y-6">
                ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-3xl shadow-lg h-64 object-cover">` : `<div class="h-64 bg-pink-50 rounded-3xl flex items-center justify-center text-slate-400">Không có ảnh</div>`}
                
                <div class="grid grid-cols-2 gap-4 text-sm bg-pink-50 p-5 rounded-3xl">
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Tên sản phẩm</span><strong>${p.name}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Mã lô</span><strong>${p.batchID}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Ngày SX</span><strong>${p.manufactureDate}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Xuất xứ</span><strong>${p.origin}</strong></div>
                </div>

                <div class="bg-fuchsia-50 rounded-3xl p-6 border border-fuchsia-100">
                    <div class="text-fuchsia-700 text-xs font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-industry"></i> NHÀ SẢN XUẤT GỐC</div>
                    <div class="font-bold text-slate-800">${manufacturerNode.name || 'N/A'}</div>
                    <div class="text-xs text-slate-600 mt-1"><i class="fa-solid fa-location-dot mr-1"></i> ${manufacturerNode.location || 'N/A'}</div>
                </div>

                ${ingredients.length > 0 ? `
                <div class="bg-rose-50 rounded-3xl p-6 border border-rose-100">
                    <div class="text-rose-700 text-xs font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-flask"></i> THÀNH PHẦN</div>
                    <div class="flex flex-wrap gap-2">${ingredients.map(item => `<span class="bg-white px-3 py-1 rounded-full text-xs text-rose-800 border border-rose-200">${item}</span>`).join('')}</div>
                </div>` : ''}

                <div class="bg-white rounded-3xl p-6 border border-pink-100 shadow-sm">
                    <div class="text-slate-500 text-xs font-bold mb-5 flex items-center gap-2 uppercase tracking-wider"><i class="fa-solid fa-route"></i> Hành trình sản phẩm</div>
                    <div class="relative pl-6 space-y-6 before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-0.5 before:bg-pink-100">
                        ${journeyHTML}
                    </div>
                </div>

                ${certUrl && !certUrl.includes('placehold') ? `<button onclick="openCertModal('${certUrl}')" class="w-full py-4 bg-violet-50 hover:bg-violet-100 text-violet-700 rounded-3xl flex items-center justify-center gap-3 text-sm font-bold transition-all border border-violet-200"><i class="fa-solid fa-file-shield"></i> Xem giấy chứng nhận sản phẩm</button>` : ''}
                
                <div class="text-center pt-4 border-t border-pink-50 pb-8">
                    <button onclick="showQrModal('${verifyUrl}')" class="w-full py-4 bg-white hover:bg-pink-50 border border-pink-200 rounded-3xl flex items-center justify-center gap-3 text-slate-700 font-semibold transition-all">
                        <i class="fa-solid fa-qrcode text-pink-500"></i> Xem mã QR
                    </button>
                </div>
            </div>
        `;
    } catch (err) {
        showError('Không thể tải chi tiết', err?.message || 'Đã xảy ra lỗi khi truy xuất thông tin sản phẩm.');
        content.innerHTML = `<p class="text-pink-500 text-center py-10">Lỗi tải dữ liệu.</p>`;
    }
}

function closeSidebar() {
    document.getElementById('productDetailSidebar').classList.add('translate-x-full');
}

function openCertModal(url) {
    if (!url || url.includes('placehold')) {
        showError('Thiếu chứng nhận', 'Sản phẩm này chưa có ảnh chứng nhận để hiển thị.');
        return;
    }
    document.getElementById('modalCertImg').src = url;
    document.getElementById('certModal').classList.add('active');
}

function showQrModal(url) {
    const canvas = document.getElementById('modalQrCanvas');
    QRCode.toCanvas(canvas, url, { width: 250, margin: 2 }, (err) => {
        if (!err) {
            document.getElementById('qrModal').classList.add('active');
        } else {
            showError('Tạo mã QR thất bại', err?.message || 'Không thể tạo mã QR cho sản phẩm này.');
        }
    });
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-tab') === id);
    });
  
    if (id === 'my-purchases') {
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.getElementById('pageTitle').innerHTML = `Tủ đồ của tôi <span class="text-pink-500"><i class="fa-solid fa-leaf"></i></span>`;
        stopScanner();
    } else {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.getElementById('pageTitle').innerHTML = `Xác thực QR <span class="text-pink-500"><i class="fa-solid fa-qrcode"></i></span>`;
        startScanner();
    }
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            let scannedId = null;
            try {
                const url = new URL(decodedText);
                scannedId = url.searchParams.get("id");
            } catch (e) {
                if (/^[a-zA-Z0-9]+$/.test(decodedText)) {
                    scannedId = decodedText;
                }
            }
            
            if (scannedId) {
                stopScanner();
                window.location.href = "verify.html?id=" + scannedId;
            } else {
                showError('Mã QR không hợp lệ', 'Không tìm thấy ID sản phẩm trong nội dung mã QR vừa quét.');
            }
        }
    ).catch(err => {
        console.error(err);
        showError('Không thể bật camera', 'Bạn cần cấp quyền sử dụng camera hoặc thiết bị không hỗ trợ.');
    });
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
}

function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('dashboard-content').classList.remove('hidden');
    }, 800);
}

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
   
    let title = '';
    let desc = '';
   
    if (type === 'my-purchases') {
        title = 'Tủ đồ của tôi';
        desc = 'Hiển thị tất cả sản phẩm bạn đang sở hữu. Mỗi sản phẩm được xác minh trên Blockchain với đầy đủ thông tin về lịch sử, thành phần và các chứng nhận an toàn.';
    }
    else if (type === 'verify-trace') {
        title = 'Quét mã xác thực';
        desc = 'Sử dụng camera quét mã QR trên hộp sản phẩm. Hệ thống sẽ trích xuất ID (6 ký tự) và kiểm tra tính chính hãng trực tiếp thông qua Hợp đồng thông minh trên mạng Sepolia.';
    }
   
    titleEl.innerHTML = title;
    descEl.innerHTML = desc;
    modal.classList.add('active');
}

window.onclick = function(event) {
    if (event.target.id === 'certModal') {
        event.target.classList.remove('active');
    }
}
</script>
