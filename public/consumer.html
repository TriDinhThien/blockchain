<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Consumer Dashboard | VeriGlow</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
       
        :root {
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-300: #f9a8d4;
            --pink-400: #f472b6;
            --pink-500: #ec4899;
            --rose-500: #f43f5e;
            --violet-500: #8b5cf6;
            --text-dark: #3f2b3d;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(252, 231, 243, 0.95), transparent 35%),
                radial-gradient(circle at bottom right, rgba(243, 232, 255, 0.9), transparent 30%),
                linear-gradient(135deg, #fff1f7 0%, #fdf4ff 45%, #fff7fb 100%);
        }
        /* Aesthetic global */
        .tab-content { display: none; }
        .tab-content.active {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        /* Intro screen - soft pink video */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 28, 54, 0.38);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.8) saturate(1.2) contrast(1.05);
        }
        .intro-content {
            text-align: center;
            z-index: 10;
            animation: introFloat 3s ease-in-out infinite;
        }
        @keyframes introFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        /* Sidebar - pink aesthetic */
        .sidebar-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 9999px;
        }
        .sidebar-item:hover {
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgb(236 72 153 / 0.22);
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #f472b6, #ec4899, #8b5cf6);
            color: white;
            box-shadow: 0 15px 30px -8px rgba(236, 72, 153, 0.45);
        }
        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 60%;
            background: white;
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
        }
        /* Product cards */
        #productGrid > div {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2.5rem;
        }
        #productGrid > div:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 25px 25px 50px -12px rgb(236 72 153 / 0.22);
        }
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
        }
        .info-icon {
            transition: all 0.2s ease;
        }
        .info-icon:hover {
            color: #ec4899;
            transform: scale(1.2);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(88, 28, 68, 0.72);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
        }
        .modal.active { display: flex; }
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Error popup centered */
        #errorModal .modal-content {
            max-width: 520px;
            width: calc(100% - 2rem);
            border-radius: 2rem;
            overflow: hidden;
        }
        #errorModal .error-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,245,250,0.98));
            border: 1px solid rgba(244, 114, 182, 0.22);
            box-shadow: 0 30px 80px rgba(190, 24, 93, 0.25);
        }
        #errorModal .error-badge {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            box-shadow: 0 12px 24px rgba(236, 72, 153, 0.3);
        }

        /* ==================== PRODUCT DETAIL SIDEBAR (GIỐNG HỆT MANUFACTURER) ==================== */
        #productDetailSidebar {
            position: fixed;
            inset-y: 0;
            right: 0;
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            display: flex;
            flex-direction: column;
            z-index: 100;
            border-left: 1px solid rgb(203 213 225);
            backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #productDetailSidebar.translate-x-full {
            transform: translateX(100%);
        }
    </style>
</head>

<script>
// Contract configuration (GIỮ NGUYÊN 100%)
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];
let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://placehold.co/400x400?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

function showError(title, message) {
    document.getElementById('errorTitle').innerText = title || 'Thông báo lỗi';
    document.getElementById('errorMessage').innerText = message || 'Đã xảy ra lỗi.';
    document.getElementById('errorModal').classList.add('active');
}

function closeErrorModal() {
    document.getElementById('errorModal').classList.remove('active');
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0]?.toLowerCase();
            if (!account) {
                showError('Lỗi ví', 'Không thể đọc địa chỉ ví từ MetaMask. Vui lòng kiểm tra lại kết nối ví.');
                return;
            }
            document.getElementById('walletAddr').innerText = account;
            contract = new web3.eth.Contract(abi, contractAddress);
            loadProducts();
        } catch (err) {
            console.error("User denied account access", err);
            showError('Lỗi kết nối ví', 'Bạn chưa cấp quyền kết nối MetaMask hoặc phiên làm việc đã bị từ chối.');
        }
    } else {
        showError('Thiếu MetaMask', 'Vui lòng cài đặt MetaMask để sử dụng chức năng xác thực và truy xuất sản phẩm.');
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-slate-400 italic">Đang tải tủ đồ từ Blockchain...</p></div>';
   
    try {
        if (!contract || !account) {
            throw new Error('Chưa kết nối ví hoặc hợp đồng chưa sẵn sàng.');
        }
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        let found = 0;
       
        // Đảo ngược vòng lặp: chạy từ count lùi về 1 để hiển thị sản phẩm mới nhất trước
        for (let i = count; i >= 1; i--) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="showProductDetail(${i})" class="bg-white rounded-[2rem] border border-pink-100 overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 group cursor-pointer relative">
                        <div class="h-56 overflow-hidden bg-rose-50 relative">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 left-4">
                                <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold shadow-sm border border-pink-100">ID: #${i}</span>
                            </div>
                        </div>
                        <div class="p-6">
                            <p class="text-[10px] text-pink-500 font-bold uppercase tracking-widest mb-2">${p.manufacturerName}</p>
                            <h4 class="font-bold text-slate-800 mb-4 line-clamp-1 group-hover:text-pink-600 transition-colors">${p.name}</h4>
                            <div class="flex items-center justify-between pt-4 border-t border-pink-50">
                                <div class="flex flex-col text-[10px]">
                                    <span class="text-slate-400 font-medium italic">Mã lô hàng</span>
                                    <span class="text-slate-700 font-bold font-mono">${p.batchID}</span>
                                </div>
                                <span class="bg-pink-50 text-pink-600 text-[10px] font-bold px-2.5 py-1 rounded-lg">Chính hãng</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
       
        grid.innerHTML = found > 0 ? html :
            '<div class="col-span-full py-32 text-center"><i class="fa-solid fa-box-open text-5xl text-pink-100 mb-6 block"></i><p class="text-slate-400 font-medium">Bạn chưa sở hữu sản phẩm nào.</p></div>';
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-pink-500">Không thể kết nối với Blockchain.</div>';
        showError('Tải dữ liệu thất bại', e?.message || 'Không thể lấy danh sách sản phẩm từ Blockchain.');
    }
}

// ==================== SHOW PRODUCT DETAIL (ĐÃ SỬA GIỐNG HỆT MANUFACTURER) ====================
async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto"></div></div>';
    sidebar.classList.remove('translate-x-full');
   
    try {
        if (!contract) throw new Error('Chưa khởi tạo hợp đồng thông minh.');
        const verify = await contract.methods.verifyProduct(id).call();
        const prod = await contract.methods.products(id).call();
        let imgUrl = formatUrl(prod.productImageUrl);
        let certUrl = formatUrl(prod.certificationUrl);
        const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
        const history = verify.visibleHistory || [];
        const ingredients = verify.ingredients || [];

        content.innerHTML = `
            <div class="space-y-6">
                ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-3xl shadow-lg h-64 object-cover">` : `<div class="h-64 bg-pink-50 rounded-3xl flex items-center justify-center text-slate-400">Không có ảnh</div>`}
                
                <div class="grid grid-cols-2 gap-4 text-sm bg-pink-50 p-5 rounded-3xl">
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Tên sản phẩm</span><strong>${verify.name}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Mã lô</span><strong>${verify.batchID}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Ngày SX</span><strong>${verify.manufactureDate}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Xuất xứ</span><strong>${verify.origin}</strong></div>
                </div>

                <div class="bg-fuchsia-50 rounded-3xl p-6 border border-fuchsia-100">
                    <div class="text-fuchsia-700 text-xs font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-industry"></i> NHÀ SẢN XUẤT</div>
                    <div class="font-bold text-slate-800">${verify.manufacturerName}</div>
                    <div class="text-xs text-slate-600 mt-1"><i class="fa-solid fa-location-dot mr-1"></i> ${verify.factoryAddress}</div>
                </div>

                ${ingredients.length > 0 ? `
                <div class="bg-rose-50 rounded-3xl p-6 border border-rose-100">
                    <div class="text-rose-700 text-xs font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-flask"></i> THÀNH PHẦN</div>
                    <div class="flex flex-wrap gap-2">${ingredients.map(item => `<span class="bg-white px-3 py-1 rounded-full text-xs text-rose-800 border border-rose-200">${item}</span>`).join('')}</div>
                </div>` : ''}

                <div class="bg-white rounded-3xl p-6 border border-pink-100 shadow-sm">
                    <div class="text-slate-500 text-xs font-bold mb-5 flex items-center gap-2 uppercase tracking-wider"><i class="fa-solid fa-route"></i> Hành trình sản phẩm</div>
                    <div class="relative pl-6 space-y-6 before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-0.5 before:bg-pink-100">
                        <div class="relative">
                            <div class="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-pink-500 border-2 border-white shadow-sm ring-2 ring-pink-100"></div>
                            <div class="text-xs font-bold text-slate-800">Sản xuất & Đăng ký</div>
                            <div class="text-[10px] text-slate-400 truncate mt-0.5">${verify.manufacturerName}</div>
                        </div>
                        <div class="relative">
                            <div class="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-slate-300 border-2 border-white"></div>
                            <div class="text-xs font-bold text-slate-600">Đã chuyển giao cho: ${history.length - 1} người</div>
                        </div>
                        <div class="relative bg-orange-50 p-3 rounded-xl border border-orange-100">
                            <div class="absolute -left-[21px] top-4 w-3 h-3 rounded-full bg-orange-500 border-2 border-white shadow-sm"></div>
                            <div class="text-[10px] font-bold text-orange-600 uppercase">Chủ sở hữu hiện tại</div>
                            <div class="text-[10px] font-mono text-slate-500 truncate mt-1">${verify.owner}</div>
                        </div>
                    </div>
                </div>

                ${certUrl && !certUrl.includes('placehold') ? `<button onclick="openCertModal('${certUrl}')" class="w-full py-4 bg-violet-50 hover:bg-violet-100 text-violet-700 rounded-3xl flex items-center justify-center gap-3 text-sm font-bold transition-all border border-violet-200"><i class="fa-solid fa-file-shield"></i> Xem giấy chứng nhận sản phẩm</button>` : ''}
                
                <div class="text-center pt-4 border-t border-pink-50">
                    <button onclick="showQrModal('${verifyUrl}')" class="w-full py-4 bg-white hover:bg-pink-50 border border-pink-200 rounded-3xl flex items-center justify-center gap-3 text-slate-700 font-semibold transition-all">
                        <i class="fa-solid fa-qrcode text-pink-500"></i> Xem mã QR
                    </button>
                </div>
            </div>
        `;
    } catch (err) {
        const message = (err?.message || '').toLowerCase();
        if (message.includes('revert') || message.includes('not found') || message.includes('invalid')) {
            showError('Sản phẩm không hợp lệ', 'ID sản phẩm không tồn tại hoặc không thể truy xuất dữ liệu. Vui lòng kiểm tra lại mã sản phẩm.');
        } else {
            showError('Không thể tải chi tiết', err?.message || 'Đã xảy ra lỗi khi truy xuất thông tin sản phẩm.');
        }
        content.innerHTML = `<p class="text-pink-500 text-center py-10">Không thể tải chi tiết sản phẩm.</p>`;
    }
}

function closeSidebar() {
    document.getElementById('productDetailSidebar').classList.add('translate-x-full');
}

function openCertModal(url) {
    if (!url || url.includes('placehold')) {
        showError('Thiếu chứng nhận', 'Sản phẩm này chưa có ảnh chứng nhận để hiển thị.');
        return;
    }
    document.getElementById('modalCertImg').src = url;
    document.getElementById('certModal').classList.add('active');
}

function showQrModal(url) {
    const canvas = document.getElementById('modalQrCanvas');
    QRCode.toCanvas(canvas, url, { width: 250, margin: 2 }, (err) => {
        if (!err) {
            document.getElementById('qrModal').classList.add('active');
        } else {
            showError('Tạo mã QR thất bại', err?.message || 'Không thể tạo mã QR cho sản phẩm này.');
        }
    });
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
  
    if (id === 'my-purchases') {
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.getElementById('pageTitle').innerText = "Tủ đồ của tôi";
        stopScanner();
    } else {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.getElementById('pageTitle').innerText = "Xác thực QR";
        startScanner();
    }
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            const idMatch = decodedText.match(/id=(\d+)/) || decodedText.match(/\d+/);
            if (idMatch) {
                showProductDetail(idMatch[1] || idMatch[0]);
                stopScanner();
            } else {
                showError('Mã QR không hợp lệ', 'Không tìm thấy ID sản phẩm trong nội dung mã QR vừa quét.');
            }
        }
    ).catch(err => {
        console.error(err);
        showError('Không thể bật camera', err?.message || 'Không thể khởi động máy quét QR.');
    });
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
}

function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('dashboard-content').classList.add('flex');
    }, 800);
}

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
   
    let title = '';
    let desc = '';
   
    if (type === 'my-purchases') {
        title = 'Tủ đồ của tôi';
        desc = 'Hiển thị tất cả sản phẩm bạn đã sở hữu. Mỗi sản phẩm được xác thực trên Blockchain với đầy đủ thông tin nguồn gốc, thành phần và lịch sử hành trình.';
    }
    else if (type === 'verify-trace') {
        title = 'Quét mã xác thực';
        desc = 'Sử dụng camera để quét mã QR trên sản phẩm. Hệ thống sẽ tự động truy xuất thông tin chi tiết và xác thực tính chính hãng của sản phẩm từ Blockchain.';
    }
   
    titleEl.innerHTML = title;
    descEl.innerHTML = desc;
    modal.classList.add('active');
}

window.onclick = function(event) {
    if (event.target.id === 'certModal' || event.target.id === 'qrModal') {
        event.target.classList.remove('active');
    }
}
</script>
</body>
</html>
