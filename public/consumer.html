<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VeriGlow | Trải nghiệm Khách hàng</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --primary: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tối ưu khung quét QR cho Mobile */
        #reader {
            border: none !important;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        #reader video { border-radius: 24px; object-fit: cover !important; }
        
        /* Bottom Navigation Style */
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-4px); transition: all 0.3s; }
        
        .product-card {
            transition: transform 0.2s;
            touch-action: manipulation;
        }
        .product-card:active { transform: scale(0.96); }
    </style>
</head>

<body class="pb-24"> <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-lg border-b border-slate-100 px-6 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="2.png" alt="Logo" class="w-8 h-8 rounded-lg object-cover">
                <h1 class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</h1>
            </div>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white shadow-sm"></div>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        
        <div id="my-purchases" class="tab-content active">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Bộ sưu tập</h2>
                <p class="text-slate-500 text-sm">Sản phẩm chính hãng bạn đang sở hữu</p>
            </div>
            
            <div id="myProductsGrid" class="grid grid-cols-1 gap-4">
                <div class="animate-pulse bg-white p-4 rounded-3xl h-32 border border-slate-100"></div>
            </div>
        </div>

        <div id="verify-trace" class="tab-content">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Truy xuất</h2>
                <p class="text-slate-500 text-sm">Quét mã trên bao bì sản phẩm</p>
            </div>

            <div class="relative">
                <div id="reader"></div>
                <div class="absolute inset-0 pointer-events-none border-[20px] border-white/10 rounded-3xl"></div>
            </div>

            <div id="traceResult" class="hidden mt-6 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-xl">
                </div>

            <div class="mt-8 p-4 bg-indigo-50 rounded-2xl flex items-start gap-3">
                <i class="fa-solid fa-lightbulb text-indigo-500 mt-1"></i>
                <p class="text-xs text-indigo-700 leading-relaxed">
                    Hãy giữ camera ổn định và đảm bảo đủ ánh sáng để nhận diện mã QR nhanh nhất.
                </p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-10 py-4 flex justify-between items-center z-50">
        <button onclick="showTab('my-purchases')" class="nav-item active flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-tight">Cửa hàng</span>
        </button>
        
        <div onclick="showTab('verify-trace')" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center -translate-y-8 shadow-xl shadow-indigo-200 border-4 border-white active:scale-90 transition-all">
            <i class="fa-solid fa-qrcode text-white text-xl"></i>
        </div>

        <button onclick="window.location.reload()" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-rotate text-xl text-slate-400"></i>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Làm mới</span>
        </button>
    </nav>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl relative animate-slideUp">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

window.addEventListener("load", async () => {
    if (window.ethereum) {
        try {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0];
            document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
            contract = new web3.eth.Contract(abi, contractAddress);
            loadPurchasedProducts();
        } catch (e) { console.error("Kết nối ví thất bại"); }
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    if (tabId === 'verify-trace') {
        startScanner();
    } else {
        stopScanner();
        loadPurchasedProducts();
    }
}

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            if (p[6].toLowerCase() === account.toLowerCase()) {
                html += `
                    <div onclick="openProductDetail(${i})" class="product-card bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4">
                        <img src="${p[8]}" class="w-20 h-20 rounded-2xl object-cover bg-slate-50">
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-800">${p[0]}</h4>
                            <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">${p[1]}</p>
                            <p class="text-xs text-slate-400 mt-1">ID: #${i}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300 pr-2"></i>
                    </div>
                `;
            }
        }
        grid.innerHTML = html || '<p class="text-center py-10 text-slate-400 text-sm">Bạn chưa có sản phẩm nào trong ví.</p>';
    } catch (e) { grid.innerHTML = 'Lỗi tải dữ liệu.'; }
}

// KHỞI CHẠY SCANNER TỐI ƯU CAMERA SAU
function startScanner() {
    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
    }
    
    const config = { fps: 15, qrbox: { width: 250, height: 250 } };
    
    html5QrCode.start(
        { facingMode: "environment" }, // Ưu tiên Camera sau
        config,
        (decodedText) => {
            const id = decodedText.split('-').pop(); // Lấy ID cuối chuỗi PRD-00001
            vibrateDevice();
            verifyProduct(id);
        }
    ).catch(err => {
        alert("Không thể truy cập Camera. Vui lòng cấp quyền trong cài đặt trình duyệt.");
    });
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop();
    }
}

async function verifyProduct(id) {
    const res = document.getElementById('traceResult');
    res.classList.remove('hidden');
    res.innerHTML = '<div class="text-center"><i class="fa-solid fa-spinner animate-spin"></i></div>';
    
    try {
        const p = await contract.methods.verifyProduct(id).call();
        res.innerHTML = `
            <div class="text-center">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-check-double text-2xl"></i>
                </div>
                <h3 class="font-bold text-xl text-slate-800">${p[0]}</h3>
                <p class="text-sm text-slate-500 mb-6">${p[1]} - ${p[3]}</p>
                <button onclick="openProductDetail(${id})" class="w-full py-3 bg-slate-900 text-white rounded-2xl font-bold">Xem toàn bộ thông tin</button>
            </div>
        `;
        stopScanner(); // Dừng quét sau khi tìm thấy
    } catch (e) {
        res.innerHTML = '<p class="text-red-500 font-bold text-center">Sản phẩm không tồn tại!</p>';
    }
}

async function openProductDetail(id) {
    const p = await contract.methods.verifyProduct(id).call();
    document.getElementById('detailModal').classList.remove('hidden');
    document.getElementById('modalContent').innerHTML = `
        <img src="${p[8]}" class="w-full h-56 object-cover rounded-3xl mb-6 shadow-lg">
        <h3 class="text-2xl font-extrabold text-slate-800 mb-2">${p[0]}</h3>
        <p class="text-indigo-600 font-bold text-sm mb-6 underline underline-offset-4">Xác thực bởi VeriGlow Blockchain</p>
        
        <div class="space-y-4 mb-8">
            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                <span class="text-slate-500 text-xs font-bold uppercase">Xuất xứ</span>
                <span class="text-slate-800 font-semibold">${p[3]}</span>
            </div>
             <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                <span class="text-slate-500 text-xs font-bold uppercase">Ngày sản xuất</span>
                <span class="text-slate-800 font-semibold">${new Date(Number(p[2])*1000).toLocaleDateString()}</span>
            </div>
        </div>

        <div class="mb-6">
            <p class="text-xs font-bold text-slate-400 uppercase mb-3">Lịch sử di chuyển</p>
            <div class="border-l-2 border-indigo-100 ml-2 pl-4 space-y-4">
                ${p[5].map(log => `
                    <div class="relative">
                        <div class="absolute -left-[21px] top-1 w-2 h-2 rounded-full bg-indigo-500"></div>
                        <p class="text-xs text-slate-600">${log}</p>
                    </div>
                `).join('')}
            </div>
        </div>
        <a href="${p[9]}" target="_blank" class="block w-full text-center py-4 border-2 border-slate-100 rounded-2xl font-bold text-slate-700">Xem chứng chỉ IPFS</a>
    `;
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
function vibrateDevice() { if (navigator.vibrate) navigator.vibrate(100); }
</script>
</body>
</html>
