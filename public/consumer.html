<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Consumer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0ea5e9;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        
        .product-card {
            background: white;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            border: 1px solid #e2e8f0;
            border-radius: 1.75rem;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.25);
            border-color: #22d3ee;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInScale 0.5s ease-out forwards; }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.35);
        }
        
        /* Timeline */
        .timeline {
            position: relative;
        }
        .timeline-item {
            position: relative;
            padding-left: 34px;
            margin-bottom: 18px;
        }
        .timeline-item:last-child { margin-bottom: 0; }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 10px;
            bottom: -18px;
            width: 3px;
            background: linear-gradient(to bottom, #0ea5e9, #67e8f9);
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot {
            position: absolute;
            left: 9px;
            top: 6px;
            width: 14px;
            height: 14px;
            background: #0ea5e9;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.25);
        }
        
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="flex text-slate-900">

    <!-- Sidebar -->
    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex flex-col z-50 hidden md:flex shadow-2xl">
        <div class="p-8 flex items-center gap-3 border-b border-slate-100">
            <img src="2.png" alt="VeriGlow Logo" class="w-12 h-12 object-contain drop-shadow-md">
            <div>
                <span class="font-bold text-2xl tracking-tighter bg-gradient-to-r from-sky-600 via-cyan-500 to-teal-500 bg-clip-text text-transparent">VeriGlow</span>
                <p class="text-[10px] text-slate-400 -mt-1">Blockchain Traceability</p>
            </div>
        </div>
        
        <nav class="mt-8 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-left font-semibold">
                <i class="fa-solid fa-box-open text-xl"></i> 
                <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-left font-semibold">
                <i class="fa-solid fa-qrcode text-xl"></i> 
                <span>Quét mã xác thực</span>
            </button>
        </nav>
        
        <div class="p-6 border-t border-slate-100 mt-auto">
            <p class="text-xs font-medium text-slate-400 mb-2">TÀI KHOẢN</p>
            <div id="walletAddr" class="text-xs font-mono bg-slate-50 p-3.5 rounded-2xl break-all text-slate-600"></div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 min-h-screen">
        <header class="h-20 glass border-b border-slate-100 flex items-center justify-between px-8 md:px-12 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-semibold text-slate-800">Sản phẩm của bạn</h2>
            <div class="flex items-center gap-3">
                <div id="statusDot" class="w-3.5 h-3.5 rounded-full bg-emerald-500 ring-2 ring-emerald-200 animate-pulse"></div>
                <span class="hidden sm:inline text-sm font-medium text-emerald-600">Đã kết nối Blockchain</span>
            </div>
        </header>

        <div class="p-8 md:p-12 max-w-7xl mx-auto">
            <!-- Tab Tủ đồ -->
            <div id="my-purchases" class="tab-content active">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
            </div>

            <!-- Tab Quét QR -->
            <div id="verify-trace" class="tab-content">
                <div class="max-w-lg mx-auto bg-white rounded-3xl shadow-2xl border border-slate-100 p-8">
                    <div id="reader" class="rounded-3xl overflow-hidden border-2 border-dashed border-slate-200 aspect-video"></div>
                    <p class="text-center text-slate-400 text-sm mt-6 font-medium">Đưa mã QR sản phẩm vào khung hình để xác thực</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Chi Tiết Sản Phẩm -->
    <div id="detailModal" class="fixed inset-0 bg-black/70 backdrop-blur-xl z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl relative max-h-[94vh] overflow-hidden flex flex-col">
            <button onclick="closeModal()" 
                    class="absolute top-6 right-6 z-10 w-11 h-11 bg-white shadow-lg rounded-2xl flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition-all">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="flex-1 overflow-y-auto p-8 md:p-12"></div>
        </div>
    </div>

    <!-- Modal Giấy Chứng Nhận -->
    <div id="certModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[90] hidden">
        <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h4 class="font-semibold text-xl">Giấy chứng nhận sản phẩm</h4>
                <button onclick="closeCertModal()" class="text-4xl leading-none text-slate-400 hover:text-slate-600">×</button>
            </div>
            <div class="p-8">
                <img id="certImage" src="" class="w-full rounded-2xl shadow-2xl" alt="Giấy chứng nhận">
            </div>
        </div>
    </div>

    <!-- Modal QR Code -->
    <div id="qrModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[90] hidden">
        <div class="bg-white rounded-3xl p-10 max-w-sm w-full mx-4 text-center">
            <h4 class="font-semibold text-xl mb-6">Mã QR Truy Xuất Nguồn Gốc</h4>
            <canvas id="modalQRCode" class="mx-auto rounded-2xl shadow-inner"></canvas>
            <p class="text-xs text-slate-400 mt-8">Quét mã để kiểm tra thông tin trên Blockchain</p>
        </div>
    </div>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";

const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "") return 'https://via.placeholder.com/600x600/0ea5e9/ffffff?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddr').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadProducts();
    } else {
        alert("Vui lòng cài đặt MetaMask để sử dụng VeriGlow!");
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = `
        <div class="col-span-full text-center py-20">
            <div class="shimmer w-12 h-12 mx-auto rounded-full"></div>
            <p class="mt-6 text-slate-400">Đang tải tủ đồ của bạn...</p>
        </div>`;

    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        let found = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="openDetail(${i})" class="product-card cursor-pointer group">
                        <div class="relative">
                            <img src="${formatUrl(p.productImageUrl)}" 
                                 class="w-full aspect-[4/3] object-cover transition-transform duration-700 group-hover:scale-105">
                            <div class="absolute top-4 right-4 bg-white/95 backdrop-blur-md text-xs font-bold px-4 py-1.5 rounded-2xl shadow text-emerald-600">
                                VERIFIED
                            </div>
                        </div>
                        <div class="p-6">
                            <h4 class="font-semibold text-xl text-slate-800 line-clamp-2 group-hover:text-sky-600 transition-colors">${p.name}</h4>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="font-mono text-sky-500 text-sm">${p.batchID}</span>
                                <span class="text-emerald-600 text-sm font-medium">${p.origin}</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
        grid.innerHTML = found ? html : `
            <div class="col-span-full text-center py-24">
                <i class="fa-solid fa-box-open text-7xl text-slate-200"></i>
                <p class="mt-6 text-slate-400 text-lg">Bạn chưa sở hữu sản phẩm nào</p>
            </div>`;
    } catch (e) {
        console.error(e);
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">Lỗi kết nối với Blockchain</div>`;
    }
}

async function openDetail(id) {
    try {
        const verifyData = await contract.methods.verifyProduct(id).call();
        const fullData = await contract.methods.products(id).call();

        let imgUrl = formatUrl(fullData.productImageUrl);
        let certUrl = formatUrl(fullData.certificationUrl);

        // Xây dựng Timeline Hành Trình
        let historyHTML = '';
        if (verifyData.visibleHistory && verifyData.visibleHistory.length > 0) {
            historyHTML = verifyData.visibleHistory.map((log, idx) => `
                <div class="timeline-item">
                    <div class="timeline-dot"></div>
                    <div class="text-slate-700 font-medium">${log}</div>
                    <div class="text-xs text-slate-400 mt-1">
                        ${idx === 0 ? 'Sản phẩm được tạo bởi Nhà sản xuất' : 'Chuyển giao quyền sở hữu'}
                    </div>
                </div>
            `).join('');
        } else {
            historyHTML = `<p class="text-slate-400 italic text-sm">Chưa có lịch sử chuyển giao.</p>`;
        }

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-5 gap-10">
                <!-- Ảnh sản phẩm -->
                <div class="lg:col-span-2">
                    <img src="${imgUrl}" class="w-full rounded-3xl shadow-2xl" style="height: 460px; object-fit: cover;">
                    
                    <div class="mt-8">
                        <button onclick="showCertModal('${certUrl}')" 
                                class="w-full flex items-center justify-center gap-3 py-4 bg-gradient-to-r from-indigo-500 to-sky-500 text-white font-semibold rounded-2xl hover:brightness-105 transition-all">
                            <i class="fa-solid fa-file-shield"></i>
                            Xem Giấy Chứng Nhận
                        </button>
                    </div>
                </div>

                <!-- Thông tin chi tiết -->
                <div class="lg:col-span-3 space-y-8">
                    <div>
                        <span class="px-4 py-1.5 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full">BLOCKCHAIN VERIFIED</span>
                        <h1 class="text-4xl font-bold text-slate-900 mt-4 leading-tight">${fullData.name}</h1>
                        <p class="font-mono text-slate-500 mt-2">ID: #${id} • Lô: ${fullData.batchID}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-5">
                        <div class="bg-slate-50 p-6 rounded-3xl">
                            <p class="text-xs uppercase font-bold text-slate-400">Ngày sản xuất</p>
                            <p class="text-2xl font-semibold text-slate-800 mt-1">${fullData.manufactureDate}</p>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-3xl">
                            <p class="text-xs uppercase font-bold text-slate-400">Xuất xứ</p>
                            <p class="text-2xl font-semibold text-slate-800 mt-1">${fullData.origin}</p>
                        </div>
                    </div>

                    <div>
                        <p class="uppercase text-xs font-bold text-slate-400 mb-3">Nhà sản xuất</p>
                        <p class="font-semibold text-lg">${fullData.manufacturerName}</p>
                        <p class="text-slate-600">${fullData.factoryAddress}</p>
                    </div>

                    <!-- Hành trình sản phẩm -->
                    <div>
                        <p class="uppercase text-xs font-bold text-slate-400 mb-4">Hành trình của sản phẩm</p>
                        <div class="timeline bg-white p-6 rounded-3xl border border-slate-100">
                            ${historyHTML}
                        </div>
                    </div>

                    <!-- Chủ sở hữu hiện tại -->
                    <div class="bg-emerald-50 border border-emerald-100 rounded-3xl p-6">
                        <p class="text-emerald-700 text-xs font-bold uppercase">Chủ sở hữu hiện tại</p>
                        <p class="font-mono text-sm mt-2 break-all text-slate-700">${verifyData.owner}</p>
                        <p class="text-emerald-600 text-xs mt-1">• Đây là sản phẩm bạn đang sở hữu</p>
                    </div>

                    <button onclick="showQrModal('https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}')" 
                            class="w-full py-5 bg-slate-900 hover:bg-black text-white font-semibold rounded-2xl flex items-center justify-center gap-3 transition-all">
                        <i class="fa-solid fa-qrcode text-xl"></i>
                        Xem mã QR truy xuất nguồn gốc
                    </button>
                </div>
            </div>
        `;

        document.getElementById('detailModal').classList.remove('hidden');
    } catch (e) {
        console.error(e);
        alert("Không thể tải thông tin sản phẩm. Vui lòng thử lại!");
    }
}

// ==================== MODAL & SCANNER ====================
function showCertModal(url) {
    if (!url || url.includes('placeholder')) return alert("Sản phẩm chưa có giấy chứng nhận.");
    document.getElementById('certImage').src = url;
    document.getElementById('certModal').classList.remove('hidden');
}

function closeCertModal() {
    document.getElementById('certModal').classList.add('hidden');
}

function showQrModal(url) {
    document.getElementById('qrModal').classList.remove('hidden');
    setTimeout(() => {
        QRCode.toCanvas(document.getElementById('modalQRCode'), url, { width: 280, margin: 2 });
    }, 300);
}

function closeQrModal() {
    document.getElementById('qrModal').classList.add('hidden');
}

function closeModal() {
    document.getElementById('detailModal').classList.add('hidden');
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    if (id === 'my-purchases') document.querySelectorAll('.sidebar-item')[0].classList.add('active');
    if (id === 'verify-trace') {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        startScanner();
    } else {
        stopScanner();
    }
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 260, height: 260 } },
        (decodedText) => {
            const match = decodedText.match(/\d+/);
            if (match) {
                openDetail(match[0]);
                stopScanner();
            }
        }
    ).catch(() => {});
}

function stopScanner() {
    if (html5QrCode) html5QrCode.stop();
}

// Đóng modal khi click ngoài
document.getElementById('certModal').addEventListener('click', e => {
    if (e.target === document.getElementById('certModal')) closeCertModal();
});
document.getElementById('qrModal').addEventListener('click', e => {
    if (e.target === document.getElementById('qrModal')) closeQrModal();
});
</script>
</body>
</html>
