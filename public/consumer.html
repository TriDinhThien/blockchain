    <title>VeriGlow | Hệ thống Truy xuất Nguồn gốc Cao cấp</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #6366f1; 
            --primary-dark: #4f46e5;
            --accent: #f472b6;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Classes */
        .glass-nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .product-card {
            background: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        /* Animation */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUpFade 0.5s ease-out; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scanner Style */
        #reader {
            border: none !important;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Sidebar & Nav Active */
        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        .nav-item.active { color: var(--primary); }

        /* Timeline UI */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--primary);
        }

        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            body { padding-bottom: 5rem; }
        }
    </style>
</head>

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "") return 'https://via.placeholder.com/400x300?text=VeriGlow+Product';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        try {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0];
            document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-green-500 border-2 border-white shadow-sm";
            document.getElementById('pcAccount').innerText = account;
            contract = new web3.eth.Contract(abi, contractAddress);
            loadPurchasedProducts();
        } catch (e) { console.error(e); }
    }
});

function showTab(tabId) {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    document.getElementById('pageTitle').innerText = tabId === 'my-purchases' ? 'Tủ đồ của tôi' : 'Xác thực Blockchain';

    if (tabId === 'verify-trace') {
        startScanner();
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.querySelectorAll('.nav-item')[1].classList.add('active');
    } else {
        stopScanner();
        loadPurchasedProducts();
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.querySelectorAll('.nav-item')[0].classList.add('active');
    }
}

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                found++;
                html += `
                    <div onclick="openProductDetail(${i})" class="product-card p-4 rounded-[2.5rem] relative group cursor-pointer">
                        <div class="relative overflow-hidden rounded-[2rem] mb-5">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-56 object-cover transform group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1.5 border border-white">
                                <i class="fa-solid fa-shield-check text-green-500 text-[10px]"></i>
                                <span class="text-[9px] font-black text-slate-700 uppercase">Verified</span>
                            </div>
                        </div>
                        <div class="px-2 pb-2">
                            <h4 class="font-extrabold text-slate-900 text-xl mb-1">${p.name}</h4>
                            <div class="flex justify-between items-center">
                                <p class="text-xs font-bold text-indigo-500 uppercase tracking-widest">${p.batchID}</p>
                                <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                    <i class="fa-solid fa-arrow-right-long text-xs"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        grid.innerHTML = found > 0 ? html : `
            <div class="col-span-full text-center py-20">
                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-box-open text-slate-200 text-4xl"></i>
                </div>
                <p class="text-slate-400 font-bold italic">Bạn chưa sở hữu sản phẩm nào.</p>
            </div>
        `;
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

async function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    if (html5QrCode.isScanning) await html5QrCode.stop();
    html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, (text) => {
        const id = text.split('-').pop();
        if (navigator.vibrate) navigator.vibrate(150);
        verifyProduct(id);
    }).catch(err => console.log(err));
}

function stopScanner() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); }

async function verifyProduct(id) {
    const res = document.getElementById('traceResult');
    res.classList.remove('hidden');
    res.innerHTML = '<div class="bg-white p-12 rounded-[2.5rem] shadow-xl text-center"><i class="fa-solid fa-spinner-third animate-spin text-indigo-500 text-3xl"></i></div>';
    try {
        const p = await contract.methods.verifyProduct(id).call();
        res.innerHTML = `
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-50 shadow-2xl text-center animate-slideUpFade">
                <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                    <i class="fa-solid fa-badge-check text-5xl"></i>
                </div>
                <h3 class="font-black text-3xl text-slate-900 mb-3">${p.name}</h3>
                <p class="text-slate-500 mb-10 font-medium">Sản phẩm chính hãng đã được mã hóa trên Blockchain bởi VeriGlow.</p>
                <button onclick="openProductDetail(${id})" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm shadow-xl hover:bg-black transition-all transform active:scale-95">
                    XEM CHI TIẾT NGUỒN GỐC
                </button>
            </div>
        `;
        stopScanner();
    } catch (e) { res.innerHTML = '<div class="p-10 text-center font-bold text-red-500 bg-white rounded-3xl shadow-xl">Mã QR không hợp lệ hoặc không tồn tại!</div>'; }
}

async function openProductDetail(id) {
    const p = await contract.methods.verifyProduct(id).call();
    document.getElementById('detailModal').classList.remove('hidden');
    
    // Nâng cấp phần Timeline Lịch sử
    const historyHtml = p.history && p.history.length > 0 
        ? `<div class="mt-8 relative ml-4 pl-8 border-l-2 border-slate-100 space-y-8">
            ${p.history.map(log => {
                const parts = log.split(':');
                return `
                <div class="timeline-item relative">
                    <p class="text-sm font-black text-slate-800">${parts[0] || 'Cập nhật'}</p>
                    <p class="text-xs font-medium text-slate-500 mt-1">${parts[1] || log}</p>
                </div>`;
            }).join('')}
          </div>`
        : '<p class="text-slate-400 italic text-sm">Chưa có dữ liệu vận chuyển.</p>';

    document.getElementById('modalContent').innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="space-y-6">
                <img src="${formatUrl(p.productImageUrl)}" class="w-full h-80 lg:h-[500px] object-cover rounded-[3rem] shadow-2xl border-4 border-slate-50">
                <div class="bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4">Chứng nhận số</p>
                    <a href="${formatUrl(p.certificationUrl)}" target="_blank" class="flex items-center justify-between text-indigo-600 font-bold hover:underline">
                        <span>GACP-WHO Certification (IPFS)</span>
                        <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            </div>
            
            <div class="flex flex-col">
                <span class="text-xs font-black text-indigo-500 uppercase tracking-[0.3em] mb-2">Thông tin sản phẩm</span>
                <h3 class="text-4xl font-black text-slate-900 mb-2 leading-tight">${p.name}</h3>
                <p class="text-slate-400 font-mono text-xs mb-8">NFT-ID: 0x${id.toString(16).padStart(4, '0')}...VeriGlow</p>
                
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-slate-50 p-5 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Xuất xứ</p>
                        <p class="text-sm font-black text-slate-800">${p.origin}</p>
                    </div>
                    <div class="bg-slate-50 p-5 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Sản xuất ngày</p>
                        <p class="text-sm font-black text-slate-800">${new Date(Number(p.manufactureDate)*1000).toLocaleDateString('vi-VN')}</p>
                    </div>
                </div>

                <div class="flex-1">
                    <p class="text-xs font-black text-slate-900 uppercase tracking-widest mb-6 border-b border-slate-100 pb-2">Hành trình sản phẩm</p>
                    ${historyHtml}
                </div>

                <div class="mt-10 pt-8 border-t border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center text-white">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div>
                            <p class="text-sm font-black text-slate-800">Xác thực bởi VeriGlow Ledger</p>
                            <p class="text-[10px] text-slate-400">Dữ liệu không thể sửa đổi trên mạng Ethereum</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
