<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Hệ thống Truy xuất Nguồn gốc Cao cấp</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-nav { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .product-card { background: white; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(226, 232, 240, 0.5); border-radius: 2.5rem; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
    </style>
</head>

<body class="flex text-slate-900">

    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white/80 backdrop-blur-xl border-r border-slate-100 flex-col z-50 hidden md:flex">
        <div class="p-10 flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-sparkles text-white text-xl"></i>
            </div>
            <span class="font-black text-2xl tracking-tighter bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-3 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-grid-2 text-lg"></i> <span>Bộ sưu tập</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-qrcode text-lg"></i> <span>Xác thực ngay</span>
            </button>
        </nav>
        <div class="p-8 border-t border-slate-50">
            <div class="bg-slate-900 rounded-2xl p-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Ví liên kết</p>
                <div class="text-[11px] font-mono text-white truncate" id="pcAccount">Chưa kết nối</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 w-full md:ml-72">
        <header class="h-20 glass-nav flex items-center justify-between px-6 md:px-12 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-xl font-extrabold text-slate-800">Tủ đồ của tôi</h2>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white animate-pulse"></div>
        </header>

        <div class="p-6 md:p-12 max-w-7xl mx-auto w-full">
            <div id="my-purchases" class="tab-content active">
                <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-xl mx-auto bg-white p-8 rounded-[3rem] shadow-xl">
                    <div id="reader"></div>
                    <div id="traceResult" class="mt-8 hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[70] hidden flex items-end md:items-center justify-center p-0 md:p-8">
        <div class="bg-white w-full max-w-5xl rounded-t-[3rem] md:rounded-[3rem] shadow-2xl relative max-h-[92vh] flex flex-col overflow-hidden">
            <button onclick="closeModal()" class="absolute top-8 right-8 z-10 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto p-8 md:p-12"></div>
        </div>
    </div>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;

// Hàm sửa lỗi hiển thị ảnh
function formatUrl(url) {
    if (!url || url === "" || url === "undefined") {
        // Trả về mã SVG nếu không có ảnh để không bao giờ bị lỗi ERR_NAME_NOT_RESOLVED
        return `data:image/svg+xml;base64,${btoa('<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#f1f5f9"/><text x="50%" y="50%" font-family="sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">VeriGlow Image</text></svg>')}`;
    }
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('pcAccount').innerText = account;
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        contract = new web3.eth.Contract(abi, contractAddress);
        loadPurchasedProducts();
    }
});

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="openProductDetail(${i})" class="product-card p-4 group cursor-pointer">
                        <div class="relative overflow-hidden rounded-[2rem] mb-4 aspect-square bg-slate-50">
                            <img src="${formatUrl(p.productImageUrl)}" 
                                 onerror="this.src='${formatUrl('')}'"
                                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        </div>
                        <h4 class="font-black text-slate-900 text-lg">${p.name}</h4>
                        <p class="text-xs font-bold text-indigo-500 uppercase tracking-widest">${p.batchID}</p>
                    </div>`;
            }
        }
        grid.innerHTML = found > 0 ? html : '<p class="col-span-full text-center py-20 text-slate-400 font-bold">Bạn chưa sở hữu sản phẩm nào.</p>';
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

async function openProductDetail(id) {
    try {
        // Lấy dữ liệu từ cả 2 hàm để đảm bảo đủ thông tin nhất
        const pBasic = await contract.methods.verifyProduct(id).call();
        const pFull = await contract.methods.products(id).call();

        document.getElementById('detailModal').classList.remove('hidden');
        
        const historyHtml = pBasic.visibleHistory && pBasic.visibleHistory.length > 0 
            ? `<div class="mt-4 relative ml-4 pl-8 border-l-2 border-slate-100 space-y-6">
                ${pBasic.visibleHistory.map(log => {
                    const parts = log.split(':');
                    return `<div class="relative"><p class="text-sm font-black text-slate-800">${parts[0]}</p><p class="text-xs text-slate-500">${parts[1] || ''}</p></div>`;
                }).join('')}
              </div>`
            : '<p class="text-slate-400 italic text-xs">Chưa có lịch sử.</p>';

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div>
                    <img src="${formatUrl(pFull.productImageUrl)}" 
                         onerror="this.src='${formatUrl('')}'"
                         class="w-full h-[450px] object-cover rounded-[3rem] shadow-2xl border-4 border-slate-50">
                    <div class="mt-8 bg-indigo-50 p-6 rounded-[2rem] border border-indigo-100">
                        <p class="text-[10px] font-black text-indigo-400 uppercase mb-3">Tài liệu kiểm định</p>
                        <a href="${formatUrl(pFull.certificationUrl)}" target="_blank" class="flex justify-between items-center font-bold text-indigo-600 hover:underline">
                            <span>Bản sao GACP-WHO (IPFS)</span>
                            <i class="fa-solid fa-up-right-from-square"></i>
                        </a>
                    </div>
                </div>
                <div>
                    <span class="text-xs font-black text-indigo-500 uppercase tracking-[0.3em]">Xác thực bởi Blockchain</span>
                    <h2 class="text-4xl font-black text-slate-900 mb-2 mt-2">${pBasic.name}</h2>
                    <p class="text-slate-400 font-mono text-xs mb-8">NFT ID: #${id} | Lô: ${pBasic.batchID}</p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 p-5 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Xuất xứ</p>
                            <p class="text-sm font-black text-slate-800">${pBasic.origin}</p>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Ngày sản xuất</p>
                            <p class="text-sm font-black text-slate-800">${new Date(Number(pBasic.manufactureDate)*1000).toLocaleDateString('vi-VN')}</p>
                        </div>
                    </div>

                    <div class="bg-slate-900 text-white p-6 rounded-[2rem] mb-8">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Nhà sản xuất</p>
                        <p class="text-sm font-bold mb-2">${pBasic.manufacturerName}</p>
                        <p class="text-[11px] text-slate-300 leading-relaxed italic">${pBasic.factoryAddress}</p>
                    </div>

                    <div>
                        <p class="text-xs font-black text-slate-900 uppercase border-b pb-2 mb-4 tracking-widest">Hành trình hành trình</p>
                        ${historyHtml}
                    </div>
                </div>
            </div>`;
    } catch (e) { console.error(e); }
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach((btn, i) => {
        btn.classList.toggle('active', (id === 'my-purchases' && i === 0) || (id === 'verify-trace' && i === 1));
    });
}
function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
