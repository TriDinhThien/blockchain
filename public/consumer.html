<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Consumer Dashboard | VeriGlow</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        
        /* Drawer Animation giống Distributor */
        #productDetailSidebar { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex text-slate-900 min-h-screen">

    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex flex-col z-40 hidden md:flex">
        <div class="p-8 flex items-center gap-3">
            <img src="2.png" alt="Logo" class="w-10 h-10 rounded-full object-cover shadow-md border border-slate-100">
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-gem"></i> <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-qrcode"></i> <span>Quét mã xác thực</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Ví của bạn</p>
                <div id="walletAddr" class="text-[10px] font-mono text-slate-600 break-all bg-white p-2 rounded-lg border border-slate-200 uppercase tracking-tighter">Đang kết nối...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 min-h-screen">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Sản phẩm sở hữu</h2>
            <div class="flex items-center gap-4">
                <button onclick="loadProducts()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-sky-600 transition-colors">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 ring-4 ring-slate-100"></div>
            </div>
        </header>

        <div class="p-10 max-w-7xl mx-auto">
            <div id="my-purchases" class="tab-content active">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <div id="reader" class="rounded-3xl overflow-hidden border-4 border-slate-50 shadow-inner bg-slate-900"></div>
                    <p class="text-center text-slate-400 text-sm mt-6 font-medium">Đưa mã QR vào khung hình để kiểm tra</p>
                </div>
            </div>
        </div>
    </main>

    <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-full md:w-[480px] bg-white shadow-2xl translate-x-full flex flex-col z-[60] border-l border-slate-200">
        <div class="px-6 py-6 border-b flex items-center justify-between bg-slate-50/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">
                    <i class="fa-solid fa-shield-check"></i>
                </div>
                <h3 class="font-bold text-lg text-slate-800">Thông tin xác thực</h3>
            </div>
            <button onclick="closeSidebar()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div id="sidebarContent" class="flex-1 overflow-y-auto p-8 space-y-8">
            </div>
    </div>

    <div id="certModal" class="modal">
        <div class="modal-content relative p-2">
            <img id="modalCertImg" src="" class="max-w-[90vw] max-h-[90vh] rounded-xl shadow-2xl">
            <button onclick="document.getElementById('certModal').classList.remove('active')" class="absolute -top-10 right-0 text-white text-2xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content p-10 text-center bg-white rounded-[2.5rem]">
            <h3 class="text-lg font-bold mb-6 text-slate-800 font-mono tracking-tight uppercase">QR Authenticity</h3>
            <canvas id="modalQrCanvas" class="mx-auto rounded-2xl shadow-sm border-8 border-slate-50"></canvas>
            <p class="mt-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Mã định danh sản phẩm Blockchain</p>
            <button onclick="document.getElementById('qrModal').classList.remove('active')" class="mt-6 text-slate-400 hover:text-slate-600 text-xs font-bold uppercase">Đóng</button>
        </div>
    </div>

<script>
// VUI LÒNG DÁN ADDRESS VÀ ABI MỚI NHẤT CỦA BẠN VÀO ĐÂY
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5"; 
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://placehold.co/400x400?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0].toLowerCase();
            document.getElementById('walletAddr').innerText = account;
            document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
            contract = new web3.eth.Contract(abi, contractAddress);
            loadProducts();
        } catch (err) {
            console.error("User denied account access");
        }
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-slate-400 italic">Đang tải tủ đồ từ Blockchain...</p></div>';

    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        let found = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            if (p.owner.toLowerCase() === account) {
                found++;
                // UI Thẻ sản phẩm đồng bộ với Distributor
                html += `
                    <div onclick="showProductDetail(${i})" class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group cursor-pointer relative">
                        <div class="h-56 overflow-hidden bg-slate-50 relative">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute top-4 left-4">
                                <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold shadow-sm border border-slate-100">ID: #${i}</span>
                            </div>
                        </div>
                        <div class="p-6">
                            <p class="text-[10px] text-sky-600 font-bold uppercase tracking-widest mb-2">${p.manufacturerName}</p>
                            <h4 class="font-bold text-slate-800 mb-4 line-clamp-1 group-hover:text-sky-600 transition-colors">${p.name}</h4>
                            <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                                <div class="flex flex-col text-[10px]">
                                    <span class="text-slate-400 font-medium italic">Mã lô hàng</span>
                                    <span class="text-slate-700 font-bold font-mono">${p.batchID}</span>
                                </div>
                                <span class="bg-emerald-50 text-emerald-600 text-[10px] font-bold px-2.5 py-1 rounded-lg">Chính hãng</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
        grid.innerHTML = found > 0 ? html : '<div class="col-span-full py-32 text-center"><i class="fa-solid fa-box-open text-5xl text-slate-100 mb-6 block"></i><p class="text-slate-400 font-medium">Bạn chưa sở hữu sản phẩm nào.</p></div>';
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">Không thể kết nối với Blockchain.</div>';
    }
}

async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="flex justify-center py-20"><div class="loading-spinner"></div></div>';
    sidebar.classList.remove('translate-x-full');

    try {
        const verify = await contract.methods.verifyProduct(id).call();
        const prod = await contract.methods.products(id).call();

        const imgUrl = formatUrl(prod.productImageUrl);
        const certUrl = formatUrl(prod.certificationUrl);
        const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
        
        // Logic xử lý mảng từ Blockchain
        const history = verify.visibleHistory || [];
        const ingredients = verify.ingredients || [];

        content.innerHTML = `
            <div class="space-y-8 animate-fadeIn">
                <div class="relative group">
                    <img src="${imgUrl}" class="w-full rounded-[2.5rem] shadow-xl h-72 object-cover border-4 border-white ring-1 ring-slate-100">
                    <div class="absolute -bottom-4 right-6 bg-white px-5 py-2 rounded-2xl shadow-lg border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Blockchain ID</p>
                        <p class="text-sm font-mono font-bold text-slate-800">#${id}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                        <p class="text-slate-400 text-[10px] uppercase font-bold tracking-tighter mb-1">Batch ID</p>
                        <p class="text-sm font-bold text-slate-700">${verify.batchID}</p>
                    </div>
                    <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                        <p class="text-slate-400 text-[10px] uppercase font-bold tracking-tighter mb-1">Ngày sản xuất</p>
                        <p class="text-sm font-bold text-slate-700">${verify.manufactureDate}</p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-sky-50 to-indigo-50 rounded-[2rem] p-6 border border-sky-100 shadow-sm relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-sky-700 text-[10px] font-black mb-3 uppercase tracking-widest flex items-center gap-2">
                            <i class="fa-solid fa-industry"></i> Đơn vị sản xuất
                        </div>
                        <div class="font-bold text-slate-800 text-lg">${verify.manufacturerName}</div>
                        <div class="text-[11px] text-slate-500 mt-2 font-medium leading-relaxed">${verify.factoryAddress}</div>
                    </div>
                </div>

                ${ingredients.length > 0 ? `
                <div class="space-y-4">
                    <p class="text-slate-800 text-xs font-bold uppercase tracking-widest ml-1">Thành phần niêm yết</p>
                    <div class="flex flex-wrap gap-2">${ingredients.map(i => `<span class="bg-white border border-slate-200 px-3.5 py-2 rounded-2xl text-[11px] text-slate-600 shadow-sm font-semibold">${i}</span>`).join('')}</div>
                </div>` : ''}

                <div class="space-y-6 pb-10">
                    <p class="text-slate-800 text-xs font-bold uppercase tracking-widest ml-1 flex items-center gap-2">
                        <i class="fa-solid fa-timeline text-sky-500"></i> Nhật ký hành trình
                    </p>
                    <div class="relative pl-7 space-y-8 before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                        ${history.map((log, idx) => `
                        <div class="relative">
                            <div class="absolute -left-[21px] top-1 w-3.5 h-3.5 rounded-full ${idx === history.length-1 ? 'bg-emerald-500 ring-4 ring-emerald-100' : 'bg-slate-200'} border-2 border-white"></div>
                            <div class="text-[13px] font-bold text-slate-700">${log}</div>
                            <div class="text-[10px] text-slate-400 mt-1 italic font-medium">Trạng thái: Đã xác thực</div>
                        </div>`).join('')}
                    </div>
                </div>

                <div class="pt-6 grid grid-cols-2 gap-4 sticky bottom-0 bg-white pb-4">
                    <button onclick="openCertModal('${certUrl}')" class="py-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-2xl flex flex-col items-center gap-2 transition-all border border-indigo-100">
                        <i class="fa-solid fa-file-shield text-xl"></i>
                        <span class="text-[10px] font-bold uppercase">Chứng nhận</span>
                    </button>
                    <button onclick="showQrModal('${verifyUrl}')" class="py-4 bg-slate-900 hover:bg-black text-white rounded-2xl flex flex-col items-center gap-2 transition-all shadow-lg">
                        <i class="fa-solid fa-qrcode text-xl"></i>
                        <span class="text-[10px] font-bold uppercase">Truy xuất QR</span>
                    </button>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = `<div class="p-10 text-center text-red-500 font-medium">Lỗi load dữ liệu: ${err.message}</div>`;
    }
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }

function openCertModal(url) {
    if (!url || url.includes('placehold')) return alert("Sản phẩm không kèm ảnh chứng nhận.");
    document.getElementById('modalCertImg').src = url;
    document.getElementById('certModal').classList.add('active');
}

function showQrModal(url) {
    const canvas = document.getElementById('modalQrCanvas');
    QRCode.toCanvas(canvas, url, { width: 280, margin: 2, color: { dark: '#0f172a' } }, (err) => {
        if (!err) document.getElementById('qrModal').classList.add('active');
    });
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    
    if (id === 'my-purchases') {
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.getElementById('pageTitle').innerText = "Sản phẩm sở hữu";
        stopScanner();
    } else {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.getElementById('pageTitle').innerText = "Xác thực QR";
        startScanner();
    }
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            const idMatch = decodedText.match(/id=(\d+)/) || decodedText.match(/\d+/);
            if (idMatch) {
                showProductDetail(idMatch[1] || idMatch[0]);
                stopScanner();
            }
        }
    ).catch(err => console.error(err));
}

function stopScanner() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); }

// Đóng modal khi click ra ngoài
window.onclick = function(event) {
    if (event.target == document.getElementById('certModal')) document.getElementById('certModal').classList.remove('active');
    if (event.target == document.getElementById('qrModal')) document.getElementById('qrModal').classList.remove('active');
}
</script>
</body>
</html>
