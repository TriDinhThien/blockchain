<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Consumer Dashboard | VeriGlow</title>
  
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
       
        :root {
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-300: #f9a8d4;
            --pink-400: #f472b6;
            --pink-500: #ec4899;
            --pink-600: #db2777;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fff5f7;
            color: #1e293b;
        }

        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 0.8s ease;
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
        }

        .nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item.active {
            background: white;
            color: var(--pink-600);
            box-shadow: 0 10px 25px -5px rgba(219, 39, 119, 0.2);
        }

        .tab-content { display: none; }
        .tab-content.active { 
            display: block; 
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 2rem;
            overflow: hidden;
        }
        #reader __video {
            object-fit: cover !important;
            border-radius: 2rem;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .product-card:hover {
            transform: translateY(-8px);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active { display: flex; }

        #alertModal { z-index: 10005; }
    </style>
</head>
<body class="min-h-screen">

    <div id="intro-screen">
        <video id="intro-video" autoplay loop muted playsinline>
            <source src="intro-consumer.mp4" type="video/mp4">
        </video>
        <div class="relative z-10 text-center px-6">
            <div class="w-32 h-32 mx-auto mb-8 rounded-full overflow-hidden border-4 border-white/30 shadow-2xl">
                <img src="2.png" class="w-full h-full object-cover">
            </div>
            <h1 class="text-5xl font-extrabold text-white mb-4 tracking-tight">VeriGlow</h1>
            <p class="text-white/80 text-lg mb-12 font-medium">Xác thực mỹ phẩm thiên nhiên chính hãng</p>
            <button onclick="enterDashboard()" class="bg-white text-pink-600 px-10 py-5 rounded-full font-bold text-xl shadow-2xl hover:scale-105 transition-transform flex items-center gap-3 mx-auto">
                <i class="fa-solid fa-water"></i>
                Khám phá ngay
            </button>
        </div>
    </div>

    <div id="dashboard-content" class="hidden flex flex-col min-h-screen">
        <header class="bg-white/70 backdrop-blur-md sticky top-0 z-50 px-6 py-4 border-b border-pink-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="2.png" class="w-10 h-10 rounded-xl shadow-lg">
                <span class="font-extrabold text-xl bg-gradient-to-r from-pink-600 to-rose-500 bg-clip-text text-transparent">VeriGlow</span>
            </div>
            <div class="flex items-center gap-3">
                <div id="walletDisplay" class="text-[10px] font-mono bg-pink-50 text-pink-600 px-3 py-2 rounded-full border border-pink-100">
                    Chưa kết nối
                </div>
                <button onclick="loadMyProducts()" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-pink-500 border border-pink-50">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 p-6 pb-32">
            <div id="my-purchases" class="tab-content active">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Tủ đồ của tôi</h2>
                    <button onclick="showFunctionInfo('my-purchases')" class="text-slate-400 hover:text-pink-500 transition-colors">
                        <i class="fa-solid fa-circle-info text-xl"></i>
                    </button>
                </div>
                <div id="purchaseGrid" class="grid grid-cols-1 gap-6">
                    <div class="text-center py-20 opacity-40">
                        <i class="fa-solid fa-box-open text-6xl mb-4"></i>
                        <p>Đang tải dữ liệu từ Blockchain...</p>
                    </div>
                </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Xác thực sản phẩm</h2>
                    <button onclick="showFunctionInfo('verify-trace')" class="text-slate-400 hover:text-pink-500 transition-colors">
                        <i class="fa-solid fa-circle-info text-xl"></i>
                    </button>
                </div>
                
                <div class="glass-card p-6 mb-8 text-center">
                    <div id="scanner-container" class="hidden mb-6">
                        <div id="reader"></div>
                        <button onclick="stopScanner()" class="mt-4 px-6 py-2 bg-red-100 text-red-600 rounded-full font-bold text-sm">Dừng quét</button>
                    </div>

                    <div id="scan-placeholder" class="py-12">
                        <div class="w-24 h-24 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl animate-bounce">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                        <h3 class="text-xl font-bold mb-2">Quét mã QR trên vỏ hộp</h3>
                        <p class="text-slate-500 text-sm mb-8 px-6">Đưa camera vào vùng chứa mã QR để kiểm tra nguồn gốc và tính chính hãng của sản phẩm.</p>
                        <button onclick="startScanner()" class="w-full bg-gradient-to-r from-pink-600 to-rose-500 text-white py-5 rounded-3xl font-bold text-lg shadow-xl shadow-pink-200">
                            <i class="fa-solid fa-camera mr-2"></i> Mở Camera
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block text-xs font-bold text-slate-400 uppercase ml-2">Hoặc nhập mã ID thủ công</label>
                    <div class="relative">
                        <input id="manualId" type="text" maxlength="6" placeholder="Nhập 6 ký tự ID" class="w-full bg-white border-2 border-pink-50 rounded-3xl px-6 py-5 outline-none focus:border-pink-300 transition-all font-bold tracking-widest text-lg uppercase">
                        <button onclick="verifyManual()" class="absolute right-2 top-2 bottom-2 bg-slate-900 text-white px-6 rounded-2xl font-bold">Kiểm tra</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-6 left-6 right-6 h-20 bg-slate-900 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-4 z-[1000]">
            <button onclick="showTab('my-purchases')" data-tab="my-purchases" class="nav-item active flex flex-col items-center justify-center w-16 h-16 rounded-3xl text-slate-400">
                <i class="fa-solid fa-heart text-2xl"></i>
                <span class="text-[10px] mt-1 font-bold">Của tôi</span>
            </button>
            <div class="w-px h-8 bg-white/10"></div>
            <button onclick="showTab('verify-trace')" data-tab="verify-trace" class="nav-item flex flex-col items-center justify-center w-16 h-16 rounded-3xl text-slate-400">
                <i class="fa-solid fa-shield-check text-2xl"></i>
                <span class="text-[10px] mt-1 font-bold">Xác thực</span>
            </button>
        </nav>
    </div>

    <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[10001] flex flex-col">
        <div class="p-6 border-b flex items-center justify-between">
            <h3 class="font-bold text-xl">Chi tiết sản phẩm</h3>
            <button onclick="closeSidebar()" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="sidebarContent" class="flex-1 overflow-y-auto p-6"></div>
    </div>

    <div id="certModal" class="modal" onclick="this.classList.remove('active')">
        <div class="max-w-4xl w-full">
            <img id="modalCertImg" src="" class="w-full rounded-2xl shadow-2xl">
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="this.classList.remove('active')">
        <div class="bg-white p-8 rounded-[2.5rem] text-center max-w-sm w-full" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-6">Mã QR Sản phẩm</h3>
            <canvas id="modalQrCanvas" class="mx-auto mb-6"></canvas>
            <p id="qrIdDisplay" class="font-mono text-pink-600 font-bold text-lg"></p>
            <button onclick="document.getElementById('qrModal').classList.remove('active')" class="mt-8 w-full py-4 bg-slate-100 rounded-2xl font-bold">Đóng</button>
        </div>
    </div>

    <div id="functionModal" class="modal" onclick="this.classList.remove('active')">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 id="functionTitle" class="text-2xl font-bold mb-4"></h3>
            <div id="functionDesc" class="text-slate-600 leading-relaxed mb-8"></div>
            <button onclick="document.getElementById('functionModal').classList.remove('active')" class="w-full py-4 bg-pink-600 text-white rounded-2xl font-bold">Đã hiểu</button>
        </div>
    </div>

    <div id="alertModal" class="modal" onclick="this.classList.remove('active')">
        <div class="bg-white p-8 rounded-[2.5rem] text-center max-w-sm w-full" onclick="event.stopPropagation()">
            <div id="alertIcon" class="text-6xl mb-4"></div>
            <h3 id="alertTitle" class="text-2xl font-bold mb-2"></h3>
            <p id="alertMessage" class="text-slate-500 mb-8"></p>
            <button id="alertBtn" onclick="document.getElementById('alertModal').classList.remove('active')" class="w-full py-4 rounded-2xl font-bold text-white"></button>
        </div>
    </div>

<script>
const contractAddress = "0x5fb38a482899ee0C716996872A0b7DD95038B98a";
const abi = [
	{
		"anonymous": false,
		"inputs": [
			{"indexed": false, "internalType": "string", "name": "id", "type": "string"},
			{"indexed": true, "internalType": "address", "name": "oldOwner", "type": "address"},
			{"indexed": true, "internalType": "address", "name": "newOwner", "type": "address"}
		],
		"name": "OwnershipTransferred",
		"type": "event"
	},
	{
		"anonymous": false,
		"inputs": [
			{"indexed": false, "internalType": "string", "name": "id", "type": "string"},
			{"indexed": false, "internalType": "string", "name": "name", "type": "string"}
		],
		"name": "ProductCreated",
		"type": "event"
	},
	{
		"inputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
		"name": "allProductIds",
		"outputs": [{"internalType": "string", "name": "", "type": "string"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{"internalType": "string", "name": "_id", "type": "string"},
			{"internalType": "string", "name": "_name", "type": "string"},
			{"internalType": "string", "name": "_batchID", "type": "string"},
			{"internalType": "string", "name": "_manufactureDate", "type": "string"},
			{"internalType": "string", "name": "_origin", "type": "string"},
			{"internalType": "string[]", "name": "_ingredients", "type": "string[]"},
			{"internalType": "string", "name": "_productImageUrl", "type": "string"},
			{"internalType": "string", "name": "_certificationUrl", "type": "string"},
			{"internalType": "string", "name": "_manufacturerName", "type": "string"},
			{"internalType": "string", "name": "_factoryAddress", "type": "string"}
		],
		"name": "createProduct",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
		"name": "getProductBasicInfo",
		"outputs": [
			{"internalType": "string", "name": "name", "type": "string"},
			{"internalType": "string", "name": "batchID", "type": "string"},
			{"internalType": "string", "name": "manufactureDate", "type": "string"},
			{"internalType": "string", "name": "origin", "type": "string"},
			{"internalType": "bool", "name": "isAuthentic", "type": "bool"},
			{"internalType": "address", "name": "owner", "type": "address"},
			{"internalType": "string[]", "name": "ingredients", "type": "string[]"},
			{"internalType": "string", "name": "productImageUrl", "type": "string"},
			{"internalType": "string", "name": "certificationUrl", "type": "string"}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getProductCount",
		"outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
		"name": "getProductJourney",
		"outputs": [
			{
				"components": [
					{"internalType": "address", "name": "wallet", "type": "address"},
					{"internalType": "string", "name": "role", "type": "string"},
					{"internalType": "string", "name": "name", "type": "string"},
					{"internalType": "string", "name": "location", "type": "string"},
					{"internalType": "uint256", "name": "timestamp", "type": "uint256"}
				],
				"internalType": "struct CosmeticsTraceability.JourneyNode[]",
				"name": "",
				"type": "tuple[]"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "", "type": "string"}],
		"name": "productExists",
		"outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{"internalType": "string", "name": "_id", "type": "string"},
			{"internalType": "address", "name": "_newOwnerWallet", "type": "address"},
			{"internalType": "string", "name": "_newRole", "type": "string"},
			{"internalType": "string", "name": "_newName", "type": "string"},
			{"internalType": "string", "name": "_newLocation", "type": "string"}
		],
		"name": "transferOwnership",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];

let web3, contract, account;
let html5QrCode;

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0];
            document.getElementById('walletDisplay').innerText = account.slice(0,6) + "..." + account.slice(-4);
            contract = new web3.eth.Contract(abi, contractAddress);
            loadMyProducts();
        } catch (e) { console.error("User denied account access"); }
    }
});

function showToast(title, message, type = 'success') {
    const modal = document.getElementById('alertModal');
    const icon = document.getElementById('alertIcon');
    const btn = document.getElementById('alertBtn');
    
    document.getElementById('alertTitle').innerText = title;
    document.getElementById('alertMessage').innerText = message;
    
    if(type === 'success') {
        icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
        btn.className = "w-full py-4 rounded-2xl font-bold text-white bg-green-500";
        btn.innerText = "Tuyệt vời";
    } else {
        icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
        btn.className = "w-full py-4 rounded-2xl font-bold text-white bg-red-500";
        btn.innerText = "Thử lại";
    }
    modal.classList.add('active');
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    
    if (tabId !== 'verify-trace') stopScanner();
}

async function loadMyProducts() {
    const grid = document.getElementById('purchaseGrid');
    if (!account) return;
    
    try {
        const count = await contract.methods.getProductCount().call();
        let html = '';
        let found = 0;

        for (let i = count - 1; i >= 0; i--) {
            const idStr = await contract.methods.allProductIds(i).call();
            const p = await contract.methods.getProductBasicInfo(idStr).call();
            
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                found++;
                const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x400?text=No+Image';
                html += `
                    <div class="product-card glass-card overflow-hidden shadow-xl shadow-pink-100/50" onclick="showDetail('${idStr}')">
                        <div class="flex p-4 gap-4">
                            <img src="${img}" class="w-24 h-24 rounded-2xl object-cover shadow-md">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] font-bold bg-pink-100 text-pink-600 px-2 py-0.5 rounded-md uppercase">Chính hãng</span>
                                    <span class="text-[10px] font-mono text-slate-400">#${idStr}</span>
                                </div>
                                <h4 class="font-bold text-slate-800 truncate">${p.name}</h4>
                                <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-calendar-day mr-1"></i>${p.manufactureDate}</p>
                                <div class="mt-3 flex items-center justify-between">
                                    <button class="text-xs font-bold text-pink-600">Xem chi tiết <i class="fa-solid fa-chevron-right ml-1"></i></button>
                                    <button onclick="event.stopPropagation(); showQR('${idStr}')" class="w-8 h-8 bg-slate-50 rounded-lg text-slate-400 flex items-center justify-center">
                                        <i class="fa-solid fa-qrcode"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }
        
        grid.innerHTML = found > 0 ? html : `<div class="text-center py-20 opacity-40"><i class="fa-solid fa-box-open text-6xl mb-4"></i><p>Bạn chưa sở hữu sản phẩm nào</p></div>`;
    } catch (e) {
        console.error(e);
        grid.innerHTML = `<p class="text-center text-red-500">Lỗi kết nối Blockchain</p>`;
    }
}

async function showDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    sidebar.classList.remove('translate-x-full');
    content.innerHTML = '<div class="text-center py-20"><i class="fa-solid fa-spinner animate-spin text-3xl text-pink-500"></i></div>';
    
    try {
        const p = await contract.methods.getProductBasicInfo(id).call();
        const journey = await contract.methods.getProductJourney(id).call();
        
        const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x400?text=No+Image';
        const cert = p.certificationUrl ? p.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : null;

        let journeyHtml = journey.map((node, idx) => `
            <div class="relative pl-8 pb-8 last:pb-0">
                <div class="absolute left-0 top-0 bottom-0 w-px bg-slate-100"></div>
                <div class="absolute left-[-4px] top-1.5 w-2 h-2 rounded-full ${idx === journey.length-1 ? 'bg-pink-500 ring-4 ring-pink-100' : 'bg-slate-300'}"></div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">${node.role}</div>
                <div class="font-bold text-slate-800 mt-0.5">${node.name}</div>
                <div class="text-[11px] text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${node.location}</div>
                <div class="text-[10px] font-mono text-slate-400 mt-1">${new Date(node.timestamp * 1000).toLocaleString()}</div>
            </div>
        `).join('');

        content.innerHTML = `
            <img src="${img}" class="w-full rounded-3xl shadow-xl mb-6 aspect-square object-cover">
            <div class="flex items-center gap-2 mb-4">
                <span class="px-3 py-1 bg-green-500 text-white text-[10px] font-bold rounded-full">VERIFIED ON BLOCKCHAIN</span>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">${p.name}</h3>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-50 p-3 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Mã lô</p>
                    <p class="text-sm font-bold">${p.batchID}</p>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Xuất xứ</p>
                    <p class="text-sm font-bold">${p.origin}</p>
                </div>
            </div>

            <div class="mb-8">
                <h4 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-flask text-pink-500"></i> Thành phần</h4>
                <div class="flex flex-wrap gap-2">
                    ${p.ingredients.map(i => `<span class="px-3 py-1.5 bg-white border border-pink-100 text-pink-600 rounded-xl text-xs font-medium">${i}</span>`).join('')}
                </div>
            </div>

            <div class="mb-8">
                <h4 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-route text-pink-500"></i> Hành trình sản phẩm</h4>
                <div class="bg-white rounded-3xl p-6 border border-slate-50">
                    ${journeyHtml}
                </div>
            </div>

            ${cert ? `<button onclick="openCert('${cert}')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg mb-4"><i class="fa-solid fa-file-shield"></i> Xem chứng nhận chất lượng</button>` : ''}
            <button onclick="window.location.href='verify.html?id=${id}'" class="w-full py-4 border-2 border-pink-500 text-pink-600 rounded-2xl font-bold">Trang xác thực công khai</button>
        `;
    } catch (e) {
        content.innerHTML = `<p class="text-red-500">Lỗi tải dữ liệu</p>`;
    }
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }
function openCert(url) { document.getElementById('modalCertImg').src = url; document.getElementById('certModal').classList.add('active'); }
function showQR(id) {
    const url = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
    QRCode.toCanvas(document.getElementById('modalQrCanvas'), url, { width: 250, margin: 2 }, function (error) {
        if (error) console.error(error);
        document.getElementById('qrIdDisplay').innerText = `ID: ${id}`;
        document.getElementById('qrModal').classList.add('active');
    });
}

// CẬP NHẬT LOGIC QUÉT QR
function startScanner() {
    document.getElementById('scanner-container').classList.remove('hidden');
    document.getElementById('scan-placeholder').classList.add('hidden');
    
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess).catch(err => {
        showToast('Lỗi camera', 'Bạn cần cấp quyền sử dụng camera hoặc thiết bị không hỗ trợ.', 'error');
    });
}

function onScanSuccess(decodedText) {
    // Logic: Kiểm tra xem link có chứa tham số id không
    try {
        const url = new URL(decodedText);
        const productId = url.searchParams.get("id");
        
        if (productId && productId.length === 6) {
            stopScanner();
            // Tự động chuyển đến trang verify tương ứng
            window.location.href = `verify.html?id=${productId}`;
        } else {
            // Nếu QR không phải định dạng mong muốn
            showToast('Lỗi định dạng', 'Mã QR không hợp lệ hoặc không phải của hệ thống VeriGlow.', 'error');
        }
    } catch (e) {
        // Nếu QR không phải là URL
        showToast('Lỗi định dạng', 'Mã QR không chứa thông tin xác thực hợp lệ.', 'error');
    }
}

function verifyManual() {
    const id = document.getElementById('manualId').value.trim().toUpperCase();
    if (id.length === 6) {
        window.location.href = `verify.html?id=${id}`;
    } else {
        showToast('ID không hợp lệ', 'Vui lòng nhập đúng 6 ký tự ID sản phẩm.', 'error');
    }
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('scan-placeholder').classList.remove('hidden');
        });
    }
}

function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('dashboard-content').classList.remove('hidden');
    }, 800);
}

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
   
    let title = '';
    let desc = '';
   
    if (type === 'my-purchases') {
        title = 'Tủ đồ của tôi';
        desc = 'Hiển thị tất cả sản phẩm bạn đang sở hữu. Mỗi sản phẩm được xác minh trên Blockchain với đầy đủ thông tin về lịch sử, thành phần và các chứng nhận an toàn.';
    }
    else if (type === 'verify-trace') {
        title = 'Quét mã xác thực';
        desc = 'Sử dụng camera quét mã QR trên hộp sản phẩm. Hệ thống sẽ trích xuất ID (6 ký tự) và chuyển bạn đến trang xác thực tương ứng để kiểm tra tính chính hãng trực tiếp thông qua Hợp đồng thông minh trên mạng Sepolia.';
    }
   
    titleEl.innerHTML = title;
    descEl.innerHTML = desc;
    modal.classList.add('active');
}

window.onclick = function(event) {
    if (event.target.classList.contains('modal')) event.target.classList.remove('active');
}
</script>
</body>
</html>
