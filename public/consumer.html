<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Hệ thống Truy xuất Nguồn gốc</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --primary: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ẩn/Hiện dựa trên thiết bị */
        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-nav { display: flex; }
            body { padding-bottom: 5rem; }
        }
        @media (min-width: 769px) {
            .desktop-sidebar { display: flex; }
            .mobile-nav { display: none; }
            .main-content { margin-left: 18rem; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #reader {
            border: none !important;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
        }
        
        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .nav-item.active { color: var(--primary); }
    </style>
</head>

<body class="min-h-screen flex text-slate-900">

    <aside class="desktop-sidebar fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex-col z-50">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-leaf text-white text-lg"></i>
                </div>
                <span class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-600">
                <i class="fa-solid fa-bag-shopping"></i> <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-600">
                <i class="fa-solid fa-qrcode"></i> <span>Quét mã QR</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-100">
            <div class="text-[10px] font-mono text-slate-400 truncate" id="pcAccount">Đang kết nối ví...</div>
        </div>
    </aside>

    <main class="main-content flex-1 flex flex-col min-w-0 w-full">
        
        <header class="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-6 md:px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-lg md:text-xl font-bold text-slate-800">Cửa hàng của tôi</h2>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white"></div>
        </header>

        <div class="p-6 md:p-10 max-w-6xl mx-auto w-full">
            
            <div id="my-purchases" class="tab-content active">
                <div class="mb-8 hidden md:block">
                    <h1 class="text-3xl font-extrabold text-slate-800">Chào mừng quay trở lại!</h1>
                    <p class="text-slate-500">Đây là danh sách mỹ phẩm chính hãng bạn đang sở hữu trên Blockchain.</p>
                </div>
                
                <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-20 text-slate-400">Đang đồng bộ hóa...</div>
                </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div>
                        <div class="mb-6">
                            <h2 class="text-2xl font-bold text-slate-800">Máy quét QR</h2>
                            <p class="text-sm text-slate-500">Sử dụng camera sau để nhận diện mã bảo mật</p>
                        </div>
                        <div id="reader" class="shadow-2xl"></div>
                    </div>
                    
                    <div id="traceResult" class="hidden animate-slideUp">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="mobile-nav fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-10 py-4 pb-6 justify-between items-center z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
        <button onclick="showTab('my-purchases')" class="nav-item active flex flex-col items-center gap-1">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[9px] font-bold uppercase">Tủ đồ</span>
        </button>
        <div onclick="showTab('verify-trace')" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center -translate-y-6 shadow-xl border-4 border-white">
            <i class="fa-solid fa-qrcode text-white text-xl"></i>
        </div>
        <button onclick="location.reload()" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-arrows-rotate text-xl text-slate-400"></i>
            <span class="text-[9px] font-bold text-slate-400 uppercase">Tải lại</span>
        </button>
    </nav>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] hidden flex items-end md:items-center justify-center p-0 md:p-6">
        <div class="bg-white w-full max-w-2xl rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl relative max-h-[90vh] overflow-hidden flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-slate-500 transition-colors">
                <i class="fa-solid fa-circle-xmark text-2xl"></i>
            </button>
            <div id="modalContent" class="overflow-y-auto pr-2"></div>
        </div>
    </div>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "") return 'https://via.placeholder.com/400x300?text=No+Image';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    if (url.startsWith('http')) return url;
    return `https://ipfs.io/ipfs/${url}`;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        try {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0];
            document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-green-500 border-2 border-white shadow-sm";
            document.getElementById('pcAccount').innerText = "Wallet: " + account.substring(0,10) + "...";
            contract = new web3.eth.Contract(abi, contractAddress);
            loadPurchasedProducts();
        } catch (e) { console.error(e); }
    }
});

function showTab(tabId) {
    // UI Desktop
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    // UI Mobile
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    // Content
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    document.getElementById('pageTitle').innerText = tabId === 'my-purchases' ? 'Cửa hàng của tôi' : 'Truy xuất nguồn gốc';

    if (tabId === 'verify-trace') {
        startScanner();
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.querySelectorAll('.nav-item')[1].classList.add('active');
    } else {
        stopScanner();
        loadPurchasedProducts();
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.querySelectorAll('.nav-item')[0].classList.add('active');
    }
}

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                found++;
                html += `
                    <div onclick="openProductDetail(${i})" class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group">
                        <img src="${formatUrl(p.productImageUrl)}" class="w-full h-44 object-cover rounded-2xl mb-4 bg-slate-50">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-extrabold text-slate-800 text-lg">${p.name}</h4>
                                <p class="text-xs text-indigo-500 font-bold uppercase tracking-wider">${p.batchID}</p>
                            </div>
                            <span class="text-[10px] text-slate-300 font-mono">#${i}</span>
                        </div>
                    </div>
                `;
            }
        }
        grid.innerHTML = found > 0 ? html : '<div class="col-span-full text-center py-20 text-slate-400">Bạn chưa sở hữu sản phẩm nào.</div>';
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

async function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    if (html5QrCode.isScanning) await html5QrCode.stop();
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
        const id = text.split('-').pop();
        if (navigator.vibrate) navigator.vibrate(100);
        verifyProduct(id);
    }).catch(err => console.log(err));
}

function stopScanner() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); }

async function verifyProduct(id) {
    const res = document.getElementById('traceResult');
    res.classList.remove('hidden');
    res.innerHTML = '<div class="bg-white p-10 rounded-[2rem] text-center shadow-lg"><i class="fa-solid fa-spinner animate-spin text-indigo-500 text-2xl"></i></div>';
    try {
        const p = await contract.methods.verifyProduct(id).call();
        res.innerHTML = `
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-2xl text-center">
                <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa-solid fa-shield-check text-4xl"></i>
                </div>
                <h3 class="font-extrabold text-2xl text-slate-800 mb-2">${p.name}</h3>
                <p class="text-slate-400 mb-8 text-sm">Sản phẩm này đã được xác thực chính hãng trên VeriGlow Blockchain.</p>
                <button onclick="openProductDetail(${id})" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">
                    Xem toàn bộ nguồn gốc
                </button>
            </div>
        `;
        stopScanner();
    } catch (e) { res.innerHTML = '<div class="p-10 text-center text-red-500 bg-white rounded-3xl">Mã QR không hợp lệ!</div>'; }
}

async function openProductDetail(id) {
    const p = await contract.methods.verifyProduct(id).call();
    document.getElementById('detailModal').classList.remove('hidden');
    
    const historyHtml = p.history && p.history.length > 0 
        ? p.history.map(log => `<div class="flex items-center gap-3 bg-slate-50 p-4 rounded-2xl mb-3 border border-slate-100">
            <div class="w-2 h-2 rounded-full bg-indigo-500"></div>
            <p class="text-xs text-slate-600 font-medium">${log}</p>
        </div>`).join('')
        : '<p class="text-slate-400 text-sm">Chưa có dữ liệu.</p>';

    document.getElementById('modalContent').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-64 md:h-full object-cover rounded-[2rem] shadow-lg">
            <div>
                <h3 class="text-2xl font-black text-slate-800 mb-1">${p.name}</h3>
                <p class="text-indigo-600 font-bold text-xs uppercase mb-6 tracking-widest">${p.batchID}</p>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Xuất xứ</p>
                        <p class="text-sm font-bold text-slate-700">${p.origin}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Ngày Sản Xuất</p>
                        <p class="text-sm font-bold text-slate-700">${new Date(Number(p.manufactureDate)*1000).toLocaleDateString()}</p>
                    </div>
                </div>

                <div class="mb-8">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 ml-1">Lịch sử di chuyển</p>
                    ${historyHtml}
                </div>
                
                <a href="${formatUrl(p.certificationUrl)}" target="_blank" class="block w-full text-center py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:bg-black transition-all">
                    Xem chứng nhận GACP-WHO (IPFS)
                </a>
            </div>
        </div>
    `;
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
