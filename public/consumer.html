<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Customer Experience</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(5rem + env(safe-area-inset-bottom));
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #reader { border: none !important; border-radius: 24px; overflow: hidden; background: #000; }
        #reader video { object-fit: cover !important; }
        .nav-item.active { color: var(--primary); }
        .product-card:active { transform: scale(0.96); transition: 0.2s; }
    </style>
</head>

<body>
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-lg border-b border-slate-100 px-6 py-4">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa-leaf text-white text-xs"></i>
                </div>
                <h1 class="font-extrabold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">VeriGlow</h1>
            </div>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300 border-2 border-white shadow-sm transition-colors"></div>
        </div>
    </header>

    <main class="p-5 max-w-md mx-auto">
        <div id="my-purchases" class="tab-content active">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Tủ đồ của tôi</h2>
                <p class="text-slate-500 text-sm">Sản phẩm bạn đang sở hữu</p>
            </div>
            <div id="myProductsGrid" class="grid grid-cols-1 gap-4">
                <div class="text-center py-20 text-slate-400">Đang tải dữ liệu...</div>
            </div>
        </div>

        <div id="verify-trace" class="tab-content">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Truy xuất</h2>
                <p class="text-slate-500 text-sm">Quét mã QR trên sản phẩm</p>
            </div>
            <div id="reader"></div>
            <div id="traceResult" class="hidden mt-6"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 px-10 py-4 pb-6 flex justify-between items-center z-50">
        <button onclick="showTab('my-purchases')" class="nav-item active flex flex-col items-center gap-1">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span class="text-[10px] font-bold uppercase">Cửa hàng</span>
        </button>
        <div onclick="showTab('verify-trace')" class="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center -translate-y-6 shadow-xl border-4 border-white active:scale-95 transition-all">
            <i class="fa-solid fa-qrcode text-white text-xl"></i>
        </div>
        <button onclick="location.reload()" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-arrows-rotate text-xl text-slate-400"></i>
            <span class="text-[10px] font-bold text-slate-400 uppercase">Tải lại</span>
        </button>
    </nav>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[60] hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            <div id="modalContent" class="max-h-[75vh] overflow-y-auto"></div>
        </div>
    </div>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

function formatUrl(url) {
    if (!url || url === "") return 'https://via.placeholder.com/400x300?text=No+Image';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    if (url.startsWith('http')) return url;
    return `https://ipfs.io/ipfs/${url}`;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        contract = new web3.eth.Contract(abi, contractAddress);
        loadPurchasedProducts();
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    if (tabId === 'verify-trace') startScanner(); else stopScanner();
}

async function loadPurchasedProducts() {
    const grid = document.getElementById('myProductsGrid');
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            if (p.owner.toLowerCase() === account.toLowerCase()) {
                html += `<div onclick="openProductDetail(${i})" class="product-card bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4">
                    <img src="${formatUrl(p.productImageUrl)}" class="w-16 h-16 rounded-2xl object-cover">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-sm">${p.name}</h4>
                        <p class="text-[9px] text-indigo-500 font-bold uppercase">${p.batchID}</p>
                    </div>
                </div>`;
            }
        }
        grid.innerHTML = html || '<p class="text-center text-slate-400 py-10">Trống.</p>';
    } catch (e) { grid.innerHTML = 'Lỗi Blockchain.'; }
}

async function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    if (html5QrCode.isScanning) await html5QrCode.stop();
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
        const id = text.split('-').pop();
        if (navigator.vibrate) navigator.vibrate(100);
        verifyProduct(id);
    }).catch(err => alert("Lỗi Camera: Hãy dùng HTTPS."));
}

function stopScanner() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop(); }

async function verifyProduct(id) {
    const res = document.getElementById('traceResult');
    res.classList.remove('hidden');
    res.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner animate-spin text-indigo-500"></i></div>';
    try {
        const p = await contract.methods.verifyProduct(id).call();
        res.innerHTML = `<div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-xl text-center">
            <h3 class="font-bold text-lg text-slate-800 mb-4">${p.name}</h3>
            <button onclick="openProductDetail(${id})" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">Xem chi tiết</button>
        </div>`;
        stopScanner();
    } catch (e) { res.innerHTML = '<div class="text-center text-red-500">Không tìm thấy!</div>'; }
}

async function openProductDetail(id) {
    const p = await contract.methods.verifyProduct(id).call();
    document.getElementById('detailModal').classList.remove('hidden');
    
    // Xử lý lịch sử an toàn để tránh lỗi map
    const historyHtml = p.history && p.history.length > 0 
        ? p.history.map(log => `<div class="bg-slate-50 p-3 rounded-xl mb-2 text-[11px] text-slate-600">${log}</div>`).join('')
        : '<p class="text-xs text-slate-400">Không có dữ liệu.</p>';

    document.getElementById('modalContent').innerHTML = `
        <img src="${formatUrl(p.productImageUrl)}" class="w-full h-48 object-cover rounded-3xl mb-6 shadow-md">
        <h3 class="text-xl font-extrabold text-slate-800 mb-1">${p.name}</h3>
        <p class="text-indigo-500 font-bold text-[10px] uppercase mb-4">${p.batchID}</p>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-50 p-3 rounded-2xl">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Xuất xứ</p>
                <p class="text-xs font-semibold">${p.origin}</p>
            </div>
            <div class="bg-slate-50 p-3 rounded-2xl">
                <p class="text-[9px] font-bold text-slate-400 uppercase">Ngày SX</p>
                <p class="text-xs font-semibold">${new Date(Number(p.manufactureDate)*1000).toLocaleDateString()}</p>
            </div>
        </div>
        <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Lịch sử di chuyển</p>
        <div class="mb-6">${historyHtml}</div>
        <a href="${formatUrl(p.certificationUrl)}" target="_blank" class="block w-full text-center py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 text-sm">Xem chứng nhận IPFS</a>
    `;
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
