<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        
        #sideDrawer { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); z-index: 50; }
        #sideDrawer.open { transform: translateX(0); }
        #overlay { transition: opacity 0.3s ease; display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 40; }
        #overlay.active { display: block; }
        .filter-btn { transition: all 0.2s ease; }
        .filter-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { max-width: 90%; max-height: 90%; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div id="overlay" onclick="closeDrawer()"></div>

    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-full max-w-[420px] bg-white shadow-2xl translate-x-full overflow-y-auto border-l border-slate-200">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur-md z-10">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle-info text-sky-600"></i>
                <h3 class="font-bold text-lg text-slate-800">Thông tin chi tiết</h3>
            </div>
            <button onclick="closeDrawer()" class="w-9 h-9 flex items-center justify-center hover:bg-red-50 hover:text-red-500 text-slate-400 rounded-xl transition-all">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div id="drawerContent" class="p-6 space-y-8"></div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-sky-100 bg-sky-600 text-white text-xl">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Chuyển giao quyền</span>
            </button>
        </nav>
        
        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Connected Wallet
                </div>
                <div id="accountDisplay" class="text-[10px] font-mono text-slate-400 break-all bg-white p-2 rounded-lg border border-slate-200">Kết nối ví...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800 tracking-tight">Kho sản phẩm</h2>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold hover:bg-slate-50 shadow-sm transition-all text-slate-700">
                <i class="fa-solid fa-arrows-rotate"></i> Làm mới
            </button>
        </header>

        <div class="p-10">
            <div id="list-products" class="tab-content active">
                <div class="flex items-center gap-3 mb-8 bg-slate-100/50 p-1.5 rounded-2xl w-fit border border-slate-200">
                    <button onclick="filterProducts('all', this)" class="filter-btn active px-6 py-2.5 rounded-xl text-xs font-bold transition-all">Tất cả</button>
                    <button onclick="filterProducts('in-stock', this)" class="filter-btn px-6 py-2.5 rounded-xl text-xs font-bold transition-all">Trong kho</button>
                    <button onclick="filterProducts('transferred', this)" class="filter-btn px-6 py-2.5 rounded-xl text-xs font-bold transition-all">Đã xuất đi</button>
                </div>
                
                <div id="productGridBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-xl mx-auto py-10">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl shadow-slate-200/50">
                    <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center text-2xl mb-6">
                        <i class="fa-solid fa-truck-moving"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">Bàn giao quyền sở hữu</h3>
                    <p class="text-slate-500 text-sm mb-8 italic">Vui lòng nhập chính xác ID và địa chỉ ví của đối tác tiếp nhận.</p>
                    
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-400 uppercase ml-1">ID Sản Phẩm</label>
                            <input id="transferId" type="number" placeholder="Ví dụ: 1" 
                                   class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-orange-500 transition-all font-bold text-slate-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-400 uppercase ml-1">Địa chỉ ví nhận (Recipient Address)</label>
                            <input id="newOwner" type="text" placeholder="0x..." 
                                   class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 outline-none font-mono text-sm focus:ring-2 focus:ring-orange-500 transition-all">
                        </div>
                        <button onclick="transferOwnership()" 
                                class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl transition-all shadow-lg active:scale-95 mt-4">
                            Xác nhận xuất kho
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="certModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content relative" onclick="event.stopPropagation()">
            <img id="certImage" src="" alt="Certificate" class="max-w-full block">
            <button onclick="closeCertModal()" class="absolute top-4 right-4 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-black">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content p-8 text-center bg-white" onclick="event.stopPropagation()">
            <h4 class="font-bold text-lg mb-4 text-slate-800">QR Truy xuất nguồn gốc</h4>
            <canvas id="modalQRCode" class="mx-auto rounded-2xl shadow-lg border border-slate-100"></canvas>
            <p class="text-xs text-slate-400 mt-6 leading-relaxed">Sử dụng camera hoặc ứng dụng quét mã để<br>xem hành trình sản phẩm trên blockchain.</p>
        </div>
    </div>

<script>
// ==================== CONFIG ====================
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";

const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'all';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    } else {
        alert("Vui lòng cài đặt MetaMask!");
    }
});

async function loadMyProducts() {
    const grid = document.getElementById('productGridBody');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto"></div></div>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            allProducts.push({ id: i, ...p });
        }
        renderGrid();
    } catch (err) {
        grid.innerHTML = '<div class="col-span-full py-20 text-center text-red-400 font-bold">Lỗi kết nối mạng Blockchain.</div>';
    }
}

// CẬP NHẬT: Render theo dạng Card chuyên nghiệp
function renderGrid() {
    const grid = document.getElementById('productGridBody');
    let filtered = allProducts;

    if (currentFilter === 'in-stock') {
        filtered = allProducts.filter(p => p.owner.toLowerCase() === account);
    } else if (currentFilter === 'transferred') {
        filtered = allProducts.filter(p => p.owner.toLowerCase() !== account);
    }

    grid.innerHTML = filtered.map(p => {
        const isOwned = p.owner.toLowerCase() === account;
        const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x300?text=No+Image';
        const statusBadge = isOwned 
            ? `<span class="bg-emerald-100 text-emerald-600 px-2.5 py-1 rounded-lg text-[10px] font-bold border border-emerald-200 uppercase">Trong kho</span>` 
            : `<span class="bg-slate-100 text-slate-400 px-2.5 py-1 rounded-lg text-[10px] font-bold border border-slate-200 uppercase">Đã xuất đi</span>`;

        return `
            <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group cursor-pointer" onclick="openDrawer(${p.id})">
                <div class="relative h-56 overflow-hidden bg-slate-100">
                    <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute top-4 left-4">${statusBadge}</div>
                    <div class="absolute top-4 right-4 bg-black/40 backdrop-blur-md text-white text-[10px] px-2.5 py-1 rounded-lg font-mono font-bold tracking-widest">#${p.id}</div>
                </div>
                <div class="p-6">
                    <div class="text-[10px] text-sky-500 font-extrabold uppercase mb-1 tracking-wider">${p.manufacturerName}</div>
                    <h4 class="font-bold text-slate-800 mb-1 text-lg line-clamp-1">${p.name}</h4>
                    <p class="text-xs text-slate-400 mb-5 italic">${p.batchID}</p>
                    
                    <div class="flex items-center justify-between border-t border-slate-50 pt-4">
                        <div class="flex items-center gap-2">
                            <i class="fa-regular fa-calendar-check text-slate-300"></i>
                            <span class="text-[10px] font-bold text-slate-500">${p.manufactureDate}</span>
                        </div>
                        <button class="text-sky-600 font-bold text-xs flex items-center gap-1.5 hover:gap-2.5 transition-all">Chi tiết <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        `;
    }).join('') || '<div class="col-span-full py-20 text-center text-slate-400 font-medium">Không tìm thấy sản phẩm nào trong kho.</div>';
}

function filterProducts(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

// ==================== DRAWER CHI TIẾT ====================
function openDrawer(id) {
    const product = allProducts.find(p => p.id == id);
    if (!product) return;

    const drawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('drawerContent');

    let imgUrl = product.productImageUrl ? product.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';
    let certUrl = product.certificationUrl ? product.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';

    content.innerHTML = `
        <div class="space-y-6">
            ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-3xl shadow-lg h-60 object-cover border border-slate-100">` : `<div class="h-60 bg-slate-50 rounded-3xl flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-5xl"></i></div>`}
            
            <div class="space-y-1">
                <h4 class="text-2xl font-black text-slate-900 leading-tight">${product.name}</h4>
                <div class="flex items-center gap-2 text-sky-600 font-bold text-sm">
                    <i class="fa-solid fa-fingerprint"></i> Product ID: #${id}
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Số Lô</p>
                    <p class="font-bold text-slate-700">${product.batchID}</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Ngày SX</p>
                    <p class="font-bold text-slate-700">${product.manufactureDate}</p>
                </div>
            </div>

            <div class="bg-sky-50 rounded-3xl p-6 border border-sky-100">
                <div class="text-sky-700 text-[10px] font-black mb-3 flex items-center gap-2 tracking-widest uppercase">
                    <i class="fa-solid fa-industry"></i> NHÀ SẢN XUẤT GỐC
                </div>
                <div class="font-bold text-slate-800 text-base">${product.manufacturerName}</div>
                <div class="text-xs text-slate-600 mt-1 flex items-start gap-1.5 leading-relaxed">
                    <i class="fa-solid fa-location-dot mt-0.5 text-sky-400"></i>
                    ${product.factoryAddress}
                </div>
            </div>

            <div class="bg-emerald-50 rounded-3xl p-6 border border-emerald-100">
                <div class="text-emerald-700 text-[10px] font-black mb-2 tracking-widest uppercase flex items-center gap-2">
                    <i class="fa-solid fa-user-shield"></i> CHỦ SỞ HỮU HIỆN TẠI
                </div>
                <div class="text-[11px] font-mono text-emerald-800 break-all bg-white/50 p-2 rounded-lg border border-emerald-100">${product.owner}</div>
            </div>

            ${certUrl ? `
            <button onclick="showCertModal('${certUrl}')" 
                    class="w-full py-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-2xl flex items-center justify-center gap-3 text-sm font-bold transition-all border border-indigo-200">
                <i class="fa-solid fa-file-shield"></i> Xem giấy chứng nhận
            </button>` : ''}

            <div class="pt-4 border-t border-slate-100">
                <button onclick="showQrModal('https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}')" 
                        class="w-full py-4 bg-white hover:bg-slate-50 border border-slate-300 rounded-2xl flex items-center justify-center gap-3 text-slate-700 font-bold transition-all shadow-sm">
                    <i class="fa-solid fa-qrcode"></i> Xem mã QR Truy xuất
                </button>
            </div>
        </div>
    `;

    drawer.classList.add('open');
    overlay.classList.add('active');
}

function closeDrawer() {
    document.getElementById('sideDrawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

// ==================== LOGIC CHUYỂN GIAO ====================
async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const receiver = document.getElementById("newOwner").value.trim();
    if (!id || !receiver) return alert("Vui lòng nhập đầy đủ thông tin!");
    
    try {
        const product = allProducts.find(p => p.id == id);
        if (!product || product.owner.toLowerCase() !== account) {
            alert("Bạn không có quyền sở hữu sản phẩm ID: " + id);
            return;
        }
        await contract.methods.transferOwnership(id, receiver).send({ from: account });
        alert("✅ Xuất kho và chuyển giao thành công!");
        loadMyProducts();
    } catch (err) {
        alert("Lỗi giao dịch: " + err.message);
    }
}

// ==================== MODALS ====================
function showCertModal(url) {
    document.getElementById('certImage').src = url;
    document.getElementById('certModal').classList.add('active');
}
function closeCertModal() { document.getElementById('certModal').classList.remove('active'); }

function showQrModal(url) {
    document.getElementById('qrModal').classList.add('active');
    setTimeout(() => {
        QRCode.toCanvas(document.getElementById('modalQRCode'), url, { width: 280, margin: 2 });
    }, 150);
}
function closeQrModal() { document.getElementById('qrModal').classList.remove('active'); }

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const titles = { 'list-products': 'Kho sản phẩm', 'transfer-ownership': 'Chuyển giao quyền' };
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    const keys = Object.keys(titles);
    const idx = keys.indexOf(tabId);
    if(idx !== -1) document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
}
</script>
</body>
</html>
