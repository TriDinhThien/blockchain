<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
      
        :root {
            --primary: #0ea5e9; /* Sky 500 */
            --blue: #3b82f6; /* Blue 500 */
            --light-blue: #bfdbfe; /* Blue 200 */
        }
      
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        /* Intro screen */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.75) saturate(1.2);
        }
        .intro-content {
            text-align: center;
            z-index: 10;
            animation: introFloat 3s ease-in-out infinite;
        }

        /* Sidebar */
        aside {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
        }
        .sidebar-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 9999px;
        }
        .sidebar-item:hover {
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgb(14 165 233 / 0.2);
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #0ea5e9, #3b82f6);
            color: white;
            box-shadow: 0 15px 30px -8px rgba(14, 165, 233, 0.45);
        }

        /* Tab content */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Product area */
        #productGridBody > div.grid-item {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(14, 165, 233, 0.15);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.08);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2.5rem;
        }
        #productGridBody > div.grid-item:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.25);
            border-color: rgba(14, 165, 233, 0.35);
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.7);
        }

        /* Filter buttons */
        .filter-btn.active {
            background: linear-gradient(90deg, #0ea5e9, #3b82f6);
            color: white;
            border-color: #0ea5e9;
            box-shadow: 0 10px 25px -5px rgb(14 165 233);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
        }
        .modal.active { display: flex; }

        #main-scroll-area {
            flex: 1 1 0 !important;
            min-height: 0 !important;
            overflow-y: auto !important;
            scroll-behavior: smooth;
        }

        @media (max-width: 768px) {
            #main-scroll-area {
                padding: 20px 20px 100px 20px !important;
            }
            #transfer-ownership input {
                padding: 16px 20px !important;
                border-radius: 9999px !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex text-slate-900 overflow-hidden relative">

    <div id="intro-screen">
        <video id="intro-video" autoplay loop muted playsinline preload="auto">
            <source src="intro-distributor.mp4" type="video/mp4">
        </video>
      
        <div class="intro-content max-w-lg px-6">
            <img src="2.png" alt="VeriGlow Logo"
                 class="mx-auto w-40 h-40 md:w-52 md:h-52 rounded-full object-cover shadow-2xl border-8 border-white/40 mb-8 ring-8 ring-white/20">
            <h1 class="text-6xl md:text-7xl font-bold tracking-[-2px] text-white drop-shadow-xl">VeriGlow</h1>
            <p class="text-white/90 text-xl md:text-2xl mt-3 font-light">Phân phối minh bạch • Blockchain • Tin cậy</p>
            <div class="mt-12 flex flex-col items-center gap-4">
                <button onclick="enterDashboard()"
                        class="px-14 py-6 bg-white text-slate-900 rounded-3xl font-semibold text-2xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all flex items-center gap-4">
                    <span>Quản lý phân phối</span>
                    <i class="fa-solid fa-truck-fast text-sky-500"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-content" class="flex w-full min-h-screen">
        <aside class="w-72 bg-white/95 border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen shadow-2xl">
            <div class="p-8">
                <div class="flex items-center gap-3">
                    <img src="2.png" alt="VeriGlow Logo" class="w-12 h-12 rounded-3xl object-cover shadow-xl ring-2 ring-sky-200">
                    <span class="font-bold text-2xl bg-gradient-to-r from-sky-600 to-blue-600 bg-clip-text text-transparent">VeriGlow</span>
                </div>
                <p class="text-sky-600 text-xs mt-1 pl-1 font-medium">Distributor Hub</p>
            </div>
          
            <nav class="mt-4 flex-1 px-6 space-y-2">
                <div class="flex items-center gap-2">
                    <button onclick="showTab('list-products')" class="sidebar-item active flex-1 flex items-center gap-3 px-5 py-4 text-slate-600 font-medium">
                        <i class="fa-solid fa-boxes-stacked text-xl"></i>
                        <span>Kho sản phẩm</span>
                    </button>
                    <button onclick="showFunctionInfo('list-products')" class="info-icon text-slate-400 hover:text-sky-500 px-2 py-2"><i class="fa-solid fa-circle-info"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showTab('transfer-ownership')" class="sidebar-item flex-1 flex items-center gap-3 px-5 py-4 text-slate-600 font-medium">
                        <i class="fa-solid fa-truck-ramp-box text-xl"></i>
                        <span>Chuyển giao quyền</span>
                    </button>
                    <button onclick="showFunctionInfo('transfer-ownership')" class="info-icon text-slate-400 hover:text-sky-500 px-2 py-2"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </nav>
          
            <div class="p-6 mt-auto border-t border-slate-100">
                <div class="glass rounded-3xl p-5 border border-white/60">
                    <div class="flex items-center gap-2 mb-3 text-[10px] font-bold text-sky-600 uppercase">
                        <div class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div> Network: Sepolia
                    </div>
                    <div id="accountDisplay" class="text-xs font-mono text-slate-500 bg-white/70 p-3 rounded-2xl border border-slate-100 truncate">Connecting...</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white/90 backdrop-blur-2xl border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
                <h2 id="pageTitle" class="text-3xl font-semibold text-slate-800 tracking-[-0.5px]">Kho sản phẩm</h2>
                <button onclick="loadProducts()" class="flex items-center gap-3 px-8 py-3 bg-white border border-slate-200 rounded-3xl text-sm font-semibold hover:bg-sky-50 transition-all">
                    <i class="fa-solid fa-arrows-rotate"></i> Làm mới
                </button>
            </header>
          
            <div id="main-scroll-area" class="p-10">
                <div id="list-products" class="tab-content active">
                    <div class="mb-8 flex flex-wrap items-center gap-3">
                        <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 active flex items-center gap-2">
                            <i class="fa-solid fa-boxes-stacked"></i> Sẵn sàng bàn giao
                        </button>
                        <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-truck-moving"></i> Đã xuất đi
                        </button>
                        <button id="btnActivity" onclick="setFilter('activity')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-clock-rotate-left"></i> Hoạt động gần đây
                        </button>
                    </div>
                    <div id="productGridBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
                </div>

                <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                    <div class="glass rounded-[2.75rem] border border-white/60 shadow-2xl p-10">
                        <h3 class="text-3xl font-bold text-slate-800 mb-8 flex items-center gap-4"><i class="fa-solid fa-truck-moving text-sky-500"></i> Tiếp tục hành trình</h3>
                        <div class="space-y-6">
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">ID sản phẩm (6 ký tự)</label><input id="transferId" type="text" maxlength="6" class="w-full px-8 py-5 rounded-3xl border border-slate-200 bg-white/70 outline-none focus:ring-2 focus:ring-sky-400 uppercase"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Địa chỉ ví người nhận</label><input id="newOwner" type="text" placeholder="0x..." class="w-full px-8 py-5 rounded-3xl border border-slate-200 bg-white/70 font-mono text-sm outline-none focus:ring-2 focus:ring-sky-400"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Vai trò mới (VD: Đại lý Cấp 2, Khách hàng)</label><input id="newRole" type="text" class="w-full px-8 py-5 rounded-3xl border border-slate-200 bg-white/70 outline-none focus:ring-2 focus:ring-sky-400"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Tên đơn vị/Người nhận</label><input id="newName" type="text" class="w-full px-8 py-5 rounded-3xl border border-slate-200 bg-white/70 outline-none focus:ring-2 focus:ring-sky-400"></div>
                            <div><label class="block text-xs font-bold text-slate-400 uppercase mb-2">Địa chỉ vật lý (Nơi nhận)</label><input id="newLocation" type="text" class="w-full px-8 py-5 rounded-3xl border border-slate-200 bg-white/70 outline-none focus:ring-2 focus:ring-sky-400"></div>
                            <button onclick="transferOwnership()" class="w-full bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white font-bold py-7 rounded-3xl shadow-2xl transition-all text-xl mt-4">Xác nhận chuyển kho</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-[420px] bg-white shadow-2xl translate-x-full flex flex-col z-[100] border-l border-slate-200 backdrop-blur-2xl">
            <div class="px-6 py-6 border-b flex items-center justify-between"><h3 class="font-bold text-xl">Chi tiết sản phẩm</h3><button onclick="closeSidebar()" class="w-10 h-10 text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-3xl"></i></button></div>
            <div id="sidebarContent" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
        </div>
        
        <div id="alertModal" class="modal" style="z-index: 10005;" onclick="if(event.target.id==='alertModal')this.classList.remove('active')">
            <div class="modal-content w-full max-w-sm mx-4 bg-white rounded-[2rem] p-8 text-center shadow-2xl">
                <div id="alertIcon" class="mb-4 text-6xl"></div>
                <h3 id="alertTitle" class="text-2xl font-bold text-slate-800 mb-3"></h3>
                <p id="alertMessage" class="text-slate-500 mb-8 text-sm break-words"></p>
                <button onclick="document.getElementById('alertModal').classList.remove('active')" id="alertBtn" class="w-full py-4 rounded-2xl font-bold text-white transition-all text-lg"></button>
            </div>
        </div>

        <div id="functionModal" class="modal" onclick="if(event.target.id==='functionModal')this.classList.remove('active')">
            <div class="modal-content w-full max-w-lg mx-4 bg-white rounded-3xl p-8" onclick="event.stopPropagation()">
                <div class="flex justify-between items-start mb-6"><h3 id="functionTitle" class="text-2xl font-bold text-slate-800"></h3><button onclick="document.getElementById('functionModal').classList.remove('active')" class="text-slate-400"><i class="fa-solid fa-xmark text-3xl"></i></button></div>
                <div id="functionDesc" class="text-slate-600 leading-relaxed"></div>
                <div class="mt-8 flex justify-end"><button onclick="document.getElementById('functionModal').classList.remove('active')" class="px-8 py-3 bg-sky-600 text-white rounded-3xl font-medium">Đã hiểu</button></div>
            </div>
        </div>
    </div>

<script>
// Contract Info (Bảo đảm khớp với Smart Contract của bạn)
const contractAddress = "0x5fb38a482899ee0C716996872A0b7DD95038B98a";
const abi = [
	{
		"anonymous": false,
		"inputs": [
			{"indexed": false, "internalType": "string", "name": "id", "type": "string"},
			{"indexed": true, "internalType": "address", "name": "oldOwner", "type": "address"},
			{"indexed": true, "internalType": "address", "name": "newOwner", "type": "address"}
		],
		"name": "OwnershipTransferred",
		"type": "event"
	},
	{
		"anonymous": false,
		"inputs": [
			{"indexed": false, "internalType": "string", "name": "id", "type": "string"},
			{"indexed": false, "internalType": "string", "name": "name", "type": "string"}
		],
		"name": "ProductCreated",
		"type": "event"
	},
	{
		"inputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
		"name": "allProductIds",
		"outputs": [{"internalType": "string", "name": "", "type": "string"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{"internalType": "string", "name": "_id", "type": "string"},
			{"internalType": "string", "name": "_name", "type": "string"},
			{"internalType": "string", "name": "_batchID", "type": "string"},
			{"internalType": "string", "name": "_manufactureDate", "type": "string"},
			{"internalType": "string", "name": "_origin", "type": "string"},
			{"internalType": "string[]", "name": "_ingredients", "type": "string[]"},
			{"internalType": "string", "name": "_productImageUrl", "type": "string"},
			{"internalType": "string", "name": "_certificationUrl", "type": "string"},
			{"internalType": "string", "name": "_manufacturerName", "type": "string"},
			{"internalType": "string", "name": "_factoryAddress", "type": "string"}
		],
		"name": "createProduct",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
		"name": "getProductBasicInfo",
		"outputs": [
			{"internalType": "string", "name": "name", "type": "string"},
			{"internalType": "string", "name": "batchID", "type": "string"},
			{"internalType": "string", "name": "manufactureDate", "type": "string"},
			{"internalType": "string", "name": "origin", "type": "string"},
			{"internalType": "bool", "name": "isAuthentic", "type": "bool"},
			{"internalType": "address", "name": "owner", "type": "address"},
			{"internalType": "string[]", "name": "ingredients", "type": "string[]"},
			{"internalType": "string", "name": "productImageUrl", "type": "string"},
			{"internalType": "string", "name": "certificationUrl", "type": "string"}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getProductCount",
		"outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
		"name": "getProductJourney",
		"outputs": [
			{
				"components": [
					{"internalType": "address", "name": "wallet", "type": "address"},
					{"internalType": "string", "name": "role", "type": "string"},
					{"internalType": "string", "name": "name", "type": "string"},
					{"internalType": "string", "name": "location", "type": "string"},
					{"internalType": "uint256", "name": "timestamp", "type": "uint256"}
				],
				"internalType": "struct CosmeticsTraceability.JourneyNode[]",
				"name": "",
				"type": "tuple[]"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [{"internalType": "string", "name": "", "type": "string"}],
		"name": "productExists",
		"outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{"internalType": "string", "name": "_id", "type": "string"},
			{"internalType": "address", "name": "_newOwnerWallet", "type": "address"},
			{"internalType": "string", "name": "_newRole", "type": "string"},
			{"internalType": "string", "name": "_newName", "type": "string"},
			{"internalType": "string", "name": "_newLocation", "type": "string"}
		],
		"name": "transferOwnership",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];

let web3, contract, account;
let currentFilter = 'inStock';

function showToast(message, type = 'success') {
    const modal = document.getElementById('alertModal');
    const icon = document.getElementById('alertIcon');
    const title = document.getElementById('alertTitle');
    const msg = document.getElementById('alertMessage');
    const btn = document.getElementById('alertBtn');
    msg.innerHTML = message;
    if (type === 'success') {
        icon.innerHTML = '<i class="fa-solid fa-circle-check text-sky-500"></i>';
        title.innerText = 'Thành công!';
        btn.className = 'w-full py-4 rounded-2xl font-bold text-white bg-sky-600';
        btn.innerText = 'Tiếp tục';
    } else {
        icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
        title.innerText = 'Lỗi';
        btn.className = 'w-full py-4 rounded-2xl font-bold text-white bg-red-600';
        btn.innerText = 'Thử lại';
    }
    modal.classList.add('active');
}

window.addEventListener("load", async () => {
    if (!window.ethereum) return showToast("Vui lòng cài đặt MetaMask!", "error");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById('accountDisplay').innerText = account.slice(0,6) + "..." + account.slice(-4);
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

async function loadProducts() {
    const grid = document.getElementById('productGridBody');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto border-sky-500"></div></div>';
    try {
        const count = Number(await contract.methods.getProductCount().call());
        let html = '';
        for (let i = count - 1; i >= 0; i--) {
            const idStr = await contract.methods.allProductIds(i).call();
            const p = await contract.methods.getProductBasicInfo(idStr).call();
            const isOwned = p.owner.toLowerCase() === account.toLowerCase();
            
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;
            if (currentFilter === 'activity') { /* Show all for activity tab */ }

            const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x300?text=No+Image';
            html += `
                <div class="grid-item bg-white overflow-hidden shadow-sm group cursor-pointer" onclick="showProductDetail('${idStr}')">
                    <div class="relative h-48 overflow-hidden bg-slate-100">
                        <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                        <div class="absolute top-3 right-3 bg-black/40 text-white text-[10px] px-2 py-1 rounded-md">ID: ${idStr}</div>
                    </div>
                    <div class="p-5">
                        <h4 class="font-bold text-slate-800 line-clamp-1">${p.name}</h4>
                        <p class="text-xs text-slate-400 mt-1 italic">${p.batchID}</p>
                        <div class="mt-4 flex justify-between items-center border-t pt-4">
                            <span class="text-[10px] text-slate-400 font-medium">${p.manufactureDate}</span>
                            <span class="text-sky-600 font-bold text-xs">Chi tiết <i class="fa-solid fa-arrow-right"></i></span>
                        </div>
                    </div>
                </div>`;
        }
        grid.innerHTML = html || '<div class="col-span-full py-20 text-center text-slate-400">Không tìm thấy sản phẩm.</div>';
    } catch (err) {
        grid.innerHTML = '<div class="col-span-full py-20 text-center text-red-400">Không thể kết nối Blockchain.</div>';
    }
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value.trim().toUpperCase();
    const newOwner = document.getElementById("newOwner").value.trim();
    const newRole = document.getElementById("newRole").value.trim();
    const newName = document.getElementById("newName").value.trim();
    const newLocation = document.getElementById("newLocation").value.trim();

    if (!id || !newOwner || !newRole || !newName || !newLocation) return showToast("Điền đầy đủ thông tin!", "error");
    
    try {
        const p = await contract.methods.getProductBasicInfo(id).call();
        if (p.owner.toLowerCase() !== account.toLowerCase()) return showToast("Bạn không sở hữu sản phẩm này!", "error");

        await contract.methods.transferOwnership(id, newOwner, newRole, newName, newLocation).send({ from: account });
        showToast("Chuyển giao thành công!", "success");
        loadProducts();
    } catch (err) {
        showToast(err.message, "error");
    }
}

async function showProductDetail(idStr) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto border-sky-500"></div></div>';
    sidebar.classList.remove('translate-x-full');
    try {
        const p = await contract.methods.getProductBasicInfo(idStr).call();
        const journey = await contract.methods.getProductJourney(idStr).call();
        const imgUrl = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';

        let journeyHTML = journey.map((node, index) => `
            <div class="relative pl-6 pb-6 border-l-2 border-slate-100 last:border-0 last:pb-0">
                <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full ${index === journey.length-1 ? 'bg-sky-500' : 'bg-slate-300'} border-2 border-white"></div>
                <div class="text-sm font-bold text-slate-800">${node.role}</div>
                <div class="text-xs text-slate-500 mt-0.5">${node.name}</div>
                <div class="text-[10px] text-slate-400 mt-1"><i class="fa-solid fa-location-dot"></i> ${node.location}</div>
                <div class="text-[9px] text-slate-400 mt-0.5">${new Date(Number(node.timestamp)*1000).toLocaleString('vi-VN')}</div>
            </div>
        `).join('');

        content.innerHTML = `
            <div class="space-y-6">
                ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-3xl shadow-lg h-56 object-cover">` : ''}
                <div class="grid grid-cols-2 gap-4 text-sm bg-slate-50 p-5 rounded-3xl">
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Sản phẩm</span><strong>${p.name}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Mã lô</span><strong>${p.batchID}</strong></div>
                </div>
                <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
                    <h5 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest"><i class="fa-solid fa-route mr-2"></i> Lịch sử vận chuyển</h5>
                    <div class="space-y-0">${journeyHTML}</div>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = '<p class="text-red-500">Lỗi tải dữ liệu.</p>';
    }
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    const titles = {'list-products': 'Kho sản phẩm', 'transfer-ownership': 'Chuyển giao quyền'};
    document.getElementById('pageTitle').innerText = titles[tabId];
    if (tabId === 'list-products') document.querySelectorAll('.sidebar-item')[0].classList.add('active');
    else document.querySelectorAll('.sidebar-item')[1].classList.add('active');
}

function setFilter(filter) {
    currentFilter = filter;
    ['btnInStock', 'btnTransferred', 'btnActivity'].forEach(id => document.getElementById(id).classList.remove('active'));
    document.getElementById(`btn${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('active');
    loadProducts();
}

function enterDashboard() {
    document.getElementById('intro-screen').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('dashboard-content').classList.add('flex');
    }, 800);
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
    let title = '', desc = '';
    if (type === 'list-products') { title = 'Kho sản phẩm'; desc = 'Xem toàn bộ sản phẩm bạn đang quản lý. Bạn có thể lọc xem <strong>Còn trong kho</strong> và những sản phẩm <strong>Đã chuyển giao</strong>.'; }
    else if (type === 'transfer-ownership') { title = 'Chuyển giao quyền'; desc = 'Bàn giao quyền sở hữu sản phẩm cho đại lý tiếp theo hoặc khách hàng. Hệ thống sẽ ghi nhận lịch sử vào Blockchain.'; }
    titleEl.innerHTML = title;
    descEl.innerHTML = desc;
    modal.classList.add('active');
}
</script>
</body>
</html>
