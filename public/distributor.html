<div id="list-products" class="tab-content active">
    
    <div class="flex gap-4 mb-8 bg-white p-2 rounded-2xl border border-slate-200 w-fit">
        <button onclick="filterProducts('owned')" id="btnFilterOwned" class="filter-btn active px-6 py-2.5 rounded-xl text-sm font-bold transition-all">
            <i class="fa-solid fa-warehouse mr-2"></i>Sản phẩm đang trong kho
        </button>
        <button onclick="filterProducts('transferred')" id="btnFilterTransferred" class="filter-btn px-6 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500">
            <i class="fa-solid fa-handshake-angle mr-2"></i>Sản phẩm đã giao khách
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-sky-500">
            <div class="text-slate-400 text-[11px] font-bold uppercase tracking-widest mb-1">Đang nắm giữ</div>
            <div id="countOwned" class="text-3xl font-black text-slate-800">0</div>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
            <div class="text-slate-400 text-[11px] font-bold uppercase tracking-widest mb-1">Đã xuất kho</div>
            <div id="countTransferred" class="text-3xl font-black text-slate-800">0</div>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <table class="w-full text-left">
            <thead>
                <tr class="bg-slate-50/50 border-b border-slate-100">
                    <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase tracking-widest">ID</th>
                    <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase tracking-widest">Thông tin</th>
                    <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase tracking-widest">Trạng thái Blockchain</th>
                    <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase tracking-widest">Thao tác</th>
                </tr>
            </thead>
            <tbody id="productListBody" class="divide-y divide-slate-50">
                </tbody>
        </table>
    </div>
</div>

<style>
    /* Style bổ sung cho nút lọc */
    .filter-btn.active {
        background: #0ea5e9;
        color: white;
        box-shadow: 0 4px 10px rgba(14, 165, 233, 0.2);
    }
    .filter-btn:not(.active):hover {
        background: #f1f5f9;
    }
</style>

<script>
let currentFilter = 'owned'; // Mặc định xem hàng trong kho
let allProductsData = [];    // Lưu tạm dữ liệu để lọc nhanh không cần gọi lại blockchain

async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProductsData = []; // Clear cũ
        let owned = 0;
        let transferred = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const productOwner = p.owner.toLowerCase();
            const userWallet = account.toLowerCase();

            // Kiểm tra: 
            // 1. Bạn đang là chủ sở hữu (Owned)
            // 2. Bạn không còn là chủ sở hữu NHƯNG tên bạn có trong lịch sử (Transferred)
            const isInHistory = p.history.some(h => h.toLowerCase().includes(userWallet));

            if (productOwner === userWallet) {
                owned++;
                allProductsData.push({ ...p, id: i, type: 'owned' });
            } else if (isInHistory) {
                transferred++;
                allProductsData.push({ ...p, id: i, type: 'transferred' });
            }
        }

        document.getElementById('countOwned').innerText = owned;
        document.getElementById('countTransferred').innerText = transferred;
        
        renderTable(); // Gọi hàm hiển thị dựa trên filter
    } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-500">Lỗi kết nối Blockchain.</td></tr>';
    }
}

function filterProducts(type) {
    currentFilter = type;
    // Cập nhật UI nút
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'text-slate-500'));
    if(type === 'owned') {
        document.getElementById('btnFilterOwned').classList.add('active');
        document.getElementById('btnFilterTransferred').classList.add('text-slate-500');
    } else {
        document.getElementById('btnFilterTransferred').classList.add('active');
        document.getElementById('btnFilterOwned').classList.add('text-slate-500');
    }
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    const filtered = allProductsData.filter(p => p.type === currentFilter);
    
    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-slate-400">Không có sản phẩm nào trong mục này.</td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map(p => `
        <tr class="hover:bg-slate-50/50 transition-all">
            <td class="px-8 py-6 font-mono text-xs text-slate-400">#${String(p.id).padStart(3, '0')}</td>
            <td class="px-8 py-6">
                <div class="font-bold text-slate-800">${p.name}</div>
                <div class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">Batch: ${p.batchID}</div>
            </td>
            <td class="px-8 py-6">
                ${p.type === 'owned' 
                    ? '<span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Trong kho</span>'
                    : '<span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Đã chuyển giao</span>'
                }
            </td>
            <td class="px-8 py-6">
                ${p.type === 'owned' 
                    ? `<button onclick="prepareTransfer(${p.id})" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-black transition-all">Bán hàng / Chuyển giao</button>`
                    : `<span class="text-slate-400 text-xs italic">Đã bàn giao cho: ${p.owner.substring(0,6)}...${p.owner.substring(38)}</span>`
                }
            </td>
        </tr>
    `).join('');
}

function prepareTransfer(id) {
    document.getElementById('transferId').value = id;
    showTab('transfer-ownership');
}
</script>
