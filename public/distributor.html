<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .filter-btn.active { background-color: #0ea5e9; color: white; border-color: #0ea5e9; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25); }
        
        /* Drawer Animation */
        #productDetailSidebar { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg bg-indigo-600 text-white text-xl">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-600 to-sky-600 bg-clip-text text-transparent">VeriGlow Dist.</span>
            </div>
        </div>
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho hàng nhập</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-share-nodes"></i> <span>Chuyển tiếp quyền</span>
            </button>
        </nav>
        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Local Node / Sepolia
                </div>
                <div id="accountDisplay" class="text-[10px] font-mono text-slate-500 truncate bg-white p-2 rounded-lg border border-slate-200">Connecting...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Kho hàng nhập</h2>
            <button onclick="loadProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50 text-slate-700">
                <i class="fa-solid fa-arrows-rotate"></i> Làm mới dữ liệu
            </button>
        </header>

        <div class="p-10 overflow-y-auto">
            <div id="list-products" class="tab-content active">
                <div class="mb-8 flex items-center gap-4">
                    <span class="text-sm font-medium text-slate-500">Bộ lọc:</span>
                    <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 active flex items-center gap-2">
                        <i class="fa-solid fa-warehouse"></i> Đang sở hữu
                    </button>
                    <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 flex items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> Đã bàn giao tiếp
                    </button>
                </div>
                <div id="productGridBody" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 rounded-2xl bg-orange-100 text-orange-600 flex items-center justify-center text-xl shadow-sm">
                            <i class="fa-solid fa-truck-moving"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">Bàn giao cho Đại lý/Khách hàng</h3>
                            <p class="text-slate-400 text-xs">Chuyển quyền sở hữu tài sản kỹ thuật số trên Blockchain.</p>
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">ID sản phẩm (Token ID)</label>
                            <input id="transferId" type="number" placeholder="Nhập ID từ kho hàng..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Địa chỉ ví người nhận</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm outline-none focus:ring-2 focus:ring-orange-500 transition-all">
                        </div>
                        <button onclick="transferOwnership()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-lg transition-all active:scale-[0.98] mt-4 flex items-center justify-center gap-2">
                            <span>Xác nhận giao dịch</span> <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-[420px] bg-white shadow-2xl translate-x-full flex flex-col z-50 border-l border-slate-200">
        <div class="px-6 py-6 border-b flex items-center justify-between bg-slate-50">
            <div class="flex items-center gap-3"><i class="fa-solid fa-circle-info text-sky-600"></i><h3 class="font-bold text-lg text-slate-800">Thông tin chi tiết</h3></div>
            <button onclick="closeSidebar()" class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div id="sidebarContent" class="flex-1 overflow-y-auto p-6 space-y-8">
            </div>
    </div>

    <div id="certModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content relative" onclick="event.stopPropagation()">
            <img id="modalCertImg" src="" class="max-w-full block shadow-2xl">
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content p-8 text-center bg-white rounded-[2rem]" onclick="event.stopPropagation()">
            <h3 class="text-lg font-bold mb-4 text-slate-800">Mã QR Định danh</h3>
            <canvas id="modalQrCanvas" class="mx-auto rounded-2xl shadow-md border-4 border-slate-50"></canvas>
            <p class="mt-4 text-xs text-slate-400 font-medium">Quét mã này để kiểm tra tính minh bạch</p>
        </div>
    </div>

<script>
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;
let currentFilter = 'inStock';

window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("MetaMask is required!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById('accountDisplay').innerText = account.slice(0,6) + "..." + account.slice(-4);
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

async function loadProducts() {
    const grid = document.getElementById('productGridBody');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto"></div></div>';
    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            const isOwned = p.owner.toLowerCase() === account.toLowerCase();
            
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;

            const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x300?text=Product+Image';
            const statusLabel = isOwned 
                ? `<span class="px-2 py-1 bg-green-100 text-green-600 text-[10px] font-bold rounded-md tracking-tighter">SẴN SÀNG</span>` 
                : `<span class="px-2 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold rounded-md tracking-tighter">ĐÃ CHUYỂN</span>`;

            html += `
                <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all group cursor-pointer" onclick="showProductDetail(${i})">
                    <div class="relative h-48 overflow-hidden bg-slate-100">
                        <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute top-3 left-3">${statusLabel}</div>
                        <div class="absolute top-3 right-3 bg-black/40 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md font-mono">ID: ${i}</div>
                    </div>
                    <div class="p-5">
                        <div class="text-[10px] text-indigo-500 font-bold uppercase mb-1">${p.manufacturerName}</div>
                        <h4 class="font-bold text-slate-800 mb-1 line-clamp-1">${p.name}</h4>
                        <div class="text-xs text-slate-400 mb-4 italic">${p.batchID}</div>
                        <div class="flex items-center justify-between border-t pt-4">
                            <span class="text-[10px] text-slate-400 font-medium"><i class="fa-regular fa-calendar mr-1"></i> ${p.manufactureDate}</span>
                            <button class="text-sky-600 font-bold text-xs flex items-center gap-1 hover:gap-2 transition-all">Chi tiết <i class="fa-solid fa-arrow-right"></i></button>
                        </div>
                    </div>
                </div>`;
        }
        grid.innerHTML = html || '<div class="col-span-full py-20 text-center text-slate-400">Không tìm thấy sản phẩm nào trong kho.</div>';
    } catch (err) {
        grid.innerHTML = '<div class="col-span-full py-20 text-center text-red-400">Lỗi kết nối Blockchain.</div>';
    }
}

async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto"></div></div>';
    sidebar.classList.remove('translate-x-full');

    try {
        const verify = await contract.methods.verifyProduct(id).call();
        const prod = await contract.methods.products(id).call();

        let imgUrl = prod.productImageUrl ? prod.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';
        let certUrl = prod.certificationUrl ? prod.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';
        const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
        
        const history = verify.visibleHistory || [];

        let ingredientsHTML = verify.ingredients && verify.ingredients.length > 0 ? `
            <div class="bg-amber-50 rounded-3xl p-6">
                <div class="text-amber-700 text-xs font-bold mb-3 flex items-center gap-2"><i class="fa-solid fa-flask"></i> THÀNH PHẦN NIÊM YẾT</div>
                <div class="flex flex-wrap gap-2">${verify.ingredients.map(item => `<span class="bg-white px-3 py-1 rounded-full text-xs text-amber-800 border border-amber-200">${item}</span>`).join('')}</div>
            </div>` : '';

        content.innerHTML = `
            <div class="space-y-6">
                ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-3xl shadow-lg h-64 object-cover border border-slate-100">` : `<div class="h-64 bg-slate-100 rounded-3xl flex items-center justify-center text-slate-400">No Image</div>`}
                
                <div class="grid grid-cols-2 gap-4 text-sm bg-slate-50 p-5 rounded-3xl border border-slate-100">
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold tracking-widest">Sản phẩm</span><strong class="text-slate-700">${verify.name}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold tracking-widest">Mã lô</span><strong class="text-slate-700">${verify.batchID}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold tracking-widest">Ngày SX</span><strong class="text-slate-700">${verify.manufactureDate}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold tracking-widest">Xuất xứ</span><strong class="text-slate-700">${verify.origin}</strong></div>
                </div>

                <div class="bg-sky-50 rounded-3xl p-6 border border-sky-100 shadow-sm">
                    <div class="text-sky-700 text-xs font-bold mb-3 flex items-center gap-2 uppercase tracking-wider"><i class="fa-solid fa-industry"></i> Nguồn gốc sản xuất</div>
                    <div class="font-bold text-slate-800">${verify.manufacturerName}</div>
                    <div class="text-xs text-slate-600 mt-1"><i class="fa-solid fa-location-dot mr-1 text-sky-400"></i> ${verify.factoryAddress}</div>
                </div>

                ${ingredientsHTML}

                <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
                    <div class="text-slate-500 text-xs font-bold mb-5 flex items-center gap-2 uppercase tracking-wider"><i class="fa-solid fa-route"></i> Nhật ký cung ứng</div>
                    <div class="relative pl-6 space-y-6 before:absolute before:left-[11px] before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                        <div class="relative">
                            <div class="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-sky-500 border-2 border-white shadow-sm ring-2 ring-sky-100"></div>
                            <div class="text-xs font-bold text-slate-800">Khởi tạo & Đăng ký</div>
                            <div class="text-[10px] text-slate-400 truncate mt-0.5">${verify.manufacturerName}</div>
                        </div>
                        <div class="relative">
                            <div class="absolute -left-[21px] top-1 w-3 h-3 rounded-full bg-slate-300 border-2 border-white"></div>
                            <div class="text-xs font-bold text-slate-600">Đã luân chuyển qua: ${history.length} điểm</div>
                        </div>
                        <div class="relative bg-orange-50 p-3 rounded-xl border border-orange-100">
                            <div class="absolute -left-[21px] top-4 w-3 h-3 rounded-full bg-orange-500 border-2 border-white shadow-sm"></div>
                            <div class="text-[10px] font-bold text-orange-600 uppercase">Vị trí hiện tại (Ví)</div>
                            <div class="text-[10px] font-mono text-slate-500 truncate mt-1">${verify.owner}</div>
                        </div>
                    </div>
                </div>

                ${certUrl ? `
                <button onclick="openCertModal('${certUrl}')" class="w-full py-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-2xl flex items-center justify-center gap-3 text-sm font-bold transition-all border border-indigo-100 shadow-sm">
                    <i class="fa-solid fa-file-shield text-indigo-500"></i> Kiểm tra chứng nhận gốc
                </button>` : ''}

                <div class="text-center pt-4 border-t border-slate-100">
                    <button onclick="showQrModal('${verifyUrl}')" class="w-full py-4 bg-white hover:bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-center gap-3 text-slate-600 font-semibold transition-all">
                        <i class="fa-solid fa-qrcode text-sky-500"></i> Hiển thị mã QR Truy xuất
                    </button>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = `<div class="p-6 text-red-500 text-center bg-red-50 rounded-2xl mx-6 italic">Lỗi: ${err.message}</div>`;
    }
}

function setFilter(filter) {
    currentFilter = filter;
    document.getElementById('btnInStock').classList.toggle('active', filter === 'inStock');
    document.getElementById('btnTransferred').classList.toggle('active', filter === 'transferred');
    loadProducts();
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }

function openCertModal(url) {
    document.getElementById('modalCertImg').src = url;
    document.getElementById('certModal').classList.add('active');
}

function showQrModal(url) {
    const canvas = document.getElementById('modalQrCanvas');
    QRCode.toCanvas(canvas, url, { width: 250, margin: 2 }, (err) => {
        if (!err) document.getElementById('qrModal').classList.add('active');
    });
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const titles = {'list-products': 'Kho hàng nhập', 'transfer-ownership': 'Chuyển tiếp quyền'};
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    const navItems = document.querySelectorAll('.sidebar-item');
    if (tabId === 'list-products') navItems[0].classList.add('active');
    else if (tabId === 'transfer-ownership') navItems[1].classList.add('active');
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value.trim();
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return alert("Vui lòng nhập ID sản phẩm và địa chỉ ví nhận!");
    
    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        alert("✅ Chuyển tiếp quyền sở hữu thành công trên Blockchain!");
        loadProducts();
        showTab('list-products');
    } catch (err) {
        alert("❌ Lỗi giao dịch: " + err.message);
    }
}
</script>
</body>
</html>
