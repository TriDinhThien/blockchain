<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriGlow | Hub Phân Phối Chiến Lược</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-text { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-spinner { border: 3px solid #f1f5f9; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-[60] glass-card px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200">
                    <i class="fa-solid fa-shield-virus text-white"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight gradient-text">VeriGlow Hub</h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="switchTab('inventory', this)" class="tab-btn active px-6 py-2 rounded-lg text-sm font-bold bg-white shadow-sm text-sky-600 transition-all">Kho Hàng</button>
                    <button onclick="switchTab('history', this)" class="tab-btn px-6 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-sky-600 transition-all">Đã Giao</button>
                </div>
                <div id="accountBox" class="flex items-center gap-3 pl-6 border-l border-slate-200">
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ví kết nối</p>
                        <p id="walletAddress" class="text-xs font-mono font-bold text-slate-700">0x...loading</p>
                    </div>
                    <button onclick="loadData()" class="w-10 h-10 rounded-xl hover:bg-slate-100 text-sky-600 transition-all"><i class="fa-solid fa-arrows-rotate"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h2 id="viewTitle" class="text-4xl font-extrabold text-slate-900 tracking-tight">Sản phẩm trong kho</h2>
            <div class="flex gap-4 mt-6">
                <div class="px-6 py-3 bg-white rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Hiện có</span>
                    <span id="countOwned" class="text-2xl font-black text-slate-800">0</span>
                </div>
                <div class="px-6 py-3 bg-white rounded-2xl border border-slate-200 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Đã bàn giao</span>
                    <span id="countSold" class="text-2xl font-black text-slate-800">0</span>
                </div>
            </div>
        </header>

        <div id="inventory-tab" class="tab-content active">
            <div id="owned-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>

        <div id="history-tab" class="tab-content">
            <div id="history-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <div id="transferModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl border border-white">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-800">Bàn giao hàng</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-all"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-100 flex items-center gap-4">
                    <img id="modalImg" src="" class="w-20 h-20 rounded-xl object-cover shadow-sm bg-white">
                    <div>
                        <p id="modalName" class="font-bold text-slate-800 text-lg"></p>
                        <p id="modalIdDisplay" class="text-xs font-mono font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded-md inline-block mt-1"></p>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-3 ml-1 tracking-widest">Ví MetaMask khách nhận</label>
                    <input id="recipientAddress" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:border-sky-500 focus:bg-white focus:outline-none font-mono text-sm transition-all shadow-inner">
                </div>

                <button id="confirmBtn" onclick="executeTransfer()" class="w-full bg-slate-900 hover:bg-sky-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-200 transition-all active:scale-95 flex items-center justify-center gap-3">
                    XÁC NHẬN CHUYỂN QUYỀN
                </button>
            </div>
        </div>
    </div>

<script>
// Cấu hình Smart Contract
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":false,"internalType":"address","name":"newOwner","type":"address"}],"name":"OwnershipTransferred","type":"event"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;
let currentProductId = null; // Biến lưu ID sản phẩm đang chọn

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddress').innerText = account.substring(0,6) + "..." + account.substring(38);
        contract = new web3.eth.Contract(abi, contractAddress);
        loadData();
    } else {
        alert("Vui lòng cài đặt MetaMask!");
    }
});

async function loadData() {
    const grids = ['owned-grid', 'history-grid'];
    grids.forEach(id => document.getElementById(id).innerHTML = `<div class="col-span-full py-20 flex flex-col items-center"><div class="loading-spinner"></div><p class="mt-4 font-bold text-slate-400">Đang quét Blockchain...</p></div>`);

    try {
        const totalRaw = await contract.methods.productCount().call();
        const totalCount = Number(totalRaw);
        
        // Cấu hình Event Scanner an toàn
        const latestBlock = BigInt(await web3.eth.getBlockNumber());
        const fromBlock = (latestBlock - 10000n < 0n) ? 0n : (latestBlock - 10000n);

        const myEvents = await contract.getPastEvents('OwnershipTransferred', { fromBlock, toBlock: 'latest' });
        const mySoldIds = new Set();
        
        // Kiểm tra xem ID có được ví này chuyển đi không
        await Promise.all(myEvents.map(async (ev) => {
            const tx = await web3.eth.getTransaction(ev.transactionHash);
            if (tx && tx.from.toLowerCase() === account) mySoldIds.add(Number(ev.returnValues.id));
        }));

        let ownedHtml = "", historyHtml = "";
        let ownedCount = 0;

        for (let i = 1; i <= totalCount; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const currentOwner = p.owner.toLowerCase();
            const date = new Date(Number(p.manufactureDate) * 1000).toLocaleDateString('vi-VN');
            const imgUrl = p.productImageUrl || 'https://images.unsplash.com/photo-1598440947619-2c35fc9aa908?auto=format&fit=crop&q=80&w=400';

            const card = `
                <div class="product-card bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl flex flex-col">
                    <div class="h-60 overflow-hidden relative group">
                        <img src="${imgUrl}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-[10px] font-black shadow-sm border border-white">ID: #${i}</div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <h4 class="font-extrabold text-slate-800 text-lg mb-4 line-clamp-1">${p.name}</h4>
                        <div class="space-y-2 mb-6 text-[11px] font-bold text-slate-500 uppercase tracking-tight">
                            <p class="flex items-center gap-2"><i class="fa-solid fa-layer-group text-sky-500 w-4"></i> Lô: ${p.batchID}</p>
                            <p class="flex items-center gap-2"><i class="fa-solid fa-calendar-check text-sky-500 w-4"></i> NSX: ${date}</p>
                        </div>
                        ${currentOwner === account ? `
                            <button onclick="openTransferModal(${i}, '${p.name.replace(/'/g, "\\'")}', '${imgUrl}')" class="mt-auto w-full py-4 bg-slate-900 hover:bg-sky-600 text-white text-[10px] font-black rounded-xl transition-all shadow-lg hover:shadow-sky-200 uppercase tracking-widest">
                                <i class="fa-solid fa-paper-plane mr-2"></i> Xuất kho
                            </button>
                        ` : `
                            <div class="mt-auto pt-4 border-t border-dashed border-slate-100">
                                <span class="text-[9px] font-black text-emerald-600 uppercase tracking-tighter flex items-center gap-1 mb-2">
                                    <i class="fa-solid fa-check-circle"></i> Đã hoàn thành bàn giao
                                </span>
                                <p class="text-[9px] font-mono text-slate-400 bg-slate-50 p-2 rounded-lg break-all">Ví nhận: ${p.owner}</p>
                            </div>
                        `}
                    </div>
                </div>
            `;

            if (currentOwner === account) {
                ownedHtml += card;
                ownedCount++;
            } else if (mySoldIds.has(i)) {
                historyHtml += card;
            }
        }

        document.getElementById('countOwned').innerText = ownedCount;
        document.getElementById('countSold').innerText = mySoldIds.size;
        document.getElementById('owned-grid').innerHTML = ownedHtml || emptyUI();
        document.getElementById('history-grid').innerHTML = historyHtml || emptyUI();

    } catch (e) {
        console.error(e);
        alert("Lỗi kết nối Blockchain: " + e.message);
    }
}

function emptyUI() {
    return `<div class="col-span-full py-20 text-center"><p class="text-slate-400 font-medium italic">Trống dữ liệu...</p></div>`;
}

function openTransferModal(id, name, img) {
    currentProductId = id; // Đảm bảo ID được gán vào biến toàn cục
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalIdDisplay').innerText = "PRODUCT ID #" + id;
    document.getElementById('modalImg').src = img;
    document.getElementById('transferModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('transferModal').classList.add('hidden');
    document.getElementById('recipientAddress').value = "";
    currentProductId = null;
}

async function executeTransfer() {
    // Sửa lỗi replace: Kiểm tra input recipientAddress đầu tiên
    const recipientInput = document.getElementById('recipientAddress');
    if (!recipientInput) return;
    
    const to = recipientInput.value.trim();
    
    // Kiểm tra tính hợp lệ của địa chỉ ví và ID
    if (!to || !web3.utils.isAddress(to)) {
        alert("Vui lòng nhập địa chỉ ví MetaMask (0x...) hợp lệ của người nhận!");
        return;
    }
    
    if (!currentProductId) {
        alert("Lỗi: Không xác định được ID sản phẩm!");
        return;
    }

    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i> ĐANG KÝ VÍ...`;

    try {
        // Chuyển ID sang kiểu BigInt/String để an toàn cho Web3
        await contract.methods.transferOwnership(currentProductId.toString(), to).send({ from: account });
        alert("Bàn giao thành công sản phẩm #" + currentProductId);
        closeModal();
        loadData();
    } catch (e) {
        console.error("Lỗi giao dịch:", e);
        alert("Lỗi: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = `XÁC NHẬN CHUYỂN QUYỀN`;
    }
}

function switchTab(view, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('bg-white', 'shadow-sm', 'text-sky-600');
        b.classList.add('text-slate-500');
    });

    btn.classList.add('bg-white', 'shadow-sm', 'text-sky-600');
    btn.classList.remove('text-slate-500');

    if (view === 'inventory') {
        document.getElementById('inventory-tab').classList.add('active');
        document.getElementById('viewTitle').innerText = "Sản phẩm trong kho";
    } else {
        document.getElementById('history-tab').classList.add('active');
        document.getElementById('viewTitle').innerText = "Lịch sử đã giao";
    }
}
</script>
</body>
</html>
