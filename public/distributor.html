<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Distributor Dashboard | VeriGlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
      
        :root {
            --primary: #0ea5e9;
            --blue: #3b82f6;
            --light-blue: #93c5fd;
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
        }
      
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Aesthetic global */
        .tab-content { display: none; }
        .tab-content.active {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Intro screen */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(14, 165, 233, 0.2);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.85) saturate(1.1);
        }
        .intro-content {
            text-align: center;
            z-index: 10;
            animation: introFloat 3s ease-in-out infinite;
        }
        @keyframes introFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Sidebar */
        .sidebar-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 9999px;
        }
        .sidebar-item:hover {
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.22);
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #60a5fa, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 15px 30px -8px rgba(59, 130, 246, 0.45);
        }

        /* Product cards */
        .product-card {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2.5rem;
        }
        .product-card:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 25px 25px 50px -12px rgba(59, 130, 246, 0.22);
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.72);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
        }
        .modal.active { display: flex; }
        .modal-content {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10001;
        }
        .toast.show { bottom: 30px; }

        /* Sidebar Product Detail */
        #productDetailSidebar {
            position: fixed;
            inset-y: 0;
            right: 0;
            width: 420px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: -25px 0 50px -12px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            z-index: 100;
            border-left: 1px solid rgb(219 234 254);
            backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #productDetailSidebar.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="flex text-slate-900">

    <div id="intro-screen">
        <video id="intro-video" autoplay loop muted playsinline>
            <source src="intro-distributor.mp4" type="video/mp4">
            Trình duyệt không hỗ trợ video.
        </video>
        <div class="intro-content max-w-lg px-6">
            <img src="2.png" alt="VeriGlow Logo" class="mx-auto w-40 h-40 md:w-52 md:h-52 rounded-full object-cover shadow-2xl border-8 border-white/40 mb-8 ring-8 ring-white/20">
            <h1 class="text-6xl md:text-7xl font-bold tracking-[-2px] text-white drop-shadow-xl">VeriGlow</h1>
            <p class="text-white/90 text-xl md:text-2xl mt-3 font-light">Distributor Portal</p>
            <div class="mt-12 flex flex-col items-center gap-4">
                <button onclick="enterDashboard()" class="px-14 py-6 bg-white text-blue-600 rounded-3xl font-semibold text-2xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all flex items-center gap-4">
                    <span>Vào hệ thống</span>
                    <i class="fa-solid fa-truck-fast"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-content" class="flex w-full min-h-screen hidden">
        
        <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white/95 border-r border-blue-100 flex flex-col z-40 hidden md:flex shadow-2xl backdrop-blur-xl">
            <div class="p-8 flex items-center gap-3">
                <img src="2.png" alt="Logo" class="w-12 h-12 rounded-3xl object-cover shadow-xl ring-2 ring-blue-200">
                <span class="font-bold text-2xl tracking-[-1px] bg-gradient-to-r from-blue-500 to-cyan-500 bg-clip-text text-transparent">VeriGlow</span>
            </div>
            
            <nav class="mt-4 px-6 space-y-2 flex-1">
                <div class="flex items-center gap-2">
                    <button onclick="showTab('list-products')" class="sidebar-item active flex-1 flex items-center gap-3 px-5 py-4 font-semibold text-slate-600">
                        <i class="fa-solid fa-boxes-stacked text-xl"></i>
                        <span>Kho hàng nhập</span>
                    </button>
                    <button onclick="showFunctionInfo('list-products')" class="text-slate-400 hover:text-blue-500 px-2 py-2"><i class="fa-solid fa-circle-info"></i></button>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="showTab('transfer-ownership')" class="sidebar-item flex-1 flex items-center gap-3 px-5 py-4 font-semibold text-slate-600">
                        <i class="fa-solid fa-share-nodes text-xl"></i>
                        <span>Chuyển tiếp quyền</span>
                    </button>
                    <button onclick="showFunctionInfo('transfer-ownership')" class="text-slate-400 hover:text-blue-500 px-2 py-2"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </nav>
            
            <div class="p-6 border-t border-blue-100">
                <div class="glass rounded-3xl p-5 border border-blue-50">
                    <p class="text-[10px] text-blue-500 font-bold uppercase mb-2">Ví Đại Lý</p>
                    <div id="walletAddr" class="text-[10px] font-mono text-slate-600 break-all bg-white/70 p-3 rounded-2xl border border-blue-100 uppercase">Đang kết nối...</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 md:ml-72 min-h-screen">
            <header class="h-20 bg-white/90 backdrop-blur-2xl border-b border-blue-100 flex items-center justify-between px-10 sticky top-0 z-30 shadow-sm">
                <h2 id="pageTitle" class="text-2xl font-semibold text-slate-800 tracking-tight flex items-center gap-3">
                    Kho hàng nhập
                </h2>
                <div class="flex items-center gap-4">
                    <button onclick="loadProducts()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-all hover:rotate-45">
                        <i class="fa-solid fa-arrows-rotate"></i>
                    </button>
                </div>
            </header>
            
            <div class="p-10 max-w-7xl mx-auto">
                
                <div id="list-products" class="tab-content active">
                    <div class="flex flex-wrap gap-3 mb-8 bg-white/60 p-2 rounded-2xl inline-flex backdrop-blur-md border border-blue-50 shadow-sm">
                        <button onclick="filterProducts('all', this)" class="filter-btn active px-6 py-2.5 rounded-xl text-sm font-semibold transition-all bg-blue-600 text-white shadow-md">
                            Tất cả Hoạt động
                        </button>
                        <button onclick="filterProducts('owned', this)" class="filter-btn px-6 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-white hover:bg-blue-50 transition-all">
                            Đang sở hữu
                        </button>
                        <button onclick="filterProducts('transferred', this)" class="filter-btn px-6 py-2.5 rounded-xl text-sm font-semibold text-slate-600 bg-white hover:bg-blue-50 transition-all">
                            Đã bàn giao tiếp
                        </button>
                    </div>

                    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                </div>

                <div id="transfer-ownership" class="tab-content">
                    <div class="max-w-xl mx-auto glass p-10 rounded-[2.75rem] shadow-2xl border border-white/60 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-cyan-400"></div>
                        <h3 class="text-2xl font-bold text-slate-800 mb-2">Bàn giao sản phẩm</h3>
                        <p class="text-sm text-slate-500 mb-8">Chuyển quyền sở hữu cho đại lý cấp dưới hoặc khách hàng.</p>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-600 uppercase mb-2 ml-2">ID Sản phẩm</label>
                                <input type="number" id="transferId" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Nhập mã ID">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-600 uppercase mb-2 ml-2">Địa chỉ ví nhận</label>
                                <input type="text" id="transferTo" class="w-full bg-slate-50 border-none px-6 py-4 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all font-mono text-xs" placeholder="0x...">
                            </div>
                            <button id="btnTransfer" onclick="transferOwnership()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mt-4 hover:bg-blue-700 hover:shadow-xl hover:-translate-y-1 transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-paper-plane"></i> Thực hiện Bàn giao
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="productDetailSidebar" class="flex flex-col">
        <div class="px-6 py-6 border-b border-blue-50 flex items-center justify-between bg-white/80">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-box-open text-blue-600 text-2xl"></i>
                <h3 class="font-bold text-xl text-slate-800">Chi tiết kho</h3>
            </div>
            <button onclick="closeSidebar()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-2xl">
                <i class="fa-solid fa-xmark text-3xl"></i>
            </button>
        </div>
        <div id="sidebarContent" class="flex-1 overflow-y-auto p-6 space-y-8"></div>
    </div>

    <div id="toast" class="toast">
        <i id="toastIcon" class="fa-solid fa-circle-check text-2xl"></i>
        <div>
            <h4 id="toastTitle" class="font-bold text-slate-800 text-sm">Thành công</h4>
            <p id="toastMessage" class="text-xs text-slate-500"></p>
        </div>
    </div>

    <div id="qrModal" class="modal" onclick="if(event.target.id==='qrModal') this.classList.remove('active')">
        <div class="modal-content p-10 text-center bg-white rounded-[2.75rem] max-w-md" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-bold mb-6 text-slate-800">Mã QR Sản phẩm</h3>
            <canvas id="modalQrCanvas" class="mx-auto rounded-3xl shadow-inner"></canvas>
            <p class="mt-8 text-xs text-slate-400">Có thể in dán lên bao bì hoặc gửi cho người nhận</p>
            <button onclick="document.getElementById('qrModal').classList.remove('active')" class="mt-8 px-8 py-3 text-slate-400 font-medium">Đóng</button>
        </div>
    </div>

    <div id="functionModal" class="modal" onclick="if(event.target.id==='functionModal') this.classList.remove('active')">
        <div class="modal-content w-full max-w-lg mx-4 bg-white rounded-3xl p-8" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <h3 id="functionTitle" class="text-2xl font-bold text-slate-800"></h3>
                <button onclick="document.getElementById('functionModal').classList.remove('active')" class="text-slate-400"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div id="functionDesc" class="text-slate-600 leading-relaxed text-sm"></div>
        </div>
    </div>

<script>
// --- Smart Contract Configuration ---
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

let web3, contract, account;

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://placehold.co/400x400?text=VeriGlow';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

function showToast(title, message, type = "success") {
    const toast = document.getElementById('toast');
    document.getElementById('toastTitle').innerText = title;
    document.getElementById('toastMessage').innerText = message;
    
    const icon = document.getElementById('toastIcon');
    if(type === "success") {
        icon.className = "fa-solid fa-circle-check text-2xl text-green-500";
    } else {
        icon.className = "fa-solid fa-triangle-exclamation text-2xl text-red-500";
    }
    
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0]?.toLowerCase();
            document.getElementById('walletAddr').innerText = account;
            contract = new web3.eth.Contract(abi, contractAddress);
            loadProducts();
        } catch (err) {
            showToast('Lỗi', 'Không thể kết nối ví MetaMask', 'error');
        }
    } else {
        showToast('Cảnh báo', 'Vui lòng cài đặt MetaMask', 'error');
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-20 text-center"><div class="loading-spinner mx-auto"></div></div>';
   
    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        let found = 0;
       
        // Lặp ngược từ lớn về nhỏ để sản phẩm mới nhất lên đầu
        for (let i = count; i >= 1; i--) {
            const p = await contract.methods.products(i).call();
            const verify = await contract.methods.verifyProduct(i).call();
            
            // Xử lý danh sách lịch sử chuyển giao
            const historyList = verify.visibleHistory.map(addr => addr.toLowerCase());
            
            // Logic phân loại:
            const isOwner = p.owner.toLowerCase() === account;
            const isTransferred = !isOwner && historyList.includes(account);
            
            // Nếu không liên quan đến ví này, bỏ qua
            if (!isOwner && !isTransferred) continue;

            found++;
            const statusType = isOwner ? 'owned' : 'transferred';
            const badgeHtml = isOwner 
                ? `<span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-md">Đang sở hữu</span>`
                : `<span class="bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-1 rounded-md">Đã chuyển giao</span>`;

            html += `
                <div data-status="${statusType}" onclick="showProductDetail(${i})" class="product-card bg-white border border-blue-50 overflow-hidden cursor-pointer relative">
                    <div class="h-48 overflow-hidden bg-slate-50 relative">
                        <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-2.5 py-1 rounded-full text-[10px] font-bold shadow-sm">ID: #${i}</div>
                    </div>
                    <div class="p-5">
                        <h4 class="font-bold text-slate-800 mb-2 truncate">${p.name}</h4>
                        <div class="flex items-center justify-between mt-3">
                            <span class="text-[10px] font-mono text-slate-500 bg-slate-100 px-2 py-1 rounded">Lô: ${p.batchID}</span>
                            ${badgeHtml}
                        </div>
                    </div>
                </div>`;
        }
       
        grid.innerHTML = found > 0 ? html : '<div class="col-span-full py-20 text-center text-slate-400">Không có dữ liệu hoạt động.</div>';
        
        // Cập nhật lại bộ lọc đang active
        const activeFilter = document.querySelector('.filter-btn.active').getAttribute('onclick').match(/'([^']+)'/)[1];
        if (activeFilter !== 'all') {
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = card.dataset.status === activeFilter ? 'block' : 'none';
            });
        }
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full py-10 text-red-500 text-center">Lỗi tải dữ liệu.</div>';
    }
}

// Hàm lọc sản phẩm trên giao diện
function filterProducts(type, btnElement) {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active', 'bg-blue-600', 'text-white', 'shadow-md');
        btn.classList.add('bg-white', 'text-slate-600');
    });
    
    btnElement.classList.remove('bg-white', 'text-slate-600');
    btnElement.classList.add('active', 'bg-blue-600', 'text-white', 'shadow-md');

    const cards = document.querySelectorAll('.product-card');
    cards.forEach(card => {
        if (type === 'all') {
            card.style.display = 'block';
        } else {
            card.style.display = card.dataset.status === type ? 'block' : 'none';
        }
    });
}

// Sidebar Detail
async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-12"><div class="loading-spinner mx-auto"></div></div>';
    sidebar.classList.add('open');
   
    try {
        const verify = await contract.methods.verifyProduct(id).call();
        const prod = await contract.methods.products(id).call();
        const history = verify.visibleHistory || [];
        const isCurrentlyMine = verify.owner.toLowerCase() === account;

        content.innerHTML = `
            <div class="space-y-6">
                <img src="${formatUrl(prod.productImageUrl)}" class="w-full rounded-3xl h-56 object-cover shadow-sm">
                
                <div class="grid grid-cols-2 gap-3 text-sm bg-blue-50/50 p-4 rounded-2xl">
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Tên</span><strong>${verify.name}</strong></div>
                    <div><span class="text-slate-400 text-[10px] block uppercase font-bold">Mã Lô</span><strong>${verify.batchID}</strong></div>
                </div>

                <div class="bg-white rounded-2xl p-5 border border-blue-100 shadow-sm">
                    <div class="text-slate-500 text-xs font-bold mb-4 uppercase"><i class="fa-solid fa-route mr-1"></i> Lịch sử sở hữu</div>
                    <div class="space-y-3">
                        <div class="text-xs p-2 bg-slate-50 rounded-lg"><span class="font-bold text-slate-700">NSX:</span> ${history[0] ? history[0].substring(0,8)+'...' : 'N/A'}</div>
                        <div class="text-[10px] text-slate-400 italic">Đã qua ${history.length - 1} lần trung chuyển</div>
                        <div class="text-xs p-2 ${isCurrentlyMine ? 'bg-blue-100 text-blue-800' : 'bg-orange-50 text-orange-800'} rounded-lg border border-dashed border-slate-300">
                            <span class="font-bold">Hiện tại:</span> ${verify.owner.substring(0,12)}...
                        </div>
                    </div>
                </div>

                <div class="text-center pt-2">
                    <button onclick="showQrModal(${id})" class="w-full py-3.5 bg-white border-2 border-blue-100 hover:border-blue-300 rounded-2xl flex items-center justify-center gap-2 text-blue-600 font-bold transition-all">
                        <i class="fa-solid fa-qrcode"></i> Lấy mã QR
                    </button>
                    ${isCurrentlyMine ? `
                    <button onclick="quickTransfer(${id})" class="w-full mt-3 py-3.5 bg-blue-600 text-white hover:bg-blue-700 rounded-2xl flex items-center justify-center gap-2 font-bold transition-all">
                        <i class="fa-solid fa-share"></i> Chuyển quyền ngay
                    </button>` : ''}
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = `<p class="text-red-500 text-center py-5">Lỗi tải dữ liệu: ${err.message}</p>`;
    }
}

function closeSidebar() {
    document.getElementById('productDetailSidebar').classList.remove('open');
}

function quickTransfer(id) {
    closeSidebar();
    showTab('transfer-ownership');
    document.getElementById('transferId').value = id;
}

// Bàn giao sản phẩm
async function transferOwnership() {
    const id = document.getElementById('transferId').value;
    const toAddress = document.getElementById('transferTo').value;
    const btn = document.getElementById('btnTransfer');

    if (!id || !toAddress) {
        showToast("Lỗi nhập liệu", "Vui lòng điền đủ ID và địa chỉ nhận", "error");
        return;
    }

    try {
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang xử lý...';
        btn.disabled = true;
        btn.classList.add('opacity-70');

        await contract.methods.transferOwnership(id, toAddress).send({ from: account });
        
        showToast("Thành công", `Đã bàn giao ID #${id} cho ${toAddress.substring(0,6)}...`);
        document.getElementById('transferId').value = '';
        document.getElementById('transferTo').value = '';
        
        // Refresh & switch tab
        loadProducts();
        showTab('list-products');
    } catch (err) {
        showToast("Lỗi giao dịch", err.message, "error");
    } finally {
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Thực hiện Bàn giao';
        btn.disabled = false;
        btn.classList.remove('opacity-70');
    }
}

function showQrModal(id) {
    const canvas = document.getElementById('modalQrCanvas');
    const url = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
    QRCode.toCanvas(canvas, url, { width: 200, margin: 2 }, (err) => {
        if (!err) document.getElementById('qrModal').classList.add('active');
    });
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
  
    if (id === 'list-products') {
        document.querySelectorAll('.sidebar-item')[0].classList.add('active');
        document.getElementById('pageTitle').innerText = "Kho hàng nhập";
    } else {
        document.querySelectorAll('.sidebar-item')[1].classList.add('active');
        document.getElementById('pageTitle').innerText = "Chuyển tiếp quyền";
    }
}

/* ====================== PHẦN AESTHETIC ====================== */
function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('dashboard-content').classList.remove('hidden');
    }, 800);
}

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
  
    let title = '';
    let desc = '';
  
    if (type === 'list-products') {
        title = 'Kho hàng nhập';
        desc = 'Hiển thị tất cả sản phẩm liên quan đến đại lý. Bạn có thể xem lịch sử <strong>Hoạt động</strong>, bộ lọc <strong>Đang sở hữu</strong> và <strong>Đã bàn giao tiếp</strong>. Mỗi thẻ sản phẩm cho phép xem chi tiết và truy xuất mã QR.';
    } else if (type === 'transfer-ownership') {
        title = 'Chuyển tiếp quyền';
        desc = 'Thực hiện bàn giao quyền sở hữu sản phẩm cho đại lý nhánh hoặc khách hàng cuối. Nhập <strong>ID sản phẩm</strong> và <strong>địa chỉ ví người nhận</strong>. Giao dịch sẽ được ghi nhận vĩnh viễn trên Blockchain.';
    }
  
    titleEl.innerHTML = title;
    descEl.innerHTML = desc;
    modal.classList.add('active');
}
</script>
