<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VeriGlow | Consumer Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --primary: #0ea5e9; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            min-height: 100vh;
        }
        .product-card { 
            background: white; 
            transition: all 0.3s ease; 
            border: 1px solid #e2e8f0; 
            border-radius: 1.5rem; 
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: var(--primary); color: white; }
    </style>
</head>

<body class="flex text-slate-900">

    <aside class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 flex flex-col z-50 hidden md:flex">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-leaf text-lg"></i>
            </div>
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('my-purchases')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-box-open"></i> <span>Tủ đồ của tôi</span>
            </button>
            <button onclick="showTab('verify-trace')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-qrcode"></i> <span>Quét mã xác thực</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Ví của bạn</p>
            <div class="text-[11px] font-mono text-slate-600 break-all bg-slate-50 p-3 rounded-lg" id="walletAddr">Kết nối ví...</div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 min-h-screen">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Sản phẩm sở hữu</h2>
            <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-300"></div>
        </header>

        <div class="p-10 max-w-6xl mx-auto">
            <div id="my-purchases" class="tab-content active">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </div>

            <div id="verify-trace" class="tab-content">
                <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <div id="reader" class="rounded-2xl overflow-hidden"></div>
                    <p class="text-center text-slate-400 text-sm mt-4 font-medium">Đưa mã QR vào khung hình</p>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200 z-10">
                <i class="fa-solid fa-xmark text-slate-500"></i>
            </button>
            <div id="modalContent" class="p-8 md:p-12"></div>
        </div>
    </div>

<script>
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, html5QrCode;

// Hàm xử lý URL ảnh và IPFS đồng bộ với Manufacturer
function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://via.placeholder.com/400x400?text=No+Image';
    if (url.startsWith('ipfs://')) return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
    return url;
}

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddr').innerText = account;
        document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
        contract = new web3.eth.Contract(abi, contractAddress);
        loadProducts();
    }
});

async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400">Đang tải sản phẩm...</div>';
    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            // Lọc sản phẩm thuộc về ví đang đăng nhập
            if (p.owner.toLowerCase() === account) {
                found++;
                html += `
                    <div onclick="openDetail(${i})" class="product-card p-4 cursor-pointer group">
                        <div class="aspect-square rounded-2xl overflow-hidden bg-slate-50 mb-4">
                            <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <h4 class="font-bold text-slate-800">${p.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[10px] font-bold text-sky-600 uppercase tracking-wider">${p.batchID}</span>
                            <span class="text-[10px] text-slate-400">${p.origin}</span>
                        </div>
                    </div>`;
            }
        }
        grid.innerHTML = found > 0 ? html : '<div class="col-span-full text-center py-20 text-slate-400 font-medium">Bạn chưa sở hữu sản phẩm nào.</div>';
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

async function openDetail(id) {
    try {
        const pBasic = await contract.methods.verifyProduct(id).call();
        const pFull = await contract.methods.products(id).call();
        
        document.getElementById('detailModal').classList.remove('hidden');
        
        const historyHtml = pBasic.visibleHistory && pBasic.visibleHistory.length > 0 
            ? pBasic.visibleHistory.map(log => {
                const parts = log.split(':');
                return `<div class="relative pl-6 pb-4 border-l-2 border-slate-100 ml-2">
                            <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-sky-500 border-4 border-white"></div>
                            <p class="text-xs font-bold text-slate-800">${parts[0] || 'Cập nhật'}</p>
                            <p class="text-[10px] text-slate-500">${parts[1] || ''}</p>
                        </div>`;
            }).join('')
            : '<p class="text-slate-400 italic text-xs">Chưa có lịch sử chuyển giao.</p>';

        document.getElementById('modalContent').innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <img src="${formatUrl(pFull.productImageUrl)}" class="w-full h-[400px] object-cover rounded-3xl shadow-lg">
                    <div class="mt-6 p-5 bg-sky-50 rounded-2xl border border-sky-100">
                        <p class="text-[10px] font-bold text-sky-400 uppercase mb-2">Chứng nhận IPFS</p>
                        <a href="${formatUrl(pFull.certificationUrl)}" target="_blank" class="flex justify-between items-center font-bold text-sky-700 text-sm hover:underline">
                            Xem chứng chỉ gốc <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                        </a>
                    </div>
                </div>
                <div>
                    <span class="text-[10px] font-black text-sky-500 uppercase tracking-[0.2em]">Blockchain Verified</span>
                    <h2 class="text-3xl font-bold text-slate-900 mt-1 mb-2">${pFull.name}</h2>
                    <p class="text-xs font-mono text-slate-400 mb-6">ID: #${id} | Lô: ${pFull.batchID}</p>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Ngày SX</p>
                            <p class="text-sm font-bold">${pFull.manufactureDate}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl">
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Xuất xứ</p>
                            <p class="text-sm font-bold">${pFull.origin}</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Thông tin nhà máy</p>
                        <p class="text-sm font-bold text-slate-800">${pFull.manufacturerName}</p>
                        <p class="text-xs text-slate-500 italic">${pFull.factoryAddress}</p>
                    </div>

                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-4 border-b pb-2">Hành trình sản phẩm</p>
                        <div class="max-h-40 overflow-y-auto">${historyHtml}</div>
                    </div>
                </div>
            </div>`;
    } catch (e) { alert("Không thể tải thông tin."); }
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach((btn, i) => {
        btn.classList.toggle('active', (id==='my-purchases' && i===0) || (id==='verify-trace' && i===1));
    });
    if(id === 'verify-trace') startScanner(); else stopScanner();
}

function startScanner() {
    if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        // Giả sử mã QR có dạng "COSME-ID-1"
        const id = text.split('-').pop();
        openDetail(id);
        stopScanner();
    }).catch(()=>{});
}

function stopScanner() { if(html5QrCode) html5QrCode.stop(); }
function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
</script>
</body>
</html>
