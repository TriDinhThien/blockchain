<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Portal | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        #sideDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        #sideDrawer.open { transform: translateX(0); }
        #overlay { transition: opacity 0.3s ease; display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 40; }
        #overlay.active { display: block; }
        .filter-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div id="overlay" onclick="closeDrawer()"></div>

    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl translate-x-full overflow-y-auto">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur-md">
            <h3 class="font-bold text-lg text-slate-800">Thông tin chi tiết</h3>
            <button onclick="closeDrawer()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i class="fa-solid fa-xmark text-slate-400 text-xl"></i>
            </button>
        </div>
        <div id="drawerContent" class="p-8 space-y-8"></div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg bg-sky-600 text-white text-xl">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" id="btn-list" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" id="btn-transfer" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-share-nodes"></i> <span>Bàn giao đại lý</span>
            </button>
        </nav>

        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4 italic text-[10px] font-mono text-slate-400 break-all border border-slate-100" id="accountDisplay">Đang kết nối...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Kho hàng phân phối</h2>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50 transition-all">
                <i class="fa-solid fa-arrows-rotate"></i> Đồng bộ Ledger
            </button>
        </header>

        <div class="p-10">
            <div id="list-products" class="tab-content active">
                <div class="flex items-center gap-2 mb-6 bg-white p-1.5 rounded-2xl border border-slate-200 w-fit">
                    <button onclick="filterProducts('all', this)" class="filter-btn active px-5 py-2 rounded-xl text-xs font-bold">Tất cả</button>
                    <button onclick="filterProducts('in-stock', this)" class="filter-btn px-5 py-2 rounded-xl text-xs font-bold">Trong kho</button>
                    <button onclick="filterProducts('transferred', this)" class="filter-btn px-5 py-2 rounded-xl text-xs font-bold">Đã xuất đi</button>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">ID</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Sản phẩm</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Lô sản xuất</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-paper-plane text-sky-500"></i> Xuất kho đại lý
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">ID Sản phẩm</label>
                            <input id="transferId" type="number" placeholder="Nhập ID (vd: 1)" class="w-full p-4 mt-1 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Địa chỉ ví nhận (Đại lý/Retailer)</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full p-4 mt-1 bg-slate-50 rounded-xl border border-slate-100 outline-none font-mono focus:ring-2 focus:ring-sky-500 transition-all text-sm">
                        </div>
                        <button onclick="transferOwnership()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl transition-all mt-6 shadow-xl">Xác nhận chuyển giao</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
// --- CONFIGURATION ---
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
    {
        "inputs": [],
        "name": "productCount",
        "outputs": [{"internalType": "uint256", "name": "", "type": "uint256"}],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "uint256", "name": "_id", "type": "uint256"}],
        "name": "verifyProduct",
        "outputs": [
            {"internalType": "string", "name": "name", "type": "string"},
            {"internalType": "string", "name": "batchID", "type": "string"},
            {"internalType": "string", "name": "manufactureDate", "type": "string"},
            {"internalType": "string", "name": "origin", "type": "string"},
            {"internalType": "address", "name": "owner", "type": "address"},
            {"internalType": "string", "name": "manufacturerName", "type": "string"},
            {"internalType": "string", "name": "factoryAddress", "type": "string"},
            {"internalType": "string", "name": "productImageUrl", "type": "string"},
            {"internalType": "string[]", "name": "ingredients", "type": "string[]"},
            {"internalType": "string[]", "name": "visibleHistory", "type": "string[]"}
        ],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [
            {"internalType": "uint256", "name": "_id", "type": "uint256"},
            {"internalType": "address", "name": "_newOwner", "type": "address"}
        ],
        "name": "transferOwnership",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    }
];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'all';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0].toLowerCase();
            document.getElementById('accountDisplay').innerText = account;
            contract = new web3.eth.Contract(abi, contractAddress);
            loadMyProducts();
        } catch (e) { console.error("User denied access"); }
    } else { alert("Vui lòng cài đặt MetaMask!"); }
});

// --- CORE LOGIC (FIX LỖI ĐỒNG BỘ) ---
async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center"><div class="animate-spin inline-block w-6 h-6 border-4 border-sky-500 border-t-transparent rounded-full"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];

        for (let i = 1; i <= count; i++) {
            try {
                // Sử dụng cơ chế gọi an toàn
                const p = await contract.methods.verifyProduct(i).call();
                
                // Chuẩn hóa dữ liệu trả về (hỗ trợ cả Array và Object)
                allProducts.push({
                    id: i,
                    name: p.name || p[0],
                    batchID: p.batchID || p[1],
                    manufactureDate: p.manufactureDate || p[2],
                    origin: p.origin || p[3],
                    owner: (p.owner || p[4]).toLowerCase(),
                    manufacturerName: p.manufacturerName || p[5],
                    factoryAddress: p.factoryAddress || p[6],
                    productImageUrl: p.productImageUrl || p[7],
                    ingredients: p.ingredients || p[8]
                });
            } catch (itemErr) {
                console.warn(`Bỏ qua sản phẩm lỗi ID ${i}:`, itemErr);
            }
        }
        renderTable();
    } catch (err) {
        console.error("Lỗi Ledger:", err);
        tbody.innerHTML = `<tr><td colspan="4" class="px-8 py-10 text-center text-red-500 font-bold">LỖI ĐỒNG BỘ LEDGER: KIỂM TRA ABI HOẶC MẠNG</td></tr>`;
    }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    let filtered = allProducts;

    if (currentFilter === 'in-stock') {
        filtered = allProducts.filter(p => p.owner === account);
    } else if (currentFilter === 'transferred') {
        filtered = allProducts.filter(p => p.owner !== account);
    }

    tbody.innerHTML = filtered.map(p => `
        <tr class="hover:bg-slate-50 transition-all cursor-pointer group" onclick="openDrawer(${p.id})">
            <td class="px-8 py-6 font-mono text-[10px] text-slate-400">#${String(p.id).padStart(3, '0')}</td>
            <td class="px-8 py-6">
                <div class="flex items-center gap-3">
                    <img src="${p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/')}" class="w-10 h-10 rounded-lg object-cover bg-slate-100 border border-slate-100" onerror="this.src='https://placehold.co/100x100?text=Cosme'">
                    <div>
                        <div class="font-bold text-slate-800 text-sm group-hover:text-sky-600 transition-colors">${p.name}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-tight">${p.origin}</div>
                    </div>
                </div>
            </td>
            <td class="px-8 py-6 text-xs font-semibold text-slate-600">${p.batchID}</td>
            <td class="px-8 py-6">
                ${p.owner === account 
                    ? '<span class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-[9px] font-black italic border border-green-100">SẴN SÀNG XUẤT</span>'
                    : '<span class="px-3 py-1 bg-slate-100 text-slate-400 rounded-lg text-[9px] font-black italic border border-slate-200">ĐÃ CHUYỂN</span>'}
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4" class="py-20 text-center text-slate-400 text-sm italic">Không tìm thấy sản phẩm nào.</td></tr>';
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const receiver = document.getElementById("newOwner").value.trim();

    if (!id || !receiver) { alert("Vui lòng điền đủ thông tin!"); return; }

    try {
        const product = allProducts.find(x => x.id == id);
        if (product && product.owner !== account) {
            alert("Bạn không phải là chủ sở hữu hiện tại của ID này!"); return;
        }

        await contract.methods.transferOwnership(id, receiver).send({ from: account });
        alert("Chuyển giao quyền sở hữu thành công!");
        loadMyProducts();
        showTab('list-products');
    } catch (err) { alert("Lỗi giao dịch: " + err.message); }
}

// --- UI HELPERS ---
async function openDrawer(id) {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;

    const drawer = document.getElementById('sideDrawer');
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('drawerContent');

    content.innerHTML = `
        <div class="space-y-6">
            <div class="aspect-square bg-slate-50 rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-inner">
                <img src="${p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/')}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400?text=Product'">
            </div>
            
            <div class="space-y-1">
                <h4 class="text-2xl font-black text-slate-900 leading-tight">${p.name}</h4>
                <div class="flex items-center gap-2 text-sky-600 font-bold text-xs uppercase tracking-widest italic">
                    <i class="fa-solid fa-certificate"></i> Verified on Blockchain
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Số lô (Batch)</p>
                    <p class="font-bold text-slate-700 text-sm">${p.batchID}</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Ngày sản xuất</p>
                    <p class="font-bold text-slate-700 text-sm">${p.manufactureDate}</p>
                </div>
            </div>

            <div class="space-y-3">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Thành phần (Ingredients)</p>
                <div class="flex flex-wrap gap-1.5">
                    ${p.ingredients && p.ingredients.length > 0 
                        ? p.ingredients.map(ing => `<span class="px-3 py-1 bg-white border border-slate-200 text-slate-600 rounded-lg text-[10px] font-semibold">${ing}</span>`).join('')
                        : '<span class="text-xs text-slate-400 italic">Không có dữ liệu thành phần</span>'}
                </div>
            </div>

            <div class="p-6 bg-slate-900 rounded-[2rem] text-white shadow-xl">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-2">Chủ sở hữu Blockchain</p>
                <p class="font-mono text-[10px] text-sky-300 break-all mb-4">${p.owner}</p>
                <div class="pt-4 border-t border-slate-800">
                    <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Sản xuất bởi</p>
                    <p class="text-xs font-bold text-slate-200">${p.manufacturerName}</p>
                    <p class="text-[9px] text-slate-400 italic mt-1 leading-relaxed">${p.factoryAddress}</p>
                </div>
            </div>

            <div class="pt-6 flex flex-col items-center gap-2">
                <div id="drawerQR" class="p-4 bg-white border border-slate-100 rounded-3xl shadow-sm"></div>
                <p class="text-[10px] text-slate-400 font-black tracking-widest">PRODUCT DIGITAL TWIN</p>
            </div>
        </div>
    `;

    drawer.classList.add('open');
    overlay.classList.add('active');
    
    setTimeout(() => {
        const qrContainer = document.getElementById('drawerQR');
        qrContainer.innerHTML = '';
        const canvas = document.createElement('canvas');
        QRCode.toCanvas(canvas, `VERIGLOW-TRACE-${id}`, { width: 130, margin: 1 });
        qrContainer.appendChild(canvas);
    }, 100);
}

function closeDrawer() {
    document.getElementById('sideDrawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const titles = { 'list-products': 'Kho hàng phân phối', 'transfer-ownership': 'Bàn giao đại lý' };
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    if (tabId === 'list-products') document.getElementById('btn-list').classList.add('active');
    else document.getElementById('btn-transfer').classList.add('active');
}
</script>
</body>
</html>
