<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow Blockchain</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.13/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --bg-main: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            overflow-x: hidden; 
        }
        .text-2xs { font-size: 10px; line-height: 1.2; }
        .text-11px { font-size: 11px; line-height: 1.2; }
        .rounded-4xl { border-radius: 2.5rem; }
        .rounded-5xl { border-radius: 3rem; }
        .tracking-2em { letter-spacing: 0.2em; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Animation & State */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar-item.active { 
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); 
            color: white; 
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
        }

        /* Side Panel Styling */
        #sidePanel {
            width: 550px;
            max-width: 100vw;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            box-shadow: -20px 0 50px rgba(0,0,0,0.05);
        }
        #sidePanel.open { transform: translateX(0); }

        .overlay {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .filter-btn.active { 
            background: #0f172a; 
            color: white; 
            border-color: #0f172a; 
        }

        .input-focus:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex text-slate-900">

    <div id="overlay" class="overlay fixed inset-0 z-40" onclick="closeSidePanel()"></div>

    <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col sticky top-0 h-screen z-20">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200">
                    <i class="fa-solid fa-shield-heart text-white text-lg"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-slate-800">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-3">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all text-slate-500 font-semibold group">
                <i class="fa-solid fa-grid-2 text-lg"></i> <span>Tổng quan kho</span>
            </button>
            <button onclick="showTab('update-status')" class="sidebar-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all text-slate-500 font-semibold">
                <i class="fa-solid fa-rotate text-lg"></i> <span>Cập nhật vận chuyển</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all text-slate-500 font-semibold">
                <i class="fa-solid fa-hand-holding-heart text-lg"></i> <span>Bàn giao khách hàng</span>
            </button>
        </nav>

        <div class="p-6">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Ví đang kết nối</p>
                <div id="accountDisplay" class="text-xs font-mono text-sky-600 truncate underline">Kết nối MetaMask...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-24 px-10 flex items-center justify-between sticky top-0 z-30 bg-slate-50/80 backdrop-blur-md">
            <div>
                <h2 id="pageTitle" class="text-2xl font-extrabold text-slate-800 tracking-tight">Tổng quan kho</h2>
                <p class="text-slate-400 text-sm font-medium">Quản lý và theo dõi dòng vòng đời sản phẩm</p>
            </div>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                <i class="fa-solid fa-arrows-rotate"></i> Làm mới dữ liệu
            </button>
        </header>

        <div class="px-10 pb-10">
            <div id="list-products" class="tab-content active">
                <div class="flex gap-3 mb-8">
                    <button onclick="filterProducts('in_stock')" id="filterStock" class="filter-btn active px-6 py-3 rounded-2xl border bg-white text-sm font-bold shadow-sm transition-all">
                        📦 Sản phẩm trong kho
                        <span id="countInStock" class="ml-2 px-2 py-0.5 rounded-full text-[10px] font-black bg-slate-100 text-slate-600">0</span>
                    </button>
                    <button onclick="filterProducts('sold')" id="filterSold" class="filter-btn px-6 py-3 rounded-2xl border bg-white text-sm font-bold shadow-sm transition-all">
                        📤 Lịch sử đã xuất
                        <span id="countSold" class="ml-2 px-2 py-0.5 rounded-full text-[10px] font-black bg-slate-100 text-slate-600">0</span>
                    </button>
                </div>

                <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200/50 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-50">
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Mã số</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Thông tin sản phẩm</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Số lô sản xuất</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Trạng thái kho</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <!-- Các tab update-status và transfer-ownership giữ nguyên -->
            <div id="update-status" class="tab-content max-w-xl mx-auto mt-10">...</div>
            <div id="transfer-ownership" class="tab-content max-w-xl mx-auto mt-10">...</div>
        </div>
    </main>

    <!-- Side Panel giữ nguyên -->
    <div id="sidePanel" class="fixed right-0 top-0 h-screen bg-white z-50 flex flex-col">...</div>

<script>
/* ======================= CONFIG ======================= */
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    { "anonymous": false, "inputs": [{ "indexed": false, "type": "uint256", "name": "id" }, { "indexed": false, "type": "address", "name": "newOwner" }], "name": "OwnershipTransferred", "type": "event" },
    { "inputs": [], "name": "productCount", "outputs": [{"type": "uint256"}], "stateMutability": "view", "type": "function" },
    { "inputs": [{"type": "uint256","name": "_id"}], "name": "verifyProduct", "outputs": [
        {"name": "name","type": "string"},{"name": "batchID","type": "string"},{"name": "manufactureDate","type": "uint256"},
        {"name": "origin","type": "string"},{"name": "isAuthentic","type": "bool"},{"name": "history","type": "string[]"},
        {"name": "owner","type": "address"},{"name": "ingredients","type": "string[]"},{"name": "productImageUrl","type": "string"},
        {"name": "certificationUrl","type": "string"}
    ], "stateMutability": "view", "type": "function" },
    { "inputs": [{"type": "uint256"},{"type": "address"}], "name": "transferOwnership", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
    { "inputs": [{"type": "uint256"},{"type": "string"}], "name": "updateStatus", "outputs": [], "stateMutability": "nonpayable", "type": "function" }
];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'in_stock';
const SOLD_STORAGE_PREFIX = 'veriglow_sold_ids_';

/* ======================= INIT ======================= */
window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("Vui lòng cài đặt MetaMask!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0].toLowerCase();
    document.getElementById('accountDisplay').innerText = account;
    contract = new web3.eth.Contract(abi, contractAddress);
    loadMyProducts();
});

/* ======================= TAB & FILTER ======================= */
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    const titles = {'list-products':'Tổng quan kho','update-status':'Cập nhật lộ trình','transfer-ownership':'Bàn giao khách hàng'};
    document.getElementById('pageTitle').innerText = titles[tabId];
}

function filterProducts(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(type === 'in_stock' ? 'filterStock' : 'filterSold').classList.add('active');
    renderTable();
}

/* ======================= SOLD TRACKING (CHỈ LOCALSTORAGE) ======================= */
function getSoldStorageKey() { return `${SOLD_STORAGE_PREFIX}${account}`; }

function loadSoldIdsFromStorage() {
    try {
        const raw = localStorage.getItem(getSoldStorageKey());
        return raw ? new Set(JSON.parse(raw).map(Number).filter(n => n > 0)) : new Set();
    } catch (_) { return new Set(); }
}

function saveSoldIdsToStorage(set) {
    try { localStorage.setItem(getSoldStorageKey(), JSON.stringify(Array.from(set))); } catch (_) {}
}

function rememberSoldId(id) {
    const num = Number(id);
    if (!Number.isFinite(num) || num <= 0) return;
    const stored = loadSoldIdsFromStorage();
    stored.add(num);
    saveSoldIdsToStorage(stored);
}

/* ======================= LOAD PRODUCTS ======================= */
async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center"><i class="fa-solid fa-circle-notch fa-spin text-sky-600 text-3xl"></i></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        const soldIds = loadSoldIdsFromStorage();
        allProducts = [];

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const owner = (p.owner || p[6] || '').toLowerCase();

            if (owner === account) {
                allProducts.push({ id: i, data: p, type: 'in_stock' });
            } else if (soldIds.has(i)) {
                allProducts.push({ id: i, data: p, type: 'sold' });
            }
        }

        updateCounts();
        renderTable();
    } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-red-400 font-bold">Lỗi kết nối Blockchain</td></tr>';
    }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    const filtered = allProducts.filter(p => p.type === currentFilter);
    
    tbody.innerHTML = filtered.length 
        ? filtered.map(item => `
            <tr class="hover:bg-slate-50/80 transition-all cursor-pointer group" onclick="openSidePanelById(${item.id})">
                <td class="px-8 py-7 font-mono text-xs text-slate-400 font-bold group-hover:text-sky-600 transition-colors">#${String(item.id).padStart(3, '0')}</td>
                <td class="px-8 py-7">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-white shadow-sm border border-slate-100 flex items-center justify-center text-sky-600 group-hover:scale-110 transition-all">
                            <i class="fa-solid fa-box-open text-lg"></i>
                        </div>
                        <div>
                            <span class="block font-black text-slate-700">${item.data.name}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${item.data.origin}</span>
                        </div>
                    </div>
                </td>
                <td class="px-8 py-7 text-slate-500 font-bold text-sm">${item.data.batchID}</td>
                <td class="px-8 py-7">
                    <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${item.type === 'in_stock' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-slate-100 text-slate-500 border border-slate-200'}">
                        ${item.type === 'in_stock' ? 'Trong kho' : 'Đã xuất kho'}
                    </span>
                </td>
            </tr>
        `).join('')
        : '<tr><td colspan="4" class="text-center py-20 text-slate-400 font-medium italic">Không có sản phẩm nào trong danh mục này</td></tr>';
}

/* ======================= COUNTS (ĐÃ SỬA LỖI NULL) ======================= */
function updateCounts() {
    const stockEl = document.getElementById('countInStock');
    const soldEl  = document.getElementById('countSold');
    if (stockEl) stockEl.innerText = allProducts.filter(p => p.type === 'in_stock').length;
    if (soldEl)  soldEl.innerText  = allProducts.filter(p => p.type === 'sold').length;
}

/* ======================= SIDE PANEL (giữ nguyên) ======================= */
function openSidePanelById(id) {
    const item = allProducts.find(p => p.id === Number(id));
    if (!item) return;
    const p = item.data;
    const ipfsGateway = "https://ipfs.io/ipfs/";
    
    document.getElementById('panelName').innerText = p.name;
    document.getElementById('panelBatch').innerText = p.batchID;
    document.getElementById('panelDate').innerText = new Date(Number(p.manufactureDate) * 1000).toLocaleDateString('vi-VN');
    document.getElementById('panelStatusBadge').innerText = item.type === 'in_stock' ? 'Có sẵn trong kho' : 'Đã xuất kho';
    
    const imgHash = p.productImageUrl.replace("ipfs://", "");
    document.getElementById('panelImage').src = ipfsGateway + imgHash;
    
    const ingContainer = document.getElementById('panelIngredients');
    ingContainer.innerHTML = p.ingredients.map(i => `<span class="px-4 py-2 bg-slate-50 text-slate-600 text-[11px] rounded-xl font-bold border border-slate-100">${i}</span>`).join('');
    
    const certHash = p.certificationUrl.replace("ipfs://", "");
    document.getElementById('panelCertLink').href = ipfsGateway + certHash;

    const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${item.id}`;
    QRCode.toCanvas(document.getElementById("panelQR"), verifyUrl, { width: 140, margin: 1, color: { dark: '#0ea5e9' } });

    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('overlay').classList.add('active');
}

function closeSidePanel() {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

/* ======================= HELPERS & WRITE ACTIONS ======================= */
function getInputValue(id) {
    const el = document.getElementById(id);
    return el && typeof el.value === 'string' ? el.value.trim() : '';
}

async function updateStatus() {
    const id = getInputValue('updateId');
    const st = getInputValue('newStatus');
    if (!id || !st) return alert("Vui lòng điền đủ thông tin!");
    try {
        await contract.methods.updateStatus(id, st).send({ from: account });
        alert("Cập nhật thành công!");
        loadMyProducts();
    } catch (e) { alert("Lỗi: " + e.message); }
}

async function transferOwnership() {
    const id = getInputValue('transferId');
    const addrRaw = getInputValue('buyerAddress');
    if (!id || !addrRaw) return alert("Vui lòng nhập đầy đủ!");
    if (!/^\d+$/.test(id)) return alert("ID không hợp lệ!");

    let addr;
    try { addr = web3.utils.toChecksumAddress(addrRaw); } 
    catch { return alert("Địa chỉ ví không hợp lệ!"); }

    try {
        await contract.methods.transferOwnership(id, addr).send({ from: account });
        rememberSoldId(id);                    // ← Lưu ngay vào LocalStorage
        alert("✅ Chuyển quyền sở hữu thành công!");
        showTab('list-products');
        loadMyProducts();                      // Cập nhật kho + lịch sử ngay lập tức
    } catch (e) { 
        alert("Lỗi: " + e.message); 
    }
}
</script>
</body>
</html>
