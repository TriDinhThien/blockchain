<!DOCTYPE html>
<html lang="vi">

    <meta charset="UTF-8">

    <title>Distributor Elite | VeriGlow Traceability</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            min-height: screen;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .tab-content { display: none; opacity: 0; transform: translateY(10px); }
        .tab-content.active { display: block; animation: slideUp 0.5s forwards ease-out; }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        /* Side Drawer */
        #sideDrawer { 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
        #sideDrawer.open { transform: translateX(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Toast Animation */
        .toast {
            animation: toastIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .product-row:hover { background: rgba(99, 102, 241, 0.03); }
    </style>
</head>

<script>
// --- CONFIG & SMART CONTRACT ---

let web3, contract, account;
let allProducts = [];
let currentFilter = 'in-stock';

// --- INITIALIZATION ---
window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadInventory();
        showToast("Đã kết nối ví thành công", "success");
    } else {
        showToast("Vui lòng cài đặt MetaMask!", "error");
    }
});

// --- TOAST NOTIFICATIONS ---
function showToast(message, type = "success") {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    const colors = {
        success: "bg-white border-l-4 border-green-500 text-slate-800",
        error: "bg-white border-l-4 border-red-500 text-slate-800"
    };
    const icons = { success: "fa-circle-check text-green-500", error: "fa-circle-xmark text-red-500" };

    toast.className = `toast glass-card flex items-center gap-4 px-6 py-4 rounded-2xl shadow-2xl pointer-events-auto min-w-[300px] ${colors[type]}`;
    toast.innerHTML = `
        <i class="fa-solid ${icons[type]} text-xl"></i>
        <div class="font-bold text-sm">${message}</div>
    `;

    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 500);
    }, 4000);
}

// --- LOGIC FUNCTIONS ---
async function loadInventory() {
    const tbody = document.getElementById('inventoryBody');
    tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center"><div class="inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></td></tr>`;

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            allProducts.push({ id: i, ...p });
        }
        renderInventory();
    } catch (err) {
        showToast("Lỗi tải dữ liệu Blockchain", "error");
    }
}

function renderInventory() {
    const tbody = document.getElementById('inventoryBody');
    const filtered = allProducts.filter(p => 
        currentFilter === 'in-stock' ? p.owner.toLowerCase() === account : p.owner.toLowerCase() !== account
    );

    document.getElementById('totalInStock').innerText = allProducts.filter(p => p.owner.toLowerCase() === account).length;

    tbody.innerHTML = filtered.map(p => `
        <tr class="product-row transition-all cursor-pointer group" onclick="openDrawer(${p.id})">
            <td class="px-10 py-8 font-mono text-xs text-slate-400 font-bold">#${String(p.id).padStart(3, '0')}</td>
            <td class="px-10 py-8">
                <div class="font-extrabold text-slate-800 group-hover:text-indigo-600 transition-colors">${p.name}</div>
                <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest mt-1">${p.origin}</div>
            </td>
            <td class="px-10 py-8">
                <div class="text-sm font-bold text-slate-600">${p.batchID}</div>
                <div class="text-[10px] text-slate-400 font-medium">${new Date(Number(p.manufactureDate) * 1000).toLocaleDateString('vi-VN')}</div>
            </td>
            <td class="px-10 py-8 text-right">
                <button class="px-6 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-indigo-600 hover:text-white transition-all">Chi tiết</button>
            </td>
        </tr>
    `).join('') || `<tr><td colspan="4" class="py-24 text-center text-slate-400 font-bold italic">Không tìm thấy dữ liệu</td></tr>`;
}

function filterInventory(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-slate-500'));
    btn.classList.add('active');
    renderInventory();
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const receiver = document.getElementById("newOwner").value.trim();

    if (!id || !receiver) return showToast("Vui lòng điền đủ thông tin!", "error");

    try {
        const product = await contract.methods.verifyProduct(id).call();
        if (product.owner.toLowerCase() !== account) return showToast("Bạn không sở hữu sản phẩm này!", "error");

        showToast("Đang thực hiện giao dịch Blockchain...", "success");
        await contract.methods.transferOwnership(id, receiver).send({ from: account });
        
        showToast("Xuất kho thành công!", "success");
        loadInventory();
        showTab('inventory');
    } catch (err) {
        showToast("Giao dịch bị từ chối!", "error");
    }
}

// --- DRAWER & UI ---
async function openDrawer(id) {
    const p = allProducts.find(x => x.id == id);
    const content = document.getElementById('drawerContent');
    
    content.innerHTML = `
        <div class="space-y-10">
            <div class="aspect-square bg-slate-50 rounded-[3rem] overflow-hidden border border-slate-100 shadow-inner flex items-center justify-center relative group">
                ${p.productImageUrl ? `<img src="${p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/')}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-box text-slate-200 text-7xl"></i>`}
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-6 bg-slate-50 rounded-[2rem] border border-white">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Mã Lô Hàng</p>
                    <p class="font-bold text-slate-800">${p.batchID}</p>
                </div>
                <div class="p-6 bg-slate-50 rounded-[2rem] border border-white">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-2">Sản xuất tại</p>
                    <p class="font-bold text-slate-800">${p.origin}</p>
                </div>
            </div>

            <div class="space-y-4 pt-6 border-t border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Thành phần</p>
                <div class="flex flex-wrap gap-2">
                    ${p.ingredients.map(ing => `<span class="px-4 py-2 bg-indigo-50 text-indigo-600 text-[10px] font-extrabold rounded-xl border border-indigo-100">${ing}</span>`).join('')}
                </div>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Vòng đời sản phẩm</p>
                <div class="space-y-4">
                    ${p.history.map((h, i) => `
                        <div class="flex gap-4">
                            <div class="w-5 flex flex-col items-center">
                                <div class="w-2.5 h-2.5 rounded-full ${i === 0 ? 'bg-indigo-600 shadow-lg shadow-indigo-200' : 'bg-slate-300'}"></div>
                                ${i !== p.history.length - 1 ? '<div class="w-[2px] flex-1 bg-slate-100"></div>' : ''}
                            </div>
                            <span class="text-xs font-bold text-slate-600 pb-2">${h}</span>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="flex flex-col items-center gap-4 bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl">
                <div id="drawerQR" class="p-4 bg-white rounded-[2rem]"></div>
                <div class="text-center">
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">Mã xác thực</p>
                    <p class="text-xs font-mono opacity-50">PRD-TRACE-${id}</p>
                </div>
            </div>
        </div>
    `;

    document.getElementById('sideDrawer').classList.add('open');
    document.getElementById('overlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('overlay').classList.add('opacity-100'), 10);
    
    setTimeout(() => {
        QRCode.toCanvas(document.createElement('canvas'), `https://veriglow.io/verify?id=${id}`, { width: 140, margin: 1 }, (err, canvas) => {
            document.getElementById('drawerQR').innerHTML = '';
            document.getElementById('drawerQR').appendChild(canvas);
        });
    }, 100);
}

function closeDrawer() {
    document.getElementById('sideDrawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('opacity-100');
    setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const titles = { 'inventory': 'Kho hàng', 'transfer': 'Xuất kho đối tác' };
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    if(tabId === 'inventory') document.querySelectorAll('.sidebar-item')[0].classList.add('active');
    else document.querySelectorAll('.sidebar-item')[1].classList.add('active');
}
</script>
</body>
</html>
