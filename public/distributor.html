<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
      
        :root {
            --primary: #0ea5e9;
            --blue: #3b82f6;
            --light-blue: #bfdbfe;
        }
      
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        /* Intro screen - Căn giữa tuyệt đối */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.6);
        }
        .intro-content {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            animation: introFadeUp 1.2s ease-out;
        }

        @keyframes introFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar */
        aside {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
        }
        .sidebar-item {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 9999px;
        }
        .sidebar-item:hover {
            transform: translateX(8px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.2);
        }
        .sidebar-item.active {
            background: linear-gradient(90deg, #3b82f6, #0ea5e9);
            color: white;
            box-shadow: 0 15px 30px -8px rgba(59, 130, 246, 0.45);
        }

        /* Tab content */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Product area */
        .grid-item {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.18);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.08);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 2.5rem;
        }
        .grid-item:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.28);
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.7);
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
        }

        /* Filter buttons */
        .filter-btn.active {
            background: linear-gradient(90deg, #3b82f6, #0ea5e9);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
            padding: 1rem;
        }
        .modal.active { display: flex; }

        /* Scroll area */
        #main-scroll-area {
            flex: 1 1 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header {
                height: 70px !important;
                padding-left: 1.25rem !important;
                padding-right: 1.25rem !important;
            }
            #pageTitle { font-size: 1.25rem !important; }
            #main-scroll-area { padding: 1.5rem 1.5rem 100px 1.5rem !important; }
            .grid-item { border-radius: 2rem; }
            #productDetailSidebar { width: 100% !important; }
            
            /* Căn giữa intro trên mobile */
            .intro-content h1 { font-size: 3.5rem !important; }
            .intro-content p { font-size: 1.1rem !important; }
            .intro-content button { width: 100%; padding: 1.25rem !important; font-size: 1.25rem !important; }
        }

        .mobile-nav-btn.active { color: #3b82f6; }
        .mobile-nav-btn.active i { transform: translateY(-4px); transition: transform 0.3s; }

        input, textarea, select { width: 100% !important; }
    </style>
</head>
<body class="min-h-screen flex text-slate-900 overflow-hidden relative">

    <div id="intro-screen">
        <video id="intro-video" autoplay loop muted playsinline preload="auto">
            <source src="intro-distributor.mp4" type="video/mp4">
        </video>
      
        <div class="intro-content">
            <img src="2.png" alt="VeriGlow Logo"
                 class="mx-auto w-32 h-32 md:w-48 md:h-48 rounded-full object-cover shadow-2xl border-4 border-white/30 mb-8 ring-4 ring-white/10">
          
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-white drop-shadow-2xl">
                VeriGlow
            </h1>
            <p class="text-white/80 text-lg md:text-xl mt-4 font-light tracking-wide">PHÂN PHỐI • BLOCKCHAIN • MINH BẠCH</p>
          
            <div class="mt-12">
                <button onclick="enterDashboard()"
                        class="px-10 py-5 bg-white text-slate-900 rounded-2xl font-bold text-xl shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-3 mx-auto">
                    <span>Vào kho quản lý</span>
                    <i class="fa-solid fa-arrow-right-to-bracket text-blue-500"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-content" class="flex w-full min-h-screen">
        <aside class="w-72 bg-white/95 border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen shadow-2xl backdrop-blur-xl">
            <div class="p-8">
                <div class="flex items-center gap-3">
                    <img src="2.png" alt="VeriGlow Logo" class="w-10 h-10 rounded-2xl object-cover shadow-lg">
                    <span class="font-bold text-2xl tracking-tight bg-gradient-to-r from-sky-500 to-blue-600 bg-clip-text text-transparent">VeriGlow</span>
                </div>
                <p class="text-blue-600 text-[10px] mt-1 pl-1 font-bold uppercase tracking-wider">Distributor Portal</p>
            </div>
          
            <nav class="mt-4 flex-1 px-6 space-y-2">
                <div class="flex items-center gap-2">
                    <button onclick="showTab('list-products')" class="sidebar-item active flex-1 flex items-center gap-3 px-5 py-4 text-slate-600 font-semibold">
                        <i class="fa-solid fa-boxes-stacked text-xl"></i>
                        <span>Kho sản phẩm</span>
                    </button>
                    <button onclick="showFunctionInfo('list-products')" class="info-icon text-slate-400 hover:text-blue-500 p-2">
                        <i class="fa-solid fa-circle-info"></i>
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showTab('transfer-ownership')" class="sidebar-item flex-1 flex items-center gap-3 px-5 py-4 text-slate-600 font-semibold">
                        <i class="fa-solid fa-truck-ramp-box text-xl"></i>
                        <span>Chuyển giao quyền</span>
                    </button>
                    <button onclick="showFunctionInfo('transfer-ownership')" class="info-icon text-slate-400 hover:text-blue-500 p-2">
                        <i class="fa-solid fa-circle-info"></i>
                    </button>
                </div>
            </nav>
          
            <div class="p-6 mt-auto border-t border-slate-100">
                <div class="glass rounded-2xl p-4 border border-white/60">
                    <div class="flex items-center gap-2 mb-2 text-[9px] font-bold text-blue-600 uppercase">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></div>
                        Network: Sepolia
                    </div>
                    <div id="accountDisplay" class="text-[10px] font-mono text-slate-500 bg-white/70 p-2.5 rounded-xl border border-slate-100 truncate">
                        Connecting...
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white/90 backdrop-blur-2xl border-b border-slate-200 flex items-center justify-between px-6 md:px-10 sticky top-0 z-30 shadow-sm">
                <h2 id="pageTitle" class="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">
                    Kho sản phẩm
                </h2>
                <button onclick="loadProducts()" class="flex items-center gap-2 px-5 md:px-8 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm font-bold hover:bg-blue-50 hover:text-blue-700 transition-all">
                    <i class="fa-solid fa-arrows-rotate"></i>
                    <span class="hidden md:inline">Làm mới</span>
                </button>
            </header>
          
            <div id="main-scroll-area" class="p-6 md:p-10">
                <div id="list-products" class="tab-content active">
                    <div class="mb-8 flex flex-wrap items-center gap-2">
                        <button id="btnActivity" onclick="setFilter('activity')" class="filter-btn active px-5 py-2.5 rounded-2xl text-xs font-bold border border-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-clock-rotate-left"></i> Hoạt động
                        </button>
                        <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn px-5 py-2.5 rounded-2xl text-xs font-bold border border-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-boxes-stacked"></i> Trong kho
                        </button>
                        <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-5 py-2.5 rounded-2xl text-xs font-bold border border-slate-200 flex items-center gap-2">
                            <i class="fa-solid fa-truck-moving"></i> Đã đi
                        </button>
                    </div>
                    <div id="productGridBody" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"></div>
                </div>

                <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                    <div class="glass rounded-[2rem] border border-white/60 shadow-2xl p-8 md:p-10">
                        <h3 class="text-2xl md:text-3xl font-bold text-slate-800 mb-8 flex items-center gap-3">
                            <i class="fa-solid fa-truck-moving text-blue-500"></i> Bàn giao sản phẩm
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-4">ID sản phẩm</label>
                                <input id="transferId" type="number" placeholder="Ví dụ: 1" class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/70 outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-4">Địa chỉ ví người nhận</label>
                                <input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white/70 font-mono text-sm outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                            </div>
                            <button onclick="transferOwnership()" class="w-full bg-gradient-to-r from-blue-600 to-sky-600 hover:from-blue-700 hover:to-sky-700 text-white font-bold py-5 rounded-2xl shadow-xl transition-all text-lg mt-4">
                                Xác nhận chuyển giao
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="mobile-bottom-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 border-t border-slate-200 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] backdrop-blur-xl z-[999] flex justify-around items-center py-3 px-6">
            <button onclick="showTab('list-products')" data-tab="list-products" class="mobile-nav-btn flex-1 flex flex-col items-center gap-1 text-slate-400">
                <i class="fa-solid fa-boxes-stacked text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Kho hàng</span>
            </button>
            <button onclick="showTab('transfer-ownership')" data-tab="transfer-ownership" class="mobile-nav-btn flex-1 flex flex-col items-center gap-1 text-slate-400">
                <i class="fa-solid fa-truck-ramp-box text-xl"></i>
                <span class="text-[10px] font-bold uppercase">Chuyển giao</span>
            </button>
        </div>

        <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-full md:w-[420px] bg-white shadow-2xl translate-x-full flex flex-col z-[1000] border-l border-slate-200 transition-transform duration-500">
            <div class="px-6 py-5 border-b flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-circle-info text-blue-600"></i>
                    <h3 class="font-bold text-lg">Chi tiết sản phẩm</h3>
                </div>
                <button onclick="closeSidebar()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:bg-slate-50 rounded-xl"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div id="sidebarContent" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        </div>

        <div id="certModal" class="modal" onclick="if(event.target.id==='certModal')this.classList.remove('active')">
            <div class="relative max-w-4xl w-full">
                <img id="modalCertImg" src="" class="w-full rounded-2xl shadow-2xl">
            </div>
        </div>

        <div id="qrModal" class="modal" onclick="if(event.target.id==='qrModal')this.classList.remove('active')">
            <div class="bg-white p-8 rounded-[2rem] text-center max-w-xs w-full" onclick="event.stopPropagation()">
                <h3 class="text-xl font-bold mb-6">Mã QR Truy xuất</h3>
                <canvas id="modalQrCanvas" class="mx-auto rounded-xl"></canvas>
                <p class="mt-6 text-[10px] text-slate-400 uppercase font-bold tracking-widest">VeriGlow Authenticated</p>
            </div>
        </div>

        <div id="functionModal" class="modal" onclick="if(event.target.id==='functionModal')this.classList.remove('active')">
            <div class="bg-white rounded-[2rem] p-8 max-w-md w-full" onclick="event.stopPropagation()">
                <h3 id="functionTitle" class="text-xl font-bold mb-4"></h3>
                <div id="functionDesc" class="text-slate-600 text-sm leading-relaxed mb-8"></div>
                <button onclick="document.getElementById('functionModal').classList.remove('active')" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">Đã hiểu</button>
            </div>
        </div>

        <div id="alertModal" class="modal" style="z-index: 10005;" onclick="if(event.target.id==='alertModal')this.classList.remove('active')">
            <div class="bg-white rounded-[2rem] p-8 text-center max-w-xs w-full shadow-2xl border border-slate-50" onclick="event.stopPropagation()">
                <div id="alertIcon" class="mb-4 text-5xl"></div>
                <h3 id="alertTitle" class="text-xl font-bold mb-2"></h3>
                <p id="alertMessage" class="text-slate-500 text-sm mb-6 leading-relaxed"></p>
                <button onclick="document.getElementById('alertModal').classList.remove('active')" id="alertBtn" class="w-full py-4 rounded-xl font-bold text-white shadow-lg"></button>
            </div>
        </div>
    </div>

<script>
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];
let web3, contract, account;
let currentFilter = 'activity';

function showToast(message, type = 'success') {
    const modal = document.getElementById('alertModal');
    const icon = document.getElementById('alertIcon');
    const title = document.getElementById('alertTitle');
    const msg = document.getElementById('alertMessage');
    const btn = document.getElementById('alertBtn');
    msg.innerHTML = message;

    if (type === 'success') {
        icon.innerHTML = '✅'; title.innerText = 'Thành công';
        btn.className = 'w-full py-4 rounded-xl font-bold text-white bg-blue-600'; btn.innerText = 'Tiếp tục';
    } else if (type === 'error') {
        icon.innerHTML = '❌'; title.innerText = 'Lỗi';
        btn.className = 'w-full py-4 rounded-xl font-bold text-white bg-red-600'; btn.innerText = 'Thử lại';
    } else {
        icon.innerHTML = '⚠️'; title.innerText = 'Cảnh báo';
        btn.className = 'w-full py-4 rounded-xl font-bold text-white bg-amber-500'; btn.innerText = 'Đã hiểu';
    }
    modal.classList.add('active');
}

window.addEventListener("load", async () => {
    if (!window.ethereum) return;
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById('accountDisplay').innerText = account.slice(0,6) + "..." + account.slice(-4);
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    const titles = {'list-products': 'Kho sản phẩm', 'transfer-ownership': 'Chuyển giao quyền'};
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    const sidebarItems = document.querySelectorAll('.sidebar-item');
    const mobileBtns = document.querySelectorAll('.mobile-nav-btn');
    if(tabId === 'list-products') { sidebarItems[0].classList.add('active'); mobileBtns[0].classList.add('active'); }
    else { sidebarItems[1].classList.add('active'); mobileBtns[1].classList.add('active'); }
    
    document.getElementById('main-scroll-area').scrollTop = 0;
}

async function loadProducts() {
    const grid = document.getElementById('productGridBody');
    grid.innerHTML = '<div class="col-span-full py-20 text-center text-blue-500"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i></div>';
    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        if (currentFilter === 'activity') {
            let hasActivity = false;
            html = '<div class="col-span-full max-w-2xl mx-auto w-full space-y-4">';
            for (let i = count; i >= 1; i--) {
                const p = await contract.methods.products(i).call();
                const isOwned = p.owner.toLowerCase() === account.toLowerCase();
                html += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full ${isOwned ? 'bg-blue-50 text-blue-600' : 'bg-orange-50 text-orange-600'} flex items-center justify-center shrink-0">
                            <i class="fa-solid ${isOwned ? 'fa-box-open' : 'fa-truck-moving'}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-xs truncate">${isOwned ? 'Nhập kho' : 'Xuất kho'} #${i}</h4>
                            <p class="text-[10px] text-slate-400 truncate">${p.name} • Lô: ${p.batchID}</p>
                        </div>
                    </div>`;
                hasActivity = true;
            }
            html += '</div>';
            grid.innerHTML = hasActivity ? html : '<p class="col-span-full text-center py-20 text-slate-400">Trống</p>';
            return;
        }

        for (let i = count; i >= 1; i--) {
            const p = await contract.methods.products(i).call();
            const isOwned = p.owner.toLowerCase() === account.toLowerCase();
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;
            
            const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x300?text=No+Image';
            html += `
                <div class="grid-item bg-white overflow-hidden group cursor-pointer" onclick="showProductDetail(${i})">
                    <div class="relative h-44 bg-slate-50">
                        <img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform">
                        <div class="absolute top-3 right-3 bg-black/50 backdrop-blur text-white text-[9px] px-2 py-1 rounded-lg font-bold">#${i}</div>
                    </div>
                    <div class="p-5">
                        <div class="text-[9px] text-blue-500 font-bold uppercase mb-1">${p.manufacturerName}</div>
                        <h4 class="font-bold text-slate-800 text-sm mb-1 truncate">${p.name}</h4>
                        <div class="flex items-center justify-between mt-4">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${p.manufactureDate}</span>
                            <i class="fa-solid fa-arrow-right text-blue-500 text-xs"></i>
                        </div>
                    </div>
                </div>`;
        }
        grid.innerHTML = html || '<p class="col-span-full text-center py-20 text-slate-400">Không tìm thấy sản phẩm</p>';
    } catch (err) { grid.innerHTML = '<p class="col-span-full text-center text-red-500">Lỗi kết nối</p>'; }
}

function setFilter(f) {
    currentFilter = f;
    document.getElementById('btnInStock').classList.toggle('active', f === 'inStock');
    document.getElementById('btnTransferred').classList.toggle('active', f === 'transferred');
    document.getElementById('btnActivity').classList.toggle('active', f === 'activity');
    loadProducts();
}

async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    content.innerHTML = '<div class="text-center py-20 text-blue-500"><i class="fa-solid fa-circle-notch fa-spin text-2xl"></i></div>';
    sidebar.classList.remove('translate-x-full');
    try {
        const verify = await contract.methods.verifyProduct(id).call();
        const prod = await contract.methods.products(id).call();
        let imgUrl = prod.productImageUrl ? prod.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';
        const verifyUrl = `https://blockchain-demo-lilac.vercel.app/verify.html?id=${id}`;
        
        content.innerHTML = `
            <div class="space-y-6">
                ${imgUrl ? `<img src="${imgUrl}" class="w-full rounded-2xl shadow-xl h-52 object-cover">` : ''}
                <div class="grid grid-cols-2 gap-3 bg-slate-50 p-4 rounded-2xl">
                    <div><span class="text-[9px] block font-bold text-slate-400 uppercase mb-1">Tên</span><strong class="text-xs">${verify.name}</strong></div>
                    <div><span class="text-[9px] block font-bold text-slate-400 uppercase mb-1">Mã Lô</span><strong class="text-xs">${verify.batchID}</strong></div>
                </div>
                <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                    <span class="text-[9px] font-bold text-blue-600 block mb-2 uppercase tracking-widest">Nhà sản xuất</span>
                    <p class="font-bold text-sm text-slate-800">${verify.manufacturerName}</p>
                    <p class="text-[10px] text-slate-500 mt-1">${verify.factoryAddress}</p>
                </div>
                <button onclick="showQrModal('${verifyUrl}')" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-qrcode"></i> Xuất mã QR
                </button>
            </div>`;
    } catch (err) { content.innerHTML = '<p class="text-red-500 text-center">Lỗi tải dữ liệu</p>'; }
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }

function showQrModal(url) {
    const modal = document.getElementById('qrModal');
    const canvas = document.getElementById('modalQrCanvas');
    QRCode.toCanvas(canvas, url, { width: 220, margin: 2 }, (err) => { if (!err) modal.classList.add('active'); });
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value.trim();
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return showToast("Vui lòng điền đầy đủ!", "warning");
    if (!web3.utils.isAddress(newOwner)) return showToast("Ví không hợp lệ!", "error");
    try {
        const p = await contract.methods.products(id).call();
        if (p.owner.toLowerCase() !== account.toLowerCase()) return showToast("Bạn không sở hữu vật phẩm này!", "error");
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        showToast("Bàn giao thành công!", "success");
        loadProducts();
    } catch (err) { showToast("Giao dịch thất bại", "error"); }
}

function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => { intro.style.display = 'none'; }, 800);
}

function showFunctionInfo(type) {
    const modal = document.getElementById('functionModal');
    const titleEl = document.getElementById('functionTitle');
    const descEl = document.getElementById('functionDesc');
    if (type === 'list-products') { 
        titleEl.innerText = 'Kho sản phẩm'; 
        descEl.innerText = 'Nơi quản lý toàn bộ sản phẩm trong kho của bạn. Bạn có thể theo dõi lịch sử và trạng thái từng món hàng.';
    } else {
        titleEl.innerText = 'Bàn giao quyền';
        descEl.innerText = 'Chuyển quyền sở hữu hợp pháp trên Blockchain cho đối tác hoặc khách hàng tiếp theo.';
    }
    modal.classList.add('active');
}
</script>
