<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriGlow | Hub Phân Phối Chiến Lược</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .gradient-text { background: linear-gradient(90deg, #0ea5e9, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 glass-card border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-sky-600 rounded-lg shadow-lg">
                    <i class="fa-solid fa-gem text-white"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight gradient-text">VeriGlow Hub</h1>
            </div>
            
            <div class="hidden md:flex items-center space-x-8">
                <button onclick="switchTab('inventory', event)" class="nav-link font-bold text-sky-600 border-b-2 border-sky-600 pb-1">Kho Hàng</button>
                <button onclick="switchTab('history', event)" class="nav-link font-semibold text-gray-500 hover:text-sky-600 transition-all">Đã Bàn Giao</button>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Địa chỉ ví</p>
                    <p id="walletAddress" class="text-xs font-mono text-gray-600">0x...connecting</p>
                </div>
                <button onclick="loadData()" class="p-2 hover:bg-sky-50 rounded-full transition-colors">
                    <i class="fa-solid fa-rotate-right text-sky-600"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="mb-10 flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <h2 id="viewTitle" class="text-3xl font-extrabold text-gray-900">Sản phẩm hiện có</h2>
                <p class="text-gray-500 mt-1">Quản lý và truy xuất nguồn gốc mỹ phẩm Blockchain.</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 min-w-[160px]">
                    <div class="w-10 h-10 bg-sky-100 rounded-xl flex items-center justify-center text-sky-600"><i class="fa-solid fa-box"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">Tồn kho</p><p id="countOwned" class="text-xl font-extrabold">0</p></div>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 min-w-[160px]">
                    <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600"><i class="fa-solid fa-paper-plane"></i></div>
                    <div><p class="text-[10px] font-bold text-gray-400 uppercase">Đã bán</p><p id="countSold" class="text-xl font-extrabold">0</p></div>
                </div>
            </div>
        </div>

        <div id="inventory-tab" class="tab-content active">
            <div id="owned-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>

        <div id="history-tab" class="tab-content">
            <div id="history-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </div>
    </main>

    <div id="transferModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] w-full max-w-lg p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-gray-800">Bàn giao khách hàng</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            <div class="space-y-6">
                <div class="bg-sky-50 p-4 rounded-xl border border-sky-100 flex items-center gap-4">
                    <img id="modalImg" src="" class="w-16 h-16 rounded-lg object-cover bg-white">
                    <div>
                        <p id="modalName" class="font-bold text-gray-800"></p>
                        <p id="modalIdDisplay" class="text-xs font-mono text-sky-600"></p>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-2 ml-1">Địa chỉ ví khách nhận (MetaMask)</label>
                    <input id="recipientAddress" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border-2 border-gray-100 focus:border-sky-500 focus:outline-none font-mono text-sm transition-all">
                </div>
                <button id="confirmBtn" onclick="executeTransfer()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-black py-4 rounded-xl shadow-lg shadow-sky-200 transition-all active:scale-95">XÁC NHẬN CHUYỂN QUYỀN</button>
            </div>
        </div>
    </div>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":false,"internalType":"address","name":"newOwner","type":"address"}],"name":"OwnershipTransferred","type":"event"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;
let selectedProductId = null;

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('walletAddress').innerText = account.substring(0,6) + "..." + account.substring(38);
        contract = new web3.eth.Contract(abi, contractAddress);
        loadData();
    }
});

async function loadData() {
    const ownedGrid = document.getElementById('owned-grid');
    const historyGrid = document.getElementById('history-grid');
    ownedGrid.innerHTML = historyGrid.innerHTML = `<div class="col-span-full flex flex-col items-center py-20"><div class="loading-spinner mb-4"></div><p class="font-bold text-gray-400">Đang quét Blockchain...</p></div>`;

    try {
        const totalCount = Number(await contract.methods.productCount().call());
        let ownedCount = 0;
        
        const latestBlock = BigInt(await web3.eth.getBlockNumber());
        const fromBlock = latestBlock - 5000n < 0n ? 0n : latestBlock - 5000n;

        const transferEvents = await contract.getPastEvents('OwnershipTransferred', {
            fromBlock: fromBlock,
            toBlock: 'latest'
        });

        const mySoldIds = new Set();
        await Promise.all(transferEvents.map(async (ev) => {
            const tx = await web3.eth.getTransaction(ev.transactionHash);
            if (tx && tx.from.toLowerCase() === account) {
                mySoldIds.add(Number(ev.returnValues.id));
            }
        }));

        let ownedHtml = "";
        let historyHtml = "";

        for (let i = 1; i <= totalCount; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const currentOwner = p.owner.toLowerCase();
            const date = new Date(Number(p.manufactureDate) * 1000).toLocaleDateString('vi-VN');
            const img = p.productImageUrl || 'https://images.unsplash.com/photo-1556229010-6c3f2c9ca5f8?auto=format&fit=crop&q=80&w=400';
            
            // Xử lý dấu nháy trong tên để tránh lỗi JavaScript khi truyền vào onclick
            const safeName = p.name.replace(/'/g, "\\'");

            const cardHtml = `
                <div class="product-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 flex flex-col h-full">
                    <div class="relative group h-56 overflow-hidden">
                        <img src="${img}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black shadow-sm">ID: #${i}</div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <h4 class="font-extrabold text-gray-900 text-lg leading-tight mb-4">${p.name}</h4>
                        <div class="space-y-2 mb-6">
                            <p class="text-[10px] text-gray-400 font-bold uppercase flex items-center gap-2"><i class="fa-solid fa-barcode text-sky-400"></i> Lô: ${p.batchID}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase flex items-center gap-2"><i class="fa-solid fa-calendar text-sky-400"></i> NSX: ${date}</p>
                        </div>
                        
                        ${currentOwner === account ? `
                            <button onclick="openTransferModal(${i}, '${safeName}', '${img}')" class="mt-auto w-full py-3 bg-gray-900 hover:bg-sky-600 text-white text-xs font-black rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg hover:shadow-sky-200">
                                <i class="fa-solid fa-paper-plane"></i> XUẤT KHO
                            </button>
                        ` : `
                            <div class="mt-auto pt-4 border-t border-dashed border-gray-100">
                                <p class="text-[9px] font-bold text-emerald-600 mb-1 uppercase tracking-widest"><i class="fa-solid fa-circle-check"></i> Đã bàn giao</p>
                                <p class="text-[9px] font-mono text-gray-400 truncate break-all">Sở hữu: ${p.owner}</p>
                            </div>
                        `}
                    </div>
                </div>
            `;

            if (currentOwner === account) {
                ownedHtml += cardHtml;
                ownedCount++;
            } else if (mySoldIds.has(i)) {
                historyHtml += cardHtml;
            }
        }

        document.getElementById('countOwned').innerText = ownedCount;
        document.getElementById('countSold').innerText = mySoldIds.size;
        
        ownedGrid.innerHTML = ownedHtml || `<div class="col-span-full py-20 text-center text-gray-400 italic">Kho hàng trống</div>`;
        historyGrid.innerHTML = historyHtml || `<div class="col-span-full py-20 text-center text-gray-400 italic">Chưa có lịch sử bàn giao</div>`;

    } catch (e) {
        console.error(e);
        alert("Lỗi tải dữ liệu!");
    }
}

function openTransferModal(id, name, img) {
    selectedProductId = id;
    document.getElementById('modalName').innerText = name;
    document.getElementById('modalIdDisplay').innerText = "Product ID: #" + id;
    document.getElementById('modalImg').src = img;
    document.getElementById('transferModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('transferModal').classList.add('hidden');
    document.getElementById('recipientAddress').value = "";
    selectedProductId = null;
}

async function executeTransfer() {
    const recipientInput = document.getElementById('recipientAddress');
    if (!recipientInput) return;

    const to = recipientInput.value.trim();
    if (!to || !web3.utils.isAddress(to)) return alert("Địa chỉ ví MetaMask không hợp lệ!");
    if (!selectedProductId) return alert("Lỗi: Chưa chọn sản phẩm!");

    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> ĐANG XỬ LÝ...`;

    try {
        // Đảm bảo selectedProductId được truyền dưới dạng chuỗi hoặc số nguyên chính xác
        await contract.methods.transferOwnership(selectedProductId.toString(), to).send({ from: account });
        alert("Thành công! Quyền sở hữu đã được bàn giao.");
        closeModal();
        loadData();
    } catch (e) {
        console.error(e);
        alert("Giao dịch thất bại: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = "XÁC NHẬN CHUYỂN QUYỀN";
    }
}

function switchTab(tab, event) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => {
        l.classList.remove('text-sky-600', 'border-sky-600', 'border-b-2');
        l.classList.add('text-gray-500');
    });

    const targetBtn = event.currentTarget;
    targetBtn.classList.add('text-sky-600', 'border-sky-600', 'border-b-2');
    targetBtn.classList.remove('text-gray-500');

    if (tab === 'inventory') {
        document.getElementById('inventory-tab').classList.add('active');
        document.getElementById('viewTitle').innerText = "Sản phẩm hiện có";
    } else {
        document.getElementById('history-tab').classList.add('active');
        document.getElementById('viewTitle').innerText = "Lịch sử đã bán";
    }
}
</script>
</body>
</html>
