<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor Dashboard | VeriGlow Blockchain</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .filter-btn.active { background: white; color: #0ea5e9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="min-h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen z-50">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200 bg-sky-600">
                    <i class="fa-solid fa-truck-fast text-white text-lg"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" id="side-list" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all hover:bg-slate-50 text-slate-600 font-semibold">
                <i class="fa-solid fa-boxes-stacked text-lg"></i> <span>Quản lý kho hàng</span>
            </button>
            <button onclick="showTab('transfer-ownership')" id="side-transfer" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all hover:bg-slate-50 text-slate-600 font-semibold">
                <i class="fa-solid fa-arrow-right-arrow-left text-lg"></i> <span>Xuất kho bàn giao</span>
            </button>
        </nav>

        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100">
                <div id="accountDisplay" class="text-[10px] font-mono text-slate-400 truncate">Đang kết nối ví...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <div>
                <h2 id="pageTitle" class="text-2xl font-extrabold text-slate-800">Quản lý kho hàng</h2>
                <p class="text-slate-400 text-xs">Theo dõi chuỗi cung ứng Blockchain</p>
            </div>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50">
                <i class="fa-solid fa-arrows-rotate text-sky-500"></i> Làm mới
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <div id="list-products" class="tab-content active">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                    <div class="flex p-1.5 bg-slate-200/60 rounded-[1.25rem] gap-1">
                        <button onclick="filterProducts('owned')" id="btnFilterOwned" class="filter-btn active px-8 py-3 rounded-[1rem] text-xs font-black transition-all">SẢN PHẨM TRONG KHO</button>
                        <button onclick="filterProducts('transferred')" id="btnFilterTransferred" class="filter-btn px-8 py-3 rounded-[1rem] text-xs font-black transition-all text-slate-500">LỊCH SỬ ĐÃ XUẤT</button>
                    </div>

                    <div class="flex gap-4">
                        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 flex items-center gap-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Hiện có</span>
                            <span id="countOwned" class="text-2xl font-black text-slate-800">0</span>
                        </div>
                        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 flex items-center gap-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Đã giao</span>
                            <span id="countTransferred" class="text-2xl font-black text-slate-800">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Sản phẩm & ID</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Chi tiết lô hàng</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Trạng thái</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto mt-10">
                <div class="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl">
                    <h3 class="text-3xl font-black text-slate-800 mb-6">Xác nhận xuất kho</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-black text-slate-400 uppercase mb-2">ID Sản phẩm</label>
                            <input id="transferId" type="number" class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-bold text-xl outline-none focus:border-sky-500">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-400 uppercase mb-2">Địa chỉ ví người nhận</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm outline-none focus:border-sky-500">
                        </div>
                        <button id="btnTransfer" onclick="transferOwnership()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-black py-5 rounded-xl transition-all shadow-lg active:scale-95">KÝ XÁC NHẬN & BÀN GIAO</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"inputs": [{"internalType": "uint256","name": "_id","type": "uint256"},{"internalType": "address","name": "_newOwner","type": "address"}],"name": "transferOwnership","outputs": [],"stateMutability": "nonpayable","type": "function"},
    {"inputs": [],"name": "productCount","outputs": [{"internalType": "uint256","name": "","type": "uint256"}],"stateMutability": "view","type": "function"},
    {"inputs": [{"internalType": "uint256","name": "_id","type": "uint256"}],"name": "verifyProduct","outputs": [{"internalType": "string","name": "name","type": "string"},{"internalType": "string","name": "batchID","type": "string"},{"internalType": "uint256","name": "manufactureDate","type": "uint256"},{"internalType": "string","name": "origin","type": "string"},{"internalType": "bool","name": "isAuthentic","type": "bool"},{"internalType": "string[]","name": "history","type": "string[]"},{"internalType": "address","name": "owner","type": "address"}],"stateMutability": "view","type": "function"}
];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'owned';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    }
});

async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        let ownedCount = 0;
        let transferredCount = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const currentOwner = p.owner.toLowerCase();
            const myWallet = account.toLowerCase();
            
            // LOGIC SỬA ĐỔI TẠI ĐÂY:
            // Lọc qua mảng history để xem ví của bạn có nằm trong danh sách chủ sở hữu cũ không
            const wasInHistory = p.history.map(h => h.toLowerCase()).includes(myWallet);

            if (currentOwner === myWallet) {
                ownedCount++;
                allProducts.push({...p, id: i, type: 'owned'});
            } else if (wasInHistory) {
                // Nếu không còn là chủ hiện tại NHƯNG từng có tên trong lịch sử
                transferredCount++;
                allProducts.push({...p, id: i, type: 'transferred'});
            }
        }

        document.getElementById('countOwned').innerText = ownedCount;
        document.getElementById('countTransferred').innerText = transferredCount;
        renderTable();
    } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500 font-bold">Lỗi tải dữ liệu Blockchain</td></tr>';
    }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    const filtered = allProducts.filter(p => p.type === currentFilter);
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-slate-400 italic">Trống</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(p => `
        <tr class="hover:bg-slate-50 transition-all">
            <td class="px-8 py-6 font-mono text-[10px] text-slate-400">#${String(p.id).padStart(5, '0')}</td>
            <td class="px-8 py-6">
                <div class="font-black text-slate-800">${p.name}</div>
                <div class="text-[10px] text-slate-400 uppercase">Sản phẩm chính hãng</div>
            </td>
            <td class="px-8 py-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full ${p.type === 'owned' ? 'bg-sky-500' : 'bg-emerald-500'}"></span>
                    <span class="text-xs font-black text-slate-700">${p.batchID}</span>
                </div>
            </td>
            <td class="px-8 py-6">
                ${p.type === 'owned' 
                    ? `<button onclick="prepareTransfer(${p.id})" class="bg-sky-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Xuất kho ngay</button>`
                    : `<div class="text-emerald-600 font-black text-[10px] uppercase italic"><i class="fa-solid fa-check"></i> Đã bàn giao</div>`
                }
            </td>
        </tr>
    `).join('');
}

function filterProducts(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'text-slate-500'));
    if(type === 'owned') {
        document.getElementById('btnFilterOwned').classList.add('active');
        document.getElementById('btnFilterTransferred').classList.add('text-slate-500');
    } else {
        document.getElementById('btnFilterTransferred').classList.add('active');
        document.getElementById('btnFilterOwned').classList.add('text-slate-500');
    }
    renderTable();
}

function prepareTransfer(id) {
    document.getElementById('transferId').value = id;
    showTab('transfer-ownership');
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'list-products') document.getElementById('side-list').classList.add('active');
    else document.getElementById('side-transfer').classList.add('active');
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return alert("Vui lòng nhập đủ thông tin");
    
    const btn = document.getElementById("btnTransfer");
    btn.disabled = true;
    btn.innerText = "ĐANG XỬ LÝ...";

    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        alert("Bàn giao thành công!");
        await loadMyProducts();
        showTab('list-products');
    } catch (e) {
        alert("Lỗi: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "KÝ XÁC NHẬN & BÀN GIAO";
    }
}
</script>
</body>
</html>
