let web3;
let contract;
let account;

async function ensureSepoliaNetwork() {
  const sepoliaChainId = "0xaa36a7";
  const currentChainId = await window.ethereum.request({ method: "eth_chainId" });

  if (currentChainId !== sepoliaChainId) {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: sepoliaChainId }]
      });
    } catch (switchError) {
      // If Sepolia is missing in wallet, ask wallet to add it.
      if (switchError.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: sepoliaChainId,
            chainName: "Sepolia",
            nativeCurrency: { name: "Sepolia ETH", symbol: "SEP", decimals: 18 },
            rpcUrls: ["https://rpc.sepolia.org"],
            blockExplorerUrls: ["https://sepolia.etherscan.io"]
          }]
        });
      } else {
        throw switchError;
      }
    }
  }
}

window.addEventListener("load", async () => {
  if (window.ethereum) {
    await ensureSepoliaNetwork();
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    contract = new web3.eth.Contract(abi, contractAddress);
    console.log("Connected account:", account);
  } else {
    alert("Vui lòng cài MetaMask!");
  }
});

async function updateStatus() {
  let id = Number(document.getElementById("updateId").value);
  const newStatus = document.getElementById("newStatus").value;

  if (!newStatus) {
    alert("Vui lòng nhập trạng thái!");
    return;
  }

  try {
    await contract.methods.updateStatus(id, newStatus).send({ from: account });
    alert("Cập nhật trạng thái thành công!");
  } catch (err) {
    console.error(err);
    alert("Lỗi: " + (err.message || err));
  }
}

async function transferOwnership() {
  let id = Number(document.getElementById("transferId").value);
  const newOwner = document.getElementById("buyerAddress").value;

  if (!web3.utils.isAddress(newOwner)) {
    alert("Địa chỉ ví không hợp lệ!");
    return;
  }

  try {
    await contract.methods.transferOwnership(id, newOwner).send({ from: account });
    alert("Chuyển giao quyền sở hữu thành công!");
  } catch (err) {
    console.error(err);
    alert("Lỗi: " + (err.message || err));
  }
}
