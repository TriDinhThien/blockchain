<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriGlow | Quản lý phân phối</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .filter-btn.active { background: white; color: #0ea5e9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen z-50">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200 bg-sky-600">
                    <i class="fa-solid fa-truck-fast text-white text-lg"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" id="side-list" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all hover:bg-slate-50 text-slate-600 font-semibold">
                <i class="fa-solid fa-boxes-stacked text-lg"></i> <span>Quản lý kho hàng</span>
            </button>
            <button onclick="showTab('transfer-ownership')" id="side-transfer" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all hover:bg-slate-50 text-slate-600 font-semibold">
                <i class="fa-solid fa-arrow-right-arrow-left text-lg"></i> <span>Xuất kho bàn giao</span>
            </button>
        </nav>
        <div class="p-6 mt-auto border-t border-slate-100">
            <div id="accountDisplay" class="text-[10px] font-mono text-slate-400 truncate bg-slate-50 p-3 rounded-xl border border-slate-100">Đang kết nối ví...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <div>
                <h2 id="pageTitle" class="text-2xl font-extrabold text-slate-800">Quản lý kho hàng</h2>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest">Blockchain Inventory System</p>
            </div>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50 active:scale-95 transition-all">
                <i class="fa-solid fa-arrows-rotate text-sky-500"></i> Làm mới
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 lg:p-12">
            <div id="list-products" class="tab-content active">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
                    <div class="flex p-1.5 bg-slate-200/60 rounded-[1.25rem] gap-1">
                        <button onclick="filterProducts('owned')" id="btnFilterOwned" class="filter-btn active px-8 py-3 rounded-[1rem] text-xs font-black transition-all">SẢN PHẨM TRONG KHO</button>
                        <button onclick="filterProducts('transferred')" id="btnFilterTransferred" class="filter-btn px-8 py-3 rounded-[1rem] text-xs font-black transition-all text-slate-500">LỊCH SỬ ĐÃ XUẤT</button>
                    </div>
                    <div class="flex gap-4">
                        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 flex items-center gap-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Hiện có</span>
                            <span id="countOwned" class="text-2xl font-black text-slate-800">0</span>
                        </div>
                        <div class="bg-white px-6 py-4 rounded-2xl border border-slate-200 flex items-center gap-4">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Đã giao</span>
                            <span id="countTransferred" class="text-2xl font-black text-slate-800">0</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/80 border-b border-slate-100">
                            <tr>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Sản phẩm & ID</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Chi tiết lô hàng</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Trạng thái</th>
                                <th class="px-8 py-6 text-[11px] font-black text-slate-400 uppercase">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-12 rounded-[3rem] border border-slate-200 shadow-2xl">
                    <h3 class="text-3xl font-black text-slate-800 mb-2">Xác nhận xuất kho</h3>
                    <p class="text-slate-400 mb-8 font-medium">Lưu ý: Hành động chuyển quyền sở hữu không thể hoàn tác.</p>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-3 ml-2 tracking-widest">ID Sản phẩm</label>
                            <input id="transferId" type="number" class="w-full px-8 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-sky-100 focus:border-sky-500 font-bold text-xl transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-slate-400 uppercase mb-3 ml-2 tracking-widest">Địa chỉ ví người nhận</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full px-8 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-sky-100 focus:border-sky-500 font-mono text-sm transition-all">
                        </div>
                        <button id="btnTransfer" onclick="transferOwnership()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-black transition-all active:scale-95">XÁC NHẬN GIAO DỊCH</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":false,"internalType":"address","name":"newOwner","type":"address"}],"name":"OwnershipTransferred","type":"event"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'owned';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        try {
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            account = accounts[0].toLowerCase();
            document.getElementById('accountDisplay').innerText = account;
            contract = new web3.eth.Contract(abi, contractAddress);
            loadMyProducts();
        } catch (e) {
            console.error("User denied account access");
        }
    } else {
        alert("Vui lòng cài đặt MetaMask!");
    }
});

async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-32 text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-slate-400 font-bold animate-pulse">ĐANG TRUY VẤN DỮ LIỆU BLOCKCHAIN...</p></td></tr>';

    try {
        // Sửa lỗi BigInt cho productCount
        const totalCountRaw = await contract.methods.productCount().call();
        const totalCount = Number(totalCountRaw);
        
        allProducts = [];
        let ownedCount = 0;
        
        // Sửa lỗi RPC & BigInt: Quét block range an toàn
        const latestBlock = BigInt(await web3.eth.getBlockNumber());
        const range = 5000n; // Chỉ quét 5000 block gần nhất để tránh overload RPC
        let fromBlockBig = latestBlock - range;
        if (fromBlockBig < 0n) fromBlockBig = 0n;

        // Lấy sự kiện chuyển giao
        const myTransfers = await contract.getPastEvents('OwnershipTransferred', {
            fromBlock: fromBlockBig,
            toBlock: 'latest'
        });

        const transferredIds = new Set();
        
        // Kiểm tra xem bạn có phải người gửi giao dịch không
        await Promise.all(myTransfers.map(async (event) => {
            try {
                const tx = await web3.eth.getTransaction(event.transactionHash);
                if (tx && tx.from.toLowerCase() === account) {
                    transferredIds.add(Number(event.returnValues.id));
                }
            } catch (err) { console.warn("Lỗi Tx:", err); }
        }));

        // Duyệt sản phẩm
        for (let i = 1; i <= totalCount; i++) {
            try {
                const p = await contract.methods.verifyProduct(i).call();
                const currentOwner = p.owner.toLowerCase();

                if (currentOwner === account) {
                    ownedCount++;
                    allProducts.push({...p, id: i, type: 'owned'});
                } else if (transferredIds.has(i)) {
                    allProducts.push({...p, id: i, type: 'transferred'});
                }
            } catch (err) { console.warn("Product lỗi ID:", i); }
        }

        document.getElementById('countOwned').innerText = ownedCount;
        document.getElementById('countTransferred').innerText = transferredIds.size;
        renderTable();

    } catch (e) {
        console.error("Lỗi chính:", e);
        tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-red-500 font-bold">Lỗi: ${e.message}</td></tr>`;
    }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    const filtered = allProducts.filter(p => p.type === currentFilter);
    
    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="py-32 text-center text-slate-400 italic font-medium">Không tìm thấy sản phẩm nào trong mục này.</td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map(p => `
        <tr class="hover:bg-slate-50/80 transition-all">
            <td class="px-8 py-8">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg bg-sky-50 flex items-center justify-center text-sky-600 font-mono text-xs font-bold border border-sky-100">#${p.id}</div>
                    <div>
                        <div class="font-bold text-slate-800 text-base">${p.name}</div>
                        <div class="text-[9px] text-slate-400 font-black uppercase tracking-[0.2em]">Authentic Product</div>
                    </div>
                </div>
            </td>
            <td class="px-8 py-8">
                <div class="text-xs font-bold text-slate-700 mb-1">${p.batchID}</div>
                <div class="text-[10px] text-slate-400 flex items-center gap-1"><i class="fa-solid fa-location-dot text-sky-400"></i> ${p.origin}</div>
            </td>
            <td class="px-8 py-8">
                <span class="px-3 py-1.5 rounded-lg text-[9px] font-black tracking-widest ${p.type === 'owned' ? 'bg-sky-100 text-sky-600' : 'bg-emerald-100 text-emerald-600'} uppercase">
                    ${p.type === 'owned' ? 'Trong kho' : 'Đã xuất kho'}
                </span>
            </td>
            <td class="px-8 py-8">
                ${p.type === 'owned' 
                    ? `<button onclick="prepareTransfer(${p.id})" class="px-5 py-2.5 bg-slate-900 text-white text-[10px] font-black rounded-xl hover:bg-sky-600 transition-all shadow-md active:scale-95 uppercase tracking-tighter">Xuất kho</button>`
                    : `<div class="text-[9px] font-mono text-slate-400 bg-slate-50 p-2 rounded-lg border border-slate-100 truncate w-40">To: ${p.owner}</div>`
                }
            </td>
        </tr>
    `).join('');
}

function filterProducts(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'text-slate-500'));
    if(type === 'owned') {
        document.getElementById('btnFilterOwned').classList.add('active');
        document.getElementById('btnFilterTransferred').classList.add('text-slate-500');
    } else {
        document.getElementById('btnFilterTransferred').classList.add('active');
        document.getElementById('btnFilterOwned').classList.add('text-slate-500');
    }
    renderTable();
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.getElementById(tabId === 'list-products' ? 'side-list' : 'side-transfer').classList.add('active');
}

function prepareTransfer(id) {
    document.getElementById('transferId').value = id;
    showTab('transfer-ownership');
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return alert("Vui lòng điền đủ thông tin!");

    const btn = document.getElementById("btnTransfer");
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> ĐANG XỬ LÝ...';

    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        alert("Thành công! Sản phẩm đã được bàn giao.");
        await loadMyProducts();
        showTab('list-products');
    } catch (e) {
        alert("Lỗi: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "XÁC NHẬN GIAO DỊCH";
    }
}
</script>
</body>
</html>
