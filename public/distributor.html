<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriGlow Distributor • Ecommerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
        .modal {
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-sky-500 to-violet-500 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-shield-heart text-white text-2xl"></i>
            </div>
            <div>
                <span class="text-2xl font-bold tracking-tighter">VeriGlow</span>
                <span class="text-xs text-zinc-500 block -mt-1">DISTRIBUTOR</span>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <button onclick="loadMyProducts()" class="flex items-center gap-2 text-sm font-medium hover:text-sky-400 transition-colors">
                <i class="fa-solid fa-rotate"></i> Làm mới
            </button>
            <div class="flex items-center gap-3 bg-zinc-800 rounded-3xl px-5 py-2 text-sm">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span id="accountDisplay" class="font-mono text-xs text-emerald-400">0x...</span>
            </div>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex gap-2 mb-10 border-b border-zinc-800 pb-1">
        <button onclick="switchTab(0)" id="tab0" class="tab-btn px-8 py-3 rounded-3xl font-semibold text-lg transition-all bg-zinc-800 text-white">📦 Sản phẩm của bạn</button>
        <button onclick="switchTab(1)" id="tab1" class="tab-btn px-8 py-3 rounded-3xl font-semibold text-lg transition-all">📤 Lịch sử chuyển giao</button>
    </div>

    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>

    <div id="emptyState" class="hidden text-center py-20">
        <i class="fa-solid fa-box-open text-6xl text-zinc-700 mb-6"></i>
        <p class="text-zinc-400 text-xl">Chưa có sản phẩm nào</p>
    </div>
</div>

<!-- TRANSFER MODAL -->
<div id="transferModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[999]">
    <div class="modal bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">Chuyển quyền sở hữu</h3>
            <button onclick="closeModal()" class="text-zinc-400 hover:text-white text-3xl leading-none">×</button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">ID sản phẩm</label>
                <input id="modalProductId" type="number" readonly
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-zinc-400 mb-2">Địa chỉ ví khách hàng</label>
                <input id="modalBuyerAddress" type="text" placeholder="0x..." 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 font-mono focus:outline-none focus:border-sky-500">
            </div>
        </div>
        <div class="mt-8 flex gap-3">
            <button onclick="closeModal()" class="flex-1 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">Hủy</button>
            <button onclick="confirmTransfer()" class="flex-1 py-4 bg-gradient-to-r from-sky-500 to-violet-500 hover:brightness-110 rounded-2xl font-semibold">XÁC NHẬN CHUYỂN GIAO</button>
        </div>
    </div>
</div>

<script>
// ==================== CONTRACT CONFIG ====================
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    { "inputs": [], "name": "productCount", "outputs": [{"type": "uint256"}], "stateMutability": "view", "type": "function" },
    { "inputs": [{"type": "uint256","name": "_id"}], "name": "verifyProduct", "outputs": [
        {"name": "name","type": "string"},{"name": "batchID","type": "string"},{"name": "manufactureDate","type": "uint256"},
        {"name": "origin","type": "string"},{"name": "isAuthentic","type": "bool"},{"name": "history","type": "string[]"},
        {"name": "owner","type": "address"},{"name": "ingredients","type": "string[]"},{"name": "productImageUrl","type": "string"},
        {"name": "certificationUrl","type": "string"}
    ], "stateMutability": "view", "type": "function" },
    { "inputs": [{"type": "uint256"},{"type": "address"}], "name": "transferOwnership", "outputs": [], "stateMutability": "nonpayable", "type": "function" }
];

let web3, contract, account;
let allProducts = [];
const SOLD_STORAGE_PREFIX = 'veriglow_distributor_sold_';
let currentTab = 0;

// ==================== INIT ====================
window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("Vui lòng cài MetaMask!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0].toLowerCase();
    document.getElementById('accountDisplay').innerText = account.slice(0,6) + "..." + account.slice(-4);
    contract = new web3.eth.Contract(abi, contractAddress);
    loadMyProducts();
});

// ==================== TAB ====================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('bg-zinc-800', i === tab);
        btn.classList.toggle('text-white', i === tab);
    });
    renderProducts();
}

// ==================== LOAD PRODUCTS ====================
async function loadMyProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = `<div class="col-span-full flex justify-center py-20"><i class="fa-solid fa-spinner fa-spin text-4xl text-sky-500"></i></div>`;

    try {
        const count = Number(await contract.methods.productCount().call());
        const soldIds = loadSoldIdsFromStorage();
        allProducts = [];

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const owner = (p.owner || p[6] || '').toLowerCase();

            if (owner === account) {
                allProducts.push({ id: i, data: p, type: 'owned' });
            } else if (soldIds.has(i)) {
                allProducts.push({ id: i, data: p, type: 'transferred' });
            }
        }
        renderProducts();
    } catch (e) {
        console.error(e);
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">Lỗi kết nối Blockchain</div>`;
    }
}

// ==================== RENDER (ĐÃ SỬA REPLACE) ====================
function renderProducts() {
    const grid = document.getElementById('productGrid');
    const filtered = currentTab === 0 
        ? allProducts.filter(p => p.type === 'owned')
        : allProducts.filter(p => p.type === 'transferred');

    document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);

    let html = '';
    filtered.forEach(item => {
        const p = item.data;
        const imgUrl = (p.productImageUrl || '').replace('ipfs://', '');
        const imageSrc = imgUrl ? `https://ipfs.io/ipfs/${imgUrl}` : `https://picsum.photos/400/400?random=${item.id}`;

        html += `
            <div class="product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                <div class="relative">
                    <img src="${imageSrc}" class="w-full h-64 object-cover" alt="${p.name}">
                    <div class="absolute top-4 right-4 px-4 py-1 bg-black/70 text-xs font-bold rounded-2xl">#${String(item.id).padStart(3,'0')}</div>
                </div>
                <div class="p-6">
                    <div class="font-bold text-xl line-clamp-1">${p.name}</div>
                    <div class="text-zinc-400 text-sm mt-1">${p.batchID} • ${p.origin}</div>
                    <div class="mt-4 text-xs text-emerald-400 flex items-center gap-2">
                        <i class="fa-solid fa-calendar"></i>
                        ${new Date(Number(p.manufactureDate) * 1000).toLocaleDateString('vi-VN')}
                    </div>
                    ${item.type === 'owned' ? `
                    <button onclick="openTransferModal(${item.id})" 
                            class="mt-6 w-full bg-gradient-to-r from-sky-500 to-violet-500 hover:brightness-110 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i>
                        CHUYỂN QUYỀN CHO KHÁCH
                    </button>` : `
                    <div class="mt-6 text-center text-xs text-zinc-500 font-medium">ĐÃ CHUYỂN GIAO</div>`}
                </div>
            </div>`;
    });
    grid.innerHTML = html || '';
}

// ==================== MODAL & TRANSFER ====================
let currentTransferId = null;

function openTransferModal(id) {
    currentTransferId = id;
    document.getElementById('modalProductId').value = id;
    document.getElementById('transferModal').classList.remove('hidden');
    document.getElementById('modalBuyerAddress').focus();
}

function closeModal() {
    document.getElementById('transferModal').classList.add('hidden');
}

async function confirmTransfer() {
    const id = Number(currentTransferId);
    const addrRaw = document.getElementById('modalBuyerAddress').value.trim();

    if (!id || !addrRaw) return alert("Vui lòng nhập đầy đủ ID và địa chỉ ví!");
    
    let addr;
    try {
        addr = web3.utils.toChecksumAddress(addrRaw);
    } catch {
        return alert("Địa chỉ ví không hợp lệ!");
    }

    try {
        await contract.methods.transferOwnership(id, addr).send({ from: account });
        rememberSoldId(id);
        alert("✅ Chuyển quyền sở hữu thành công!");
        closeModal();
        loadMyProducts();
    } catch (e) {
        alert("Lỗi chuyển giao: " + (e.message || e));
    }
}

// ==================== SOLD STORAGE ====================
function getSoldStorageKey() { return `${SOLD_STORAGE_PREFIX}${account}`; }
function loadSoldIdsFromStorage() {
    try {
        const raw = localStorage.getItem(getSoldStorageKey());
        return raw ? new Set(JSON.parse(raw).map(Number).filter(n => n > 0)) : new Set();
    } catch (_) { return new Set(); }
}
function saveSoldIdsToStorage(set) {
    try { localStorage.setItem(getSoldStorageKey(), JSON.stringify(Array.from(set))); } catch (_) {}
}
function rememberSoldId(id) {
    const num = Number(id);
    if (!num || num <= 0) return;
    const stored = loadSoldIdsFromStorage();
    stored.add(num);
    saveSoldIdsToStorage(stored);
}
</script>
</body>
</html>
