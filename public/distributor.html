<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor | VeriGlow Chain</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7ff; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar-item.active { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        #sideDrawer { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        #sideDrawer.open { transform: translateX(0); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>

<body class="min-h-screen flex text-slate-900 overflow-hidden">

    <div id="overlay" onclick="closeDrawer()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-[90] transition-opacity"></div>

    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-[-20px_0_50px_rgba(0,0,0,0.1)] translate-x-full flex flex-col">
        <div class="p-6 border-b flex items-center justify-between">
            <h3 class="font-extrabold text-xl">Chi tiết kiện hàng</h3>
            <button onclick="closeDrawer()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
                <i class="fa-solid fa-times text-slate-400"></i>
            </button>
        </div>
        <div id="drawerContent" class="flex-1 overflow-y-auto custom-scrollbar p-8 space-y-8"></div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen z-20">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i class="fa-solid fa-route text-white text-xl"></i>
                </div>
                <div>
                    <span class="block font-black text-xl tracking-tight text-indigo-950 leading-none">VeriGlow</span>
                    <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em]">Distributor</span>
                </div>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-3">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4 mb-2">Điều hướng</p>
            <button onclick="showTab('inventory')" class="sidebar-item active w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 group">
                <i class="fa-solid fa-layer-group text-lg"></i> <span>Kho hàng tổng</span>
            </button>
            <button onclick="showTab('transfer')" class="sidebar-item w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold text-slate-500 group">
                <i class="fa-solid fa-truck-ramp-box text-lg"></i> <span>Xuất kho đại lý</span>
            </button>
        </nav>

        <div class="p-6">
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-500/20 rounded-full blur-2xl group-hover:bg-indigo-500/40 transition-all"></div>
                <p class="text-[10px] font-bold text-indigo-300 uppercase mb-3">Ví quản trị viên</p>
                <div id="accountDisplay" class="text-[10px] font-mono break-all opacity-70 leading-relaxed">Đang kết nối...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-24 bg-white/70 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 shrink-0">
            <div>
                <h2 id="pageTitle" class="text-2xl font-black text-slate-800 tracking-tight">Kho hàng tổng</h2>
                <p class="text-xs text-slate-400 font-medium">Quản lý và theo dõi luồng sản phẩm trên Blockchain</p>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadInventory()" class="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all shadow-sm">
                    <i class="fa-solid fa-sync-alt"></i> Làm mới
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-10">
            
            <div id="inventory" class="tab-content active space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                        <div class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-boxes-stacked"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase">Trong kho</p>
                            <h4 id="countInStock" class="text-2xl font-black text-slate-800">0</h4>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                        <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center text-xl shadow-inner">
                            <i class="fa-solid fa-paper-plane"></i>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-slate-400 uppercase">Đã xuất đi</p>
                            <h4 id="countOut" class="text-2xl font-black text-slate-800">0</h4>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden">
                    <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                        <div class="flex gap-2 p-1.5 bg-white border border-slate-200 rounded-2xl">
                            <button onclick="filterTable('in-stock', this)" class="filter-btn active px-6 py-2.5 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white">HIỆN CÓ</button>
                            <button onclick="filterTable('out', this)" class="filter-btn px-6 py-2.5 rounded-xl text-xs font-black transition-all text-slate-400">LỊCH SỬ XUẤT</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="border-b border-slate-100">
                                    <th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Sản phẩm</th>
                                    <th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mã Lô</th>
                                    <th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Trạng thái</th>
                                    <th class="px-10 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="transfer" class="tab-content max-w-2xl mx-auto pt-4">
                <div class="bg-white p-12 rounded-[3rem] shadow-2xl border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-10 opacity-5">
                        <i class="fa-solid fa-shipping-fast text-9xl"></i>
                    </div>
                    
                    <h3 class="text-3xl font-black mb-2">Xuất kho đại lý</h3>
                    <p class="text-slate-400 text-sm mb-10 font-medium">Bàn giao quyền sở hữu sản phẩm cho các đối tác bán lẻ.</p>

                    <div class="space-y-8">
                        <div class="group">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">ID Sản phẩm (Dán từ kho)</label>
                            <div class="relative">
                                <i class="fa-solid fa-hashtag absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input id="transferId" type="number" placeholder="Ví dụ: 12" class="w-full pl-12 pr-6 py-5 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all font-bold text-lg">
                            </div>
                        </div>

                        <div class="group">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">Địa chỉ ví đối tác (MetaMask)</label>
                            <div class="relative">
                                <i class="fa-solid fa-wallet absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input id="newOwner" type="text" placeholder="0x..." class="w-full pl-12 pr-6 py-5 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono text-xs">
                            </div>
                        </div>

                        <button onclick="transferOwnership()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-6 rounded-2xl shadow-xl shadow-indigo-100 transition-all flex items-center justify-center gap-3 active:scale-95">
                            <i class="fa-solid fa-check-circle text-xl"></i> XÁC NHẬN BÀN GIAO
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script>

	{

		"outputs": [

		"type": "function"

];

let web3, contract, account;
let allProducts = [];
let currentFilter = 'in-stock';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadInventory();
    } else {
        alert("Cần cài đặt MetaMask để sử dụng!");
    }
});

async function loadInventory() {
    const tbody = document.getElementById('inventoryBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center"><div class="inline-block animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            allProducts.push({ id: i, ...p });
        }
        renderTable();
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-red-500 font-bold">Lỗi Blockchain: Kiểm tra lại mạng hoặc Contract.</td></tr>';
    }
}

function renderTable() {
    const tbody = document.getElementById('inventoryBody');
    const inStock = allProducts.filter(p => p.owner.toLowerCase() === account);
    const out = allProducts.filter(p => p.owner.toLowerCase() !== account);

    document.getElementById('countInStock').innerText = inStock.length;
    document.getElementById('countOut').innerText = out.length;

    const data = currentFilter === 'in-stock' ? inStock : out;

    tbody.innerHTML = data.map(p => `
        <tr class="hover:bg-slate-50 transition-all">
            <td class="px-10 py-7">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-100 flex-shrink-0 overflow-hidden border">
                        <img src="${p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://via.placeholder.com/100'}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <div class="font-extrabold text-slate-800 text-sm">#${p.id} - ${p.name}</div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase">${p.origin}</div>
                    </div>
                </div>
            </td>
            <td class="px-10 py-7 text-xs font-bold text-slate-600">${p.batchID}</td>
            <td class="px-10 py-7">
                <span class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider ${currentFilter === 'in-stock' ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}">
                    ${currentFilter === 'in-stock' ? 'Sẵn sàng' : 'Đã xuất'}
                </span>
            </td>
            <td class="px-10 py-7 text-right">
                <button onclick="openDrawer(${p.id})" class="p-3 bg-white border border-slate-200 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-100 transition-all">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </td>
        </tr>
    `).join('') || `<tr><td colspan="4" class="py-20 text-center text-slate-300 italic">Danh sách đang trống</td></tr>`;
}

async function openDrawer(id) {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;

    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('sideDrawer').classList.add('open');
    
    document.getElementById('drawerContent').innerHTML = `
        <div class="space-y-6">
            <div class="aspect-square bg-slate-100 rounded-[2rem] overflow-hidden border-4 border-white shadow-lg">
                <img src="${p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/')}" class="w-full h-full object-cover">
            </div>
            <div class="space-y-1">
                <h4 class="text-2xl font-black text-slate-900 leading-tight">${p.name}</h4>
                <p class="text-indigo-600 font-bold text-sm">Batch: ${p.batchID}</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Ngày SX</p>
                    <p class="font-bold text-slate-700 text-xs">${new Date(Number(p.manufactureDate)*1000).toLocaleDateString()}</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Xác thực</p>
                    <p class="font-bold text-emerald-600 text-xs">Chính hãng</p>
                </div>
            </div>
            <div class="space-y-4">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Thành phần</p>
                <div class="flex flex-wrap gap-2">
                    ${p.ingredients.map(i => `<span class="px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-lg text-[10px] font-bold">${i}</span>`).join('')}
                </div>
            </div>
            <div class="pt-6 border-t border-slate-100 flex flex-col items-center gap-2">
                <div id="qrInDrawer" class="p-4 bg-white border border-slate-200 rounded-[2rem] shadow-inner"></div>
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Smart QR-Code</p>
            </div>
        </div>
    `;

    setTimeout(() => {
        QRCode.toCanvas(document.createElement('canvas'), `TRACER-ID-${id}`, { width: 140 }, (err, canvas) => {
            document.getElementById('qrInDrawer').appendChild(canvas);
        });
    }, 100);
}

function closeDrawer() {
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('sideDrawer').classList.remove('open');
}

function filterTable(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = "filter-btn px-6 py-2.5 rounded-xl text-xs font-black transition-all text-slate-400";
    });
    btn.className = "filter-btn active px-6 py-2.5 rounded-xl text-xs font-black transition-all bg-indigo-600 text-white";
    renderTable();
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    document.getElementById('pageTitle').innerText = tabId === 'inventory' ? 'Kho hàng tổng' : 'Xuất kho đại lý';
    const idx = tabId === 'inventory' ? 0 : 1;
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const receiver = document.getElementById("newOwner").value.trim();
    if (!id || !receiver) return alert("Điền đầy đủ thông tin xuất kho!");

    try {
        await contract.methods.transferOwnership(id, receiver).send({ from: account });
        alert("Bàn giao quyền thành công!");
        loadInventory();
        showTab('inventory');
    } catch (err) {
        alert("Lỗi: " + err.message);
    }
}
</script>
