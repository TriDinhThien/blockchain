<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        
        #sideDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        #sideDrawer.open { transform: translateX(0); }
        #overlay { transition: opacity 0.3s ease; display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 40; }
        #overlay.active { display: block; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <div id="overlay" onclick="closeDrawer()"></div>

    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl translate-x-full overflow-y-auto">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur-md">
            <h3 class="font-bold text-lg text-slate-800">Chi tiết sản phẩm</h3>
            <button onclick="closeDrawer()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i class="fa-solid fa-xmark text-slate-400 text-xl"></i>
            </button>
        </div>
        <div id="drawerContent" class="p-8 space-y-8"></div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg bg-indigo-600 text-white text-xl">
                    <i class="fa-solid fa-industry"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">Manufacturer Portal</p>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('create-product')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-plus-circle"></i> <span>Tạo sản phẩm mới</span>
            </button>
            <button onclick="showTab('list-products')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Quản lý lô hàng</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-arrow-right"></i> <span>Xuất kho bàn giao</span>
            </button>
        </nav>

        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4 italic text-[10px] font-mono text-slate-400 break-all" id="accountDisplay">Kết nối ví...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Tạo sản phẩm mới</h2>
            <div class="flex gap-3">
                <button onclick="loadMyProducts()" class="p-2.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-all text-slate-500">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
        </header>

        <div class="p-10">
            <div id="create-product" class="tab-content active max-w-4xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Tên sản phẩm</span>
                                <input id="prodName" type="text" placeholder="Ví dụ: Kem dưỡng VeriGlow 50ml" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Mã số lô (Batch ID)</span>
                                <input id="prodBatch" type="text" placeholder="VG-2024-001" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Ngày sản xuất</span>
                                <input id="prodDate" type="date" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Nguồn gốc (Quốc gia)</span>
                                <input id="prodOrigin" type="text" placeholder="Việt Nam / Hàn Quốc" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Thành phần (cách nhau bằng dấu phẩy)</span>
                                <textarea id="prodIngredients" placeholder="Nước, Glycerin, Vitamin C..." class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all h-32"></textarea>
                            </label>
                        </div>
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">URL Hình ảnh (IPFS/Web)</span>
                                <input id="prodImage" type="text" placeholder="https://..." class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">URL Chứng nhận an toàn</span>
                                <input id="prodCert" type="text" placeholder="https://..." class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Tên công ty sản xuất</span>
                                <input id="prodManufacturer" type="text" placeholder="Công ty Mỹ phẩm VeriGlow" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            <label class="block">
                                <span class="text-xs font-bold text-slate-400 uppercase ml-2">Địa chỉ nhà máy</span>
                                <input id="prodFactory" type="text" placeholder="Khu Công Nghệ Cao, Thủ Đức" class="w-full mt-1 p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            </label>
                            
                            <div class="pt-6">
                                <button onclick="createProduct()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center gap-3">
                                    <i class="fa-solid fa-cloud-arrow-up"></i> Đăng ký sản phẩm lên Blockchain
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="list-products" class="tab-content">
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">ID</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Sản phẩm</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Lô sản xuất</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Chủ sở hữu hiện tại</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-3 text-slate-800">
                        <i class="fa-solid fa-paper-plane text-indigo-500"></i> Xuất kho cho Distributor
                    </h3>
                    <div class="space-y-4">
                        <input id="transferId" type="number" placeholder="Nhập ID sản phẩm" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input id="newOwner" type="text" placeholder="Địa chỉ ví người nhận (0x...)" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none font-mono focus:ring-2 focus:ring-indigo-500">
                        <button onclick="transferOwnership()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all mt-4">Xác nhận chuyển giao</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
// --- CONFIG (Đồng bộ với Distributor) ---
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
	{
		"inputs": [
			{ "internalType": "string", "name": "_name", "type": "string" },
			{ "internalType": "string", "name": "_batchID", "type": "string" },
			{ "internalType": "string", "name": "_manufactureDate", "type": "string" },
			{ "internalType": "string", "name": "_origin", "type": "string" },
			{ "internalType": "string[]", "name": "_ingredients", "type": "string[]" },
			{ "internalType": "string", "name": "_productImageUrl", "type": "string" },
			{ "internalType": "string", "name": "_certificationUrl", "type": "string" },
			{ "internalType": "string", "name": "_manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "_factoryAddress", "type": "string" }
		],
		"name": "createProduct",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_id", "type": "uint256" },
			{ "internalType": "address", "name": "_newOwner", "type": "address" }
		],
		"name": "transferOwnership",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "productCount",
		"outputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"name": "products",
		"outputs": [
			{ "internalType": "string", "name": "name", "type": "string" },
			{ "internalType": "string", "name": "batchID", "type": "string" },
			{ "internalType": "string", "name": "manufactureDate", "type": "string" },
			{ "internalType": "string", "name": "origin", "type": "string" },
			{ "internalType": "bool", "name": "isAuthentic", "type": "bool" },
			{ "internalType": "address", "name": "owner", "type": "address" },
			{ "internalType": "string", "name": "productImageUrl", "type": "string" },
			{ "internalType": "string", "name": "certificationUrl", "type": "string" },
			{ "internalType": "string", "name": "manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "factoryAddress", "type": "string" }
		],
		"stateMutability": "view",
		"type": "function"
	}
];

let web3, contract, account;
let allProducts = [];

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    } else {
        alert("Vui lòng cài đặt MetaMask!");
    }
});

// --- CHỨC NĂNG TẠO SẢN PHẨM ---
async function createProduct() {
    const name = document.getElementById('prodName').value;
    const batch = document.getElementById('prodBatch').value;
    const date = document.getElementById('prodDate').value;
    const origin = document.getElementById('prodOrigin').value;
    const ingredients = document.getElementById('prodIngredients').value.split(',').map(s => s.trim());
    const image = document.getElementById('prodImage').value;
    const cert = document.getElementById('prodCert').value;
    const manufacturer = document.getElementById('prodManufacturer').value;
    const factory = document.getElementById('prodFactory').value;

    if (!name || !batch || !date) {
        alert("Vui lòng nhập các thông tin bắt buộc!");
        return;
    }

    try {
        await contract.methods.createProduct(
            name, batch, date, origin, ingredients, 
            image, cert, manufacturer, factory
        ).send({ from: account });
        
        alert("Sản phẩm đã được đúc (mint) thành công!");
        showTab('list-products');
        loadMyProducts();
    } catch (err) {
        alert("Lỗi khi tạo sản phẩm: " + err.message);
    }
}

// --- TẢI DANH SÁCH ---
async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            allProducts.push({ id: i, ...p });
        }
        renderTable();
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-16 text-center text-red-400 italic text-sm">Không thể tải dữ liệu Blockchain.</td></tr>';
    }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = allProducts.map(p => `
        <tr class="hover:bg-slate-50 transition-all cursor-pointer group" onclick="openDrawer(${p.id})">
            <td class="px-8 py-6 font-mono text-xs text-slate-400">#${p.id}</td>
            <td class="px-8 py-6">
                <div class="font-bold text-slate-800 group-hover:text-indigo-600 transition-colors">${p.name}</div>
                <div class="text-[10px] text-slate-400 uppercase font-bold">${p.origin}</div>
            </td>
            <td class="px-8 py-6 text-sm font-semibold text-slate-600">${p.batchID}</td>
            <td class="px-8 py-6">
                <div class="font-mono text-[10px] text-slate-500 break-all w-32 truncate">
                    ${p.owner.toLowerCase() === account ? '<span class="text-indigo-600 font-bold">Bạn (Manufacturer)</span>' : p.owner}
                </div>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4" class="px-8 py-16 text-center text-slate-400 font-medium">Chưa có sản phẩm nào được tạo.</td></tr>';
}

// --- CHUYỂN GIAO ---
async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const receiver = document.getElementById("newOwner").value.trim();

    if (!id || !receiver) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    try {
        await contract.methods.transferOwnership(id, receiver).send({ from: account });
        alert("Bàn giao thành công!");
        loadMyProducts();
    } catch (err) {
        alert("Lỗi: " + err.message);
    }
}

// --- UI HELPERS ---
function openDrawer(id) {
    const product = allProducts.find(p => p.id == id);
    if (!product) return;

    const content = document.getElementById('drawerContent');
    content.innerHTML = `
        <div class="space-y-6">
            <div class="aspect-square bg-slate-100 rounded-3xl overflow-hidden border border-slate-200 flex items-center justify-center">
                ${product.productImageUrl ? `<img src="${product.productImageUrl}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-image text-slate-300 text-6xl"></i>`}
            </div>
            <div>
                <h4 class="text-2xl font-black text-slate-900">${product.name}</h4>
                <p class="text-indigo-600 font-bold text-sm italic">ID Sản phẩm: ${id}</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Ngày sản xuất</p>
                    <p class="font-bold text-slate-700">${product.manufactureDate}</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Lô số</p>
                    <p class="font-bold text-slate-700">${product.batchID}</p>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Chủ sở hữu hiện tại</p>
                <p class="p-3 bg-slate-900 text-indigo-300 rounded-xl font-mono text-[9px] break-all">${product.owner}</p>
            </div>
            <div class="pt-6 flex flex-col items-center gap-2">
                <div id="drawerQR" class="p-3 bg-white border-2 border-dashed border-slate-200 rounded-2xl shadow-sm"></div>
                <p class="text-[10px] text-slate-400 font-medium tracking-widest uppercase">Mã truy xuất nguồn gốc</p>
            </div>
        </div>
    `;

    document.getElementById('sideDrawer').classList.add('open');
    document.getElementById('overlay').classList.add('active');
    
    setTimeout(() => {
        QRCode.toCanvas(document.createElement('canvas'), `VERIGLOW-PROD-${id}`, { width: 140 }, (err, canvas) => {
            document.getElementById('drawerQR').appendChild(canvas);
        });
    }, 100);
}

function closeDrawer() {
    document.getElementById('sideDrawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const titles = { 'create-product': 'Tạo sản phẩm mới', 'list-products': 'Quản lý lô hàng', 'transfer-ownership': 'Xuất kho bàn giao' };
    document.getElementById('pageTitle').innerText = titles[tabId];
    
    const items = document.querySelectorAll('.sidebar-item');
    if(tabId === 'create-product') items[0].classList.add('active');
    if(tabId === 'list-products') items[1].classList.add('active');
    if(tabId === 'transfer-ownership') items[2].classList.add('active');
}
</script>
</body>
</html>
