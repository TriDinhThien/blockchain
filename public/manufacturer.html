<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .filter-btn.active { background-color: #0ea5e9; color: white; border-color: #0ea5e9; }
        #productDetailSidebar { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        
        /* Modal Style for Certificate */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-sky-600 text-white shadow-lg shadow-sky-200">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-circle-plus"></i> <span>Đăng ký sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Chuyển giao quyền</span>
            </button>
        </nav>
        <div class="p-6 mt-auto border-t border-slate-100">
            <div id="accountDisplay" class="text-[10px] font-mono text-slate-500 truncate bg-slate-50 p-3 rounded-lg border border-slate-200 italic">Connecting...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Kho sản phẩm</h2>
            <button onclick="loadProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50">
                <i class="fa-solid fa-arrows-rotate text-sky-500"></i> Làm mới
            </button>
        </header>

        <div class="p-10 overflow-y-auto">
            <div id="list-products" class="tab-content active">
                <div class="mb-8 flex items-center gap-4">
                    <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn px-6 py-2.5 rounded-full text-sm font-semibold border border-slate-200 active">Trong kho</button>
                    <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-6 py-2.5 rounded-full text-sm font-semibold border border-slate-200">Đã đi</button>
                </div>
                <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    </div>
            </div>

            <div id="create-product" class="tab-content max-w-5xl mx-auto">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-2xl overflow-hidden p-10">
                    <h3 class="text-xl font-bold mb-6">Thông tin sản xuất</h3>
                    <div class="grid grid-cols-2 gap-6 mb-6">
                        <input id="manufacturerName" type="text" placeholder="Tên công ty" class="p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-sky-500">
                        <input id="factoryAddress" type="text" placeholder="Địa chỉ nhà máy" class="p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-sky-500">
                        <input id="name" type="text" placeholder="Tên sản phẩm" class="p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-sky-500">
                        <input id="batchID" type="text" placeholder="Mã lô" class="p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-sky-500">
                        <input id="manufactureDate" type="date" class="p-4 bg-slate-50 border rounded-xl outline-none">
                        <input id="origin" type="text" placeholder="Quốc gia" class="p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-sky-500">
                    </div>
                    <textarea id="ingredients" placeholder="Thành phần (cách nhau bởi dấu phẩy)" class="w-full p-4 bg-slate-50 border rounded-xl mb-6"></textarea>
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div><label class="block text-xs font-bold mb-2 uppercase">Ảnh sản phẩm</label><input id="productImage" type="file" class="text-xs"></div>
                        <div><label class="block text-xs font-bold mb-2 uppercase">Giấy chứng nhận</label><input id="certification" type="file" class="text-xs"></div>
                    </div>
                    <button id="btnCreate" onclick="createProduct()" class="w-full py-4 bg-sky-600 text-white font-bold rounded-xl hover:bg-sky-700 transition-all">Tạo sản phẩm</button>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
                    <h3 class="text-xl font-bold mb-6"><i class="fa-solid fa-truck-moving text-orange-500"></i> Bàn giao</h3>
                    <input id="transferId" type="number" placeholder="ID sản phẩm" class="w-full p-4 bg-slate-50 border rounded-xl mb-4">
                    <input id="newOwner" type="text" placeholder="Địa chỉ ví người nhận (0x...)" class="w-full p-4 bg-slate-50 border rounded-xl mb-6 font-mono text-sm">
                    <button onclick="transferOwnership()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl">Xác nhận</button>
                </div>
            </div>
        </div>
    </main>

    <div id="productDetailSidebar" class="fixed inset-y-0 right-0 w-[450px] bg-white shadow-2xl translate-x-full flex flex-col z-50 border-l border-slate-200">
        <div class="px-6 py-6 border-b flex items-center justify-between bg-slate-50">
            <h3 class="font-bold text-lg text-slate-800">Thông tin chi tiết</h3>
            <button onclick="closeSidebar()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        <div id="sidebarContent" class="flex-1 overflow-y-auto p-8 space-y-8"></div>
    </div>

    <div id="certModal" class="modal-overlay" onclick="this.classList.remove('active')">
        <img id="modalCertImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300">
    </div>

<script>
// Cấu hình Blockchain
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, currentFilter = 'inStock';

window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("Cài MetaMask!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    document.getElementById('accountDisplay').innerText = account;
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

// Mock Upload IPFS (Vì không có API thực tế ở đây, bạn giữ nguyên hàm fetch của bạn nhé)
async function uploadFileToIPFS(file) {
    if (!file) return "";
    return "ipfs://QmPlaceholder"; // Thay bằng logic upload thật
}

// Hàm tải sản phẩm và render dạng THẺ (Cards)
async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full text-center py-20"><div class="loading-spinner mx-auto"></div></div>';
    
    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            const isOwned = p.owner.toLowerCase() === account.toLowerCase();
            
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;

            const img = p.productImageUrl ? p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : 'https://placehold.co/400x300?text=No+Image';
            const cert = p.certificationUrl ? p.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';

            html += `
            <div class="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all group">
                <div class="relative h-64 overflow-hidden">
                    <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">ID: #${i}</div>
                </div>
                <div class="p-6">
                    <div class="text-[10px] text-sky-600 font-bold uppercase mb-1 tracking-wider">${p.manufacturerName}</div>
                    <h4 class="font-bold text-lg text-slate-800 mb-4 line-clamp-1">${p.name}</h4>
                    
                    <div class="flex items-center justify-between gap-2">
                        <button onclick="showProductDetail(${i})" class="flex-1 bg-slate-900 text-white text-xs font-bold py-3 rounded-2xl hover:bg-sky-600 transition-all">Chi tiết</button>
                        ${cert ? `<button onclick="viewCertificate('${cert}')" class="w-12 h-12 flex items-center justify-center bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm" title="Xem chứng nhận"><i class="fa-solid fa-file-shield"></i></button>` : ''}
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html || '<div class="col-span-full text-center py-20 text-slate-400">Trống</div>';
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center text-red-500">Lỗi kết nối</div>';
    }
}

// Hiển thị chi tiết và HÀNH TRÌNH
async function showProductDetail(id) {
    const sidebar = document.getElementById('productDetailSidebar');
    const content = document.getElementById('sidebarContent');
    sidebar.classList.remove('translate-x-full');
    content.innerHTML = '<div class="text-center py-20"><div class="loading-spinner mx-auto"></div></div>';

    try {
        const v = await contract.methods.verifyProduct(id).call();
        const p = await contract.methods.products(id).call();
        const cert = p.certificationUrl ? p.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/') : '';
        
        // v.visibleHistory là mảng các địa chỉ đã từng sở hữu (nếu smart contract lưu trữ)
        const history = v.visibleHistory || [v.owner]; 

        content.innerHTML = `
            <div class="space-y-4">
                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                    <div class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Thông tin cơ bản</div>
                    <div class="grid grid-cols-2 gap-y-4 text-sm">
                        <div><span class="text-slate-400 text-[11px] block uppercase">Mã lô</span><span class="font-semibold">${v.batchID}</span></div>
                        <div><span class="text-slate-400 text-[11px] block uppercase">Ngày SX</span><span class="font-semibold">${v.manufactureDate}</span></div>
                        <div><span class="text-slate-400 text-[11px] block uppercase">Xuất xứ</span><span class="font-semibold">${v.origin}</span></div>
                    </div>
                </div>

                <div class="bg-sky-50 p-6 rounded-[2rem] border border-sky-100">
                    <div class="text-[10px] font-bold text-sky-600 uppercase mb-4 tracking-widest">Đơn vị sản xuất</div>
                    <h5 class="font-bold text-slate-800">${v.manufacturerName}</h5>
                    <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i> ${v.factoryAddress}</p>
                </div>

                <div class="bg-amber-50 p-6 rounded-[2rem] border border-amber-100">
                    <div class="text-[10px] font-bold text-amber-600 uppercase mb-3 tracking-widest">Thành phần</div>
                    <div class="flex flex-wrap gap-2">
                        ${v.ingredients.map(i => `<span class="px-3 py-1 bg-white border border-amber-200 rounded-full text-xs text-amber-700 font-medium">${i}</span>`).join('')}
                    </div>
                </div>

                <div class="p-6">
                    <div class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Hành trình chuyển giao (${history.length})</div>
                    <div class="relative space-y-6 before:absolute before:left-3 before:top-2 before:bottom-2 before:w-0.5 before:bg-slate-100">
                        <div class="relative pl-10">
                            <div class="absolute left-0 top-1 w-6 h-6 bg-green-500 border-4 border-white rounded-full shadow-sm z-10"></div>
                            <div class="text-xs font-bold text-slate-800">Khởi tạo & Sản xuất</div>
                            <div class="text-[10px] text-slate-400 truncate font-mono">${history[0]}</div>
                        </div>
                        ${history.slice(1).map((addr, index) => `
                            <div class="relative pl-10">
                                <div class="absolute left-0 top-1 w-6 h-6 bg-sky-500 border-4 border-white rounded-full shadow-sm z-10"></div>
                                <div class="text-xs font-bold text-slate-800">Chuyển giao lần ${index + 1}</div>
                                <div class="text-[10px] text-slate-400 truncate font-mono">${addr}</div>
                            </div>
                        `).join('')}
                        <div class="relative pl-10 bg-sky-50 p-4 rounded-2xl border border-sky-100">
                            <div class="absolute left-0 top-5 w-6 h-6 bg-orange-500 border-4 border-white rounded-full shadow-sm z-10 animate-pulse"></div>
                            <div class="text-xs font-bold text-orange-600 uppercase tracking-tighter">Chủ sở hữu hiện tại</div>
                            <div class="text-[10px] text-slate-600 truncate font-mono mt-1">${v.owner}</div>
                        </div>
                    </div>
                </div>

                ${cert ? `
                <button onclick="viewCertificate('${cert}')" class="w-full py-4 border-2 border-dashed border-indigo-200 rounded-[2rem] text-indigo-600 font-bold text-sm hover:bg-indigo-50 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-contract"></i> Xem Giấy chứng nhận sản phẩm
                </button>` : ''}
            </div>
        `;
    } catch (e) {
        content.innerHTML = '<p class="text-red-500">Lỗi: ' + e.message + '</p>';
    }
}

// Xử lý xem chứng nhận qua Modal
function viewCertificate(url) {
    const modal = document.getElementById('certModal');
    const img = document.getElementById('modalCertImg');
    img.src = url;
    modal.classList.add('active');
}

// Các hàm bổ trợ
function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('pageTitle').innerText = document.querySelector(`[onclick="showTab('${id}')"] span`).innerText;
    document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
}

function setFilter(f) {
    currentFilter = f;
    document.getElementById('btnInStock').classList.toggle('active', f==='inStock');
    document.getElementById('btnTransferred').classList.toggle('active', f==='transferred');
    loadProducts();
}

function closeSidebar() { document.getElementById('productDetailSidebar').classList.add('translate-x-full'); }

async function createProduct() {
    const btn = document.getElementById('btnCreate');
    btn.disabled = true;
    btn.innerText = "Đang xử lý...";
    try {
        const data = [
            document.getElementById("name").value,
            document.getElementById("batchID").value,
            document.getElementById("manufactureDate").value,
            document.getElementById("origin").value,
            document.getElementById("ingredients").value.split(',').map(i=>i.trim()),
            await uploadFileToIPFS(document.getElementById("productImage").files[0]),
            await uploadFileToIPFS(document.getElementById("certification").files[0]),
            document.getElementById("manufacturerName").value,
            document.getElementById("factoryAddress").value
        ];
        await contract.methods.createProduct(...data).send({ from: account });
        alert("Thành công!");
        loadProducts();
        showTab('list-products');
    } catch (e) { alert(e.message); }
    btn.disabled = false;
    btn.innerText = "Tạo sản phẩm";
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const to = document.getElementById("newOwner").value;
    try {
        await contract.methods.transferOwnership(id, to).send({ from: account });
        alert("Đã chuyển giao!");
        loadProducts();
    } catch (e) { alert(e.message); }
}
</script>
</body>
</html>
