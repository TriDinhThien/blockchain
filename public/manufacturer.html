<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | VeriGlow Traceability</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        
        #sideDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 50; }
        #sideDrawer.open { transform: translateX(0); }
        #overlay { transition: opacity 0.3s ease; display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 40; }
        #overlay.active { display: block; }
        .filter-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">
    <div id="overlay" onclick="closeDrawer()"></div>

    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl translate-x-full overflow-y-auto">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur-md">
            <div>
                <h3 class="font-bold text-lg text-slate-800">Chi tiết sản phẩm</h3>
                <p class="text-[10px] text-sky-600 font-bold uppercase tracking-wider">Blockchain Verified</p>
            </div>
            <button onclick="closeDrawer()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i class="fa-solid fa-xmark text-slate-400 text-xl"></i>
            </button>
        </div>
        <div id="drawerContent" class="p-8 space-y-8"></div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg bg-sky-600 text-white text-xl">
                    <i class="fa-solid fa-flask-vial"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-plus-circle"></i> <span>Đăng ký mới</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Xuất kho</span>
            </button>
        </nav>
        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4 italic text-[10px] font-mono text-slate-400 break-all" id="accountDisplay">Kết nối ví...</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Kho sản phẩm</h2>
            <button onclick="loadMyProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50">
                <i class="fa-solid fa-arrows-rotate"></i> Đồng bộ
            </button>
        </header>

        <div class="p-10">
            <div id="list-products" class="tab-content active">
                <div class="flex items-center gap-2 mb-6 bg-white p-1.5 rounded-2xl border border-slate-200 w-fit">
                    <button onclick="filterProducts('all', this)" class="filter-btn active px-5 py-2 rounded-xl text-xs font-bold transition-all">Tất cả</button>
                    <button onclick="filterProducts('in-stock', this)" class="filter-btn px-5 py-2 rounded-xl text-xs font-bold transition-all">Trong kho</button>
                </div>
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">ID</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Sản phẩm</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Mã Lô</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="create-product" class="tab-content max-w-4xl mx-auto">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 p-12 shadow-sm space-y-8">
                    <div>
                        <h3 class="text-2xl font-bold text-slate-900">Đăng ký sản phẩm</h3>
                        <p class="text-slate-400 text-sm">Thông tin này sẽ được lưu vĩnh viễn trên Blockchain.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tên công ty</label>
                            <input id="mfgName" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Địa chỉ nhà máy</label>
                            <input id="mfgAddr" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tên mỹ phẩm</label>
                            <input id="pName" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Mã Batch/Lô</label>
                            <input id="pBatch" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Ngày sản xuất</label>
                            <input id="pDate" type="date" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nguồn gốc</label>
                            <input id="pOrigin" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Thành phần</label>
                        <textarea id="pIngredients" placeholder="Vitamin C, Aqua, Glycerin..." class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500 min-h-[100px]"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="p-6 border-2 border-dashed border-slate-100 rounded-3xl bg-slate-50/50">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">Ảnh sản phẩm</label>
                            <input id="fileImg" type="file" class="text-xs">
                        </div>
                        <div class="p-6 border-2 border-dashed border-slate-100 rounded-3xl bg-slate-50/50">
                            <label class="text-[10px] font-black text-slate-400 uppercase block mb-3">Giấy chứng nhận (PDF/Ảnh)</label>
                            <input id="fileCert" type="file" class="text-xs">
                        </div>
                    </div>
                    <button id="btnCreate" onclick="createProduct()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-shield-check"></i> XÁC THỰC VÀ ĐĂNG KÝ
                    </button>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-xl mx-auto">
                <div class="bg-white p-12 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-6">
                    <h3 class="text-2xl font-bold flex items-center gap-3">
                        <i class="fa-solid fa-truck-fast text-sky-500"></i> Xuất kho sản phẩm
                    </h3>
                    <div class="space-y-4">
                        <input id="tId" type="number" placeholder="ID sản phẩm" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none focus:ring-2 focus:ring-sky-500">
                        <input id="tAddr" type="text" placeholder="Địa chỉ ví người nhận (0x...)" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100 outline-none font-mono text-sm focus:ring-2 focus:ring-sky-500">
                        <button onclick="transferOwnership()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-5 rounded-xl transition-all">BẮT ĐẦU VẬN CHUYỂN</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<script>
// --- CONFIG (Giữ nguyên từ file cũ của bạn) ---
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
	{
		"inputs": [
			{ "internalType": "string", "name": "_name", "type": "string" },
			{ "internalType": "string", "name": "_batchID", "type": "string" },
			{ "internalType": "string", "name": "_manufactureDate", "type": "string" },
			{ "internalType": "string", "name": "_origin", "type": "string" },
			{ "internalType": "string[]", "name": "_ingredients", "type": "string[]" },
			{ "internalType": "string", "name": "_productImageUrl", "type": "string" },
			{ "internalType": "string", "name": "_certificationUrl", "type": "string" },
			{ "internalType": "string", "name": "_manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "_factoryAddress", "type": "string" }
		],
		"name": "createProduct",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{ "internalType": "uint256", "name": "_id", "type": "uint256" },
			{ "internalType": "address", "name": "_newOwner", "type": "address" }
		],
		"name": "transferOwnership",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "productCount",
		"outputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ],
		"name": "products",
		"outputs": [
			{ "internalType": "string", "name": "name", "type": "string" },
			{ "internalType": "string", "name": "batchID", "type": "string" },
			{ "internalType": "string", "name": "manufactureDate", "type": "string" },
			{ "internalType": "string", "name": "origin", "type": "string" },
			{ "internalType": "bool", "name": "isAuthentic", "type": "bool" },
			{ "internalType": "address", "name": "owner", "type": "address" },
			{ "internalType": "string", "name": "productImageUrl", "type": "string" },
			{ "internalType": "string", "name": "certificationUrl", "type": "string" },
			{ "internalType": "string", "name": "manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "factoryAddress", "type": "string" }
		],
		"stateMutability": "view",
		"type": "function"
	},
    {
		"inputs": [ { "internalType": "uint256", "name": "_id", "type": "uint256" } ],
		"name": "verifyProduct",
		"outputs": [
			{ "internalType": "string", "name": "name", "type": "string" },
			{ "internalType": "string", "name": "batchID", "type": "string" },
			{ "internalType": "string", "name": "manufactureDate", "type": "string" },
			{ "internalType": "string", "name": "origin", "type": "string" },
			{ "internalType": "address", "name": "owner", "type": "address" },
			{ "internalType": "string", "name": "manufacturerName", "type": "string" },
			{ "internalType": "string", "name": "factoryAddress", "type": "string" },
			{ "internalType": "string[]", "name": "visibleHistory", "type": "string[]" }
		],
		"stateMutability": "view",
		"type": "function"
	}
];

let web3, contract, account;
let allProducts = [];

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0].toLowerCase();
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    }
});

// --- HELPER: Xử lý link IPFS hiển thị ảnh ---
function formatIPFS(url) {
    if (!url) return "";
    // Nếu là link web bình thường
    if (url.startsWith('http')) return url;
    // Nếu là mã CID hoặc link ipfs://
    const cid = url.replace('ipfs://', '');
    return `https://gateway.pinata.cloud/ipfs/${cid}`;
}

// --- LOGIC: Tải lên IPFS ---
async function uploadToIPFS(file) {
    if (!file) return "";
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    if (!res.ok) throw new Error("Upload thất bại");
    const data = await res.json();
    return `ipfs://${data.IpfsHash}`;
}

// --- CORE: Tạo sản phẩm ---
async function createProduct() {
    const btn = document.getElementById('btnCreate');
    const originalText = btn.innerHTML;
    try {
        btn.disabled = true;
        btn.innerHTML = `<div class="loading-spinner mr-2"></div> Đang mã hóa dữ liệu...`;

        const imgUrl = await uploadToIPFS(document.getElementById('fileImg').files[0]);
        const certUrl = await uploadToIPFS(document.getElementById('fileCert').files[0]);

        btn.innerHTML = `<div class="loading-spinner mr-2"></div> Đang ghi lên Blockchain...`;

        await contract.methods.createProduct(
            document.getElementById('pName').value,
            document.getElementById('pBatch').value,
            document.getElementById('pDate').value,
            document.getElementById('pOrigin').value,
            document.getElementById('pIngredients').value.split(',').map(s => s.trim()),
            imgUrl, certUrl,
            document.getElementById('mfgName').value,
            document.getElementById('mfgAddr').value
        ).send({ from: account });

        alert("Đăng ký thành công!");
        loadMyProducts();
        showTab('list-products');
    } catch (e) {
        alert("Lỗi: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

// --- CORE: Tải danh sách ---
async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="px-8 py-10 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';
    try {
        const count = Number(await contract.methods.productCount().call());
        allProducts = [];
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            // Lấy theo Index [0..9] để đảm bảo dữ liệu không bị undefined
            allProducts.push({
                id: i,
                name: p[0],
                batchID: p[1],
                manufactureDate: p[2],
                origin: p[3],
                isAuthentic: p[4],
                owner: p[5].toLowerCase(),
                productImageUrl: p[6],
                certificationUrl: p[7],
                manufacturerName: p[8],
                factoryAddress: p[9]
            });
        }
        renderTable();
    } catch (e) { console.error(e); }
}

function renderTable() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = allProducts.map(p => `
        <tr class="hover:bg-slate-50 transition-all cursor-pointer group" onclick="openDrawer(${p.id})">
            <td class="px-8 py-6 font-mono text-[10px] text-slate-400">#${p.id}</td>
            <td class="px-8 py-6">
                <div class="font-bold text-slate-800">${p.name}</div>
                <div class="text-[9px] text-sky-600 font-black uppercase tracking-widest">${p.origin}</div>
            </td>
            <td class="px-8 py-6 text-xs font-bold text-slate-500">${p.batchID}</td>
            <td class="px-8 py-6">
                ${p.owner === account 
                    ? '<span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[9px] font-black uppercase border border-emerald-100">Trong kho</span>'
                    : '<span class="px-3 py-1 bg-slate-100 text-slate-400 rounded-full text-[9px] font-black uppercase border border-slate-200">Đã xuất</span>'}
            </td>
        </tr>
    `).join('') || '<tr><td colspan="4" class="px-8 py-16 text-center text-slate-300 italic">Kho hàng trống</td></tr>';
}

// --- CORE: Chi tiết sản phẩm ---
async function openDrawer(id) {
    const p = allProducts.find(x => x.id == id);
    if (!p) return;

    let history = [];
    try {
        const v = await contract.methods.verifyProduct(id).call();
        history = v.visibleHistory || [];
    } catch(e) {}

    const drawer = document.getElementById('sideDrawer');
    const content = document.getElementById('drawerContent');

    content.innerHTML = `
        <div class="space-y-6">
            <div class="aspect-square bg-slate-100 rounded-[2rem] overflow-hidden border border-slate-100 shadow-inner flex items-center justify-center relative">
                ${p.productImageUrl ? 
                    `<img src="${formatIPFS(p.productImageUrl)}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=Error+Loading+IPFS'">` : 
                    `<div class="text-slate-300 text-center"><i class="fa-solid fa-image text-5xl mb-2"></i><p class="text-[10px] font-bold">KHÔNG CÓ ẢNH</p></div>`}
            </div>

            <div>
                <h4 class="text-3xl font-black text-slate-900 leading-tight">${p.name}</h4>
                <p class="text-sky-500 font-bold text-xs">ID SẢN PHẨM: #${id}</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Mã Lô</p>
                    <p class="font-bold text-slate-800">${p.batchID}</p>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Ngày SX</p>
                    <p class="font-bold text-slate-800">${p.manufactureDate}</p>
                </div>
            </div>

            <div>
                <p class="text-[9px] font-black text-slate-400 uppercase mb-3 ml-2">Giấy kiểm định chất lượng</p>
                ${p.certificationUrl ? 
                    `<a href="${formatIPFS(p.certificationUrl)}" target="_blank" class="flex items-center gap-4 p-5 bg-emerald-50 text-emerald-700 rounded-2xl border border-emerald-100 hover:scale-[1.02] transition-transform">
                        <i class="fa-solid fa-file-shield text-2xl"></i>
                        <div>
                            <span class="font-bold text-sm block">Certificate Gốc</span>
                            <span class="text-[9px] opacity-60 uppercase font-black">Bảo mật IPFS</span>
                        </div>
                        <i class="fa-solid fa-chevron-right ml-auto text-xs opacity-50"></i>
                    </a>` : 
                    `<div class="p-5 border-2 border-dashed border-slate-100 rounded-2xl text-center text-[11px] text-slate-400 font-bold italic uppercase">Chưa cập nhật tài liệu</div>`}
            </div>

            <div class="space-y-4 pt-4 border-t border-slate-100">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2 ml-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> Nhật ký vận hành
                </p>
                <div class="space-y-4 ml-3 border-l-2 border-slate-100 pl-5">
                    ${history.map((h, i) => `
                        <div class="relative">
                            <div class="absolute -left-[25px] top-1.5 w-3 h-3 rounded-full ${i === 0 ? 'bg-sky-500 ring-4 ring-sky-100' : 'bg-slate-200'}"></div>
                            <span class="text-xs font-bold text-slate-700 block">${h}</span>
                            <span class="text-[9px] text-slate-400 font-black italic uppercase">On-Chain Verified</span>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="pt-8 flex flex-col items-center gap-3">
                <div id="drawerQR" class="p-4 bg-white border border-slate-200 rounded-3xl shadow-sm"></div>
                <p class="text-[9px] text-slate-400 font-black tracking-widest uppercase">QR TRUY XUẤT NGUỒN GỐC</p>
            </div>
        </div>
    `;
    drawer.classList.add('open');
    document.getElementById('overlay').classList.add('active');
    setTimeout(() => {
        const canvas = document.createElement('canvas');
        QRCode.toCanvas(canvas, `VERIGLOW-PROD-${id}`, { width: 140, margin: 1 });
        document.getElementById('drawerQR').innerHTML = '';
        document.getElementById('drawerQR').appendChild(canvas);
    }, 50);
}

function closeDrawer() {
    document.getElementById('sideDrawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.getElementById('pageTitle').innerText = document.querySelector(`[onclick="showTab('${tabId}')"] span`).innerText;
    document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
}

async function transferOwnership() {
    try {
        const id = document.getElementById('tId').value;
        const to = document.getElementById('tAddr').value;
        await contract.methods.transferOwnership(id, to).send({ from: account });
        alert("Xuất kho thành công!");
        loadMyProducts();
        showTab('list-products');
    } catch (e) { alert(e.message); }
}

function filterProducts(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadMyProducts(); // Trong thực tế bạn có thể lọc mảng allProducts tại đây
}
</script>
</body>
</html>
