<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | CosmeChain</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Style cho bộ lọc */
        .filter-btn.active { background: #0ea5e9; color: white; }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200 overflow-hidden bg-sky-500">
                    <i class="fa-solid fa-industry text-white"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <div class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4 ml-2">Nhà sản xuất</div>
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-warehouse text-lg"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-circle-plus text-lg"></i> <span>Đăng ký lô mới</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-ramp-box text-lg"></i> <span>Xuất kho / Chuyển giao</span>
            </button>
        </nav>

        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <div id="accountDisplay" class="text-[10px] font-mono text-slate-500 truncate">Đang kết nối...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Kho sản phẩm</h2>
            <button onclick="loadMyProducts()" class="p-2 hover:bg-slate-100 rounded-full transition-all text-sky-600">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </header>

        <div class="p-10 overflow-y-auto">
            
            <div id="list-products" class="tab-content active">
                <div class="flex gap-2 mb-8 bg-slate-200/50 p-1 rounded-xl w-fit">
                    <button onclick="setFilter('in-stock')" id="filterInStock" class="filter-btn active px-6 py-2 rounded-lg text-sm font-bold transition-all">Trong kho</button>
                    <button onclick="setFilter('shipped')" id="filterShipped" class="filter-btn px-6 py-2 rounded-lg text-sm font-bold transition-all">Đã xuất kho</button>
                </div>

                <div id="qrListSection" class="hidden mb-8 bg-white rounded-3xl border border-slate-200 p-6 text-center">
                    <canvas id="qrCodeList" class="mx-auto mb-2"></canvas>
                    <div id="qrListLabel" class="text-xs font-mono font-bold text-slate-500"></div>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 border-b border-slate-100">
                            <tr>
                                <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase">Sản phẩm</th>
                                <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase">Mã lô</th>
                                <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase">Sở hữu bởi</th>
                                <th class="px-8 py-5 text-[10px] font-bold text-slate-400 uppercase">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="create-product" class="tab-content max-w-4xl mx-auto">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-xl p-10">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="col-span-2 space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Tên sản phẩm</label>
                            <input id="name" type="text" class="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none focus:border-sky-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Mã lô (Batch ID)</label>
                            <input id="batchID" type="text" class="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Ngày sản xuất</label>
                            <input id="manufactureDate" type="date" class="w-full px-5 py-3 rounded-xl border bg-slate-50 outline-none">
                        </div>
                        <div class="col-span-2">
                            <button id="btnCreate" onclick="createProduct()" class="w-full bg-sky-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-sky-200">
                                Xác nhận đúc (Mint) sản phẩm
                            </button>
                        </div>
                    </div>
                </div>
                <div id="qrSection" class="hidden mt-8 text-center p-6 bg-white rounded-3xl border-2 border-dashed border-sky-200">
                    <canvas id="qrCode" class="mx-auto"></canvas>
                    <p class="text-xs text-slate-400 mt-2 italic">Mã QR đã sẵn sàng để dán lên bao bì.</p>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
                    <h3 class="text-xl font-bold mb-6">Chuyển giao cho Nhà phân phối</h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nhập ID sản phẩm</label>
                            <input id="transferId" type="number" oninput="previewProduct(this.value)" placeholder="Ví dụ: 1" class="w-full px-6 py-4 rounded-xl border bg-slate-50 outline-none focus:ring-4 focus:ring-orange-100">
                        </div>

                        <div id="previewCard" class="hidden p-4 rounded-2xl border-2 border-orange-100 bg-orange-50/30 animate-pulse">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div id="previewName" class="font-bold text-slate-800">---</div>
                                    <div id="previewBatch" class="text-xs text-slate-500">Lô: ---</div>
                                </div>
                                <div id="previewStatus" class="text-[10px] font-bold px-2 py-1 rounded-md">---</div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Địa chỉ ví Nhà phân phối</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border bg-slate-50 outline-none font-mono text-sm">
                        </div>

                        <button id="btnTransfer" onclick="transferOwnership()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-xl transition-all disabled:opacity-50">
                            Ký lệnh xuất kho
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

<script>
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"uint256","name":"_manufactureDate","type":"uint256"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"uint256","name":"manufactureDate","type":"uint256"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"string[]","name":"history","type":"string[]"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

let web3, contract, account;
let currentFilter = 'in-stock';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('accountDisplay').innerText = `Ví: ${account.substring(0,6)}...${account.substring(38)}`;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const pageTitles = {'list-products': 'Kho sản phẩm', 'create-product': 'Đăng ký sản phẩm', 'transfer-ownership': 'Chuyển giao'};
    document.getElementById('pageTitle').innerText = pageTitles[tabId];
    
    const btns = document.querySelectorAll('.sidebar-item');
    if(tabId === 'list-products') btns[0].classList.add('active');
    if(tabId === 'create-product') btns[1].classList.add('active');
    if(tabId === 'transfer-ownership') btns[2].classList.add('active');
}

// 1. CHỨC NĂNG LƯU TRỮ CỤC BỘ (LOCALSTORAGE)
function saveTransferId(id) {
    let history = JSON.parse(localStorage.getItem('mfr_history_' + account) || "[]");
    if(!history.includes(id)) {
        history.push(id);
        localStorage.setItem('mfr_history_' + account, JSON.stringify(history));
    }
}

function getTransferredIds() {
    return JSON.parse(localStorage.getItem('mfr_history_' + account) || "[]");
}

// 2. CHỨC NĂNG BỘ LỌC
function setFilter(type) {
    currentFilter = type;
    document.getElementById('filterInStock').classList.toggle('active', type === 'in-stock');
    document.getElementById('filterShipped').classList.toggle('active', type === 'shipped');
    loadMyProducts();
}

async function loadMyProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        const shippedIds = getTransferredIds();
        let html = '';

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const owner = p[6].toLowerCase();
            const isMe = owner === account.toLowerCase();
            const wasMe = shippedIds.includes(String(i));

            // Logic lọc
            if (currentFilter === 'in-stock' && !isMe) continue;
            if (currentFilter === 'shipped' && (isMe || !wasMe)) continue;

            html += `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="px-8 py-4 font-bold text-slate-800">${p[0]}</td>
                    <td class="px-8 py-4 text-xs font-mono text-slate-500">${p[1]}</td>
                    <td class="px-8 py-4 text-[10px] font-mono">${isMe ? '<span class="text-green-600 font-bold">Bạn sở hữu</span>' : owner.substring(0,10)+'...'}</td>
                    <td class="px-8 py-4">
                        <button onclick="showProductQr(${i})" class="text-sky-500 hover:text-sky-700 font-bold text-xs">Xem mã QR</button>
                    </td>
                </tr>
            `;
        }
        tbody.innerHTML = html || '<tr><td colspan="4" class="py-10 text-center text-slate-400">Không có sản phẩm nào.</td></tr>';
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-red-500">Lỗi dữ liệu.</td></tr>';
    }
}

// 3. PREVIEW THÔNG MINH
async function previewProduct(id) {
    const card = document.getElementById('previewCard');
    const btn = document.getElementById('btnTransfer');
    if(!id || id < 1) { card.classList.add('hidden'); return; }

    try {
        const p = await contract.methods.verifyProduct(id).call();
        card.classList.remove('hidden');
        document.getElementById('previewName').innerText = p[0];
        document.getElementById('previewBatch').innerText = "Mã lô: " + p[1];
        
        const isOwner = p[6].toLowerCase() === account.toLowerCase();
        const statusEl = document.getElementById('previewStatus');
        
        if(isOwner) {
            statusEl.innerText = "Hợp lệ: Đang trong kho";
            statusEl.className = "text-[10px] font-bold px-2 py-1 rounded-md bg-green-100 text-green-700";
            btn.disabled = false;
        } else {
            statusEl.innerText = "Lỗi: Bạn không sở hữu ID này";
            statusEl.className = "text-[10px] font-bold px-2 py-1 rounded-md bg-red-100 text-red-700";
            btn.disabled = true;
        }
    } catch (e) {
        card.classList.add('hidden');
    }
}

async function createProduct() {
    const btn = document.getElementById('btnCreate');
    const name = document.getElementById("name").value;
    const batchID = document.getElementById("batchID").value;
    const dateInput = document.getElementById("manufactureDate").value;

    if (!name || !batchID || !dateInput) { alert("Thiếu thông tin!"); return; }
    
    btn.disabled = true;
    btn.innerText = "Đang xử lý...";

    try {
        const timestamp = Math.floor(new Date(dateInput).getTime() / 1000);
        await contract.methods.createProduct(name, batchID, timestamp, "Việt Nam", [], "", "").send({ from: account });
        
        const newId = await contract.methods.productCount().call();
        showProductQr(newId);
        alert("Thành công!");
        loadMyProducts();
    } catch (err) {
        alert("Lỗi: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "Xác nhận đúc (Mint) sản phẩm";
    }
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const newOwner = document.getElementById("newOwner").value;

    if (!id || !newOwner) { alert("Nhập đủ thông tin!"); return; }

    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        saveTransferId(id); // Lưu vào LocalStorage trước khi "mất dấu"
        alert("Đã chuyển giao thành công!");
        showTab('list-products');
        setFilter('shipped');
    } catch (err) {
        alert("Giao dịch thất bại!");
    }
}

function showProductQr(id) {
    const displayId = `PRD-${String(id).padStart(8, '0')}`;
    const verifyUrl = `${window.location.origin}/verify.html?code=${displayId}`;
    document.getElementById('qrListLabel').innerText = displayId;
    document.getElementById('qrListSection').classList.remove('hidden');
    QRCode.toCanvas(document.getElementById("qrCodeList"), verifyUrl, { width: 120 });
    
    // Cuộn lên xem QR
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
