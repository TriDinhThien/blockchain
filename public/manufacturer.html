  <!-- CSS Styles -->
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f0f8ff; /* Light sea blue background */
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 119, 182, 0.2); /* Sea blue shadow */
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #0077b6; /* Sea blue */
      margin-bottom: 30px;
      font-size: 28px;
    }

    h2 {
      color: #00a8e8; /* Brighter sea blue */
      margin-top: 40px;
      font-size: 22px;
      border-bottom: 2px solid #0077b6;
      padding-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #00a8e8;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #0077b6; /* Sea blue button */
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #005f8f; /* Darker sea blue */
    }

    canvas {
      display: block;
      margin: 20px auto;
      border: 1px solid #00a8e8;
      border-radius: 8px;
    }

    hr {
      border: 0;
      height: 1px;
      background-color: #00a8e8;
      margin: 30px 0;
    }

    /* Responsive design */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      h1 { font-size: 24px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Nhà Sản Xuất – Tạo Sản Phẩm</h1>

    <input id="name" placeholder="Tên sản phẩm"><br>
    <input id="batchID" placeholder="Mã lô"><br>
    <input id="manufactureDate" type="date" required><br>
    <input id="origin" placeholder="Nguồn gốc"><br>
    <input id="ingredients" placeholder="Thành phần (cách nhau bằng dấu phẩy, ví dụ: Nước, Vitamin C)"><br>
    <input id="productImage" type="file" accept="image/*"><br>
    <input id="certification" type="file" accept="image/*"><br>
    <button onclick="createProduct()">Tạo sản phẩm</button>

    <br><br>
    <canvas id="qrCode"></canvas>

    <hr>

    <h2>Chuyển giao quyền sở hữu</h2>

    <input id="transferId" placeholder="ID sản phẩm"><br>
    <input id="newOwner" placeholder="Địa chỉ ví mới (0x...)"><br>
    <button onclick="transferOwnership()">Chuyển giao</button>

  </div>

======================= */

let web3;
let contract;
let account;

async function ensureSepoliaNetwork() {
  const sepoliaChainId = "0xaa36a7";
  const currentChainId = await window.ethereum.request({ method: "eth_chainId" });

  if (currentChainId !== sepoliaChainId) {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: sepoliaChainId }]
      });
    } catch (switchError) {
      // If Sepolia is missing in wallet, ask wallet to add it.
      if (switchError.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: sepoliaChainId,
            chainName: "Sepolia",
            nativeCurrency: { name: "Sepolia ETH", symbol: "SEP", decimals: 18 },
            rpcUrls: ["https://rpc.sepolia.org"],
            blockExplorerUrls: ["https://sepolia.etherscan.io"]
          }]
        });
      } else {
        throw switchError;
      }
    }
  }
}

/* =======================
   2. INIT WEB3
======================= */
window.addEventListener("load", async () => {
  if (window.ethereum) {
    await ensureSepoliaNetwork();
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0];
    contract = new web3.eth.Contract(abi, contractAddress);
    console.log("Connected account:", account);
  } else {
    alert("Vui lòng cài MetaMask!");
  }
});

/* =======================
   3. CREATE PRODUCT
======================= */
const ipfs = window.IpfsHttpClient.create({ host: 'ipfs.infura.io', port: 5001, protocol: 'https' }); // IPFS client

async function createProduct() {
  const name = document.getElementById("name").value;
  const batchID = document.getElementById("batchID").value;
  const dateInput = document.getElementById("manufactureDate").value;
  const origin = document.getElementById("origin").value;
  const ingredientsStr = document.getElementById("ingredients").value;

  if (!name || !batchID || !dateInput || !origin || !ingredientsStr) {
    alert("Vui lòng nhập đầy đủ thông tin!");
    return;
  }

  const ingredients = ingredientsStr.split(',').map(i => i.trim());
  const manufactureDate = Math.floor(new Date(dateInput).getTime() / 1000);

  // Upload ảnh sản phẩm
  const productImageFile = document.getElementById("productImage").files[0];
  let productImageUrl = '';
  if (productImageFile) {
    const added = await ipfs.add(productImageFile);
    productImageUrl = `ipfs://${added.path}`;
  }

  // Upload chứng nhận
  const certificationFile = document.getElementById("certification").files[0];
  let certificationUrl = '';
  if (certificationFile) {
    const added = await ipfs.add(certificationFile);
    certificationUrl = `ipfs://${added.path}`;
  }

  try {
    await contract.methods
      .createProduct(name, batchID, manufactureDate, origin, ingredients, productImageUrl, certificationUrl)
      .send({ from: account });

    let id = await contract.methods.productCount().call();
    id = Number(id);

    alert("Tạo sản phẩm thành công! ID: " + id);

    QRCode.toCanvas(
      document.getElementById("qrCode"),
      `http://localhost:3000/verify.html?id=${id}`,
      err => err && console.error(err)
    );
  } catch (err) {
    console.error(err);
    alert("Lỗi: " + (err.message || err));
  }
}

/* =======================
   4. TRANSFER OWNERSHIP
======================= */
async function transferOwnership() {
  let idInput = document.getElementById("transferId").value.trim();
  let id = Number(idInput);

  if (idInput === "" || isNaN(id) || id <= 0 || !Number.isInteger(id)) {
    alert("ID sản phẩm không hợp lệ! Vui lòng nhập số nguyên dương (ví dụ: 1, 2, ...).");
    return;
  }

  const newOwner = document.getElementById("newOwner").value.trim();

  if (!newOwner || !web3.utils.isAddress(newOwner)) {
    alert("Địa chỉ ví mới không hợp lệ! Vui lòng nhập địa chỉ Ethereum hợp lệ (bắt đầu bằng 0x...).");
    return;
  }

  try {
    await contract.methods
      .transferOwnership(id, newOwner)
      .send({ from: account });

    alert("Chuyển giao quyền sở hữu thành công!");
  } catch (err) {
    console.error(err);
    alert("Lỗi: " + (err.message || err));
  }
}
