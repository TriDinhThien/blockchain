<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* Chuyển động Tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Sidebar & Buttons */
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .filter-btn { transition: all 0.3s ease; border-radius: 99px; }
        .filter-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }

        /* Thẻ sản phẩm */
        .product-card {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
        }
        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            border-color: #0ea5e9;
        }

        /* Timeline hành trình */
        .timeline-item { position: relative; padding-left: 32px; padding-bottom: 24px; }
        .timeline-item::before {
            content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: #e2e8f0;
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot {
            position: absolute; left: 0; top: 4px; width: 22px; height: 22px;
            background: #0ea5e9; border: 4px solid white; border-radius: 50%;
            box-shadow: 0 0 0 1px #0ea5e9;
        }

        /* Modal chính */
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Sub-modal Giấy chứng nhận */
        #certModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="flex text-slate-900 min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col fixed inset-y-0 z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-microchip text-lg"></i>
            </div>
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-circle-plus"></i> <span>Đăng ký sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Chuyển giao quyền</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Ví Quản Trị</p>
                <div id="accountDisplay" class="text-[11px] font-mono text-slate-600 break-all bg-white p-2.5 rounded-lg border border-slate-200 truncate">Connecting...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 flex flex-col">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-40">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Kho sản phẩm</h2>
            <button onclick="loadProducts()" class="p-2.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-xl transition-all">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
        </header>

        <div class="p-10 max-w-7xl mx-auto w-full">
            <div id="list-products" class="tab-content active">
                <div class="flex items-center gap-4 mb-10">
                    <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn active px-6 py-2.5 border border-slate-200 text-sm font-bold flex items-center gap-2">
                        <i class="fa-solid fa-warehouse"></i> Còn trong kho
                    </button>
                    <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-6 py-2.5 border border-slate-200 text-sm font-bold flex items-center gap-2 text-slate-500">
                        <i class="fa-solid fa-truck-fast"></i> Đã chuyển giao
                    </button>
                </div>
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
            </div>

            <div id="create-product" class="tab-content max-w-4xl mx-auto">
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-10 border-b border-slate-100 bg-slate-50/50">
                        <h3 class="text-2xl font-extrabold text-slate-900">Đăng ký sản phẩm</h3>
                    </div>
                    <div class="p-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Tên công ty</label><input id="manufacturerName" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Địa chỉ nhà máy</label><input id="factoryAddress" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Tên sản phẩm</label><input id="name" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Mã lô (Batch ID)</label><input id="batchID" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Ngày sản xuất</label><input id="manufactureDate" type="date" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Quốc gia</label><input id="origin" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></div>
                        </div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Thành phần (cách nhau bởi dấu phẩy)</label><textarea id="ingredients" rows="3" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 outline-none"></textarea></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-6 bg-sky-50 rounded-2xl border border-sky-100"><label class="block text-sky-700 font-bold text-xs uppercase mb-3">Ảnh sản phẩm</label><input id="productImage" type="file" accept="image/*"></div>
                            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100"><label class="block text-indigo-700 font-bold text-xs uppercase mb-3">Giấy chứng nhận</label><input id="certification" type="file" accept="image/*"></div>
                        </div>
                        <button id="btnCreate" onclick="createProduct()" class="w-full py-5 bg-slate-900 text-white font-bold rounded-2xl hover:bg-black transition-all">Ghi lên Blockchain</button>
                    </div>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 text-center">
                    <h3 class="text-2xl font-bold text-slate-800 mb-8">Bàn giao sở hữu</h3>
                    <div class="space-y-6 text-left">
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">ID sản phẩm</label><input id="transferId" type="number" class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-bold outline-none"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Địa chỉ ví người nhận</label><input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-mono outline-none text-sm"></div>
                        <button onclick="transferOwnership()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-5 rounded-2xl transition-all">Xác nhận chuyển giao</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl relative max-h-[92vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-500 z-10 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div id="modalContent" class="p-8 md:p-12"></div>
        </div>
    </div>

    <div id="certModal" onclick="closeCertModal()">
        <div class="relative max-w-4xl w-full" onclick="event.stopPropagation()">
            <button onclick="closeCertModal()" class="absolute -top-12 right-0 text-white text-4xl hover:text-red-400 transition-colors">&times;</button>
            <img id="certFullImage" src="" class="w-full h-auto rounded-2xl shadow-2xl border-4 border-white/10">
        </div>
    </div>

<script>
// --- Cấu hình Web3 ---
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, currentFilter = 'inStock';

window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("MetaMask not found!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0].toLowerCase();
    document.getElementById('accountDisplay').innerText = account;
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://via.placeholder.com/400x400?text=VeriGlow+Product';
    return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
}

// --- Hiển thị Danh sách ---
async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-10 text-center text-slate-400">Đang tải...</div>';

    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            const isOwned = p.owner.toLowerCase() === account;
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;

            html += `
                <div onclick="openDetail(${i})" class="product-card p-5 cursor-pointer group">
                    <div class="aspect-square rounded-2xl overflow-hidden bg-slate-50 mb-4 border border-slate-100">
                        <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <span class="text-[10px] font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded-md uppercase tracking-wider">ID #${i}</span>
                    <h4 class="font-bold text-slate-800 line-clamp-1 text-base mt-2">${p.name}</h4>
                    <p class="text-[11px] text-slate-500 mt-1"><i class="fa-solid fa-industry mr-1"></i>${p.manufacturerName}</p>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center text-[10px] font-bold uppercase ${isOwned ? 'text-emerald-500' : 'text-orange-500'}">
                        <span>● ${isOwned ? 'Trong kho' : 'Đã giao'}</span>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </div>
                </div>`;
        }
        grid.innerHTML = html || '<div class="col-span-full text-center py-20 text-slate-400">Trống</div>';
    } catch (e) { grid.innerHTML = 'Lỗi kết nối Blockchain.'; }
}

// --- Xem Chi Tiết ---
async function openDetail(id) {
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('hidden');
    content.innerHTML = '<div class="py-20 text-center"><div class="loading-spinner mx-auto mb-4"></div><p>Đang truy vấn Blockchain...</p></div>';

    try {
        const verifyData = await contract.methods.verifyProduct(id).call();
        const fullData = await contract.methods.products(id).call();

        // Xây dựng Hành trình
        let timelineHTML = `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="text-sm font-bold text-slate-800">Cơ sở sản xuất: ${fullData.manufacturerName}</div>
                <div class="text-[11px] text-slate-500 mt-0.5"><i class="fa-solid fa-location-dot mr-1"></i>${fullData.factoryAddress}</div>
                <div class="text-[10px] text-sky-600 font-bold uppercase mt-1">Giai đoạn: Khởi tạo trên Blockchain</div>
            </div>`;

        if (verifyData.visibleHistory && verifyData.visibleHistory.length > 0) {
            verifyData.visibleHistory.forEach((log, idx) => {
                timelineHTML += `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="text-sm font-medium text-slate-700">${log}</div>
                        <div class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-tighter">Bàn giao quyền sở hữu</div>
                    </div>`;
            });
        }

        const isCurrentOwner = verifyData.owner.toLowerCase() === account;

        content.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-5 space-y-6">
                    <div class="aspect-square rounded-[2rem] overflow-hidden shadow-2xl border border-slate-100 bg-white">
                        <img src="${formatUrl(fullData.productImageUrl)}" class="w-full h-full object-cover">
                    </div>
                    <button onclick="showCertModal('${formatUrl(fullData.certificationUrl)}')" 
                            class="w-full py-4 bg-white border-2 border-indigo-100 hover:bg-indigo-50 text-indigo-600 font-bold rounded-2xl flex items-center justify-center gap-3 transition-all">
                        <i class="fa-solid fa-file-shield text-xl"></i> Xem giấy chứng nhận sản phẩm
                    </button>
                </div>

                <div class="lg:col-span-7 space-y-8">
                    <div>
                        <div class="flex items-center gap-3 mb-3">
                            <span class="px-3 py-1 bg-sky-100 text-sky-700 text-[10px] font-bold rounded-full uppercase tracking-widest">ID #${id} Verified</span>
                            <span class="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-full uppercase">Lô: ${fullData.batchID}</span>
                        </div>
                        <h1 class="text-3xl font-extrabold text-slate-900">${fullData.name}</h1>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Ngày sản xuất</p>
                            <p class="font-bold text-slate-800">${fullData.manufactureDate}</p>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Xuất xứ</p>
                            <p class="font-bold text-slate-800">${fullData.origin}</p>
                        </div>
                    </div>

                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Hành trình sản phẩm</p>
                        <div class="space-y-0 ml-2">
                            ${timelineHTML}
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Chủ sở hữu hiện tại</p>
                        <div class="${isCurrentOwner ? 'bg-emerald-50 border-emerald-100' : 'bg-orange-50 border-orange-100'} border p-5 rounded-2xl">
                            <p class="font-mono text-[11px] break-all text-slate-600">${verifyData.owner}</p>
                            <p class="text-[10px] mt-2 font-bold ${isCurrentOwner ? 'text-emerald-600' : 'text-orange-600'} italic">
                                ${isCurrentOwner ? '● Sản phẩm đang nằm trong kho của bạn' : '● Sản phẩm đã được chuyển giao cho đối tác'}
                            </p>
                        </div>
                    </div>
                </div>
            </div>`;
    } catch (e) { content.innerHTML = '<p class="text-red-500">Lỗi tải dữ liệu.</p>'; }
}

// --- Điều hướng & Tiện ích ---
function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    const btnIdx = ['list-products', 'create-product', 'transfer-ownership'].indexOf(id);
    document.querySelectorAll('.sidebar-item')[btnIdx].classList.add('active');
}

function setFilter(filter) {
    currentFilter = filter;
    document.getElementById('btnInStock').classList.toggle('active', filter === 'inStock');
    document.getElementById('btnTransferred').classList.toggle('active', filter === 'transferred');
    loadProducts();
}

function showCertModal(url) {
    if (!url || url.includes('placeholder')) return alert("Không tìm thấy giấy chứng nhận cho sản phẩm này.");
    document.getElementById('certFullImage').src = url;
    document.getElementById('certModal').style.display = 'flex';
}

function closeCertModal() { document.getElementById('certModal').style.display = 'none'; }
function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

// --- Chức năng Blockchain (create, transfer) giữ nguyên logic cũ của bạn ---
async function createProduct() {
    const btn = document.getElementById('btnCreate');
    btn.disabled = true;
    btn.innerHTML = 'Đang thực hiện...';
    try {
        const name = document.getElementById("name").value;
        const bId = document.getElementById("batchID").value;
        const date = document.getElementById("manufactureDate").value;
        const origin = document.getElementById("origin").value;
        const ing = document.getElementById("ingredients").value.split(',');
        const mName = document.getElementById("manufacturerName").value;
        const fAddr = document.getElementById("factoryAddress").value;
        // Phần upload IPFS (Bạn thay bằng API thực tế của mình)
        await contract.methods.createProduct(name, bId, date, origin, ing, "", "", mName, fAddr).send({ from: account });
        alert("Thành công!");
        location.reload();
    } catch (e) { alert("Lỗi: " + e.message); btn.disabled = false; btn.innerHTML = 'Thử lại'; }
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const to = document.getElementById("newOwner").value;
    try {
        await contract.methods.transferOwnership(id, to).send({ from: account });
        alert("Chuyển giao thành công!");
        loadProducts();
    } catch (e) { alert("Lỗi!"); }
}
</script>
</body>
</html>
