<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | VeriGlow</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        
        /* Tab Transitions */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Sidebar & Buttons */
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .filter-btn { transition: all 0.3s ease; border-radius: 99px; }
        .filter-btn.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }

        /* Product Cards */
        .product-card {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
        }
        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
            border-color: #0ea5e9;
        }

        /* Timeline */
        .timeline-item { position: relative; padding-left: 28px; }
        .timeline-item::before {
            content: ''; position: absolute; left: 9px; top: 0; bottom: -20px; width: 2px; background: #e2e8f0;
        }
        .timeline-item:last-child::before { display: none; }
        .timeline-dot {
            position: absolute; left: 0; top: 4px; width: 18px; height: 18px;
            background: #0ea5e9; border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        /* Modal Customization */
        .modal-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex text-slate-900 min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col fixed inset-y-0 z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-sky-600 flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-microchip text-lg"></i>
            </div>
            <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
        </div>
        <nav class="mt-4 px-6 space-y-2 flex-1">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-circle-plus"></i> <span>Đăng ký sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-slate-500 hover:bg-slate-50">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Chuyển giao quyền</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Quản trị viên</p>
                <div id="accountDisplay" class="text-[11px] font-mono text-slate-600 break-all bg-white p-2.5 rounded-lg border border-slate-200 truncate">Connecting...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 md:ml-72 flex flex-col">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-40">
            <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Kho sản phẩm</h2>
            <button onclick="loadProducts()" class="p-2.5 text-slate-400 hover:text-sky-600 hover:bg-sky-50 rounded-xl transition-all">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
        </header>

        <div class="p-10 max-w-7xl mx-auto w-full">
            <div id="list-products" class="tab-content active">
                <div class="flex items-center gap-4 mb-10">
                    <button id="btnInStock" onclick="setFilter('inStock')" class="filter-btn active px-6 py-2.5 border border-slate-200 text-sm font-bold flex items-center gap-2">
                        <i class="fa-solid fa-warehouse"></i> Còn trong kho
                    </button>
                    <button id="btnTransferred" onclick="setFilter('transferred')" class="filter-btn px-6 py-2.5 border border-slate-200 text-sm font-bold flex items-center gap-2 text-slate-500">
                        <i class="fa-solid fa-truck-fast"></i> Đã chuyển giao
                    </button>
                </div>
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
            </div>

            <div id="create-product" class="tab-content max-w-4xl mx-auto">
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-10 border-b border-slate-100 bg-slate-50/50">
                        <h3 class="text-2xl font-extrabold text-slate-900">Đăng ký sản phẩm mới</h3>
                        <p class="text-slate-500 text-sm mt-1">Thông tin sẽ được mã hóa và lưu trữ vĩnh viễn trên Ethereum Sepolia.</p>
                    </div>
                    <div class="p-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Tên công ty</label><input id="manufacturerName" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Địa chỉ nhà máy</label><input id="factoryAddress" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Tên sản phẩm</label><input id="name" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Mã lô (Batch ID)</label><input id="batchID" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Ngày sản xuất</label><input id="manufactureDate" type="date" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                            <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Quốc gia</label><input id="origin" type="text" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></div>
                        </div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Thành phần (cách nhau bởi dấu phẩy)</label><textarea id="ingredients" rows="3" class="w-full px-5 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-sky-500 outline-none transition-all"></textarea></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-6 bg-sky-50 rounded-2xl border border-sky-100"><label class="block text-sky-700 font-bold text-xs uppercase mb-3"><i class="fa-solid fa-image mr-2"></i>Ảnh sản phẩm</label><input id="productImage" type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-sky-600 file:text-white cursor-pointer"></div>
                            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100"><label class="block text-indigo-700 font-bold text-xs uppercase mb-3"><i class="fa-solid fa-file-shield mr-2"></i>Giấy chứng nhận</label><input id="certification" type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white cursor-pointer"></div>
                        </div>
                        <button id="btnCreate" onclick="createProduct()" class="w-full py-5 bg-slate-900 hover:bg-black text-white font-bold rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
                            <span>Ký xác thực trên Blockchain</span> <i class="fa-solid fa-signature"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm text-center">
                    <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl">
                        <i class="fa-solid fa-truck-moving"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">Bàn giao sở hữu</h3>
                    <p class="text-slate-400 text-sm mb-10">Chuyển quyền quản lý sản phẩm cho Đại lý hoặc Nhà phân phối.</p>
                    <div class="space-y-6 text-left">
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">ID sản phẩm</label><input id="transferId" type="number" class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-orange-500 outline-none font-bold"></div>
                        <div class="space-y-2"><label class="text-xs font-bold text-slate-400 uppercase">Địa chỉ ví người nhận</label><input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm focus:ring-2 focus:ring-orange-500 outline-none"></div>
                        <button onclick="transferOwnership()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-orange-100 transition-all">Xác nhận chuyển giao</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 modal-overlay z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl relative max-h-[92vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-500 z-10 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div id="modalContent" class="p-8 md:p-12"></div>
        </div>
    </div>

<script>
// ==================== CONFIG & CORE LOGIC ====================
const contractAddress = "0x91898720F37b76F8DC33B21702a2376592784aD5";
const abi = [
    {"inputs":[{"internalType":"string","name":"_name","type":"string"},{"internalType":"string","name":"_batchID","type":"string"},{"internalType":"string","name":"_manufactureDate","type":"string"},{"internalType":"string","name":"_origin","type":"string"},{"internalType":"string[]","name":"_ingredients","type":"string[]"},{"internalType":"string","name":"_productImageUrl","type":"string"},{"internalType":"string","name":"_certificationUrl","type":"string"},{"internalType":"string","name":"_manufacturerName","type":"string"},{"internalType":"string","name":"_factoryAddress","type":"string"}],"name":"createProduct","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"},{"internalType":"address","name":"_newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"productCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"products","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"bool","name":"isAuthentic","type":"bool"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"productImageUrl","type":"string"},{"internalType":"string","name":"certificationUrl","type":"string"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"}],"stateMutability":"view","type":"function"},
    {"inputs":[{"internalType":"uint256","name":"_id","type":"uint256"}],"name":"verifyProduct","outputs":[{"internalType":"string","name":"name","type":"string"},{"internalType":"string","name":"batchID","type":"string"},{"internalType":"string","name":"manufactureDate","type":"string"},{"internalType":"string","name":"origin","type":"string"},{"internalType":"address","name":"owner","type":"address"},{"internalType":"string","name":"manufacturerName","type":"string"},{"internalType":"string","name":"factoryAddress","type":"string"},{"internalType":"string[]","name":"ingredients","type":"string[]"},{"internalType":"string[]","name":"visibleHistory","type":"string[]"}],"stateMutability":"view","type":"function"}
];

let web3, contract, account, currentFilter = 'inStock';

window.addEventListener("load", async () => {
    if (!window.ethereum) return alert("Vui lòng cài MetaMask!");
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    account = accounts[0].toLowerCase();
    document.getElementById('accountDisplay').innerText = account;
    contract = new web3.eth.Contract(abi, contractAddress);
    loadProducts();
});

function formatUrl(url) {
    if (!url || url === "" || url === "undefined") return 'https://via.placeholder.com/400x400?text=VeriGlow+Product';
    return url.replace('ipfs://', 'https://ipfs.io/ipfs/');
}

// ==================== TAB & FILTER ====================
function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
    const btnIdx = ['list-products', 'create-product', 'transfer-ownership'].indexOf(id);
    document.querySelectorAll('.sidebar-item')[btnIdx].classList.add('active');
    document.getElementById('pageTitle').innerText = ['Kho sản phẩm', 'Đăng ký sản phẩm', 'Chuyển giao quyền'][btnIdx];
}

function setFilter(filter) {
    currentFilter = filter;
    document.getElementById('btnInStock').classList.toggle('active', filter === 'inStock');
    document.getElementById('btnTransferred').classList.toggle('active', filter === 'transferred');
    loadProducts();
}

// ==================== BLOCKCHAIN ACTIONS ====================
async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<div class="col-span-full py-20 flex flex-col items-center gap-4 text-slate-400"><div class="loading-spinner"></div><p>Đang tải dữ liệu từ Blockchain...</p></div>';

    try {
        const count = await contract.methods.productCount().call();
        let html = '';
        let found = 0;

        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.products(i).call();
            const isOwned = p.owner.toLowerCase() === account;
            
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;

            found++;
            html += `
                <div onclick="openDetail(${i})" class="product-card p-5 cursor-pointer group">
                    <div class="aspect-square rounded-2xl overflow-hidden bg-slate-50 mb-4 border border-slate-100">
                        <img src="${formatUrl(p.productImageUrl)}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded-md uppercase tracking-wider">ID #${i}</span>
                        <span class="text-[10px] text-slate-400 font-mono">${p.batchID}</span>
                    </div>
                    <h4 class="font-bold text-slate-800 line-clamp-1 text-base">${p.name}</h4>
                    <p class="text-[11px] text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${p.origin}</p>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                        <span class="text-[10px] font-bold uppercase ${isOwned ? 'text-emerald-500' : 'text-orange-500'}">
                            ${isOwned ? '● Trong kho' : '● Đã chuyển'}
                        </span>
                        <i class="fa-solid fa-arrow-right text-slate-300 group-hover:text-sky-500 transition-colors"></i>
                    </div>
                </div>`;
        }
        grid.innerHTML = found > 0 ? html : `<div class="col-span-full py-20 text-center text-slate-400 font-medium">Không tìm thấy sản phẩm nào trong mục này.</div>`;
    } catch (e) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-400">Lỗi kết nối Blockchain. Vui lòng kiểm tra MetaMask.</div>';
    }
}

async function openDetail(id) {
    const modal = document.getElementById('detailModal');
    const content = document.getElementById('modalContent');
    modal.classList.remove('hidden');
    content.innerHTML = '<div class="py-20 text-center"><div class="loading-spinner mx-auto mb-4"></div><p class="text-slate-500">Đang truy vấn Blockchain...</p></div>';

    try {
        const verifyData = await contract.methods.verifyProduct(id).call();
        const fullData = await contract.methods.products(id).call();

        const ingredientsHTML = verifyData.ingredients && verifyData.ingredients.length > 0 ? 
            `<div class="bg-slate-50 border border-slate-100 rounded-2xl p-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Thành phần chi tiết</p>
                <div class="flex flex-wrap gap-2">${verifyData.ingredients.map(ing => `<span class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-xs text-slate-600">${ing}</span>`).join('')}</div>
            </div>` : '';

        const historyHTML = verifyData.visibleHistory.map((log, index) => `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="text-sm font-bold text-slate-700">${log}</div>
                <div class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-tighter">${index === 0 ? 'Tạo mới trên hệ thống' : 'Chuyển quyền sở hữu'}</div>
            </div>`).join('');

        content.innerHTML = `
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-5 space-y-6">
                    <div class="aspect-square rounded-[2rem] overflow-hidden shadow-2xl border border-slate-100">
                        <img src="${formatUrl(fullData.productImageUrl)}" class="w-full h-full object-cover">
                    </div>
                    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-6">
                        <p class="text-indigo-700 text-[10px] font-bold uppercase mb-4 tracking-widest">Chứng nhận chất lượng</p>
                        ${fullData.certificationUrl ? `<img src="${formatUrl(fullData.certificationUrl)}" class="w-full rounded-xl shadow-sm">` : `<p class="text-xs text-indigo-400 italic text-center">Chưa đính kèm giấy chứng nhận</p>`}
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-8">
                    <div>
                        <div class="flex items-center gap-3 mb-3">
                            <span class="px-3 py-1 bg-sky-100 text-sky-700 text-[10px] font-bold rounded-full uppercase">#${id} Blockchain Verified</span>
                            <span class="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-bold rounded-full uppercase">${fullData.batchID}</span>
                        </div>
                        <h1 class="text-3xl font-extrabold text-slate-900 leading-tight">${fullData.name}</h1>
                        <p class="text-slate-500 text-sm mt-2"><i class="fa-solid fa-industry mr-2"></i>${fullData.manufacturerName}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Ngày sản xuất</p>
                            <p class="font-bold text-slate-800">${fullData.manufactureDate}</p>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Xuất xứ</p>
                            <p class="font-bold text-slate-800">${fullData.origin}</p>
                        </div>
                    </div>

                    ${ingredientsHTML}

                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Hành trình sản phẩm</p>
                        <div class="space-y-6 ml-2">
                            ${historyHTML}
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">Địa chỉ sở hữu hiện tại</p>
                        <div class="bg-slate-900 text-sky-400 p-4 rounded-xl font-mono text-[11px] break-all border border-slate-800 shadow-inner">
                            ${verifyData.owner}
                        </div>
                    </div>
                </div>
            </div>`;
    } catch (e) {
        content.innerHTML = '<div class="py-20 text-center text-red-500 font-bold">Lỗi không thể tải chi tiết sản phẩm.</div>';
    }
}

// ==================== IPFS & FORM ====================
async function uploadFileToIPFS(file) {
    if (!file) return "";
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    if (!res.ok) throw new Error("Upload file thất bại.");
    const data = await res.json();
    return `ipfs://${data.cid}`;
}

async function createProduct() {
    const btn = document.getElementById('btnCreate');
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner"></div> Đang ghi lên Blockchain...';

    try {
        const name = document.getElementById("name").value.trim();
        const batchID = document.getElementById("batchID").value.trim();
        const manufactureDate = document.getElementById("manufactureDate").value;
        const origin = document.getElementById("origin").value.trim();
        const ingredientsStr = document.getElementById("ingredients").value.trim();
        const manufacturerName = document.getElementById("manufacturerName").value.trim();
        const factoryAddress = document.getElementById("factoryAddress").value.trim();

        if (!name || !batchID || !manufactureDate || !origin || !manufacturerName || !factoryAddress) {
            throw new Error("Vui lòng điền đầy đủ các thông tin bắt buộc.");
        }

        const ingredients = ingredientsStr ? ingredientsStr.split(',').map(i => i.trim()) : [];
        const imgFile = document.getElementById("productImage").files[0];
        const certFile = document.getElementById("certification").files[0];

        const productImageUrl = imgFile ? await uploadFileToIPFS(imgFile) : "";
        const certificationUrl = certFile ? await uploadFileToIPFS(certFile) : "";

        await contract.methods.createProduct(
            name, batchID, manufactureDate, origin, ingredients,
            productImageUrl, certificationUrl, manufacturerName, factoryAddress
        ).send({ from: account });

        alert("✅ Sản phẩm đã được đăng ký thành công!");
        window.location.reload();
    } catch (err) {
        alert("❌ Lỗi: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

async function transferOwnership() {
    const id = document.getElementById("transferId").value.trim();
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return alert("Vui lòng điền đủ thông tin ID và Ví!");
    
    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        alert("✅ Chuyển giao thành công!");
        loadProducts();
        showTab('list-products');
    } catch (err) {
        alert("❌ Lỗi: " + err.message);
    }
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
window.onclick = function(e) { if(e.target == document.getElementById('detailModal')) closeModal(); }

</script>
</body>
