<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | CosmeChain</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Bộ lọc */
        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background-color: #0ea5e9;
            color: white;
            border-color: #0ea5e9;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
        }

        /* Sidebar trượt từ phải */
        #productDetailSidebar {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200 overflow-hidden bg-sky-600 text-white text-xl">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">VeriGlow</span>
            </div>
        </div>
        
        <nav class="mt-4 flex-1 px-6 space-y-2">
            <button onclick="showTab('list-products')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-boxes-stacked"></i> <span>Kho sản phẩm</span>
            </button>
            <button onclick="showTab('create-product')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-circle-plus"></i> <span>Đăng ký sản phẩm</span>
            </button>
            <button onclick="showTab('transfer-ownership')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all hover:bg-slate-50 text-slate-600 font-medium">
                <i class="fa-solid fa-truck-ramp-box"></i> <span>Chuyển giao quyền</span>
            </button>
        </nav>

        <div class="p-6 mt-auto border-t border-slate-100">
            <div class="bg-slate-50 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-slate-500 uppercase">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Network: Sepolia
                </div>
                <div id="accountDisplay" class="text-[10px] font-mono text-slate-500 truncate bg-white p-2 rounded-lg border border-slate-200 italic">Connecting...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <h2 id="pageTitle" class="text-2xl font-bold text-slate-800">Kho sản phẩm</h2>
            <button onclick="loadProducts()" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-semibold hover:bg-slate-50 text-slate-700">
                <i class="fa-solid fa-arrows-rotate"></i> Làm mới
            </button>
        </header>

        <div class="p-10 overflow-y-auto">
            
            <!-- TAB KHO SẢN PHẨM -->
            <div id="list-products" class="tab-content active">
                
                <!-- BỘ LỌC MỚI -->
                <div class="mb-8 flex items-center gap-4">
                    <span class="text-sm font-medium text-slate-500">Hiển thị:</span>
                    <button id="btnInStock" onclick="setFilter('inStock')" 
                            class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 active flex items-center gap-2">
                        <i class="fa-solid fa-boxes-stacked"></i>
                        Còn trong kho
                    </button>
                    <button id="btnTransferred" onclick="setFilter('transferred')" 
                            class="filter-btn px-6 py-3 rounded-3xl text-sm font-semibold border border-slate-200 flex items-center gap-2">
                        <i class="fa-solid fa-truck-moving"></i>
                        Đã chuyển giao
                    </button>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-100">
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">ID</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Thông tin sản phẩm</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Nhà máy & Lô</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Ngày sản xuất</th>
                                <th class="px-8 py-5 text-[11px] font-bold text-slate-400 uppercase">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="productListBody" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <!-- Các tab khác giữ nguyên -->
            <div id="create-product" class="tab-content max-w-5xl mx-auto">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-2xl overflow-hidden">
                    <div class="bg-slate-900 p-8 text-white flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold">Đăng ký sản phẩm lên Blockchain</h3>
                            <p class="text-slate-400 text-xs">Mọi thông tin sẽ được lưu trữ phi tập trung.</p>
                        </div>
                        <i class="fa-solid fa-shield-halved text-4xl text-sky-500"></i>
                    </div>

                    <div class="p-10 space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Tên công ty sản xuất</label>
                                <input id="manufacturerName" type="text" placeholder="Công ty Mỹ phẩm ABC" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Địa chỉ nhà máy</label>
                                <input id="factoryAddress" type="text" placeholder="KCN Biên Hòa, Đồng Nai" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Tên sản phẩm</label>
                                <input id="name" type="text" placeholder="Kem dưỡng da Vitamin C" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Mã lô (Batch ID)</label>
                                <input id="batchID" type="text" placeholder="BATCH-2024-001" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Ngày sản xuất</label>
                                <input id="manufactureDate" type="date" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-600 uppercase">Quốc gia</label>
                                <input id="origin" type="text" placeholder="Việt Nam" class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-600 uppercase">Thành phần chi tiết</label>
                            <textarea id="ingredients" rows="2" placeholder="Nước, Tinh chất B5, Glycerin..." class="w-full px-5 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-sky-500"></textarea>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="p-6 bg-sky-50 rounded-2xl border border-sky-100">
                                <label class="block text-sky-700 font-bold text-sm mb-3"><i class="fa-solid fa-image mr-2"></i>Ảnh sản phẩm</label>
                                <input id="productImage" type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-sky-600 file:text-white hover:file:bg-sky-700 cursor-pointer">
                            </div>
                            <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                                <label class="block text-indigo-700 font-bold text-sm mb-3"><i class="fa-solid fa-file-shield mr-2"></i>Giấy chứng nhận</label>
                                <input id="certification" type="file" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 cursor-pointer">
                            </div>
                        </div>

                        <div class="flex flex-col items-center gap-6 pt-4">
                            <button id="btnCreate" onclick="createProduct()" class="w-full md:w-fit px-12 py-4 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-2xl shadow-lg transition-all flex items-center gap-3">
                                <span>Ký & Xác thực Blockchain</span> <i class="fa-solid fa-paper-plane"></i>
                            </button>
                            
                            <div id="qrSection" class="hidden text-center bg-white p-6 rounded-3xl border-2 border-dashed border-slate-200">
                                <canvas id="qrCode" class="mx-auto rounded-xl"></canvas>
                                <p class="text-[10px] text-slate-400 mt-4 italic">*Lưu lại mã này để in lên bao bì</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
                    <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-truck-moving text-orange-500"></i> Bàn giao sản phẩm
                    </h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">ID sản phẩm</label>
                            <input id="transferId" type="number" placeholder="Ví dụ: 1" class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-orange-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Địa chỉ ví người nhận (Đại lý/NPP)</label>
                            <input id="newOwner" type="text" placeholder="0x..." class="w-full px-6 py-4 rounded-xl border border-slate-200 bg-slate-50 font-mono text-sm outline-none focus:ring-2 focus:ring-orange-500">
                        </div>
                        <button onclick="transferOwnership()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-xl shadow-lg transition-all active:scale-95">
                            Xác nhận chuyển giao
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- SIDEBAR CHI TIẾT SẢN PHẨM (TRƯỢT TỪ PHẢI) -->
    <div id="productDetailSidebar" 
         class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl translate-x-full flex flex-col z-50 border-l border-slate-200">
        
        <div class="px-6 py-6 border-b flex items-center justify-between bg-slate-50">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-circle-info text-sky-600"></i>
                <h3 class="font-bold text-lg text-slate-800">Chi tiết sản phẩm</h3>
            </div>
            <button onclick="closeSidebar()" 
                    class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>

        <div id="sidebarContent" class="flex-1 overflow-y-auto p-6 space-y-8">
            <!-- Nội dung được JS điền động -->
        </div>
    </div>

<script>
/* 1. CONTRACT CONFIG (ABI ĐÃ CẬP NHẬT ĐẦY ĐỦ CHO STRUCT MỚI) */
const contractAddress = "0xA78423a9320aa5e70Cf27aC4C4f5E75d2A2b46F6";
const abi = [
    {
        "inputs": [
            {"internalType": "string","name": "_name","type": "string"},
            {"internalType": "string","name": "_batchID","type": "string"},
            {"internalType": "string","name": "_manufactureDate","type": "string"},
            {"internalType": "string","name": "_origin","type": "string"},
            {"internalType": "string[]","name": "_ingredients","type": "string[]"},
            {"internalType": "string","name": "_productImageUrl","type": "string"},
            {"internalType": "string","name": "_certificationUrl","type": "string"},
            {"internalType": "string","name": "_manufacturerName","type": "string"},
            {"internalType": "string","name": "_factoryAddress","type": "string"}
        ],
        "name": "createProduct",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "uint256","name": "_id","type": "uint256"}],
        "name": "verifyProduct",
        "outputs": [
            {"internalType": "string","name": "name","type": "string"},
            {"internalType": "string","name": "batchID","type": "string"},
            {"internalType": "string","name": "manufactureDate","type": "string"},
            {"internalType": "string","name": "origin","type": "string"},
            {"internalType": "address","name": "owner","type": "address"},
            {"internalType": "string","name": "manufacturerName","type": "string"},
            {"internalType": "string","name": "factoryAddress","type": "string"},
            {"internalType": "string[]","name": "visibleHistory","type": "string[]"},
            {"internalType": "string[]","name": "ingredients","type": "string[]"},
            {"internalType": "string","name": "productImageUrl","type": "string"},
            {"internalType": "string","name": "certificationUrl","type": "string"}
        ],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [],
        "name": "productCount",
        "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
        "stateMutability": "view",
        "type": "function"
    },
    {
        "inputs": [{"internalType": "uint256","name": "_id","type": "uint256"},{"internalType": "address","name": "_newOwner","type": "address"}],
        "name": "transferOwnership",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    }
];

let web3, contract, account;
let currentFilter = 'inStock';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        
        // Khởi tạo filter mặc định
        document.getElementById('btnInStock').classList.add('active');
        loadProducts();
    } else {
        alert("Vui lòng cài đặt MetaMask!");
    }
});

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    
    const pageTitles = { 'list-products': 'Kho sản phẩm', 'create-product': 'Đăng ký sản phẩm', 'transfer-ownership': 'Chuyển giao quyền' };
    document.getElementById('pageTitle').innerText = pageTitles[tabId];

    const idx = ['list-products', 'create-product', 'transfer-ownership'].indexOf(tabId);
    document.querySelectorAll('.sidebar-item')[idx].classList.add('active');
}

/* 2. UPLOAD IPFS (giữ nguyên) */
async function uploadFileToIPFS(file) {
    if (!file) return "";
    const formData = new FormData();
    formData.append('file', file);

    const res = await fetch('/api/upload', {
        method: 'POST',
        body: formData
    });

    if (!res.ok) throw new Error("Upload file thất bại.");
    const data = await res.json();
    return `ipfs://${data.cid}`;
}

/* 3. ĐĂNG KÝ SẢN PHẨM (giữ nguyên) */
async function createProduct() {
    const btn = document.getElementById('btnCreate');
    const fields = {
        name: document.getElementById("name").value.trim(),
        batch: document.getElementById("batchID").value.trim(),
        date: document.getElementById("manufactureDate").value.trim(),
        origin: document.getElementById("origin").value.trim(),
        ingredients: document.getElementById("ingredients").value.trim(),
        mfrName: document.getElementById("manufacturerName").value.trim(),
        mfrAddr: document.getElementById("factoryAddress").value.trim()
    };

    if (Object.values(fields).some(v => !v)) {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner"></div> <span>Đang xử lý dữ liệu...</span>';

    try {
        const imgFile = document.getElementById("productImage").files[0];
        const certFile = document.getElementById("certification").files[0];
        
        let imgUrl = "";
        let certUrl = "";

        if (imgFile) imgUrl = await uploadFileToIPFS(imgFile);
        if (certFile) certUrl = await uploadFileToIPFS(certFile);

        const ingredientsArr = fields.ingredients.split(',').map(i => i.trim());

        await contract.methods.createProduct(
            fields.name, fields.batch, fields.date, fields.origin, 
            ingredientsArr, imgUrl, certUrl, fields.mfrName, fields.mfrAddr
        ).send({ from: account });

        const newId = await contract.methods.productCount().call();
        document.getElementById('qrSection').classList.remove('hidden');
        QRCode.toCanvas(document.getElementById("qrCode"), `VERIGLOW-ID-${newId}`, { width: 150 });
        
        alert("Sản phẩm đã được tạo vĩnh viễn trên Blockchain!");
        loadProducts();
    } catch (err) {
        alert("Lỗi: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Ký & Xác thực Blockchain</span> <i class="fa-solid fa-paper-plane"></i>';
    }
}

/* 4. LOAD SẢN PHẨM + BỘ LỌC MỚI */
async function loadProducts() {
    const tbody = document.getElementById('productListBody');
    tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-10 text-center"><div class="loading-spinner mx-auto"></div></td></tr>';

    try {
        const count = Number(await contract.methods.productCount().call());
        let html = '';
        
        for (let i = 1; i <= count; i++) {
            const p = await contract.methods.verifyProduct(i).call();
            const isOwned = p.owner.toLowerCase() === account.toLowerCase();

            // Lọc theo bộ lọc hiện tại
            if (currentFilter === 'inStock' && !isOwned) continue;
            if (currentFilter === 'transferred' && isOwned) continue;

            const statusHTML = isOwned 
                ? `<div class="flex items-center gap-1.5 px-3 py-1 bg-green-50 text-green-600 rounded-full w-fit text-[10px] font-bold"><div class="w-1.5 h-1.5 rounded-full bg-green-500"></div> SẴN SÀNG</div>`
                : `<div class="flex items-center gap-1.5 px-3 py-1 bg-orange-50 text-orange-600 rounded-full w-fit text-[10px] font-bold"><div class="w-1.5 h-1.5 rounded-full bg-orange-500"></div> ĐÃ CHUYỂN GIAO</div>`;

            html += `
                <tr class="hover:bg-slate-50 transition-all cursor-pointer" onclick="showProductDetail(${i})">
                    <td class="px-8 py-6 font-mono text-xs text-slate-400">#${i}</td>
                    <td class="px-8 py-6">
                        <div class="font-bold text-slate-800">${p.name}</div>
                        <div class="text-[10px] text-sky-500 font-bold uppercase">${p.manufacturerName}</div>
                    </td>
                    <td class="px-8 py-6">
                        <div class="text-sm font-semibold">${p.batchID}</div>
                        <div class="text-[10px] text-slate-400 truncate w-48">${p.factoryAddress}</div>
                    </td>
                    <td class="px-8 py-6 text-sm text-slate-500">${p.manufactureDate}</td>
                    <td class="px-8 py-6">${statusHTML}</td>
                </tr>
            `;
        }
        
        tbody.innerHTML = html || '<tr><td colspan="5" class="px-8 py-16 text-center text-slate-400">Không có sản phẩm nào phù hợp với bộ lọc.</td></tr>';
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-16 text-center text-red-400">Lỗi kết nối Blockchain.</td></tr>';
    }
}

/* 5. BỘ LỌC */
function setFilter(filterType) {
    currentFilter = filterType;
    
    const btnInStock = document.getElementById('btnInStock');
    const btnTransferred = document.getElementById('btnTransferred');
    
    if (filterType === 'inStock') {
        btnInStock.classList.add('active');
        btnTransferred.classList.remove('active');
    } else {
        btnInStock.classList.remove('active');
        btnTransferred.classList.add('active');
    }
    
    loadProducts();
}

/* 6. SIDEBAR CHI TIẾT SẢN PHẨM (TRƯỢT TỪ PHẢI) */
async function showProductDetail(id) {
    if (!contract) return;

    try {
        const p = await contract.methods.verifyProduct(id).call();

        // Chuyển IPFS sang gateway công khai
        const imageSrc = p.productImageUrl 
            ? p.productImageUrl.replace(/^ipfs:\/\//, 'https://ipfs.io/ipfs/') 
            : '';
        const certSrc = p.certificationUrl 
            ? p.certificationUrl.replace(/^ipfs:\/\//, 'https://ipfs.io/ipfs/') 
            : '';

        const ingredientsHTML = p.ingredients && p.ingredients.length 
            ? p.ingredients.map(ing => `<li class="flex items-start gap-2 text-slate-700"><span class="text-emerald-500">•</span> ${ing}</li>`).join('')
            : '<li class="text-slate-400">Chưa cập nhật thành phần</li>';

        const historyHTML = p.visibleHistory && p.visibleHistory.length 
            ? p.visibleHistory.map(h => `<li class="text-xs text-slate-500 py-1 border-b border-slate-100 last:border-0">${h}</li>`).join('')
            : '<li class="text-slate-400 text-xs">Chưa có lịch sử chuyển giao</li>';

        const contentHTML = `
            <div class="space-y-8">
                <!-- Ảnh sản phẩm lớn -->
                <div class="text-center">
                    ${imageSrc 
                        ? `<img src="${imageSrc}" class="mx-auto rounded-3xl shadow-xl object-cover w-full max-h-[260px]" alt="Ảnh sản phẩm">`
                        : `<div class="h-64 bg-slate-100 rounded-3xl flex flex-col items-center justify-center text-slate-400"><i class="fa-solid fa-image text-7xl mb-4"></i><p class="text-xs">Không có ảnh sản phẩm</p></div>`}
                </div>

                <!-- Thông tin cơ bản -->
                <div class="bg-slate-50 rounded-3xl p-6 grid grid-cols-2 gap-x-8 gap-y-6 text-sm">
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Tên sản phẩm</div>
                        <div class="font-semibold text-slate-800">${p.name}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Nhà sản xuất</div>
                        <div class="font-semibold text-slate-800">${p.manufacturerName}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Mã lô</div>
                        <div class="font-semibold text-slate-800">${p.batchID}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Ngày sản xuất</div>
                        <div class="font-semibold text-slate-800">${p.manufactureDate}</div>
                    </div>
                    <div class="col-span-2">
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Địa chỉ nhà máy</div>
                        <div class="font-semibold text-slate-800">${p.factoryAddress}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Quốc gia</div>
                        <div class="font-semibold text-slate-800">${p.origin}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Chủ sở hữu hiện tại</div>
                        <div class="font-mono text-[11px] bg-white p-3 rounded-2xl border border-slate-200 break-all">${p.owner}</div>
                    </div>
                </div>

                <!-- Thành phần -->
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest">Thành phần chi tiết</div>
                    <ul class="space-y-2 pl-2">${ingredientsHTML}</ul>
                </div>

                <!-- Giấy chứng nhận & Ảnh -->
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-sky-50 border border-sky-100 rounded-3xl p-5">
                        <div class="text-sky-700 text-xs font-bold mb-3">Ảnh sản phẩm</div>
                        ${imageSrc 
                            ? `<img src="${imageSrc}" class="w-full rounded-2xl shadow-sm" style="height: 180px; object-cover;">`
                            : `<div class="h-40 bg-white rounded-2xl flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-5xl"></i></div>`}
                    </div>
                    <div class="bg-indigo-50 border border-indigo-100 rounded-3xl p-5">
                        <div class="text-indigo-700 text-xs font-bold mb-3">Giấy chứng nhận</div>
                        ${certSrc 
                            ? `<img src="${certSrc}" class="w-full rounded-2xl shadow-sm" style="height: 180px; object-cover;">`
                            : `<div class="h-40 bg-white rounded-2xl flex items-center justify-center text-slate-300"><i class="fa-solid fa-file-shield text-5xl"></i></div>`}
                    </div>
                </div>

                <!-- Lịch sử chuyển giao -->
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest">Lịch sử chuyển giao quyền sở hữu</div>
                    <ul class="text-xs bg-white border border-slate-100 rounded-3xl p-5 space-y-3">${historyHTML}</ul>
                </div>

                <!-- QR Code -->
                <div class="pt-6 border-t border-dashed text-center">
                    <div class="inline-flex flex-col items-center bg-white p-6 rounded-3xl shadow-inner">
                        <canvas id="sidebarQR" class="mx-auto"></canvas>
                    </div>
                    <p class="mt-4 text-[10px] text-slate-400">VERIGLOW-ID-${id} • Quét để truy xuất nguồn gốc</p>
                </div>
            </div>
        `;

        document.getElementById('sidebarContent').innerHTML = contentHTML;

        // Mở sidebar
        const sidebar = document.getElementById('productDetailSidebar');
        sidebar.classList.remove('translate-x-full');

        // Tạo QR sau khi DOM cập nhật
        setTimeout(() => {
            const qrCanvas = document.getElementById('sidebarQR');
            if (qrCanvas) {
                QRCode.toCanvas(qrCanvas, `VERIGLOW-ID-${id}`, { width: 200, margin: 2 });
            }
        }, 150);

    } catch (err) {
        console.error(err);
        alert("Không thể tải chi tiết sản phẩm: " + err.message);
    }
}

function closeSidebar() {
    document.getElementById('productDetailSidebar').classList.add('translate-x-full');
}

/* 7. CHUYỂN GIAO QUYỀN (giữ nguyên) */
async function transferOwnership() {
    const id = document.getElementById("transferId").value;
    const newOwner = document.getElementById("newOwner").value.trim();
    if (!id || !newOwner) return alert("Vui lòng điền đủ thông tin!");
    try {
        await contract.methods.transferOwnership(id, newOwner).send({ from: account });
        alert("Đã bàn giao quyền sở hữu thành công!");
        loadProducts();
    } catch (err) { 
        alert("Lỗi chuyển giao: " + err.message); 
    }
}
</script>
</body>
</html>
