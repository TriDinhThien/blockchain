<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manufacturer Dashboard | CosmeChain Blockchain</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0ea5e9; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .filter-tab.active { background: #0ea5e9; color: white; border-color: #0ea5e9; }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen flex text-slate-900">

    <!-- ASIDE & HEADER GIỮ NGUYÊN HOÀN TOÀN NHƯ CODE CŨ CỦA BẠN -->
    <aside class="w-72 bg-white border-r border-slate-200 hidden md:flex flex-col sticky top-0 h-screen">
        <!-- ... (giữ nguyên toàn bộ phần aside) ... -->
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <!-- HEADER giữ nguyên -->
        <!-- ... -->

        <div class="p-10 overflow-y-auto">
            
            <!-- TAB LIST PRODUCTS giữ nguyên -->
            <div id="list-products" class="tab-content active">
                <!-- ... giữ nguyên toàn bộ ... -->
            </div>

            <!-- TAB TẠO SẢN PHẨM – GIỮ NGUYÊN 100% HTML NHƯ CODE CŨ -->
            <div id="create-product" class="tab-content max-w-5xl mx-auto">
                <div class="bg-white rounded-[2rem] border border-slate-200 shadow-2xl overflow-hidden">
                    <div class="bg-slate-900 p-10 text-white relative">
                        <h3 class="text-2xl font-bold mb-2">Đăng ký sản phẩm mới</h3>
                        <p class="text-slate-400 text-sm">Nhập thông tin để lưu lên Blockchain.</p>
                    </div>
                    <div class="p-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700 ml-1">Tên mỹ phẩm</label>
                            <input id="name" type="text" placeholder="Ví dụ: Kem dưỡng ẩm sâu" class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/50">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700 ml-1">Mã lô (Batch ID)</label>
                            <input id="batchID" type="text" placeholder="BATCH-XXXX" class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/50">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700 ml-1">Ngày sản xuất</label>
                            <input id="manufactureDate" type="date" class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/50">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-700 ml-1">Xuất xứ</label>
                            <input id="origin" type="text" placeholder="Vietnam" class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/50">
                        </div>
                        <div class="md:col-span-2">
                            <button id="btnCreate" onclick="createProduct()" class="w-full py-4 bg-sky-600 hover:bg-sky-700 text-white font-bold rounded-2xl shadow-xl transition-all">
                                Ký và gửi giao dịch Blockchain
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- QR SECTION – GIỮ NGUYÊN HTML NHƯ CODE CŨ -->
                <div id="qrSection" class="hidden mt-8 text-center bg-white p-8 rounded-[2rem] border-2 border-dashed border-slate-200">
                    <canvas id="qrCode" class="mx-auto rounded-xl"></canvas>
                </div>
            </div>

            <!-- TAB TRANSFER giữ nguyên -->
            <div id="transfer-ownership" class="tab-content max-w-2xl mx-auto">
                <!-- ... giữ nguyên ... -->
            </div>
        </div>
    </main>

<script>
// === GIỮ NGUYÊN TOÀN BỘ PHẦN ĐẦU SCRIPT (contract, web3, loadMyProducts, v.v.) ===
const contractAddress = "0xf57C58cA13F953271a761f1d3Eb6283270A5331a";
const abi = [ /* giữ nguyên ABI như code cũ */ ];

let web3, contract, account;
let currentFilter = 'in-stock';

window.addEventListener("load", async () => {
    if (window.ethereum) {
        web3 = new Web3(window.ethereum);
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        account = accounts[0];
        document.getElementById('accountDisplay').innerText = account;
        contract = new web3.eth.Contract(abi, contractAddress);
        loadMyProducts();
    }
});

function showTab(tabId) { /* giữ nguyên */ }
function saveShippedId(id) { /* giữ nguyên */ }
function getShippedIds() { /* giữ nguyên */ }
function setFilter(type) { /* giữ nguyên */ }
async function loadMyProducts() { /* giữ nguyên */ }
async function previewProduct(id) { /* giữ nguyên */ }
async function transferOwnership() { /* giữ nguyên */ }
function showProductQr(id) { /* giữ nguyên */ }

// === PHẦN ĐÃ HOÀN THIỆN: TẠO SẢN PHẨM + KÍCH HOẠT QR (chỉ thay đổi phần này) ===
async function createProduct() {
    const name = document.getElementById("name").value;
    const batch = document.getElementById("batchID").value;
    const date = Math.floor(new Date(document.getElementById("manufactureDate").value).getTime()/1000);
    const origin = document.getElementById("origin").value;

    try {
        // Lấy ID hiện tại trước khi tạo
        const currentCount = Number(await contract.methods.productCount().call());

        await contract.methods.createProduct(name, batch, date, origin, [], "", "").send({from: account});

        const newProductId = currentCount + 1;

        alert(`✅ Thành công! Sản phẩm ID mới: #${newProductId}`);

        // === KÍCH HOẠT QR NGAY (tính năng bạn cần) ===
        const qrSection = document.getElementById('qrSection');
        qrSection.classList.remove('hidden');

        const displayId = `PRD-${String(newProductId).padStart(8, '0')}`;
        const verifyUrl = `${window.location.origin}/verify.html?code=${displayId}`;

        QRCode.toCanvas(document.getElementById("qrCode"), verifyUrl, { width: 280 });

        // Cập nhật danh sách kho
        loadMyProducts();

    } catch (e) {
        console.error(e);
        alert("Lỗi giao dịch! Vui lòng kiểm tra MetaMask và thử lại.");
    }
}
</script>
</body>
</html>
