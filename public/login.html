<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - VeriGlow Traceability</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        /* Intro Screen */
        #intro-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.45);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.85) contrast(1.1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
        }

        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #0ea5e9, #10b981);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }

        input, select {
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }

        .submit-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(16, 185, 129, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.75);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(16px);
        }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center overflow-hidden">

    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <video id="intro-video" autoplay loop muted playsinline>
            <source src="https://videos.pexels.com/video-files/854219/854219-hd_1920_1080_30fps.mp4" type="video/mp4">
        </video>
        
        <div class="text-center z-10 px-6">
            <img src="2.png" alt="VeriGlow Logo" 
                 class="mx-auto w-44 h-44 rounded-full object-cover shadow-2xl border-8 border-white/40 mb-8 ring-8 ring-white/20">
            
            <h1 class="text-6xl font-bold tracking-[-2px] text-white drop-shadow-2xl">VeriGlow</h1>
            <p class="text-white/90 text-2xl mt-3 font-light">Blockchain Traceability</p>
            
            <button onclick="enterDashboard()" 
                    class="mt-16 px-16 py-6 bg-white text-slate-900 rounded-3xl font-semibold text-2xl shadow-2xl hover:scale-105 transition-all flex items-center gap-4 mx-auto">
                <span>Bắt đầu ngay</span>
                <i class="fa-solid fa-leaf text-emerald-500"></i>
            </button>
        </div>
    </div>

    <!-- LOGIN CONTAINER -->
    <div id="main-content" class="hidden w-full max-w-md mx-auto p-6">
        <div class="glass rounded-3xl shadow-2xl p-10 border border-white/60">
            <div class="flex justify-center mb-8">
                <img src="2.png" alt="VeriGlow" class="w-16 h-16 rounded-2xl shadow-lg">
            </div>
            
            <h1 class="text-3xl font-bold text-center text-slate-800 tracking-tight mb-2">Chào mừng trở lại</h1>
            <p class="text-center text-slate-500 mb-8">Đăng nhập để truy xuất nguồn gốc sản phẩm</p>

            <!-- Tabs -->
            <div class="tabs flex gap-2 mb-8 bg-slate-100 p-1 rounded-3xl">
                <button id="loginTab" onclick="switchTab('login')" 
                        class="tab-btn active flex-1 py-4 rounded-3xl font-semibold text-sm">Đăng Nhập</button>
                <button id="registerTab" onclick="switchTab('register')" 
                        class="tab-btn flex-1 py-4 rounded-3xl font-semibold text-sm">Tạo Tài Khoản</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Tên đăng nhập" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                <input type="password" id="loginPassword" placeholder="Mật khẩu" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                <button type="submit" class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl text-lg shadow-lg">
                    Đăng Nhập
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden">
                <input type="text" id="regUsername" placeholder="Tên đăng nhập" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                <input type="email" id="regEmail" placeholder="Email" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                <input type="password" id="regPassword" placeholder="Mật khẩu" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                
                <select id="regRole" required
                        class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                    <option value="">-- Chọn vai trò --</option>
                    <option value="manufacturer">Manufacturer (Nhà sản xuất)</option>
                    <option value="distributor">Distributor (Nhà phân phối)</option>
                    <option value="consumer">Consumer (Người tiêu dùng)</option>
                </select>
                
                <button type="submit" class="submit-btn w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-semibold rounded-2xl text-lg shadow-lg">
                    Tạo Tài Khoản
                </button>
            </form>

            <!-- Google Login -->
            <div class="mt-8">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-white px-4 text-slate-400">hoặc</span>
                    </div>
                </div>
                <div class="google-btn mt-6 flex justify-center">
                    <div id="g_id_signin"></div>
                </div>
            </div>

            <div class="text-center mt-8 text-xs text-slate-400">
                © 2026 VeriGlow Blockchain Traceability
            </div>
        </div>
    </div>

    <!-- Function Info Modal -->
    <div id="functionModal" class="modal" onclick="if(event.target.id==='functionModal')this.classList.remove('active')">
        <div class="modal-content w-full max-w-md mx-4 bg-white rounded-3xl p-8" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <h3 id="functionTitle" class="text-2xl font-bold text-slate-800"></h3>
                <button onclick="document.getElementById('functionModal').classList.remove('active')" 
                        class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-3xl"></i></button>
            </div>
            <div id="functionDesc" class="text-slate-600 leading-relaxed"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="document.getElementById('functionModal').classList.remove('active')" 
                        class="px-8 py-3 bg-emerald-600 text-white rounded-3xl font-medium">Đã hiểu</button>
            </div>
        </div>
    </div>

<script>
// ================= TAB SWITCH =================
function switchTab(type) {
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    loginForm.classList.toggle("hidden", type !== "login");
    registerForm.classList.toggle("hidden", type !== "register");
    loginTab.classList.toggle("active", type === "login");
    registerTab.classList.toggle("active", type === "register");
}

// ================= REGISTER =================
document.getElementById("registerForm").addEventListener("submit", e => {
    e.preventDefault();
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const role = document.getElementById("regRole").value;

    if (!role) return alert("Vui lòng chọn vai trò");
    if (localStorage.getItem("user_" + username)) {
        return alert("Username đã tồn tại!");
    }

    const user = { username, email, password, role };
    localStorage.setItem("user_" + username, JSON.stringify(user));
    alert("✅ Tạo tài khoản thành công!");
    switchTab("login");
});

// ================= LOGIN =================
document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;

    const stored = localStorage.getItem("user_" + username);
    if (!stored) return alert("Tài khoản không tồn tại!");

    const user = JSON.parse(stored);
    if (user.password !== password) return alert("Sai mật khẩu!");

    saveSession(user);
    redirectByRole(user.role);
});

// ================= GOOGLE =================
window.onload = function() {
    google.accounts.id.initialize({
        client_id: "YOUR_GOOGLE_CLIENT_ID", // ← Thay bằng Client ID thật của bạn
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
    });

    google.accounts.id.renderButton(
        document.getElementById("g_id_signin"),
        { theme: "outline", size: "large", width: "100%" }
    );
};

function handleCredentialResponse(response) {
    google.accounts.id.disableAutoSelect();
    fetch("/api/google-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: response.credential })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            const user = {
                username: data.email,
                email: data.email,
                role: "consumer"
            };
            saveSession(user);
            redirectByRole("consumer");
        } else {
            alert("Google login thất bại");
        }
    })
    .catch(err => console.error(err));
}

// ================= SESSION & REDIRECT =================
function saveSession(user) {
    sessionStorage.setItem("currentUser", JSON.stringify(user));
}

function redirectByRole(role) {
    if (role === "manufacturer") window.location = "manufacturer.html";
    else if (role === "distributor") window.location = "distributor.html";
    else window.location = "consumer.html";
}

function logout() {
    sessionStorage.removeItem("currentUser");
    google.accounts.id.disableAutoSelect();
    window.location = "index.html";
}

// ================= ENTER DASHBOARD =================
function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
    }, 800);
}

// ================= FUNCTION INFO MODAL =================
function showFunctionInfo(type) {
    // Hiện tại trang login chưa có nút info, bạn có thể thêm sau nếu cần
    // Code này để giữ tính nhất quán với các trang khác
}

// Khởi động intro
document.addEventListener("DOMContentLoaded", () => {
    // Có thể thêm logic khác nếu cần
});
</script>
</body>
</html>
