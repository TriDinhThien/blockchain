<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - VeriGlow Traceability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Background layer */
        #background-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Video background */
        #background-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.75);
        }

        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
        }

        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #0ea5e9, #10b981);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }

        input, select {
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }

        .submit-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <!-- Background Layer -->
    <div id="background-layer">
        <!-- Video background (ưu tiên nếu có file background.mp4) -->
        <video id="background-video" autoplay loop muted playsinline class="hidden">
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="flex items-center justify-center min-h-screen p-6 relative z-10">
        <div class="w-full max-w-md">
            <div class="glass rounded-3xl shadow-2xl p-10 border border-white/70">
                
                <!-- Header -->
                <div class="flex flex-col items-center mb-10">
                    <img src="2.png" alt="VeriGlow Logo" 
                         class="w-20 h-20 rounded-3xl object-cover shadow-2xl ring-4 ring-white mb-4">
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-sky-600 to-emerald-600 bg-clip-text text-transparent tracking-tighter">
                        VeriGlow
                    </h1>
                    <p class="text-slate-500 text-sm mt-1">Blockchain Traceability System</p>
                </div>

                <!-- Tabs -->
                <div class="flex bg-slate-100 rounded-2xl p-1 mb-10">
                    <button id="loginTab" 
                            onclick="switchTab('login')"
                            class="tab-btn active flex-1 py-4 rounded-xl font-semibold text-sm">
                        Đăng Nhập
                    </button>
                    <button id="registerTab" 
                            onclick="switchTab('register')"
                            class="tab-btn flex-1 py-4 rounded-xl font-semibold text-sm">
                        Tạo Tài Khoản
                    </button>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="space-y-6">
                        <input type="text" id="loginUsername" 
                               class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm"
                               placeholder="Tên đăng nhập" required>
                        
                        <input type="password" id="loginPassword" 
                               class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm"
                               placeholder="Mật khẩu" required>
                        
                        <button type="submit" 
                                class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl text-base shadow-lg">
                            Đăng Nhập
                        </button>
                    </div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="hidden space-y-6">
                    <input type="text" id="regUsername" 
                           class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm"
                           placeholder="Tên đăng nhập" required>
                    
                    <input type="email" id="regEmail" 
                           class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm"
                           placeholder="Email" required>
                    
                    <input type="password" id="regPassword" 
                           class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm"
                           placeholder="Mật khẩu" required>
                    
                    <select id="regRole" 
                            class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none text-sm">
                        <option value="">-- Chọn vai trò --</option>
                        <option value="manufacturer">Manufacturer (Nhà sản xuất)</option>
                        <option value="distributor">Distributor (Nhà phân phối)</option>
                        <option value="consumer">Consumer (Người tiêu dùng)</option>
                    </select>
                    
                    <button type="submit" 
                            class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl text-base shadow-lg">
                        Tạo Tài Khoản
                    </button>
                </form>

                <!-- Google Sign In -->
                <div class="mt-8">
                    <div class="text-center text-slate-400 text-xs mb-4 tracking-widest">HOẶC TIẾP TỤC VỚI</div>
                    <div id="g_id_signin" class="flex justify-center"></div>
                </div>

                <div class="text-center mt-12 text-xs text-slate-400">
                    © 2026 VeriGlow Blockchain Traceability System
                </div>
            </div>
        </div>
    </div>

<script>
// Background Setup - Ưu tiên video, sau đó là ảnh
document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('background-video');
    const bgLayer = document.getElementById('background-layer');

    // Kiểm tra video có tồn tại không
    fetch('background.mp4', { method: 'HEAD' })
        .then(response => {
            if (response.ok) {
                video.classList.remove('hidden');
                video.play().catch(() => {});
            } else {
                // Nếu không có video → dùng ảnh background.jpg hoặc background.png
                bgLayer.style.backgroundImage = "url('background.jpg')";
            }
        })
        .catch(() => {
            // Fallback dùng ảnh nếu không có video
            bgLayer.style.backgroundImage = "url('background.jpg')";
        });

    // Tab Switch
    function switchTab(type) {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const loginTab = document.getElementById("loginTab");
        const registerTab = document.getElementById("registerTab");

        if (type === "login") {
            loginForm.classList.remove("hidden");
            registerForm.classList.add("hidden");
            loginTab.classList.add("active");
            registerTab.classList.remove("active");
        } else {
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
            loginTab.classList.remove("active");
            registerTab.classList.add("active");
        }
    }

    // Register
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const role = document.getElementById("regRole").value;

        if (!role) return alert("Vui lòng chọn vai trò!");
        if (localStorage.getItem("user_" + username)) {
            return alert("Tên đăng nhập đã tồn tại!");
        }

        const user = { username, email, password, role };
        localStorage.setItem("user_" + username, JSON.stringify(user));
        alert("✅ Tạo tài khoản thành công!");
        switchTab("login");
    });

    // Login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        const stored = localStorage.getItem("user_" + username);
        if (!stored) return alert("Tài khoản không tồn tại!");

        const user = JSON.parse(stored);
        if (user.password !== password) return alert("Sai mật khẩu!");

        saveSession(user);
        redirectByRole(user.role);
    });

    // Google Sign In
    function initGoogle() {
        if (typeof google === 'undefined') return;
        
        google.accounts.id.initialize({
            client_id: "YOUR_GOOGLE_CLIENT_ID",   // ← Thay bằng Client ID Google của bạn
            callback: handleCredentialResponse,
            auto_select: false,
            cancel_on_tap_outside: true
        });

        google.accounts.id.renderButton(
            document.getElementById("g_id_signin"),
            { theme: "outline", size: "large", width: "100%", text: "continue_with" }
        );
    }

    function handleCredentialResponse(response) {
        google.accounts.id.disableAutoSelect();
        const user = { username: "google_user", email: "user@gmail.com", role: "consumer" };
        saveSession(user);
        redirectByRole("consumer");
    }

    function saveSession(user) {
        sessionStorage.setItem("currentUser", JSON.stringify(user));
    }

    function redirectByRole(role) {
        if (role === "manufacturer") window.location = "manufacturer.html";
        else if (role === "distributor") window.location = "distributor.html";
        else window.location = "consumer.html";
    }

    // Khởi tạo Google
    window.addEventListener('load', initGoogle);
});
</script>
</body>
</html>
