<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đăng Nhập - VeriGlow Traceability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Firebase SDK v12.11.0 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCXS7P36IXbu2wg63hXhEMPtbSacXjmekU",
            authDomain: "veriglow-traceability.firebaseapp.com",
            projectId: "veriglow-traceability",
            storageBucket: "veriglow-traceability.firebasestorage.app",
            messagingSenderId: "133403846027",
            appId: "1:133403846027:web:c64ab22e3214604f47fb8e",
            measurementId: "G-8PNN9581QK"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Export để dùng trong script thường
        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDB = db;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
       
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.93);
            backdrop-filter: blur(20px);
        }
        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active {
            background: linear-gradient(90deg, #0ea5e9, #10b981);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }
        input, select {
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        .submit-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(16, 185, 129, 0.4);
        }
        /* Mobile optimization */
        @media (max-width: 640px) {
            .glass {
                padding: 28px 20px;
                margin: 10px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6">

    <!-- Intro Screen -->
    <div id="intro-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0f172a]/60 transition-all duration-700">
        <div class="text-center z-10 px-6 max-w-xs sm:max-w-sm">
            <img src="2.png" alt="VeriGlow Logo"
                 class="mx-auto w-36 h-36 sm:w-44 sm:h-44 rounded-full object-cover shadow-2xl border-8 border-white/40 mb-8 ring-8 ring-white/20">
           
            <h1 class="text-5xl sm:text-6xl font-bold tracking-[-2px] text-white drop-shadow-xl">
                VeriGlow
            </h1>
            <p class="text-white/90 text-xl sm:text-2xl mt-3 font-light">Blockchain Traceability</p>
            <p class="text-emerald-200 text-sm mt-2">Minh bạch • An toàn • Kết nối thiên nhiên</p>
          
            <button onclick="enterDashboard()"
                    class="mt-12 w-full sm:w-auto px-14 py-6 bg-white text-slate-900 rounded-3xl font-semibold text-xl sm:text-2xl shadow-2xl hover:shadow-3xl hover:scale-105 transition-all flex items-center justify-center gap-4 mx-auto">
                <span>Tiếp tục đăng nhập</span>
                <i class="fa-solid fa-arrow-right text-emerald-500"></i>
            </button>
        </div>
    </div>

    <!-- Main Login Container -->
    <div id="main-content" class="hidden w-full max-w-md mx-auto">
        <div class="glass rounded-3xl shadow-2xl p-8 sm:p-10 border border-white/60">
           
            <!-- Header -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="2.png" alt="Logo" class="w-12 h-12 sm:w-14 sm:h-14 rounded-3xl object-cover shadow-md">
                <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-sky-600 to-emerald-600 bg-clip-text text-transparent">
                    VeriGlow
                </h1>
            </div>
            <p class="text-center text-slate-500 mb-8 text-sm">Hệ thống truy xuất nguồn gốc Blockchain</p>

            <!-- Tabs -->
            <div class="flex bg-slate-100 rounded-2xl p-1 mb-8">
                <button id="loginTab"
                        onclick="switchTab('login')"
                        class="tab-btn active flex-1 py-4 rounded-xl font-semibold text-sm">
                    Đăng Nhập
                </button>
                <button id="registerTab"
                        onclick="switchTab('register')"
                        class="tab-btn flex-1 py-4 rounded-xl font-semibold text-sm">
                    Tạo Tài Khoản
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="space-y-5">
                    <input type="text" id="loginUsername"
                           class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm"
                           placeholder="Tên đăng nhập" required>
                   
                    <input type="password" id="loginPassword"
                           class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm"
                           placeholder="Mật khẩu" required>
                   
                    <button type="submit"
                            class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl text-base shadow-lg">
                        Đăng Nhập
                    </button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden space-y-5">
                <input type="text" id="regUsername"
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm"
                       placeholder="Tên đăng nhập" required>
               
                <input type="email" id="regEmail"
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm"
                       placeholder="Email" required>
               
                <input type="password" id="regPassword"
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm"
                       placeholder="Mật khẩu" required>
               
                <select id="regRole"
                        class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:outline-none text-sm bg-white">
                    <option value="">-- Chọn vai trò --</option>
                    <option value="manufacturer">Manufacturer (Nhà sản xuất)</option>
                    <option value="distributor">Distributor (Nhà phân phối)</option>
                    <option value="consumer">Consumer (Người tiêu dùng)</option>
                </select>
               
                <button type="submit"
                        class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl text-base shadow-lg">
                    Tạo Tài Khoản
                </button>
            </form>

            <!-- Google Sign In -->
            <div class="mt-8">
                <div class="text-center text-slate-400 text-xs mb-4">hoặc</div>
                <div id="g_id_signin" class="flex justify-center"></div>
            </div>

            <div class="text-center mt-10 text-[10px] text-slate-400">
                © 2026 VeriGlow Blockchain Traceability System
            </div>
        </div>
    </div>

<script>
// Tab Switch
function switchTab(type) {
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    if (type === "login") {
        loginForm.classList.remove("hidden");
        registerForm.classList.add("hidden");
        loginTab.classList.add("active");
        registerTab.classList.remove("active");
    } else {
        loginForm.classList.add("hidden");
        registerForm.classList.remove("hidden");
        loginTab.classList.remove("active");
        registerTab.classList.add("active");
    }
}

// Register (sẽ cập nhật sau khi dùng Firebase đầy đủ)
document.getElementById("registerForm").addEventListener("submit", e => {
    e.preventDefault();
    const username = document.getElementById("regUsername").value.trim();
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const role = document.getElementById("regRole").value;

    if (!role) return alert("Vui lòng chọn vai trò!");
    if (localStorage.getItem("user_" + username)) {
        return alert("Tên đăng nhập đã tồn tại!");
    }

    const user = { username, email, password, role };
    localStorage.setItem("user_" + username, JSON.stringify(user));
   
    alert("✅ Tạo tài khoản thành công!");
    switchTab("login");
});

// Login
document.getElementById("loginForm").addEventListener("submit", e => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const stored = localStorage.getItem("user_" + username);
    if (!stored) return alert("Tài khoản không tồn tại!");
    const user = JSON.parse(stored);
    if (user.password !== password) return alert("Sai mật khẩu!");
    saveSession(user);
    redirectByRole(user.role);
});

// Google Sign In
window.onload = function() {
    google.accounts.id.initialize({
        client_id: "YOUR_GOOGLE_CLIENT_ID",
        callback: handleCredentialResponse,
        auto_select: false,
        cancel_on_tap_outside: true
    });
    google.accounts.id.renderButton(
        document.getElementById("g_id_signin"),
        {
            theme: "outline",
            size: "large",
            width: "100%",
            text: "continue_with"
        }
    );
};

function handleCredentialResponse(response) {
    google.accounts.id.disableAutoSelect();
    const user = {
        username: "google_user",
        email: "user@gmail.com",
        role: "consumer"
    };
    saveSession(user);
    redirectByRole("consumer");
}

function saveSession(user) {
    sessionStorage.setItem("currentUser", JSON.stringify(user));
}

function redirectByRole(role) {
    if (role === "manufacturer") window.location = "manufacturer.html";
    else if (role === "distributor") window.location = "distributor.html";
    else window.location = "consumer.html";
}

// Enter Dashboard
function enterDashboard() {
    const intro = document.getElementById('intro-screen');
    intro.style.opacity = '0';
    setTimeout(() => {
        intro.style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
    }, 700);
}
</script>
</body>
</html>
