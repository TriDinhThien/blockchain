<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đăng Nhập - VeriGlow Traceability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background:
                linear-gradient(rgba(15, 23, 42, 0.45), rgba(15, 23, 42, 0.65)),
                url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat fixed;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
        }

        .tab-btn {
            transition: all 0.35s ease;
            color: #e2e8f0;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, #0ea5e9, #10b981);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }

        .submit-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -8px rgba(16, 185, 129, 0.4);
        }

        .form-input,
        .form-select {
            background: rgba(255,255,255,0.9);
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14,165,233,0.15);
        }

        .intro-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .intro-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(2, 6, 23, 0.35), rgba(2, 6, 23, 0.72));
            z-index: 1;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="intro-screen" class="fixed inset-0 z-50 flex items-center justify-center transition-all duration-700 overflow-hidden">
        <video autoplay muted loop playsinline class="intro-video">
            <source src="intro-login-background.mp4" type="video/mp4">
        </video>
        <div class="intro-overlay"></div>

        <div class="text-center z-10 px-6 relative">
            <img src="2.png" alt="VeriGlow Logo" class="mx-auto w-36 h-36 rounded-full object-cover shadow-2xl border-8 border-white/40 mb-8">
            <h1 class="text-5xl md:text-6xl font-bold text-white drop-shadow-xl tracking-wide">VeriGlow</h1>
            <p class="text-white/90 text-xl mt-3 font-light tracking-[0.2em] uppercase">Blockchain Traceability</p>
            <button onclick="enterDashboard()" class="mt-12 px-14 py-6 bg-white text-slate-900 rounded-3xl font-semibold text-xl shadow-2xl hover:scale-105 transition-all flex items-center gap-4 mx-auto">
                <span>Tiếp tục đăng nhập</span>
                <i class="fa-solid fa-arrow-right text-emerald-500"></i>
            </button>
        </div>
    </div>

    <div id="main-content" class="hidden w-full max-w-md mx-auto">
        <div class="glass rounded-3xl p-8 md:p-10">
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="2.png" alt="Logo" class="w-14 h-14 rounded-2xl object-cover shadow-lg">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-sky-300 to-emerald-300 bg-clip-text text-transparent">VeriGlow</h1>
            </div>

            <p class="text-center text-slate-200 mb-8 text-sm leading-relaxed">
                Hệ thống truy xuất nguồn gốc mỹ phẩm minh bạch,
                bảo mật và đáng tin cậy trên nền tảng Blockchain.
            </p>

            <div class="flex bg-white/10 rounded-2xl p-1 mb-8 border border-white/10">
                <button id="loginTab" onclick="switchTab('login')" class="tab-btn active flex-1 py-4 rounded-xl font-semibold text-sm">Đăng Nhập</button>
                <button id="registerTab" onclick="switchTab('register')" class="tab-btn flex-1 py-4 rounded-xl font-semibold text-sm">Tạo Tài Khoản</button>
            </div>

            <form id="loginForm" class="space-y-5">
                <input type="email" id="loginEmail" class="form-input w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" placeholder="Email" required>
                <input type="password" id="loginPassword" class="form-input w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" placeholder="Mật khẩu" required>
                <button type="submit" class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl shadow-lg">Đăng Nhập</button>
            </form>

            <form id="registerForm" class="hidden space-y-5">
                <input type="text" id="regUsername" class="form-input w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" placeholder="Tên người dùng" required>
                <input type="email" id="regEmail" class="form-input w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" placeholder="Email" required>
                <input type="password" id="regPassword" class="form-input w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" placeholder="Mật khẩu (6+ ký tự)" required>
                <select id="regRole" class="form-select w-full px-6 py-4 rounded-2xl border border-transparent focus:outline-none text-sm" required>
                    <option value="">-- Chọn vai trò --</option>
                    <option value="manufacturer">Nhà sản xuất</option>
                    <option value="distributor">Nhà phân phối</option>
                    <option value="consumer">Người tiêu dùng</option>
                </select>
                <button type="submit" class="submit-btn w-full py-4 bg-gradient-to-r from-sky-600 to-emerald-600 text-white font-semibold rounded-2xl shadow-lg">Đăng Ký</button>
            </form>

            <div id="g_id_signin" class="mt-8 flex justify-center"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAQH-F90Hv_f1uMOENv7hCm_bGU9f0aGs",
            authDomain: "veriglow.firebaseapp.com",
            projectId: "veriglow",
            storageBucket: "veriglow.firebasestorage.app",
            messagingSenderId: "400350869290",
            appId: "1:400350869290:web:a4bff84794214a1dcb5053"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.enterDashboard = () => {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
            }, 700);
        };

        window.switchTab = (type) => {
            document.getElementById("loginForm").classList.toggle("hidden", type === 'register');
            document.getElementById("registerForm").classList.toggle("hidden", type === 'login');
            document.getElementById("loginTab").classList.toggle("active", type === 'login');
            document.getElementById("registerTab").classList.toggle("active", type === 'register');
        };

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("regEmail").value.trim();
            const password = document.getElementById("regPassword").value;
            const username = document.getElementById("regUsername").value.trim();
            const role = document.getElementById("regRole").value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: email,
                    role: role,
                    createdAt: new Date().toISOString()
                });

                alert("Đăng ký thành công! Hãy đăng nhập.");
                window.switchTab('login');
            } catch (error) {
                alert("Lỗi đăng ký: " + error.message);
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    sessionStorage.setItem("currentUser", JSON.stringify({ ...userData, uid: user.uid }));
                    localStorage.setItem("loggedInUserId", user.uid);

                    alert("Đăng nhập thành công!");
                    const target = userData.role === "manufacturer" ? "manufacturer.html" :
                                 userData.role === "distributor" ? "distributor.html" : "consumer.html";
                    window.location.href = target;
                }
            } catch (error) {
                alert("Sai email hoặc mật khẩu. Vui lòng thử lại.");
            }
        });
    </script>
</body>
</html>
