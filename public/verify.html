<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xác thực sản phẩm | VeriGlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { 
            --primary: #ec4899; 
            --primary-light: #fdf2f8;
            --slate-800: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #fff1f2, #f8fafc);
            background-attachment: fixed;
            color: var(--slate-800);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }

        .gradient-text {
            background: linear-gradient(135deg, #db2777 0%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #db2777 0%, #ec4899 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.4);
        }

        /* Journey Styles */
        .journey-line::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #f1f5f9;
        }

        .node-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            left: 6px;
            top: 4px;
            z-index: 10;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center border border-pink-100">
                <img src="2.png" alt="VeriGlow" class="w-7 h-7">
            </div>
            <span class="text-xl font-extrabold tracking-tight text-slate-800">VeriGlow</span>
        </div>
        <div id="statusIndicator" class="flex items-center gap-2 px-4 py-2 bg-white rounded-full border border-slate-100 shadow-sm text-[10px] font-bold uppercase tracking-wider text-slate-400">
            <span class="w-2 h-2 rounded-full bg-slate-300"></span> Blockchain Offline
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6">
        
        <header class="text-center py-8">
            <h1 class="text-4xl font-extrabold mb-3 tracking-tight text-slate-800">Truy xuất nguồn gốc</h1>
            <p class="text-slate-500 text-sm leading-relaxed max-w-xs mx-auto">Nhập mã định danh duy nhất để kiểm tra tính minh bạch của sản phẩm.</p>
        </header>

        <section id="batchInputCard" class="glass-card rounded-[2.5rem] p-8 shadow-xl border border-white mb-8 animate-fade-in">
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mb-3 ml-1">Product ID (6 ký tự)</label>
                    <div class="relative">
                        <input type="text" id="batchInput" maxlength="6" placeholder="Ví dụ: VG1234" 
                               class="w-full bg-slate-50 border border-slate-100 rounded-2xl py-5 px-6 text-xl font-bold text-slate-700 placeholder:text-slate-300 transition-all uppercase tracking-widest">
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300">
                            <i class="fa-solid fa-keyboard text-xl"></i>
                        </div>
                    </div>
                </div>
                <button onclick="checkProduct()" id="verifyBtn" class="w-full btn-primary py-5 rounded-2xl text-white font-bold text-lg shadow-lg flex items-center justify-center gap-3">
                    <span>Xác thực ngay</span>
                    <i class="fa-solid fa-arrow-right-long text-sm"></i>
                </button>
            </div>
        </section>

        <section id="resultArea" class="hidden space-y-6 animate-fade-in">
            
            <div class="glass-card rounded-[3rem] overflow-hidden shadow-2xl border border-white">
                <div class="relative group">
                    <img id="resImg" src="" class="w-full h-80 object-cover transition-transform duration-700 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                    <div class="absolute bottom-6 left-8 right-8">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="px-3 py-1 bg-emerald-500 text-white text-[10px] font-bold rounded-full uppercase tracking-wider flex items-center gap-1.5">
                                <i class="fa-solid fa-shield-check"></i> Chính hãng
                            </span>
                        </div>
                        <h2 id="resName" class="text-3xl font-bold text-white leading-tight"></h2>
                    </div>
                </div>

                <div class="p-8 space-y-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                            <span class="text-[10px] text-slate-400 block uppercase font-bold tracking-wider mb-1">Mã lô hàng</span>
                            <strong id="resBatch" class="text-slate-700 text-sm"></strong>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100">
                            <span class="text-[10px] text-slate-400 block uppercase font-bold tracking-wider mb-1">Ngày sản xuất</span>
                            <strong id="resDate" class="text-slate-700 text-sm"></strong>
                        </div>
                        <div class="bg-slate-50 p-5 rounded-[2rem] border border-slate-100 col-span-2">
                            <span class="text-[10px] text-slate-400 block uppercase font-bold tracking-wider mb-1">Nguồn gốc xuất xứ</span>
                            <div class="flex items-center gap-2 mt-1">
                                <i class="fa-solid fa-location-dot text-rose-500"></i>
                                <strong id="resOrigin" class="text-slate-700 text-sm"></strong>
                            </div>
                        </div>
                    </div>

                    <div>
                        <h4 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-leaf text-emerald-500"></i> Thành phần sản phẩm
                        </h4>
                        <div id="resIngredients" class="flex flex-wrap gap-2"></div>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <h4 class="text-xs font-extrabold text-slate-800 uppercase tracking-widest mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-route text-pink-500"></i> Hành trình Blockchain
                        </h4>
                        <div id="resJourney" class="relative pl-6 space-y-0 journey-line">
                            </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-4">
                        <button onclick="resetVerify()" class="py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-sm hover:bg-slate-200 transition-colors">
                            Kiểm tra mã khác
                        </button>
                        <button onclick="generateShareQR()" class="py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg">
                            <i class="fa-solid fa-share-nodes text-xs"></i> Chia sẻ
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white/60 p-6 rounded-[2rem] border border-white flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-file-shield"></i>
                    </div>
                    <div>
                        <h5 class="text-sm font-bold text-slate-800">Chứng nhận chất lượng</h5>
                        <p class="text-[10px] text-slate-400">Đã được xác minh trên IPFS</p>
                    </div>
                </div>
                <a id="resCert" href="#" target="_blank" class="w-10 h-10 bg-white border border-slate-100 rounded-xl flex items-center justify-center text-slate-400 hover:text-pink-500 transition-colors shadow-sm">
                    <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                </a>
            </div>
        </section>
    </main>

    <script>
        const contractAddress = "0x5fb38a482899ee0C716996872A0b7DD95038B98a";
        const abi = [
            {
                "inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
                "name": "getProductBasicInfo",
                "outputs": [
                    {"internalType": "string", "name": "name", "type": "string"},
                    {"internalType": "string", "name": "batchID", "type": "string"},
                    {"internalType": "string", "name": "manufactureDate", "type": "string"},
                    {"internalType": "string", "name": "origin", "type": "string"},
                    {"internalType": "bool", "name": "isAuthentic", "type": "bool"},
                    {"internalType": "address", "name": "owner", "type": "address"},
                    {"internalType": "string[]", "name": "ingredients", "type": "string[]"},
                    {"internalType": "string", "name": "productImageUrl", "type": "string"},
                    {"internalType": "string", "name": "certificationUrl", "type": "string"}
                ],
                "stateMutability": "view", "type": "function"
            },
            {
                "inputs": [{"internalType": "string", "name": "_id", "type": "string"}],
                "name": "getProductJourney",
                "outputs": [
                    {
                        "components": [
                            {"internalType": "address", "name": "wallet", "type": "address"},
                            {"internalType": "string", "name": "role", "type": "string"},
                            {"internalType": "string", "name": "name", "type": "string"},
                            {"internalType": "string", "name": "location", "type": "string"},
                            {"internalType": "uint256", "name": "timestamp", "type": "uint256"}
                        ],
                        "internalType": "struct CosmeticsTraceability.JourneyNode[]", "name": "", "type": "tuple[]"
                    }
                ],
                "stateMutability": "view", "type": "function"
            },
            {
                "inputs": [{"internalType": "string", "name": "", "type": "string"}],
                "name": "productExists",
                "outputs": [{"internalType": "bool", "name": "", "type": "bool"}],
                "stateMutability": "view", "type": "function"
            }
        ];

        let web3, contract;

        async function init() {
            const indicator = document.getElementById('statusIndicator');
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                contract = new web3.eth.Contract(abi, contractAddress);
                indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Blockchain Ready';
                indicator.classList.replace('text-slate-400', 'text-emerald-600');
            } else {
                indicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-500"></span> No Wallet Found';
                indicator.classList.replace('text-slate-400', 'text-rose-600');
            }

            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                document.getElementById('batchInput').value = id;
                checkProduct();
            }
        }

        async function checkProduct() {
            const id = document.getElementById('batchInput').value.trim();
            const btn = document.getElementById('verifyBtn');
            if (!id) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Đang xác thực...';

            try {
                const exists = await contract.methods.productExists(id).call();
                if (!exists) throw new Error("Mã sản phẩm không tồn tại!");

                const p = await contract.methods.getProductBasicInfo(id).call();
                const journey = await contract.methods.getProductJourney(id).call();

                document.getElementById('resName').innerText = p.name;
                document.getElementById('resBatch').innerText = p.batchID;
                document.getElementById('resDate').innerText = p.manufactureDate;
                document.getElementById('resOrigin').innerText = p.origin;
                document.getElementById('resImg').src = p.productImageUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');
                document.getElementById('resCert').href = p.certificationUrl.replace('ipfs://', 'https://ipfs.io/ipfs/');

                // Render Ingredients
                const ingContainer = document.getElementById('resIngredients');
                ingContainer.innerHTML = p.ingredients.map(i => 
                    `<span class="bg-slate-50 border border-slate-100 text-slate-600 px-3 py-1.5 rounded-xl text-[11px] font-bold">${i}</span>`
                ).join('');

                // Render Journey (3-node logic: Start, Mid, Current)
                const journeyContainer = document.getElementById('resJourney');
                let journeyHTML = '';
                
                if(journey.length > 0) {
                    const first = journey[0];
                    const last = journey[journey.length-1];
                    const midCount = journey.length - 2;

                    // Node 1: Khởi đầu
                    journeyHTML += renderNode(first, 'Khởi điểm', 'bg-rose-400');

                    // Node 2: Trung gian (nếu có)
                    if(midCount > 0) {
                        journeyHTML += `
                        <div class="relative pl-2 pb-6">
                            <div class="node-dot bg-slate-200"></div>
                            <div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Trung chuyển</div>
                                <div class="text-xs text-slate-500 mt-1">Đã đi qua ${midCount} điểm phân phối</div>
                            </div>
                        </div>`;
                    }

                    // Node 3: Hiện tại
                    journeyHTML += renderNode(last, 'Chủ sở hữu hiện tại', 'bg-pink-500', true);
                }
                
                journeyContainer.innerHTML = journeyHTML;

                document.getElementById('batchInputCard').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Xác thực ngay</span><i class="fa-solid fa-arrow-right-long text-sm"></i>';
            }
        }

        function renderNode(node, label, dotColor, isLast = false) {
            const time = new Date(Number(node.timestamp) * 1000).toLocaleString('vi-VN', { dateStyle: 'short', timeStyle: 'short' });
            return `
            <div class="relative pl-2 pb-6">
                <div class="node-dot ${dotColor}"></div>
                <div class="${isLast ? 'bg-pink-50/50 p-4 rounded-2xl border border-pink-100 -ml-2' : ''}">
                    <div class="text-[10px] font-extrabold ${isLast ? 'text-pink-500' : 'text-slate-400'} uppercase tracking-widest">${label}</div>
                    <div class="text-xs font-bold text-slate-700 mt-1">${node.name} (${node.role})</div>
                    <div class="flex items-center gap-3 mt-1 text-[10px] text-slate-400">
                        <span><i class="fa-solid fa-clock mr-1"></i>${time}</span>
                        <span><i class="fa-solid fa-location-dot mr-1"></i>${node.location}</span>
                    </div>
                    ${isLast ? `<div class="mt-2 text-[9px] font-mono text-pink-300 break-all">${node.wallet}</div>` : ''}
                </div>
            </div>`;
        }

        function resetVerify() {
            document.getElementById('batchInputCard').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('batchInput').value = '';
            window.history.pushState({}, '', window.location.pathname);
        }

        function generateShareQR() {
            const id = document.getElementById('batchInput').value;
            const url = window.location.origin + window.location.pathname + '?id=' + id;
            
            const modalHTML = `
            <div id="qrModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6" onclick="this.remove()">
                <div class="bg-white rounded-[3rem] p-10 text-center max-w-sm w-full shadow-2xl" onclick="event.stopPropagation()">
                    <div class="mb-6 flex justify-center">
                        <img src="2.png" class="w-12 h-12 mb-2">
                    </div>
                    <h3 class="text-xl font-bold mb-2 text-slate-800">QR Chia sẻ</h3>
                    <p class="text-slate-400 text-xs mb-8">Bất kỳ ai quét mã này đều có thể xem thông tin xác thực sản phẩm.</p>
                    <div class="bg-slate-50 p-6 rounded-[2.5rem] inline-block border border-slate-100">
                        <canvas id="modalQrCanvas" class="mx-auto"></canvas>
                    </div>
                    <button onclick="document.getElementById('qrModal').remove()" class="mt-8 w-full py-4 bg-slate-100 text-slate-800 rounded-2xl font-bold hover:bg-slate-200 transition-colors">Đóng cửa sổ</button>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            setTimeout(() => QRCode.toCanvas(document.getElementById('modalQrCanvas'), url, { width: 220, margin: 1, color: { dark: '#0f172a' } }), 50);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
